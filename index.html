[data-theme="aurora"] .section, [data-theme="aurora"] .kpi-strip, [data-theme="aurora"] .breakdown-strip,

  backdrop-filter: blur(40px) saturate(180%) !important;

  box-shadow: 0 1px 0 rgba(255,255,255,0.06) inset, 0 8px 32px rgba(0,0,0,0.25) !important;
  border-radius: 16px !important;
}
[data-theme="glass"] .hero-card,
[data-theme="aurora"] .hero-card,
[data-theme="stealth"] .hero-card,
[data-theme="slate"] .hero-card,
[data-theme="mono"] .hero-card,
[data-theme="neon"] .hero-card {

  border-radius: 14px !important;
  transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1) !important;
}
[data-theme="glass"] .hero-card:hover,
[data-theme="aurora"] .hero-card:hover,
[data-theme="stealth"] .hero-card:hover,
[data-theme="slate"] .hero-card:hover,
[data-theme="mono"] .hero-card:hover,
[data-theme="neon"] .hero-card:hover {

  box-shadow: 0 1px 0 rgba(255,255,255,0.1) inset, 0 12px 32px rgba(0,0,0,0.3) !important;
}
/* Stealth — keep true black background but add depth */
[data-theme="stealth"] body{background: radial-gradient(ellipse at top, #0d0d12 0%, #000 60%);background-attachment:fixed}
/* Slate — radial depth */
[data-theme="slate"] body{background: radial-gradient(ellipse at top right, #1a2030 0%, #0d1117 50%, #080c12 100%);background-attachment:fixed}
/* Aurora — ambient purple glow */
[data-theme="aurora"] body{background: radial-gradient(ellipse at top left, #1a0e2a 0%, #0a0612 50%, #060410 100%);background-attachment:fixed}
/* Neon — deep purple ambient */
[data-theme="neon"] body{background: radial-gradient(ellipse at center, #15041e 0%, #0a0014 70%);background-attachment:fixed}
/* Mono — subtle gray depth */
[data-theme="mono"] body{background: radial-gradient(ellipse at top, #0f0f0f 0%, #050505 70%);background-attachment:fixed}
/* Glass — subtle blue depth */
[data-theme="glass"] body{background: radial-gradient(ellipse at top, #14141e 0%, #08080c 70%);background-attachment:fixed}

/* Paper light theme — adapted frost effect with shadows instead of blur */
[data-theme="paper"] .section, [data-theme="paper"] .kpi-strip, [data-theme="paper"] .breakdown-strip {
  box-shadow: 0 1px 0 rgba(255,255,255,0.9) inset, 0 4px 16px rgba(0,0,0,0.06) !important;

}

}

  transform: translateY(-2px) !important;
  box-shadow: 0 1px 0 rgba(255,255,255,1) inset, 0 8px 20px rgba(0,0,0,0.1) !important;
}


/* ──── MERCURY — Liquid chrome / metallic monochrome ──── */
[data-theme="mercury"]{--bg:#0e0e12;--bg1:#1a1a22;--bg2:#13131a;--bg3:#0a0a10;--border:#3d3d4f;--border2:#252533;--text:#f8f8fa;--text2:#d0d0d8;--text3:#9898a8;--text4:#a8a8b8;--text5:#787888;--green:#a8b5c0;--red:#c8a0a0;--yellow:#d8c890;--blue:#a8c0d0;--purple:#b0a8c8;}

[data-theme="mercury"] .section,[data-theme="mercury"] .kpi-strip,[data-theme="mercury"] .breakdown-strip{background:linear-gradient(160deg, rgba(255,255,255,0.06) 0%, rgba(255,255,255,0.02) 40%, rgba(255,255,255,0.04) 100%) !important;border:1px solid rgba(255,255,255,0.1) !important;backdrop-filter:blur(40px) saturate(120%) !important;-webkit-backdrop-filter:blur(40px) saturate(120%) !important;box-shadow:0 1px 0 rgba(255,255,255,0.12) inset, 0 -1px 0 rgba(0,0,0,0.3) inset, 0 8px 32px rgba(0,0,0,0.35) !important;border-radius:18px !important}
[data-theme="mercury"] .hero-card{background:linear-gradient(165deg, rgba(255,255,255,0.08) 0%, rgba(255,255,255,0.025) 50%, rgba(255,255,255,0.05) 100%) !important;border:1px solid rgba(255,255,255,0.12) !important;backdrop-filter:blur(40px) saturate(120%) !important;-webkit-backdrop-filter:blur(40px) saturate(120%) !important;box-shadow:0 1px 0 rgba(255,255,255,0.18) inset, 0 -1px 0 rgba(0,0,0,0.25) inset, 0 8px 24px rgba(0,0,0,0.3) !important;border-radius:16px !important;transition:all 0.3s cubic-bezier(0.4, 0, 0.2, 1) !important;position:relative;overflow:hidden}
[data-theme="mercury"] .hero-card::before{content:'';position:absolute;top:0;left:5%;right:5%;height:1px;background:linear-gradient(90deg,transparent 0%,rgba(255,255,255,0.4) 50%,transparent 100%);pointer-events:none}
[data-theme="mercury"] .hero-card:hover{transform:translateY(-2px) !important;background:linear-gradient(165deg, rgba(255,255,255,0.12) 0%, rgba(255,255,255,0.04) 50%, rgba(255,255,255,0.07) 100%) !important;box-shadow:0 1px 0 rgba(255,255,255,0.25) inset, 0 -1px 0 rgba(0,0,0,0.25) inset, 0 12px 32px rgba(0,0,0,0.4) !important}
[data-theme="mercury"] .sec-hd{color:rgba(255,255,255,0.55);letter-spacing:3px;font-weight:300}
[data-theme="mercury"] .stat-lbl{color:rgba(255,255,255,0.5);letter-spacing:2px;font-weight:300}
[data-theme="mercury"] th{color:rgba(255,255,255,0.45);border-bottom:1px solid rgba(255,255,255,0.08);background:transparent;font-weight:400;letter-spacing:1.5px}
[data-theme="mercury"] td{border-bottom:1px solid rgba(255,255,255,0.04);color:rgba(255,255,255,0.88)}

[data-theme="mercury"] .kpi-strip > .mini-card,[data-theme="mercury"] .breakdown-strip > .section{border-right:1px solid rgba(255,255,255,0.06)}
[data-theme="mercury"] .btn-ghost.active{border-bottom:2px solid rgba(255,255,255,0.85);color:rgba(255,255,255,1);background:rgba(255,255,255,0.05)}
[data-theme="mercury"] .nav-bar{background:rgba(20,20,28,0.5);backdrop-filter:blur(60px) saturate(120%);border-bottom:1px solid rgba(255,255,255,0.06)}


/* ──── OBSIDIAN — like Mercury but darker, with deep emerald accents ──── */
[data-theme="obsidian"]{--bg:#06080a;--bg1:#0d1014;--bg2:#0a0e12;--bg3:#06080a;--border:#283038;--border2:#1a1f25;--text:#f0f5f2;--text2:#c8d0d0;--text3:#7d8a8a;--text4:#90a0a0;--text5:#5d6868;--green:#1a8870;--red:#a85060;--yellow:#d8b870;--blue:#5a8fa8;--purple:#7a708a;}

[data-theme="obsidian"] .section,[data-theme="obsidian"] .kpi-strip,[data-theme="obsidian"] .breakdown-strip{background:linear-gradient(160deg, rgba(255,255,255,0.04) 0%, rgba(255,255,255,0.01) 50%, rgba(26,136,112,0.02) 100%) !important;border:1px solid rgba(255,255,255,0.06) !important;backdrop-filter:blur(40px) saturate(140%) !important;-webkit-backdrop-filter:blur(40px) saturate(140%) !important;box-shadow:0 1px 0 rgba(255,255,255,0.06) inset, 0 -1px 0 rgba(0,0,0,0.4) inset, 0 8px 32px rgba(0,0,0,0.5), 0 0 24px rgba(26,136,112,0.04) !important;border-radius:18px !important}
[data-theme="obsidian"] .hero-card{background:linear-gradient(165deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0.015) 50%, rgba(26,136,112,0.03) 100%) !important;border:1px solid rgba(255,255,255,0.08) !important;backdrop-filter:blur(40px) saturate(140%) !important;-webkit-backdrop-filter:blur(40px) saturate(140%) !important;box-shadow:0 1px 0 rgba(255,255,255,0.1) inset, 0 -1px 0 rgba(0,0,0,0.3) inset, 0 8px 24px rgba(0,0,0,0.4) !important;border-radius:16px !important;transition:all 0.3s cubic-bezier(0.4, 0, 0.2, 1) !important;position:relative;overflow:hidden}
[data-theme="obsidian"] .hero-card::before{content:'';position:absolute;top:0;left:10%;right:10%;height:1px;background:linear-gradient(90deg,transparent 0%,rgba(255,255,255,0.25) 50%,transparent 100%);pointer-events:none}
[data-theme="obsidian"] .hero-card:hover{transform:translateY(-2px) !important;background:linear-gradient(165deg, rgba(255,255,255,0.08) 0%, rgba(255,255,255,0.025) 50%, rgba(26,136,112,0.06) 100%) !important;border-color:rgba(26,136,112,0.3) !important;box-shadow:0 1px 0 rgba(255,255,255,0.15) inset, 0 -1px 0 rgba(0,0,0,0.3) inset, 0 12px 32px rgba(0,0,0,0.5), 0 0 20px rgba(26,136,112,0.1) !important}
[data-theme="obsidian"] .sec-hd{color:rgba(200,208,208,0.6);letter-spacing:3px;font-weight:300}
[data-theme="obsidian"] .stat-lbl{color:rgba(200,208,208,0.55);letter-spacing:2px;font-weight:400}
[data-theme="obsidian"] th{color:rgba(200,208,208,0.5);border-bottom:1px solid rgba(255,255,255,0.05);background:transparent;font-weight:400;letter-spacing:1.5px}
[data-theme="obsidian"] td{border-bottom:1px solid rgba(255,255,255,0.03);color:rgba(240,245,242,0.88)}
[data-theme="obsidian"] .tr-row:hover{background:rgba(26,136,112,0.05)}
[data-theme="obsidian"] .kpi-strip > .mini-card,[data-theme="obsidian"] .breakdown-strip > .section{border-right:1px solid rgba(255,255,255,0.05)}
[data-theme="obsidian"] .btn-ghost.active{border-bottom:2px solid #1a8870;color:rgba(255,255,255,1);background:rgba(26,136,112,0.08)}
[data-theme="obsidian"] .nav-bar{background:rgba(6,8,10,0.5);backdrop-filter:blur(60px) saturate(140%);border-bottom:1px solid rgba(255,255,255,0.05)}

[data-density="compact"]{--pad:8px;--card-pad:7px 10px;--mini-pad:6px 9px;--fs:11px;--fsm:10px;--fss:9px;--fsxs:8px;}
[data-density="compact"] .content{padding:14px 18px}
[data-density="compact"] th,[data-density="compact"] td{padding:5px 8px}
[data-density="compact"] .sec-hd{padding:8px 14px}
[data-density="large"]{--pad:22px;--card-pad:18px 22px;--mini-pad:14px 18px;--fs:14px;--fsm:12px;--fss:11px;--fsxs:10px;}

*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'JetBrains Mono',monospace;font-size:var(--fs)}
::-webkit-scrollbar{width:3px;height:3px}::-webkit-scrollbar-track{background:var(--bg1)}::-webkit-scrollbar-thumb{background:var(--text5)}
input,select,textarea{background:var(--bg2);border:1px solid var(--border);color:var(--text);font-family:'JetBrains Mono',monospace;font-size:var(--fsm);padding:8px 10px;width:100%;outline:none;transition:border-color .15s}
input:focus,select:focus,textarea:focus{border-color:color-mix(in srgb, var(--green) 40%, transparent)}
select{-webkit-appearance:none;cursor:pointer}
button{cursor:pointer;font-family:'JetBrains Mono',monospace;border:none;transition:all .15s}
.btn-g{background:color-mix(in srgb,var(--green) 12%,transparent);border:1px solid color-mix(in srgb,var(--green) 30%,transparent);color:var(--green);padding:7px 16px;font-size:var(--fsxs);letter-spacing:1px}
.btn-g:hover{background:color-mix(in srgb,var(--green) 22%,transparent)}.btn-g:disabled{opacity:.4;cursor:not-allowed}
.btn-r{background:color-mix(in srgb,var(--red) 12%,transparent);border:1px solid color-mix(in srgb,var(--red) 30%,transparent);color:var(--red);padding:7px 16px;font-size:var(--fsxs);letter-spacing:1px}
.btn-r:hover{background:color-mix(in srgb,var(--red) 22%,transparent)}
.btn-y{background:color-mix(in srgb,var(--yellow) 12%,transparent);border:1px solid color-mix(in srgb,var(--yellow) 30%,transparent);color:var(--yellow);padding:7px 16px;font-size:var(--fsxs);letter-spacing:1px}
.btn-b{background:color-mix(in srgb,var(--blue) 12%,transparent);border:1px solid color-mix(in srgb,var(--blue) 30%,transparent);color:var(--blue);padding:7px 16px;font-size:var(--fsxs);letter-spacing:1px}
.btn-d{background:var(--bg2);border:1px solid var(--border);color:var(--text3);padding:7px 16px;font-size:var(--fsxs);letter-spacing:1px}
.btn-d:hover{border-color:var(--text4);color:var(--text2)}
.btn-ghost{background:none;border:none;color:var(--text4);font-size:var(--fss);letter-spacing:2px;padding:13px 16px;border-bottom:2px solid transparent}
.btn-ghost:hover{color:var(--text2)}.btn-ghost.active{color:var(--green);border-bottom-color:var(--green)}
.del-btn{background:none;border:none;color:var(--text5);font-size:14px;padding:2px 7px}.del-btn:hover{color:var(--red)}
.edit-btn{background:none;border:none;color:var(--text4);font-size:var(--fss);padding:2px 7px}.edit-btn:hover{color:var(--yellow)}
.card{background:var(--bg1);border:1px solid var(--border);padding:var(--card-pad);position:relative;overflow:visible}
.mini-card{background:var(--bg2);border:none;padding:var(--mini-pad);position:relative;overflow:visible}
.section{border:1px solid var(--border);background:var(--bg2)}
.sec-hd{background:transparent;padding:6px 9px 3px;border-bottom:none;font-size:var(--fsxs);letter-spacing:2px;color:var(--text4);display:flex;justify-content:space-between;align-items:center;gap:8px}
.lbl{display:block;font-size:var(--fsxs);letter-spacing:2px;color:var(--text3);margin-bottom:4px}
.tag{font-size:var(--fsxs);letter-spacing:1px;padding:1px 7px;background:var(--bg2);color:var(--text3);border:1px solid var(--border2)}
.tr-row:hover{background:var(--bg2)}
.topbar{background:color-mix(in srgb,var(--bg) 85%,var(--bg1));border-bottom:1px solid var(--border);display:flex;align-items:stretch;padding:0 16px;position:sticky;top:0;z-index:100;flex-wrap:wrap}
.content{padding:calc(var(--pad)*1.5) calc(var(--pad)*1.75);max-width:1440px;margin:0 auto}
table{width:100%;border-collapse:collapse;font-size:var(--fsm)}
th{padding:7px 9px;text-align:left;color:var(--text3);font-weight:normal;font-size:var(--fsxs);letter-spacing:2px;border-bottom:1px solid var(--border);white-space:nowrap;background:var(--bg2);cursor:pointer}
th:hover{color:var(--text2)}
td{padding:6px 9px;border-bottom:1px solid color-mix(in srgb,var(--border) 50%,transparent);color:var(--text2);vertical-align:middle}
.drop-zone{border:1px dashed var(--border);padding:28px 20px;text-align:center;cursor:pointer;transition:all .15s;background:var(--bg3)}
.drop-zone:hover,.drop-zone.drag{border-color:color-mix(in srgb,var(--green) 50%,transparent);background:color-mix(in srgb,var(--green) 5%,transparent)}
a.clink{color:var(--blue);font-size:var(--fsxs);text-decoration:none}
/* tooltip */
.tip-wrap{position:relative;display:inline-flex;align-items:center;gap:4px;vertical-align:middle}
.tip-icon{display:inline-flex;align-items:center;justify-content:center;width:13px;height:13px;border-radius:50%;background:var(--bg3);border:1px solid var(--border);color:var(--text4);font-size:8px;cursor:help;font-style:normal;font-family:serif;flex-shrink:0}
.tip-icon:hover+.tip-box{display:block}
.tip-box{display:none;position:absolute;top:18px;left:0;background:var(--bg1);border:1px solid var(--border);padding:10px 12px;font-size:var(--fss);color:var(--text2);letter-spacing:.3px;line-height:1.7;width:240px;z-index:60;pointer-events:none;box-shadow:0 8px 24px #00000099}
/* warning */
.warn-stripe{position:absolute;top:0;left:0;right:0;height:2px}
.warn-badge{font-size:var(--fsxs);color:var(--yellow);display:flex;align-items:center;gap:4px;margin-top:4px}
.danger-badge{font-size:var(--fsxs);color:var(--red);display:flex;align-items:center;gap:4px;margin-top:4px}
/* modal */
.modal-bg{position:fixed;inset:0;background:#000000cc;z-index:200;display:flex;align-items:center;justify-content:center;padding:20px}
.modal{background:var(--bg1);border:1px solid var(--border);width:100%;max-width:640px;max-height:92vh;overflow-y:auto}
.modal-hd{background:var(--bg);padding:13px 18px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;font-size:var(--fsxs);letter-spacing:2px;color:var(--text3);position:sticky;top:0;z-index:3}
/* grades */
.grade-A{color:var(--green);background:color-mix(in srgb,var(--green) 12%,transparent);border:1px solid color-mix(in srgb,var(--green) 25%,transparent);font-size:var(--fss);padding:1px 7px;font-family:'Bebas Neue',monospace}
.grade-B{color:var(--blue);background:color-mix(in srgb,var(--blue) 12%,transparent);border:1px solid color-mix(in srgb,var(--blue) 25%,transparent);font-size:var(--fss);padding:1px 7px;font-family:'Bebas Neue',monospace}
.grade-C{color:var(--yellow);background:color-mix(in srgb,var(--yellow) 12%,transparent);border:1px solid color-mix(in srgb,var(--yellow) 25%,transparent);font-size:var(--fss);padding:1px 7px;font-family:'Bebas Neue',monospace}
.grade-D{color:#ff8c42;background:#ff8c4218;border:1px solid #ff8c4230;font-size:var(--fss);padding:1px 7px;font-family:'Bebas Neue',monospace}
.grade-F{color:var(--red);background:color-mix(in srgb,var(--red) 12%,transparent);border:1px solid color-mix(in srgb,var(--red) 25%,transparent);font-size:var(--fss);padding:1px 7px;font-family:'Bebas Neue',monospace}
.grade-x{color:var(--text4);background:var(--bg2);border:1px solid var(--border2);font-size:var(--fss);padding:1px 7px;font-family:'Bebas Neue',monospace}
/* inline select */
.inline-sel{background:var(--bg2);border:1px solid var(--border);color:var(--text2);font-family:'JetBrains Mono',monospace;font-size:var(--fsxs);padding:2px 4px;outline:none;cursor:pointer;max-width:120px}
.inline-sel:focus{border-color:color-mix(in srgb,var(--green) 40%,transparent)}
/* filter */
.filter-inp{background:transparent;border:none;border-bottom:1px solid var(--border);color:var(--text2);font-family:'JetBrains Mono',monospace;font-size:var(--fsxs);padding:3px 5px;width:100%;outline:none}
.filter-inp:focus{border-bottom-color:var(--green)}
.vbadge{font-size:var(--fsxs);color:var(--text5);letter-spacing:1px;font-family:'JetBrains Mono',monospace}
.lesson-card{background:var(--bg3);border:1px solid var(--border2);padding:13px 15px;margin-bottom:8px}
/* spinner / pulse */
.pulse{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 2s infinite;vertical-align:middle}
.pulse-y{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--yellow);animation:pulse 2s infinite;vertical-align:middle}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.25}}
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{display:inline-block;width:15px;height:15px;border:2px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
.fade{animation:fadeIn .2s ease}
/* auth */
.auth-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
/* theme switcher */
.theme-dot{width:16px;height:16px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all .15s}
.theme-dot.active{border-color:var(--text);transform:scale(1.4);box-shadow:0 0 0 2px var(--bg),0 0 0 4px var(--text2)}
/* toggle */
.toggle-pill{display:inline-flex;background:var(--bg2);border:1px solid var(--border);border-radius:0;overflow:hidden}
.toggle-pill button{background:none;border:none;color:var(--text4);padding:4px 12px;font-size:var(--fsxs);letter-spacing:1px;transition:all .15s}
.toggle-pill button.on{background:color-mix(in srgb,var(--green) 15%,transparent);color:var(--green)}
</style>
</head>
<body>
<div id="app"><div style="height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:18px"><div style="font-family:'Bebas Neue',monospace;font-size:36px;letter-spacing:5px;color:#00e5a0">EDGE LOG</div><div style="width:240px;height:3px;background:#1e1e36;overflow:hidden;position:relative"><div id="loadbar" style="height:100%;background:#00e5a0;width:0%;transition:width .3s ease"></div></div><div id="loadtxt" style="font-size:10px;letter-spacing:3px;color:#404060">INITIALIZING v12.9...</div></div></div>
<script>
// Manual loading stages — shows EXACTLY what's running
window._stages=[];
window._setStage=function(name){

window.findDuplicateTrades=function(){
  const groups={};
  trades.forEach(t=>{
    const key=t.date+'|'+t.symbol;
    if(!groups[key])groups[key]=[];
    groups[key].push(t);
  });
  const dupes=[];
  Object.values(groups).forEach(group=>{
    if(group.length<2)return;
    for(let i=0;i<group.length;i++){
      for(let j=i+1;j<group.length;j++){
        const a=group[i],b=group[j];
        const entryClose=Math.abs(a.entry-b.entry)<0.5;
        const exitClose=Math.abs(a.exit-b.exit)<0.5;
        const sameDir=a.type===b.type;
        if(entryClose&&exitClose&&sameDir){
          if(!dupes.some(d=>d.includes(a)||d.includes(b)))dupes.push([a,b]);
        }
      }
    }
  });
  return dupes;
};

  const pctGains=[];const pctLosses=[];
  let runBal2=accountEquity>0?accountEquity:0;
  tds.forEach(t=>{
    const base=runBal2>0?runBal2:1;
    const p=(t.pnl/base)*100;
    if(t.pnl>0)pctGains.push(p);
    else if(t.pnl<0)pctLosses.push(p);
    runBal2+=t.pnl;
  });
  const avgPctWin=pctGains.length?pctGains.reduce((a,b)=>a+b,0)/pctGains.length:0;
  const avgPctLoss=pctLosses.length?pctLosses.reduce((a,b)=>a+b,0)/pctLosses.length:0;
  // Kelly Criterion: optimal bet size as % of account
  // Full Kelly: K = WR - (1-WR)/(avgWin/avgLoss)
  // Half Kelly used in practice (safer)

  const kelly = avgL > 0 ? Math.max(0, wr - (1-wr)/(avgW/avgL)) : 0;
  const halfKelly = kelly / 2;
  // Expectancy ratio (normalized per $1 risked)
  const expectancyRatio = avgL > 0 ? (wr * avgW - (1-wr)*avgL)/avgL : 0;
  return{wr,avgW,avgL,pf,ev,net,grossNet,grossW,grossL,grossWins:grossW,grossLosses:grossL,maxWin:best?pnlVal(best):0,maxLoss:worst?Math.abs(pnlVal(worst)):0,totalFees,feeImpact,maxDD,sharpe,recovery,rr,streak,sdir,maxWS,maxLS,kelly,halfKelly,expectancyRatio,avgPctWin,avgPctLoss,
    wins:wins.length,losses:losses.length,total:tds.length,longs:longs.length,shorts:shorts.length,
    longPnl:longs.reduce((s,t)=>s+t.pnl,0),shortPnl:shorts.reduce((s,t)=>s+t.pnl,0),
    longWR:longs.length?longs.filter(t=>pnlVal(t)>0).length/longs.length:0,
    shortWR:shorts.length?shorts.filter(t=>pnlVal(t)>0).length/shorts.length:0,
    best,worst,bestDay,worstDay,avgDur,avgWinDur,avgLossDur,
    syms,setups,monthly,byGrade,byTF,dow,byDay,rolling};
}

// ── NinjaTrader PDF Statement Parser ─────────────────────────────
async function importPDF(file){
  if(!window.pdfjsLib){throw new Error('PDF library not loaded. Refresh and try again.');}
  const arrayBuf=await file.arrayBuffer();
  const pdf=await pdfjsLib.getDocument({data:arrayBuf}).promise;
  // Build line-by-line text
  let allLines=[];
  for(let pi=1;pi<=pdf.numPages;pi++){
    const page=await pdf.getPage(pi);
    const content=await page.getTextContent();
    const items=content.items.sort((a,b)=>{
      const yDiff=Math.abs(a.transform[5]-b.transform[5]);
      if(yDiff>2)return b.transform[5]-a.transform[5];
      return a.transform[4]-b.transform[4];
    });
    let lastY=null,line='';
    items.forEach(it=>{
      const y=it.transform[5];
      if(lastY!==null&&Math.abs(y-lastY)>2){
        if(line.trim())allLines.push(line.trim());
        line='';
      }
      line+=' '+it.str;
      lastY=y;
    });
    if(line.trim())allLines.push(line.trim());
  }
  const result={batch:[],merges:[],feeUpdates:[],balRows:[],imported:0,skipped:0,merged:0,type:'pdf_statement',label:file.name};
  // Balances
  for(const line of allLines){
    const begM=line.match(/Beginning balance\s+([\d,.]+)/i);
    if(begM){const b=parseFloat(begM[1].replace(/,/g,''));if(b>0&&(!accountEquity||accountEquity===0))accountEquity=b;}
    const endM=line.match(/Ending Balance\s+(?:US\$?\s+)?([\d,.]+)/i);
    if(endM){const e=parseFloat(endM[1].replace(/,/g,''));if(e>0){const dM=allLines.join(' ').match(/(?:Daily|Monthly) Statement\s+(\d{1,2}\/\d{1,2}\/\d{4})/i);if(dM)result.balRows.push({date:parseDate(dM[1]),balance:e});}}
  }
  // ── Parse Daily Activity Summary ──────────────────────────────
  // Format:
  //   "MM/DD/YYYY SYMBOLM6"
  //   "<contracts> <exch> <comm> <nfa> <pnl> <segregated> - -"
  //   "MM/DD/YYYY Clearing_Fee"
  //   "- - - - <clearingPnl> <segregated> - -"
  // The Clearing_Fee row has its fee amount as the 5th number (PNL column position)
  // dailyData[sym|date] = {contracts, fees: {exch,comm,nfa,clearing}, pnl, totalFees}
  const dailyData={};
  for(let i=0;i<allLines.length;i++){
    const line=allLines[i].trim();
    // Match "MM/DD/YYYY SYMBOL" header line
    const symHdr=line.match(/^(\d{2}\/\d{2}\/\d{4})\s+([A-Z]{2,6})M?\d?\s*$/);
    if(symHdr){
      const date=parseDate(symHdr[1]);
      const baseSym=getBase(symHdr[2]);
      const sym=PRESETS[baseSym]?baseSym:baseSym;
      // Next line has the numbers
      const dataLine=(allLines[i+1]||'').trim();
      const nums=dataLine.match(/-?[\d,]+\.?\d*/g)||[];
      if(nums.length>=5){
        const contracts=parseInt(nums[0])||0;
        if(contracts>0){
          const exch=Math.abs(parseFloat(nums[1].replace(/,/g,''))||0);
          const comm=Math.abs(parseFloat(nums[2].replace(/,/g,''))||0);
          const nfa=Math.abs(parseFloat(nums[3].replace(/,/g,''))||0);
          const pnl=parseFloat(nums[4].replace(/,/g,''))||0;
          const key=sym+'|'+date;
          if(!dailyData[key]){
            dailyData[key]={contracts,exch,comm,nfa,clearing:0,pnl,sym,date};
          } else {
            dailyData[key].contracts+=contracts;
            dailyData[key].exch+=exch;
            dailyData[key].comm+=comm;
            dailyData[key].nfa+=nfa;
            dailyData[key].pnl+=pnl;
          }
        }
      }
    }
    // Match Clearing_Fee row
    const clearHdr=line.match(/^(\d{2}\/\d{2}\/\d{4})\s+Clearing_Fee\s*$/i);
    if(clearHdr){
      const date=parseDate(clearHdr[1]);
      const dataLine=(allLines[i+1]||'').trim();
      // The clearing fee row format: "- - - - <fee> <segregated> - -"
      // Find the first negative number which is the clearing fee
      const nums=dataLine.match(/-?[\d,]+\.?\d*/g)||[];
      // First non-dash number is the clearing fee
      const fee=Math.abs(parseFloat(nums[0]?nums[0].replace(/,/g,''):'0')||0);
      // Add clearing to whichever symbol traded on this date
      Object.values(dailyData).forEach(d=>{
        if(d.date===date)d.clearing+=fee;
      });
    }
  }
  // ── Parse Fills section ──────────────────────────────────────
  // Format per line:
  //   "MM/DD/YYYY HH:MM:SS PM(GMT) FILL <buyQty> <sellQty> <price> <orderId>"
  // After "Trading details for SYMBOL Name - Date (TICKER)"
  const fillsBySymDate={};
  let currentSym=null;
  for(let j=0;j<allLines.length;j++){
    const line=allLines[j];
    const symMatch=line.match(/Trading details for.*\(([A-Z]{2,6})M?\d?\)/i);
    if(symMatch){currentSym=getBase(symMatch[1]);continue;}
    if(!currentSym)continue;
    // Match fill line - flexible to handle both AM/PM and GMT variations
    const fillMatch=line.match(/^\s*(\d{2}\/\d{2}\/\d{4})\s+(\d{1,2}:\d{2}:\d{2})\s*(AM|PM)?\s*\(?GMT?\)?\s+FILL/i);
    if(!fillMatch)continue;
    const date=parseDate(fillMatch[1]);
    let time=fillMatch[2];
    // Convert to 24h if PM
    if(fillMatch[3]&&fillMatch[3].toUpperCase()==='PM'){
      const parts=time.split(':');
      let h=parseInt(parts[0]);
      if(h<12)h+=12;
      time=String(h).padStart(2,'0')+':'+parts[1]+':'+parts[2];
    } else if(fillMatch[3]&&fillMatch[3].toUpperCase()==='AM'){
      const parts=time.split(':');
      let h=parseInt(parts[0]);
      if(h===12)h=0;
      time=String(h).padStart(2,'0')+':'+parts[1]+':'+parts[2];
    }
    // Extract rest of line after FILL keyword
    const afterFill=line.substring(fillMatch[0].length).trim();
    // Split into tokens, replace '-' with null
    const tokens=afterFill.split(/\s+/);
    let buyQty=null,sellQty=null,price=null,orderId='';
    if(tokens[0]&&tokens[0]!=='-')buyQty=parseInt(tokens[0])||null;
    if(tokens[1]&&tokens[1]!=='-')sellQty=parseInt(tokens[1])||null;
    if(tokens[2])price=parseFloat(tokens[2].replace(/,/g,''))||null;
    if(tokens[3])orderId=tokens[3].replace(/,/g,'');
    if(!price)continue;
    const side=buyQty?'BUY':'SELL';
    const qty=buyQty||sellQty||1;
    const key=currentSym+'|'+date;
    if(!fillsBySymDate[key])fillsBySymDate[key]=[];
    fillsBySymDate[key].push({time,side,price,qty,orderId});
  }
  // ── Pair fills into round-trip trades ─────────────────────────
  Object.entries(fillsBySymDate).forEach(([key,fills])=>{
    fills.sort((a,b)=>a.time.localeCompare(b.time));
    const [sym,date]=key.split('|');
    const useSym=PRESETS[sym]?sym:sym;
    const dayInfo=dailyData[key];
    // Build trades from fills using proper position tracking
    // Supports scale-in (adding) and scale-out (partial exits)
    // A trade opens when position leaves zero and closes when it returns to zero
    const trades_=[];
    let pos=0;
    let entryQty=0,entryNotional=0,entryTime=null,entrySide=null,entryOid='';
    let exitQty=0,exitNotional=0,exitTime=null;
    fills.forEach(f=>{
      const delta=f.side==='BUY'?f.qty:-f.qty;
      const newPos=pos+delta;
      const isAddToPosition=pos===0||Math.sign(delta)===Math.sign(pos);
      const isReducePosition=pos!==0&&Math.sign(delta)!==Math.sign(pos);
      if(isAddToPosition){
        if(pos===0){
          // First fill of a new trade - initialize entry tracking
          entrySide=f.side;entryOid=f.orderId;entryTime=f.time;
          entryQty=Math.abs(delta);entryNotional=f.price*Math.abs(delta);
          exitQty=0;exitNotional=0;exitTime=null;
        } else {
          // Scale-in: accumulate entry size & weighted price
          entryQty+=Math.abs(delta);entryNotional+=f.price*Math.abs(delta);
        }
      } else if(isReducePosition){
        // Scale-out: accumulate exit size & weighted price
        const closingQty=Math.min(Math.abs(delta),Math.abs(pos));
        exitQty+=closingQty;exitNotional+=f.price*closingQty;
        exitTime=f.time;
      }
      // Check if trade is fully closed
      if(pos!==0&&newPos===0){
        // Trade complete
        const avgEntry=entryQty>0?entryNotional/entryQty:0;
        const avgExit=exitQty>0?exitNotional/exitQty:0;
        trades_.push({
          dir:entrySide==='BUY'?'LONG':'SHORT',
          entry:avgEntry,exit:avgExit,
          entryTime,exitTime,
          size:entryQty,
          orderId:entryOid
        });
        // Reset
        entryQty=0;entryNotional=0;entryTime=null;entrySide=null;entryOid='';
        exitQty=0;exitNotional=0;exitTime=null;
      }
      pos=newPos;
    });
    // Check existing trades
    const existing=trades.filter(t=>t.date===date&&t.symbol===useSym);
    if(existing.length){
      // Update existing trades from PDF data — match by entry/exit price proximity
      existing.forEach(t=>{
        const matchingPair=trades_.find(p=>Math.abs(p.entry-t.entry)<0.5||Math.abs(p.exit-t.exit)<0.5);
        if(!matchingPair)return;
        const updates={};
        if(t.type!==matchingPair.dir)updates.type=matchingPair.dir;
        if(Math.abs((t.size||1)-matchingPair.size)>0)updates.size=matchingPair.size;
        if(Math.abs(t.entry-matchingPair.entry)>0.01)updates.entry=+matchingPair.entry.toFixed(4);
        if(Math.abs(t.exit-matchingPair.exit)>0.01)updates.exit=+matchingPair.exit.toFixed(4);
        if(Object.keys(updates).length){
          // Recalculate P/L with updated values
          const newSize=updates.size||t.size||1;
          const newType=updates.type||t.type;
          const newEntry=updates.entry||t.entry;
          const newExit=updates.exit||t.exit;
          const calc2=tradeCalc(t.symbol,newType,newEntry,newExit,newSize,t.fees||0);
          updates.grossPnl=calc2.grossPnl;
          updates.pnl=calc2.pnl;
          result.merges.push({id:t.id,updates,desc:'updated from PDF: '+Object.keys(updates).filter(k=>!['grossPnl','pnl'].includes(k)).join(', ')});
        }
      });
    } else if(trades_.length){
      // Create trades — distribute fees properly
      const totalFees=dayInfo?(dayInfo.exch+dayInfo.comm+dayInfo.nfa+dayInfo.clearing):0;
      const totalContracts=trades_.reduce((s,t)=>s+t.size,0)||1;
      const feePerContract=totalFees/totalContracts;
      trades_.forEach(p=>{
        const fees=+(feePerContract*p.size).toFixed(2);
        const calc=tradeCalc(useSym,p.dir,p.entry,p.exit,p.size,fees);
        const eT=p.entryTime?p.entryTime.slice(0,5):null;
        const xT=p.exitTime?p.exitTime.slice(0,5):null;
        let durMin=null;
        if(eT&&xT){
          const [eh,em]=eT.split(':').map(Number);
          const [xh,xm]=xT.split(':').map(Number);
          const s=eh*60+em,e=xh*60+xm;
          durMin=e>=s?e-s:(e+1440)-s;
        }
        result.batch.push({
          date,symbol:useSym,type:p.dir,
          entry:+p.entry.toFixed(4),exit:+p.exit.toFixed(4),
          size:p.size,fees,grossPnl:calc.grossPnl,pnl:calc.pnl,
          setup:'—',grade:'—',timeframe:'—',
          notes:'',chartUrl:'',
          durationMins:durMin,entryTime:eT,exitTime:xT,
          orderId:p.orderId||'',
          source:'PDF Statement',assetType:'futures'
        });
      });
    }
    // Apply fee updates to existing trades from Daily Activity
    if(existing.length&&dayInfo){
      const totalFees=dayInfo.exch+dayInfo.comm+dayInfo.nfa+dayInfo.clearing;
      const totalContracts=existing.reduce((s,t)=>s+(t.size||1),0)||1;
      const feePerContract=totalFees/totalContracts;
      existing.forEach(t=>{
        const newFee=+(feePerContract*(t.size||1)).toFixed(2);
        if(Math.abs((t.fees||0)-newFee)>0.005){
          result.feeUpdates.push({id:t.id,fees:newFee,trade:t});
        }
      });
    }
  });
  result.imported=result.batch.length;
  result.merged=result.merges.length;
  return result;
}

// CSV Parsing
function parseLine(l){const r=[];let c='',q=false;for(const ch of l){if(ch==='"')q=!q;else if(ch===','&&!q){r.push(c.trim());c='';}else c+=ch;}r.push(c.trim());return r.map(f=>f.replace(/^"|"$/g,'').trim());}
function parseDate(s){if(!s)return'';let m=s.match(/(\d{1,2})\/(\d{1,2})\/(\d{4})/);if(m)return m[3]+'-'+m[1].padStart(2,'0')+'-'+m[2].padStart(2,'0');m=s.match(/(\d{4})-(\d{2})-(\d{2})/);if(m)return m[0];return s.slice(0,10);}
function parseDT(s){
  if(!s)return null;
  s=String(s).trim();
  // Try MM/DD/YYYY HH:MM:SS (US format)
  let m=s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})\s+(\d{1,2}):(\d{2})(?::(\d{2}))?(?:\s*([APap])\.?[Mm]\.?)?$/);
  if(m){let h=+m[4];if(m[7]){const isPM=/p/i.test(m[7]);if(isPM&&h<12)h+=12;else if(!isPM&&h===12)h=0;}return new Date(+m[3],+m[1]-1,+m[2],h,+m[5],+(m[6]||0));}
  // YYYY-MM-DD HH:MM:SS (ISO-like)
  m=s.match(/^(\d{4})-(\d{1,2})-(\d{1,2})[\sT](\d{1,2}):(\d{2})(?::(\d{2}))?/);
  if(m)return new Date(+m[1],+m[2]-1,+m[3],+m[4],+m[5],+(m[6]||0));
  // Fallback: native Date parse
  const d=new Date(s);
  return isNaN(d.getTime())?null:d;
}
function detectType(hdr){
  const h=hdr.join(' ').toLowerCase();
  if(h.includes('buyprice')&&h.includes('sellprice')&&h.includes('pairedqty'))return'position_history';
  if(h.includes('buyfillid')&&h.includes('sellfillid'))return'performance_v2';
  if(h.includes('cashchangetype'))return'cash';
  if(h.includes('delta')&&h.includes('amount')&&!h.includes('buyprice'))return'cash';
  if(h.includes('totalrealizedpnl'))return'balance_history';
  if(h.includes('b/s')&&h.includes('status'))return'orders';
  if(h.includes('boughttimestamp'))return'performance';
  if(h.includes('fillprice'))return'fills';
  return'generic';
}

function importCSV(text,label){
  const lines=text.split('\n').filter(l=>l.trim());
  if(lines.length<2)return{imported:0,skipped:0,merged:0,type:'empty',batch:[],merges:[],feeUpdates:[],balRows:[]};
  const hdr=parseLine(lines[0]).map(h=>h.toLowerCase().replace(/\s+/g,''));
  const type=detectType(hdr);
  const gc2=(row,keys)=>{for(const k of keys){const i=hdr.findIndex(h=>h.includes(k.replace(/\s/g,'')));if(i!==-1&&row[i]!=null&&row[i]!=='')return row[i];}return'';};

  if(type==='cash'){
    // NT8 Cash History: Account,Transaction ID,Timestamp,Date,Delta,Amount,Cash Change Type,Currency,Contract
    // Fee rows: Exchange Fee, Clearing Fee, Nfa Fee, Commission (each as separate line item)
    // Balance rows: Amount column = running balance AFTER each transaction
    // Trade Paired rows: Delta = gross P/L — DO NOT count as fee
    const feeUpdates=[],balRows=[],ledgerFromCSV=[];
    const pdfLedgerSeen={};
    let foundStartingBalance=false;
    const FEE_TYPES=['exchange fee','clearing fee','nfa fee','commission','regulatory','exchange','clearing','nfa'];
    const SKIP_TYPES=['trade paired','interest','dividend']; // Note: fund transaction handled separately for starting balance
    // Group fees by date
    const feesByDate={};
    for(let i=1;i<lines.length;i++){
      const row=parseLine(lines[i]);if(row.length<4)continue;
      // Try to get Cash Change Type — col 6 in NT8 format
      const ctypeRaw=gc2(row,['cashchangetype','cash change type','type','transtype','transactiontype'])||row[6]||'';
      const ctype=ctypeRaw.toLowerCase().trim();
      const dateRaw=gc2(row,['date','tradedate'])||row[3]||'';
      const date=parseDate(dateRaw);if(!date)continue;
      const delta=parseFloat(gc2(row,['delta','amount','value'])||row[4]||'NaN');
      const runBal=parseFloat(row[5]||'NaN'); // Amount col = running balance
      // Track running balance from any row that has it
      if(!isNaN(runBal)&&runBal>50)balRows.push({date,balance:runBal});
      // Fund Transaction / Deposit / Withdrawal / ACH — track every event
      if(ctype.includes('fund transaction')||ctype.includes('deposit')||ctype.includes('withdrawal')||ctype.includes('ach')||ctype.includes('wire')){
        if(!isNaN(delta)&&delta!==0){
          // Build unique key to dedupe across re-imports
          const evKey=date+'|'+delta.toFixed(2)+'|'+ctype;
          if(!pdfLedgerSeen[evKey]){
            pdfLedgerSeen[evKey]=true;
            ledgerFromCSV.push({
              date,
              amount:delta,
              type:delta>0?'DEPOSIT':'WITHDRAWAL',
              desc:ctypeRaw||'Fund Transaction'
            });
          }
          // First positive event = starting equity baseline
          if(delta>0&&!foundStartingBalance){
            accountEquity=delta;
            foundStartingBalance=true;
          }
        }
        continue;
      }
      // Skip non-fee rows
      if(SKIP_TYPES.some(t=>ctype.includes(t)))continue;
      // Only count actual fee rows
      const isFeeRow=FEE_TYPES.some(t=>ctype.includes(t));
      if(isFeeRow&&!isNaN(delta)&&delta<0){
        feesByDate[date]=(feesByDate[date]||0)+Math.abs(delta);
      }
    }
    // Match fees to trades by date — distribute evenly if multiple trades same day
    Object.entries(feesByDate).forEach(([date,totalFee])=>{
      const dayTrades=trades.filter(t=>t.date===date&&!t.feeFromCash);
      if(!dayTrades.length){
        // Try ±1 day
        const d=new Date(date+'T12:00:00');
        for(const off of [-1,1]){
          const d2=new Date(d);d2.setDate(d.getDate()+off);
          const alt=d2.toISOString().slice(0,10);
          const altTrades=trades.filter(t=>t.date===alt&&!t.feeFromCash);
          if(altTrades.length){const perT=+(totalFee/altTrades.length).toFixed(4);altTrades.forEach(t=>feeUpdates.push({id:t.id,fees:perT,trade:t}));return;}
        }
        return;
      }
      const perTrade=+(totalFee/dayTrades.length).toFixed(4);
      dayTrades.forEach(t=>feeUpdates.push({id:t.id,fees:perTrade,trade:t}));
    });
    // Update account equity from last balance entry
    // (removed) — balance history no longer overwrites accountEquity
    return{imported:0,skipped:0,merged:0,type:'cash',batch:[],merges:[],feeUpdates,balRows,feesByDate};
  }

  // ── NT8 Orders CSV ───────────────────────────────────────────────
  // Columns: Account,Order ID,Instrument,B/S,Qty,Type,Status,Filled,Time,Name,...
  // B/S: " Buy" or " Sell" (note leading space from NT8)
  // Use Filled orders to determine trade direction
  
  // ── NT8 Orders CSV — use B/S + Filled status to determine direction ─
  // Columns: Order ID, B/S, Qty, Symbol, Status, Filled, Fill Price, Avg Price,
  //          Commission, Stop Price, Limit Price, Time, Account
  if(type==='orders'){
    // Orders CSV: track all filled orders by buy/sell + price + symbol + date
    // We can match these to existing trades by symbol+date+entry price proximity
    // and populate buyFillId / sellFillId fields
    const ordersByKey={}; // sym|date -> [{side, price, orderId, time, fillId}]
    for(let i=1;i<lines.length;i++){
      const row=parseLine(lines[i]);if(row.length<6)continue;
      const status=(gc2(row,['status'])||'').toLowerCase();
      if(!status.includes('filled'))continue;
      const bs=(gc2(row,['b/s','ordside','buysell','side','action','type'])||'').trim().toLowerCase();
      const side=bs.startsWith('b')||bs==='long'?'BUY':'SELL';
      // Try 'Product' column first (already base symbol like 'MES'), fall back to 'Contract' (like 'MESM6')
      const symRaw=gc2(row,['product','symbol','contract','instrument'])||'';
      const sym=getBase(symRaw);if(!sym)continue;
      // Date: try 'Fill Time' or 'Timestamp' (full datetime) first, then 'Date'
      const dtRaw=gc2(row,['fill time','filltime','filledtime','timestamp','time','date']);
      const date=parseDate(dtRaw);if(!date)continue;
      // Two distinct IDs: internal 'orderId' (col 1) and visible 'Order ID' (col 3)
      const internalOrderId=gc2(row,['orderid'])||'';
      const visibleOrderId=gc2(row,['order id'])||'';
      const oid=visibleOrderId||internalOrderId||'';
      const fillId=gc2(row,['fillid','fill id','filled id'])||oid;
      // Price: 'avgPrice' or 'Avg Fill Price' (cols 8, 28)
      const price=parseFloat(gc2(row,['avgprice','avg price','avg fill price','fillprice','filled price','filledprice','price'])||'NaN');
      const key=sym+'|'+date;
      if(!ordersByKey[key])ordersByKey[key]=[];
      ordersByKey[key].push({side,price,orderId:oid,fillId,time:dtRaw});
    }
    // Match orders to existing trades
    const merges=[];
    // Debug: log how many trades and order-key buckets we have
    console.log('[ORDERS] orderKeys:',Object.keys(ordersByKey).length,'sample:',Object.keys(ordersByKey).slice(0,3));
    console.log('[ORDERS] tradeKeys:',trades.map(t=>t.symbol+'|'+t.date).slice(0,3));
    trades.forEach(t=>{
      const key=t.symbol+'|'+t.date;
      const orders=ordersByKey[key];
      if(!orders||!orders.length)return;
      const updates={};
      // Find buy and sell orders matching entry/exit prices
      const buyOrder=orders.find(o=>o.side==='BUY'&&Math.abs(o.price-(t.type==='LONG'?t.entry:t.exit))<0.5);
      const sellOrder=orders.find(o=>o.side==='SELL'&&Math.abs(o.price-(t.type==='LONG'?t.exit:t.entry))<0.5);
      if(buyOrder&&!t.buyFillId)updates.buyFillId=buyOrder.fillId||buyOrder.orderId;
      if(sellOrder&&!t.sellFillId)updates.sellFillId=sellOrder.fillId||sellOrder.orderId;
      // Capture Buy/Sell Order IDs separately (the visible NT Order ID, not the internal one)
      if(buyOrder&&!t.buyOrderId)updates.buyOrderId=buyOrder.orderId;
      if(sellOrder&&!t.sellOrderId)updates.sellOrderId=sellOrder.orderId;
      // Set top-level orderId if missing (use first matching order)
      if(!t.orderId){
        const firstOrder=t.type==='LONG'?buyOrder:sellOrder;
        if(firstOrder)updates.orderId=firstOrder.orderId;
      }
      if(Object.keys(updates).length){
        merges.push({id:t.id,updates,desc:Object.keys(updates).join(', ')});
      }
    });
    return{imported:0,skipped:0,merged:merges.length,type:'orders',batch:[],merges,feeUpdates:[],balRows:[]};
  }

  // ── NT8 Performance CSV (new format with pnl column) ────────────
  // Cols: symbol,_priceFormat,_priceFormatType,_tickSize,buyFillId,sellFillId,
  //       qty,buyPrice,sellPrice,pnl,boughtTimestamp,soldTimestamp,duration
  if(type==='performance_v2'){
    const batch=[],merges=[];let skipped=0;
    for(let i=1;i<lines.length;i++){
      const row=parseLine(lines[i]);if(row.length<10)continue;
      const sym=getBase(gc2(row,['symbol','product'])||'MES')||'MES';
      const useSym=PRESETS[sym]?sym:'MES';
      const qty=parseInt(gc2(row,['qty','quantity'])||'1')||1;
      const buyR=parseFloat(gc2(row,['buyprice','buy price'])||'NaN');
      const sellR=parseFloat(gc2(row,['sellprice','sell price'])||'NaN');
      const buyFillId=gc2(row,['buyfillid','buy fill id','buy fillid'])||'';
      const sellFillId=gc2(row,['sellfillid','sell fill id','sell fillid'])||'';
      // pnl column may have $ prefix: "$1.25"
      const plRaw=gc2(row,['pnl','p/l','pl']);
      const plR=parseFloat(plRaw.replace(/[$,]/g,''));
      if(isNaN(buyR)||isNaN(sellR))continue;
      // ── Direction: timestamp-first, P/L-confirmed ──────────────
      // NT8: BoughtTimestamp = when BUY filled, SoldTimestamp = when SELL filled
      // LONG  = buy entry first → BoughtTimestamp <= SoldTimestamp
      // SHORT = sell entry first → SoldTimestamp < BoughtTimestamp
      const btRaw=gc2(row,['boughttimestamp','bought timestamp']);
      const stRaw=gc2(row,['soldtimestamp','sold timestamp']);
      const btDT=parseDT(btRaw),stDT=parseDT(stRaw);
      let dir='LONG';
      if(btDT&&stDT){
        // Primary: use timestamps
        dir=btDT<=stDT?'LONG':'SHORT';
        // Cross-check with P/L — if they disagree, trust timestamps over P/L
        // (P/L can be 0 on breakeven trades, timestamps are always reliable)
      } else {
        // No timestamps available — default LONG, correct via Orders CSV import
        dir='LONG';
      }
      // Entry = price paid to open, Exit = price received to close
      const entry=dir==='LONG'?buyR:sellR;
      const exit=dir==='LONG'?sellR:buyR;
      const date=parseDate(btRaw);if(!date)continue;
      const entryTime=btDT?btDT.toTimeString().slice(0,5):null;
      const exitTime=stDT?stDT.toTimeString().slice(0,5):null;
      const durationMins=btDT&&stDT?Math.round(Math.abs(stDT-btDT)/60000):null;
      // Use CSV pnl if available (it's gross), else calculate
      const grossPnl=!isNaN(plR)?+plR.toFixed(2):calcPnl(useSym,dir,entry,exit,qty,0).gross;
      // Honor an explicit fees column if the CSV carries one (comprehensive/merged export),
      // else fall back to the per-instrument default. Fee column = real fee from Cash History.
      const feeRaw=parseFloat((gc2(row,['fees','fee','commission','totalfees'])||'').replace(/[$,]/g,''));
      const csvHasFee=!isNaN(feeRaw);
      const fees=csvHasFee?+feeRaw.toFixed(2):getFee(useSym);
      const netPnl=+(grossPnl-fees).toFixed(2);
      const existing=trades.find(t=>t.date===date&&t.symbol===useSym&&(Math.abs(t.entry-entry)<0.5||Math.abs(t.exit-exit)<0.5));
      if(existing){
        const upd={};
        if(durationMins&&!existing.durationMins)upd.durationMins=durationMins;
        if(entryTime&&!existing.entryTime)upd.entryTime=entryTime;
        if(exitTime&&!existing.exitTime)upd.exitTime=exitTime;
        if(existing.type!==dir)upd.type=dir;
        if(Object.keys(upd).length>0)merges.push({id:existing.id,updates:upd,desc:Object.keys(upd).join(', ')});
        else skipped++;
        continue;
      }
      batch.push({date,symbol:useSym,type:dir,entry:+entry.toFixed(4),exit:+exit.toFixed(4),
        size:qty,fees,grossPnl,pnl:netPnl,setup:'—',grade:'—',timeframe:'—',
        notes:'',chartUrl:'',durationMins,entryTime,exitTime,buyFillId,sellFillId,
        orderId:buyFillId||sellFillId||'',feeFromCash:csvHasFee,
        source:csvHasFee?'Comprehensive CSV':'Performance CSV',assetType:'futures'});
    }
    return{imported:batch.length,skipped,merged:merges.length,type:'performance_v2',batch,merges,feeUpdates:[],balRows:[]};
  }

  // ── Account Balance History CSV ───────────────────────────────
  if(type==='balance_history'){
    // Account Balance History CSV: Account ID, Account Name, Trade Date, Total Amount, Total Realized PNL
    // Each row = end-of-day balance. We can detect deposits by checking:
    //   today_balance - (yesterday_balance + today_pnl) = deposit/withdrawal
    const balRows=[];
    const detectedLedger=[];
    const sortedRows=[];
    for(let i=1;i<lines.length;i++){
      const row=parseLine(lines[i]);if(row.length<3)continue;
      const date=parseDate(gc2(row,['trade date','tradedate','date']));
      // Handle comma-thousands in NT8 format like "1,458.35"
      const balRaw=(gc2(row,['total amount','totalamount','endbalance','ending balance','balance','amount'])||'').replace(/[",$]/g,'');
      const pnlRaw=(gc2(row,['total realized pnl','totalrealizedpnl','realized pnl'])||'').replace(/[",$]/g,'');
      const bal=parseFloat(balRaw);
      const pnl=parseFloat(pnlRaw)||0;
      if(!date||isNaN(bal))continue;
      sortedRows.push({date,balance:bal,pnl});
    }
    // Sort by date so we can detect deposits chronologically
    sortedRows.sort((a,b)=>a.date>b.date?1:-1);
    let prevBal=null;
    sortedRows.forEach((r,idx)=>{
      balRows.push({date:r.date,balance:r.balance});
      // Detect deposit/withdrawal: today_bal - (yesterday_bal + today_pnl)
      if(prevBal!==null){
        const expected=prevBal+r.pnl;
        const diff=+(r.balance-expected).toFixed(2);
        if(Math.abs(diff)>=1){ // threshold to avoid rounding noise
          detectedLedger.push({
            date:r.date,
            amount:diff,
            type:diff>0?'DEPOSIT':'WITHDRAWAL',
            desc:'Detected from balance history'
          });
        }
      } else if(r.balance>0&&idx===0){
        // First row — if there's a balance with no preceding day, it's the initial deposit
        detectedLedger.push({
          date:r.date,
          amount:r.balance,
          type:'DEPOSIT',
          desc:'Initial deposit (detected from balance history)'
        });
      }
      prevBal=r.balance;
    });
    return{imported:0,skipped:0,merged:0,type:'balance_history',batch:[],merges:[],feeUpdates:[],balRows,ledgerEvents:detectedLedger};
  }

  // ── NT8 Position History parser ────────────────────────────────
  // Columns: Position ID,Timestamp,Trade Date,Net Pos,Net Price,Bought,Avg. Buy,Sold,Avg. Sell,
  //          Account,Contract,Product,...,Pair ID,Buy Fill ID,Sell Fill ID,Paired Qty,
  //          Buy Price,Sell Price,P/L,Currency,Bought Timestamp,Sold Timestamp
  if(type==='position_history'){
    const batch=[],merges=[];let skipped=0;
    for(let i=1;i<lines.length;i++){
      const row=parseLine(lines[i]);if(row.length<20)continue;
      const sym=getBase(gc2(row,['product','contract'])||'MES')||'MES';
      const useSym=PRESETS[sym]?sym:'MES';
      const qty=parseInt(gc2(row,['pairedqty','paired qty','qty','quantity'])||'1')||1;
      const buyFillId=gc2(row,['buyfillid','buy fill id'])||'';
      const sellFillId=gc2(row,['sellfillid','sell fill id'])||'';
      const positionId=gc2(row,['position id','positionid'])||'';
      const pairId=gc2(row,['pair id','pairid'])||'';
      const buyR=parseFloat(gc2(row,['buyprice','buy price'])||'NaN');
      const sellR=parseFloat(gc2(row,['sellprice','sell price'])||'NaN');
      const plR=parseFloat(gc2(row,['p/l','pl','pnl','profit'])||'NaN');
      if(isNaN(buyR)||isNaN(sellR))continue;
      // ── DIRECTION LOGIC (the critical fix) ──────────────────────
      // If (sellPrice - buyPrice) * P/L > 0 → LONG (prices confirm P/L direction)
      // If (sellPrice - buyPrice) * P/L < 0 → SHORT (prices inverse of P/L)
      // When P/L = 0 or prices equal → use timestamps: earlier = entry
      // Direction: timestamps ONLY (NT8 P/L = sell-buy always, can't determine direction)
      const _bt2=parseDT(gc2(row,['boughttimestamp','bought timestamp']));
      const _st2=parseDT(gc2(row,['soldtimestamp','sold timestamp']));
      let dir='LONG';
      if(_bt2&&_st2){
        dir=_bt2<=_st2?'LONG':'SHORT';
      }
      const entry=dir==='LONG'?buyR:sellR;
      const exit=dir==='LONG'?sellR:buyR;
      // Date
      const dateRaw=gc2(row,['trade date','tradedate','date','timestamp']);
      const date=parseDate(dateRaw);if(!date)continue;
      // Timestamps
      const btRaw=gc2(row,['boughttimestamp','bought timestamp']);
      const stRaw=gc2(row,['soldtimestamp','sold timestamp']);
      const btDT=parseDT(btRaw),stDT=parseDT(stRaw);
      const entryTime=btDT?btDT.toTimeString().slice(0,5):null;
      const exitTime=stDT?stDT.toTimeString().slice(0,5):null;
      const durationMins=btDT&&stDT?Math.round(Math.abs(stDT-btDT)/60000):null;
      // P/L: use the CSV's P/L column directly (it's already gross P/L)
      const grossPnl=isNaN(plR)?0:+plR.toFixed(2);
      // Fees come from Cash History — use per-instrument default for now
      const fees=getFee(useSym);
      const netPnl=+(grossPnl-fees).toFixed(2);
      const eqPct=accountEquity>0?+((Math.abs(grossPnl)/accountEquity)*100).toFixed(2):null;
      // Dupe check
      const existing=trades.find(t=>t.date===date&&t.symbol===useSym&&(Math.abs(t.entry-entry)<0.5||Math.abs(t.exit-exit)<0.5));
      if(existing){
        const upd={};
        if(durationMins&&!existing.durationMins)upd.durationMins=durationMins;
        if(entryTime&&!existing.entryTime)upd.entryTime=entryTime;
        if(exitTime&&!existing.exitTime)upd.exitTime=exitTime;
        if(buyFillId&&!existing.buyFillId)upd.buyFillId=buyFillId;
        if(sellFillId&&!existing.sellFillId)upd.sellFillId=sellFillId;
        if(positionId&&!existing.positionId)upd.positionId=positionId;
        if(pairId&&!existing.pairId)upd.pairId=pairId;
        // Update direction if existing was wrong
        if(existing.type!==dir){upd.type=dir;upd.entry=entry;upd.exit=exit;}
        if(Object.keys(upd).length>0)merges.push({id:existing.id,updates:upd,desc:Object.keys(upd).join(', ')});
        else skipped++;
        continue;
      }
      batch.push({date,symbol:useSym,type:dir,entry:+entry.toFixed(4),exit:+exit.toFixed(4),
        size:qty,fees,grossPnl,pnl:netPnl,setup:'—',grade:'—',timeframe:'—',
        notes:'',chartUrl:'',durationMins,entryTime,exitTime,eqPct,
        source:label||'Position History',assetType:'futures',buyFillId,sellFillId,positionId,pairId,orderId:buyFillId||sellFillId||''});
    }
    return{imported:batch.length,skipped,merged:merges.length,type:'position_history',batch,merges,feeUpdates:[],balRows:[]};
  }

  const batch=[],merges=[];let skipped=0;
  for(let i=1;i<lines.length;i++){
    const row=parseLine(lines[i]);if(row.length<4)continue;
    const rawSym=gc2(row,['symbol','instrument'])||'MES',base=getBase(rawSym);
    const sym=PRESETS[base]?base:(rawSym.toUpperCase().slice(0,6));
    const qty=parseInt(gc2(row,['qty','quantity','contracts','size','shares']))||1;
    const buyR=parseFloat(gc2(row,['buyprice','buy price'])),sellR=parseFloat(gc2(row,['sellprice','sell price']));
    const entR=parseFloat(gc2(row,['entryprice','entry price','avg entry','entry','open'])),extR=parseFloat(gc2(row,['exitprice','exit price','avg exit','exit','close']));
    let entry,exit,dir;
    if(!isNaN(buyR)&&!isNaN(sellR)&&buyR>0&&sellR>0){
      // NT8 BuyPrice/SellPrice DON'T indicate direction.
      // They just show what price the buy/sell sides filled at.
      // Must use timestamps to determine which came first (= entry direction)
      const _btRaw=gc2(row,['boughttimestamp','bought timestamp','entrytime','entry time']);
      const _stRaw=gc2(row,['soldtimestamp','sold timestamp','exittime','exit time']);
      const _btDT=parseDT(_btRaw),_stDT=parseDT(_stRaw);
      if(_btDT&&_stDT){
        // Bought before sold = LONG, sold before bought = SHORT
        dir=_btDT<=_stDT?'LONG':'SHORT';
      } else {
        // No timestamps: cannot reliably determine from prices alone
        // Default LONG, will be corrected by Orders CSV if imported
        dir='LONG';
      }
      entry=dir==='LONG'?buyR:sellR;
      exit=dir==='LONG'?sellR:buyR;
    }
    else if(!isNaN(entR)&&!isNaN(extR)&&entR>0&&extR>0){entry=entR;exit=extR;const ds=(gc2(row,['action','side','direction','type'])||'').toLowerCase();dir=ds.includes('buy')||ds.includes('long')?'LONG':'SHORT';}
    else continue;
    const dtR=gc2(row,['boughttimestamp','soldtimestamp','entrytime','entry time','entrydate','date','time']);
    const date=parseDate(dtR);if(!date)continue;
    const buyDT=parseDT(gc2(row,['boughttimestamp','entrytime','entry time'])),sellDT=parseDT(gc2(row,['soldtimestamp','exittime','exit time']));
    const durationMins=buyDT&&sellDT?Math.round(Math.abs(sellDT-buyDT)/60000):null;
    const entryTime=buyDT?buyDT.toTimeString().slice(0,5):null,exitTime=sellDT?sellDT.toTimeString().slice(0,5):null;
    // Fee: use CSV commission column if present, else use per-instrument fee
    // Fee detection — try many NT8 column name variants
    const feeRaw=parseFloat(gc2(row,[
      'commission','commissions','fee','fees','comm','comms',
      'brokerfee','roundtripfee','transactionfee','execfee',
      'totalcommission','fillcommission','tradingfee'
    ]));
    // Only fall back to default if column truly absent (NaN). Honor 0 fees.
    // If fee looks per-contract (very small), multiply by qty
    let fees=isNaN(feeRaw)?getFee(sym):feeRaw;
    if(!isNaN(feeRaw)&&feeRaw>0&&feeRaw<1&&qty>1) fees=feeRaw*qty; // per-contract detection
    const orderId=gc2(row,['orderid','order id','id','ordernum'])||'';
    const calc=tradeCalc(sym,dir,entry,exit,qty,fees);
    const existing=trades.find(t=>t.date===date&&t.symbol===sym&&Math.abs(t.entry-entry)<0.01&&t.size===qty);
    if(existing){
      const upd={},needsApproval={};
      if(durationMins&&!existing.durationMins)upd.durationMins=durationMins;
      if(entryTime&&!existing.entryTime)upd.entryTime=entryTime;
      if(exitTime&&!existing.exitTime)upd.exitTime=exitTime;
      if(orderId&&!existing.orderId)upd.orderId=orderId;
      // Fee override — if user manually set fee, require approval before changing
      if(!isNaN(feeRaw)&&feeRaw>0&&Math.abs((existing.fees||0)-feeRaw)>0.001){
        const newCalc=tradeCalc(sym,existing.type,existing.entry,existing.exit,existing.size,feeRaw);
        if(existing.feeFromCash||existing.feeFromCsv||existing.fees===getFee(sym)){
          // Auto-set fee — safe to override without approval
          upd.fees=feeRaw;upd.pnl=newCalc.pnl;upd.grossPnl=newCalc.grossPnl;upd.feeFromCsv=true;
        } else {
          // User may have manually set this — queue for approval
          needsApproval.fees={old:existing.fees,new:feeRaw,pnlOld:existing.pnl,pnlNew:newCalc.pnl,calc:newCalc};
        }
      }
      if(Object.keys(needsApproval).length>0){
        merges.push({id:existing.id,updates:upd,needsApproval,desc:Object.keys(upd).join(', ')||'none',trade:existing});
      } else if(Object.keys(upd).length>0){
        merges.push({id:existing.id,updates:upd,desc:Object.keys(upd).join(', ')});
      } else skipped++;
      continue;
    }
    const eqPct=accountEquity>0?+((Math.abs(calc.gross)/accountEquity)*100).toFixed(2):null;
batch.push({date,symbol:sym,type:dir,entry:+entry.toFixed(4),exit:+exit.toFixed(4),size:qty,fees,...calc,setup:'—',grade:'—',timeframe:'—',notes:'',chartUrl:'',orderId,durationMins,entryTime,exitTime,source:label||'Import',assetType:isFut(sym)?'futures':'stock',eqPct});
  }
  return{imported:batch.length,skipped,merged:merges.length,type,batch,merges,feeUpdates:[],balRows:[]};
}

// ── Order-independent fee buffer ──────────────────────────────────
// Cash History fees are matched to trades BY DATE. If a Cash CSV is imported
// before the trades for that date exist, the fees used to be dropped. We now
// persist per-date fee totals and back-fill them onto trades whenever those
// trades appear — so upload order no longer matters and re-imports stay correct.
function loadPendingFees(){try{return JSON.parse(localStorage.getItem('el_pending_fees')||'{}');}catch(e){return{};}}
function mergePendingFees(feesByDate){if(!feesByDate)return;const buf=loadPendingFees();for(const[d,v]of Object.entries(feesByDate))buf[d]=v;localStorage.setItem('el_pending_fees',JSON.stringify(buf));}
async function applyPendingFees(extraTrades){
  const buf=loadPendingFees();const all=[...trades,...(extraTrades||[])];let applied=0;
  for(const[date,totalFee]of Object.entries(buf)){
    const dayTrades=all.filter(t=>t.date===date);if(!dayTrades.length)continue;
    const need=dayTrades.filter(t=>!t.feeFromCash);if(!need.length)continue;
    const perT=+(totalFee/dayTrades.length).toFixed(4);
    for(const t of need){const c=tradeCalc(t.symbol,t.type,t.entry,t.exit,t.size,perT);await updateTrade(t.id,{fees:perT,pnl:c.pnl,grossPnl:c.grossPnl,feeFromCash:true});applied++;}
  }
  return applied;
}
async function commitImport(r,skipApproval){
  const addedIds=[];
  const _aid=localStorage.getItem('el_account_id')||'';
  const _brk=localStorage.getItem('el_broker_name')||'';
  for(const t of r.batch){
    const stamp={};if(_aid&&!t.account)stamp.account=_aid;if(_brk&&!t.broker)stamp.broker=_brk;
    if(!t.buyOrderId&&t.buyFillId)stamp.buyOrderId=t.buyFillId;
    if(!t.sellOrderId&&t.sellFillId)stamp.sellOrderId=t.sellFillId;
    const ref=await colRef.add({...t,...stamp,createdAt:firebase.firestore.FieldValue.serverTimestamp()});addedIds.push(ref.id);
  }
  // Separate merges that need approval from safe ones
  const safeMerges=r.merges.filter(m=>!m.needsApproval||Object.keys(m.needsApproval).length===0);
  const approvalMerges=r.merges.filter(m=>m.needsApproval&&Object.keys(m.needsApproval).length>0);
  for(const m of safeMerges)await updateTrade(m.id,m.updates);
  // Queue approval merges (unless already approved)
  if(!skipApproval&&approvalMerges.length>0){
    pendingMerges=[...pendingMerges,...approvalMerges];
    setTimeout(showApprovalModal,200);
  } else if(skipApproval){
    for(const m of approvalMerges)await updateTrade(m.id,{...m.updates,...Object.fromEntries(Object.entries(m.needsApproval).map(([k,v])=>[k,v.new]))});
  }
  // Cash fee updates
  for(const f of r.feeUpdates){
    const t=f.trade;
    const newCalc=tradeCalc(t.symbol,t.type,t.entry,t.exit,t.size,f.fees);
    await updateTrade(f.id,{fees:f.fees,pnl:newCalc.pnl,grossPnl:newCalc.grossPnl,feeFromCash:true});
  }
  // Order-independent fee back-fill: remember any cash-fee totals and apply them
  // to trades created in THIS import (newTrades) or any prior trades still missing fees.
  if(r.feesByDate)mergePendingFees(r.feesByDate);
  const _newTrades=r.batch.map((t,i)=>({...t,id:addedIds[i]})).filter(t=>t.id);
  const _filled=await applyPendingFees(_newTrades);
  if(_filled)console.log('[FEES] back-filled real fees on',_filled,'trade(s) from buffer');
  if(r.balRows&&r.balRows.length){balanceHistory=[...balanceHistory,...r.balRows].sort((a,b)=>a.date>b.date?1:-1);accountEquity=balanceHistory[balanceHistory.length-1]?.balance||accountEquity;localStorage.setItem('el_equity',accountEquity);}
  // Merge ledger events (deposits/withdrawals) — dedupe by date+amount
  if(r.ledgerEvents&&r.ledgerEvents.length){
    let addedCount=0;
    r.ledgerEvents.forEach(ev=>{
      const exists=ledgerEvents.find(e=>e.date===ev.date&&Math.abs(e.amount-ev.amount)<0.01);
      if(!exists){
        ledgerEvents.push(ev);
        addedCount++;
      }
    });
    if(addedCount>0){
      ledgerEvents.sort((a,b)=>a.date>b.date?1:-1);
      localStorage.setItem('el_ledger',JSON.stringify(ledgerEvents));
      console.log('[LEDGER] Added',addedCount,'events. Total:',ledgerEvents.length);
    }
  }
  // Track upload history
  if((r.batch&&r.batch.length)||(r.merges&&r.merges.length)||(r.feeUpdates&&r.feeUpdates.length)||(r.balRows&&r.balRows.length)){
    // Capture detailed info about what changed
    const mergeDetails=(r.merges||[]).map(m=>{
      const t=trades.find(x=>x.id===m.id)||{};
      // Build before/after summary for each changed field
      const changes=[];
      const updates=m.updates||{};
      Object.keys(updates).forEach(k=>{
        const oldV=t[k];
        const newV=updates[k];
        // Format display values based on field type
        let oldS=oldV,newS=newV;
        if(k==='entry'||k==='exit'){oldS=oldV?oldV.toFixed(4):'—';newS=newV.toFixed(4);}
        else if(k==='pnl'||k==='grossPnl'||k==='fees'){oldS=oldV!=null?'$'+oldV.toFixed(2):'—';newS='$'+newV.toFixed(2);}
        else if(k==='size'){oldS=oldV||1;newS=newV;}
        else if(k==='type'){oldS=oldV||'?';newS=newV;}
        else{oldS=String(oldV||'—').slice(0,12);newS=String(newV).slice(0,12);}
        if(String(oldV)!==String(newV))changes.push({field:k,old:oldS,new:newS});
      });
      return {
        id:m.id,
        desc:m.desc||'',
        symbol:t.symbol||'?',
        date:t.date||'?',
        type:t.type||'?',
        entry:t.entry,
        exit:t.exit,
        pnl:t.pnl,
        size:t.size||1,
        updates:Object.keys(updates).join(', '),
        changes
      };
    });
    const feeDetails=(r.feeUpdates||[]).map(f=>({id:f.id,oldFee:f.trade?.fees||0,newFee:f.fees,symbol:f.trade?.symbol||'?',date:f.trade?.date||'?'}));
    const addedDetails=(r.batch||[]).map((t,idx)=>({id:addedIds[idx],symbol:t.symbol,date:t.date,type:t.type,entry:t.entry,exit:t.exit,size:t.size,pnl:t.pnl}));
    const entry={ts:new Date().toISOString(),label:r.label||'Import',type:r.type,added:(r.batch||[]).length,merged:(r.merges||[]).length,feeUpdates:(r.feeUpdates||[]).length,ledgerEvents:(r.ledgerEvents||[]).length,tradeIds:addedIds||[],mergeDetails,feeDetails,addedDetails};
    uploadHistory.unshift(entry);if(uploadHistory.length>50)uploadHistory=uploadHistory.slice(0,50);
    localStorage.setItem('el_uploads',JSON.stringify(uploadHistory));
  }
}

async function approveChange(idx){
  const m=pendingMerges[idx];if(!m)return;
  const upd={...m.updates};
  if(m.needsApproval.fees){const f=m.needsApproval.fees;upd.fees=f.new;upd.pnl=f.pnlNew;upd.grossPnl=f.calc.grossPnl;upd.feeFromCsv=true;}
  await updateTrade(m.id,upd);
  pendingMerges.splice(idx,1);
  if(!pendingMerges.length){const el2=document.getElementById('approval-modal');if(el2)el2.remove();}
  else showApprovalModal();
}
async function rejectChange(idx){pendingMerges.splice(idx,1);if(!pendingMerges.length){const el2=document.getElementById('approval-modal');if(el2)el2.remove();}else showApprovalModal();}
async function approveAllChanges(){const ms=[...pendingMerges];pendingMerges=[];document.getElementById('approval-modal')?.remove();for(const m of ms)await updateTrade(m.id,{...m.updates,...(m.needsApproval?.fees?{fees:m.needsApproval.fees.new,pnl:m.needsApproval.fees.pnlNew,grossPnl:m.needsApproval.fees.calc.grossPnl,feeFromCsv:true}:{})});}
function rejectAllChanges(){pendingMerges=[];document.getElementById('approval-modal')?.remove();}

async function runAutoImport(){if(!autoHandle)return;try{const file=await autoHandle.getFile(),text=await file.text(),r=importCSV(text,'Auto-Import');if(r.batch.length>0||r.merges.length>0){await commitImport(r);if(el('auto-last'))el('auto-last').textContent='Synced '+new Date().toLocaleTimeString()+' · +'+r.imported+' new · '+r.merged+' merged';}else{if(el('auto-last'))el('auto-last').textContent='Checked '+new Date().toLocaleTimeString()+' · no changes';}}catch(e){console.error(e);}const secs=parseInt((el('auto-interval')||{value:60}).value)||60;autoTimer=setTimeout(runAutoImport,secs*1000);}

// SVG Charts
function sparkline(data,color,w,h,showAxis){
  if(!data||data.length<2)return'';
  const min=Math.min(...data),max=Math.max(...data),range=max-min||1;
  const sx=i=>i/(data.length-1)*w,sy=v=>h*0.85-((v-min)/range*h*0.75);
  const path='M'+data.map((v,i)=>sx(i).toFixed(1)+','+sy(v).toFixed(1)).join('L');
  const fill='M'+sx(0)+','+h+' L'+data.map((v,i)=>sx(i).toFixed(1)+','+sy(v).toFixed(1)).join(' L')+' L'+sx(data.length-1)+','+h+' Z';
  let axis='';
  if(showAxis){
    const lastVal=data[data.length-1],curY=sy(lastVal);
    axis+=`<text x="${w-1}" y="${Math.max(8,curY-2)}" text-anchor="end" fill="${lastVal>=0?'#00e5a0':'#ff3d5a'}" font-size="10" font-family="JetBrains Mono,monospace">$${lastVal>=0?'+':''}${lastVal.toFixed(0)}</text>`;
    axis+=`<text x="1" y="9" text-anchor="start" fill="#505070" font-size="7" font-family="JetBrains Mono,monospace">$${max.toFixed(0)}</text>`;
    if(min<0)axis+=`<text x="1" y="${h-2}" text-anchor="start" fill="#505070" font-size="7" font-family="JetBrains Mono,monospace">$${min.toFixed(0)}</text>`;
  }
  return`<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}" style="display:block;overflow:visible"><defs><linearGradient id="sg${color.replace('#','')}" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="${color}" stop-opacity=".25"/><stop offset="100%" stop-color="${color}" stop-opacity="0"/></linearGradient></defs><path d="${fill}" fill="url(#sg${color.replace('#','')})"/><path d="${path}" stroke="${color}" stroke-width="1.5" fill="none"/>` +axis+'</svg>';
}
function svgLineLabeled(pts,color,W,H,showTradeAmounts,spyPts,yUnit){
  // Same as svgLine but adds P&L amount labels at each dot
  if(!pts||pts.length<2)return'<p style="padding:20px;color:var(--text5);font-size:11px;text-align:center">Add at least 2 trades</p>';
  const PAD={t:18,r:22,b:30,l:62};const cw=W-PAD.l-PAD.r,ch=H-PAD.t-PAD.b;
  const ys=pts.map(p=>p.y);
  // Adaptive Y range — don't anchor to 0 if all points are positive/negative
  let minY=Math.min(...ys),maxY=Math.max(...ys);
  const span=maxY-minY;
  // Add 8% padding above and below the actual data range
  const pad=span*0.08||1;
  minY-=pad;maxY+=pad;
  const rY=maxY-minY||1;
  const sx=i=>PAD.l+(i/(pts.length-1||1))*cw,sy=v=>PAD.t+ch-((v-minY)/rY)*ch,y0=sy(0);
  const path='M'+pts.map((p,i)=>sx(i).toFixed(1)+','+sy(p.y).toFixed(1)).join('L');
  // Use the visual floor (bottom of chart) as the fill base, not necessarily y=0
  const floor=PAD.t+ch;
  // Baseline: if zero is visible, use it; otherwise use floor
  const baseline=(minY<=0&&maxY>=0)?y0:floor;
  const fill='M'+sx(0)+','+baseline.toFixed(1)+' L'+pts.map((p,i)=>sx(i).toFixed(1)+','+sy(p.y).toFixed(1)).join(' L')+' L'+sx(pts.length-1)+','+baseline.toFixed(1)+' Z';
  // Smart label placement — only show every Nth label to avoid crowding
  const labelStep=Math.max(1,Math.floor(pts.length/8));
  const dots=pts.map((p,i)=>{
    const isWin=p.pnl>=0,cx=sx(i).toFixed(1),cyv=sy(p.y).toFixed(1);
    const dotSvg=`<circle class="chart-trade-dot" data-date="${p.date||''}" cx="${cx}" cy="${cyv}" r="2.5" fill="${isWin?'#00e5a0':'#ff3d5a'}" stroke="var(--bg)" stroke-width="1.5"/>`;
    let labelSvg='';
    if(showTradeAmounts&&i%labelStep===0&&p.pnl!==undefined){
      const lbl=(p.pnl>=0?'+':'')+p.pnl.toFixed(0);
      const labelY=(parseFloat(cyv)-6).toFixed(1);
      labelSvg=`<text x="${cx}" y="${labelY}" text-anchor="middle" fill="${isWin?'#00e5a0':'#ff3d5a'}" font-size="8" font-family="JetBrains Mono,monospace" opacity=".8">${lbl}</text>`;
    }
    return dotSvg+labelSvg;
  }).join('');
  // Equity value at current end
  const lastVal=pts[pts.length-1].y,lastX=sx(pts.length-1),lastY=sy(lastVal);
  const endLabel=`<text x="${(lastX+4).toFixed(1)}" y="${lastY.toFixed(1)}" fill="${lastVal>=0?'#00e5a0':'#ff3d5a'}" font-size="9" font-family="JetBrains Mono,monospace" font-weight="bold">${lastVal>=0?'+':''}${lastVal.toFixed(0)}</text>`;
  // High/low labels
  const maxPt=pts.reduce((a,b)=>b.y>a.y?b:a),minPt=pts.reduce((a,b)=>b.y<a.y?b:a);
  const maxIdx=pts.indexOf(maxPt),minIdx=pts.indexOf(minPt);
  const highLabel=`<text x="${sx(maxIdx).toFixed(1)}" y="${(sy(maxPt.y)-6).toFixed(1)}" text-anchor="middle" fill="#00e5a0" font-size="13" font-family="JetBrains Mono,monospace" opacity=".85" font-weight="600">$${maxPt.y.toFixed(0)}</text>`;
  const lowLabel=minPt.y<0?`<text x="${sx(minIdx).toFixed(1)}" y="${(sy(minPt.y)+12).toFixed(1)}" text-anchor="middle" fill="#ff3d5a" font-size="13" font-family="JetBrains Mono,monospace" opacity=".85" font-weight="600">$${minPt.y.toFixed(0)}</text>`:'';
  let yg='',yt='';
  for(let i=0;i<=4;i++){const v=minY+rY*i/4,y=sy(v);yg+=`<line x1="${PAD.l}" y1="${y.toFixed(1)}" x2="${W-PAD.r}" y2="${y.toFixed(1)}" stroke="var(--text5)" stroke-dasharray="2,6"/>`;yt+=`<text x="${PAD.l-6}" y="${(y+4).toFixed(1)}" text-anchor="end" fill="var(--text2)" font-size="13" font-family="JetBrains Mono,monospace" font-weight="500">${(yUnit==="%"||window.chartPctMode)?v.toFixed(1)+"%":"$"+v.toFixed(0)}</text>`;}
  let xt='';const step=Math.max(1,Math.floor(pts.length/8));for(let i=0;i<pts.length;i+=step)xt+=`<text x="${sx(i).toFixed(1)}" y="${H-5}" text-anchor="middle" fill="var(--text2)" font-size="13" font-family="JetBrains Mono,monospace" font-weight="500">${i+1}</text>`;
  const zero=minY<=0&&maxY>=0?`<line x1="${PAD.l}" y1="${y0.toFixed(1)}" x2="${W-PAD.r}" y2="${y0.toFixed(1)}" stroke="var(--text4)" stroke-dasharray="4,4"/>`:'';

  // === INTERACTIVE OVERLAY: invisible hit-zones + crosshair + tooltip ===
  const uniqueId='chart_'+Math.random().toString(36).slice(2,9);
  // Build per-point hover rects (invisible) with data attributes
  let hoverZones='';
  for(let i=0;i<pts.length;i++){
    const p=pts[i];
    const zx=i===0?PAD.l:(sx(i-1)+sx(i))/2;
    const zw=i===pts.length-1?(W-PAD.r-zx):(sx(i+1)-zx)/2+((sx(i)-(i===0?PAD.l:sx(i-1)))/2);
    // simpler: full width slice = cw/pts.length, centered on each point

  }
  const tooltipHTML=`<g class="chart-tooltip" id="${uniqueId}_tip" style="display:none;pointer-events:none">
    <line class="chart-xhair" x1="0" y1="${PAD.t}" x2="0" y2="${PAD.t+ch}" stroke="var(--text4)" stroke-width="1" stroke-dasharray="3,3"/>
    <circle class="chart-dot-h" cx="0" cy="0" r="5" fill="var(--bg)" stroke="${color}" stroke-width="2"/>
    <rect class="chart-tip-bg" x="0" y="0" width="200" height="92" fill="var(--bg)" stroke="${color}" stroke-width="1" rx="3"/>
    <text class="chart-tip-trade" x="0" y="0" fill="var(--text)" font-size="11" font-family="JetBrains Mono,monospace" font-weight="bold">Trade #1</text>
    <text class="chart-tip-sym" x="0" y="0" fill="var(--text3)" font-size="10" font-family="JetBrains Mono,monospace"></text>
    <text class="chart-tip-pnl" x="0" y="0" fill="${color}" font-size="11" font-family="JetBrains Mono,monospace">P&amp;L: +$0</text>
    <text class="chart-tip-cum" x="0" y="0" fill="var(--text3)" font-size="11" font-family="JetBrains Mono,monospace">Cum: $0</text>
    <text class="chart-tip-hint" x="0" y="0" fill="var(--blue)" font-size="9" font-family="JetBrains Mono,monospace">▸ click to view trade</text>
  </g>`;
  // After-render JS: attach handlers (we use setTimeout because the SVG is rendered via innerHTML)

    const svg=document.getElementById(uniqueId);
    if(!svg)return;
    const tip=svg.querySelector('.chart-tooltip');
    const xhair=tip.querySelector('.chart-xhair');
    const dotH=tip.querySelector('.chart-dot-h');
    const tipBg=tip.querySelector('.chart-tip-bg');
    const tipTrade=tip.querySelector('.chart-tip-trade');
    const tipPnl=tip.querySelector('.chart-tip-pnl');
    const tipCum=tip.querySelector('.chart-tip-cum');
    const tipSym=svg.querySelector('.chart-tip-sym');
    const tipHint=svg.querySelector('.chart-tip-hint');
    svg.querySelectorAll('.chart-hover-zone').forEach(z=>{
      z.addEventListener('mouseenter',()=>{
        const x=parseFloat(z.dataset.x);
        const y=parseFloat(z.dataset.y);
        const idx=parseInt(z.dataset.idx);
        const cum=parseFloat(z.dataset.cum);
        const pnl=parseFloat(z.dataset.pnl);
        const tid=z.dataset.tid;
        const date=z.dataset.date;
        const sym=z.dataset.sym;
        const type=z.dataset.type;
        // Position elements
        xhair.setAttribute('x1',x);xhair.setAttribute('x2',x);
        dotH.setAttribute('cx',x);dotH.setAttribute('cy',y);
        const tipW=200,tipH=92;
        let tx=x+10;
        if(tx+tipW>W-10)tx=x-tipW-10;
        let ty=y-tipH-12;
        if(ty<PAD.t)ty=y+12;
        tipBg.setAttribute('x',tx);tipBg.setAttribute('y',ty);

        tipTrade.setAttribute('x',tx+10);tipTrade.setAttribute('y',ty+18);
        tipSym.setAttribute('x',tx+10);tipSym.setAttribute('y',ty+34);
        tipPnl.setAttribute('x',tx+10);tipPnl.setAttribute('y',ty+52);
        tipCum.setAttribute('x',tx+10);tipCum.setAttribute('y',ty+68);
        tipHint.setAttribute('x',tx+10);tipHint.setAttribute('y',ty+84);
        // Content
        tipTrade.textContent=idx===0?'Start':('Trade #'+idx);
        if(idx===0){
          tipSym.textContent='';
          tipPnl.textContent='Starting balance';
          tipPnl.setAttribute('fill','var(--text4)');

          tipHint.style.display='none';
          tipBg.setAttribute('height',62);
        } else {
          tipSym.textContent=(sym||'')+(type?' · '+type:'')+(date?'  '+date:'');
          tipPnl.textContent=(pnl>=0?'P&L: +$':'P&L: -$')+Math.abs(pnl).toFixed(2);
          tipPnl.setAttribute('fill',pnl>=0?'#00e5a0':'#ff3d5a');

          }

  },50);

  // SPY overlay line (if provided)
  let spyPath='';
  if(spyPts&&spyPts.length>=2){

    spyPath=`<path d="${spyLine}" stroke="#fbbf24" stroke-width="2" fill="none" stroke-dasharray="5,4" opacity="0.85"/>`;
