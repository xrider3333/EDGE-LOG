  // Get last 20 trades or last 7 days, whichever is more
  const sorted=[...trades].sort((a,b)=>a.date>b.date?-1:1);
  const recent=sorted.slice(0,20);
  const S=calcStats(recent);
  if(!S){out.innerHTML='<div style="color:var(--text4)">Not enough trades to analyze.</div>';return;}
  const all=calcStats(trades);
  const insights=[];
  // 1) Performance vs overall
  const wrDiff=(S.wr-all.wr)*100;
  const pfDiff=S.pf-all.pf;
  if(Math.abs(wrDiff)>3||Math.abs(pfDiff)>0.2){
    insights.push({
      type:wrDiff>=0&&pfDiff>=0?'positive':'warning',
      label:'TREND',
      text:`Recent ${recent.length} trades show <b>${wrDiff>=0?'+':''}${wrDiff.toFixed(0)}% WR</b> and <b>${pfDiff>=0?'+':''}${pfDiff.toFixed(2)} PF</b> vs overall (${(all.wr*100).toFixed(0)}% WR, ${all.pf.toFixed(2)} PF).`
    });
  } else {
    insights.push({type:'neutral',label:'TREND',text:`Recent performance is consistent with your overall stats (${(S.wr*100).toFixed(0)}% WR, ${S.pf.toFixed(2)} PF).`});
  }
  // 2) Win/loss size analysis
  if(S.avgW>0&&S.avgL>0){
    const rr=S.avgW/S.avgL;
    if(rr<1){
      insights.push({type:'warning',label:'RISK / REWARD',text:`Your average win ($${S.avgW.toFixed(0)}) is <b>smaller</b> than your average loss ($${S.avgL.toFixed(0)}) — R:R of ${rr.toFixed(2)}. You need >50% win rate to be profitable. Consider letting winners run or cutting losses faster.`});
    } else if(rr>2){
      insights.push({type:'positive',label:'RISK / REWARD',text:`Strong R:R of ${rr.toFixed(2)} — winners are ${rr.toFixed(1)}× larger than losers. Even a 40% win rate would be profitable here.`});
    } else {
      insights.push({type:'neutral',label:'RISK / REWARD',text:`R:R of ${rr.toFixed(2)} — balanced. Win rate of ${(S.wr*100).toFixed(0)}% keeps you profitable.`});
    }
  }
  // 3) Streak analysis
  if(S.streak>=3){
    insights.push({type:S.sdir>0?'positive':'warning',label:'STREAK',text:`Currently on a <b>${S.streak} ${S.sdir>0?'WIN':'LOSS'} streak</b>.${S.sdir<0?' Consider taking a break or reviewing recent setups before continuing.':' Be aware of overconfidence — stick to your plan.'}`});
  }
  // 4) Symbol concentration
  const symCounts={};
  recent.forEach(t=>symCounts[t.symbol]=(symCounts[t.symbol]||0)+1);
  const topSym=Object.entries(symCounts).sort((a,b)=>b[1]-a[1])[0];
  if(topSym&&topSym[1]/recent.length>0.7){
    insights.push({type:'neutral',label:'CONCENTRATION',text:`<b>${(topSym[1]/recent.length*100).toFixed(0)}%</b> of recent trades are <b>${topSym[0]}</b>. Concentration helps you learn one instrument deeply, but diversification can reduce single-instrument risk.`});
  }
  // 5) Fees impact
  const feeDrag=all.totalFees/Math.abs(all.grossNet||1)*100;
  if(feeDrag>15){
    insights.push({type:'warning',label:'FEES',text:`Fees are eating <b>${feeDrag.toFixed(0)}%</b> of gross P&L ($${all.totalFees.toFixed(0)} on $${Math.abs(all.grossNet).toFixed(0)} gross). High-frequency trading on micros amplifies this. Consider fewer, larger setups.`});
  }
  // 6) Day of week / time pattern
  const byDow={0:[],1:[],2:[],3:[],4:[],5:[],6:[]};
  recent.forEach(t=>{if(t.date)byDow[new Date(t.date).getDay()].push(t.pnl);});
  const dowNames=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  let worstDow=null,worstPnl=0;
  Object.entries(byDow).forEach(([d,ps])=>{if(ps.length>=3){const sum=ps.reduce((a,b)=>a+b,0);if(sum<worstPnl){worstPnl=sum;worstDow=d;}}});
  if(worstDow!==null&&worstPnl<-10){
    insights.push({type:'warning',label:'PATTERN',text:`<b>${dowNames[worstDow]}</b> is your worst day in recent trades (${byDow[worstDow].length} trades, ${worstPnl.toFixed(0)} total). Worth reviewing what's different.`});
  }
  // Render
  out.innerHTML=insights.map(i=>{
    const colors={positive:'var(--green)',warning:'var(--yellow)',neutral:'var(--blue)'};
    const c=colors[i.type]||'var(--text3)';
    return `<div style="border-left:3px solid ${c};padding:8px 14px;margin-bottom:6px;background:color-mix(in srgb,${c} 5%,transparent)">
      <div style="font-size:var(--fsxs);letter-spacing:2px;color:${c};margin-bottom:3px">${i.label}</div>
      <div style="color:var(--text2)">${i.text}</div>
    </div>`;
  }).join('')+`<div style="text-align:right;font-size:var(--fsxs);color:var(--text5);margin-top:6px">Analyzed ${recent.length} most recent trades</div>`;
};
function runAISummary(tds,period){
  const out=el('ai-output');if(!out)return;
  out.innerHTML='<div style="display:flex;align-items:center;gap:10px;color:var(--text3);font-size:var(--fsm)"><div class="spinner"></div>Analyzing...</div>';
  const S2=calcStats(tds);if(!S2){out.innerHTML='<div style="color:var(--text4)">Not enough data for this period.</div>';return;}

  // Client-side rule-based analysis — always works
  const sections=[];
  const periodLabel=period==='all'?'All time':period==='day'?'Last 24h':period==='week'?'Last 7 days':'Last 30 days';
  // 1. Summary
  const trend=S2.rolling.net.slice(-5);
  const recentSlope=trend.length>1?trend[trend.length-1]-trend[0]:0;
  let summ=`<b style="color:var(--text)">${periodLabel}:</b> ${S2.total} trades, net P&L <span style="color:${gch(S2.net)}">${fmt(S2.net)}</span> (gross ${fmt(S2.grossNet)}). `;
  summ+=S2.ev>0?`Positive EV of <span style="color:var(--green)">$${S2.ev.toFixed(2)}/trade</span> — strategy has edge.`:`<span style="color:var(--red)">Negative EV of $${S2.ev.toFixed(2)}/trade</span> — strategy currently losing money on expectation.`;
  summ+=recentSlope>0?' Recent trend is <span style="color:var(--green)">improving ↑</span>.':recentSlope<-20?' Recent trend is <span style="color:var(--red)">declining ↓</span> — something changed recently.':'';
  sections.push(['📊 SUMMARY',summ]);

  // 2. Strengths
  const strengths=[];
  if(S2.wr>=0.55)strengths.push(`Strong win rate of <b>${pct(S2.wr)}</b> — trade selection is disciplined.`);
  if(S2.pf>=1.8)strengths.push(`Excellent profit factor of <b>${S2.pf.toFixed(2)}×</b> — winners significantly outpace losers.`);
  if(S2.rr>=1.5)strengths.push(`Good risk:reward of <b>${S2.rr.toFixed(2)}R</b> — cutting losses appropriately vs wins.`);
  if(S2.sharpe>1)strengths.push(`Annualized Sharpe of <b>${S2.sharpe.toFixed(2)}</b> — consistent, low-variance returns.`);
  if(S2.maxWS>=4)strengths.push(`Win streak of <b>${S2.maxWS}</b> shows ability to execute when in rhythm.`);
  if(S2.feeImpact<8)strengths.push(`Fee drag at <b>${S2.feeImpact.toFixed(1)}%</b> is well controlled.`);
  const bestSetup=Object.entries(S2.setups).sort(([,a],[,b])=>b.pnl-a.pnl)[0];
  if(bestSetup&&bestSetup[0]!=='—')strengths.push(`Best setup is <b>${bestSetup[0]}</b>: ${fmt(bestSetup[1].pnl)} net P&L, ${(bestSetup[1].wins/bestSetup[1].count*100).toFixed(0)}% WR.`);
  sections.push(['💪 STRENGTHS',strengths.length?strengths.slice(0,2).join(' '):'Not enough data to identify clear strengths yet.']);

  // 3. Critical weakness
  const weaknesses=[];
  if(S2.wr<0.45)weaknesses.push({sev:3,msg:`Win rate of <b style="color:var(--red)">${pct(S2.wr)}</b> is below 45%. With your avg win of $${S2.avgW.toFixed(0)} and avg loss of $${S2.avgL.toFixed(0)}, you need >45% WR to stay profitable. Be more selective — only take A/B grade setups.`});
  if(S2.rr<1)weaknesses.push({sev:3,msg:`Risk:Reward of <b style="color:var(--red)">${S2.rr.toFixed(2)}R</b> — your average loss ($${S2.avgL.toFixed(0)}) exceeds your average win ($${S2.avgW.toFixed(0)}). Set a hard rule: minimum 1.5R per trade or pass.`});
  if(S2.maxLS>=4)weaknesses.push({sev:2,msg:`Max loss streak of <b>${S2.maxLS}</b>. Continuing to trade through streaks amplifies damage. Consider a 3-loss stop rule.`});
  if(S2.feeImpact>15)weaknesses.push({sev:2,msg:`Fee drag is <b style="color:var(--yellow)">${S2.feeImpact.toFixed(1)}%</b> of gross — commissions are eating a significant portion. Reduce overtrading or renegotiate fees.`});
  if(S2.pf<1)weaknesses.push({sev:3,msg:`Profit factor <b style="color:var(--red)">${S2.pf.toFixed(2)}</b> means for every $1 won you lose $${(1/S2.pf).toFixed(2)}. Strategy is currently net-losing. Pause and review trade criteria.`});
  weaknesses.sort((a,b)=>b.sev-a.sev);
  sections.push(['⚠ CRITICAL WEAKNESS',weaknesses.length?weaknesses[0].msg:'No critical weaknesses detected — focus on maintaining consistency.']);

  // 4. Action plan
  const actions=[];
  if(S2.wr<0.5)actions.push(`<b>1. Tighten entry criteria</b> — before entering, confirm: setup matches your best-performing type (${bestSetup?bestSetup[0]:'check stats'}), grade is A or B, and RR is >1.5.`);
  else actions.push(`<b>1. Protect the edge</b> — WR is ${pct(S2.wr)}. Stay disciplined. Don't increase size until you have 50+ trades at this WR.`);
  if(S2.rr<1.5)actions.push(`<b>2. Fix stops and targets</b> — move stops only to reduce loss, never to give a trade "more room." Set a minimum target of 1.5× your stop size before entry.`);
  else actions.push(`<b>2. Capitalize on your ${S2.rr.toFixed(2)}R ratio</b> — consider scaling out 50% at 1R and letting the rest run to 2R+.`);
  if(S2.feeImpact>10)actions.push(`<b>3. Reduce frequency</b> — at ${S2.feeImpact.toFixed(1)}% fee drag, fewer, higher-quality trades will improve net P&L.`);
  else if(S2.maxLS>=3)actions.push(`<b>3. Implement a daily loss limit</b> — 3 losses in a session = done for the day. Review those trades the next morning before trading again.`);
  else actions.push(`<b>3. Document every trade</b> — grade each trade A-F and track patterns. Your best setups deserve larger size once identified.`);
  sections.push(['📋 ACTION PLAN',actions.join('<br/>')]);

  // 5. Pattern alert
  const recent=tds.slice(-5);
  const recentNet=recent.reduce((s,t)=>s+t.pnl,0);
  const recentWR=recent.filter(t=>t.pnl>0).length/Math.max(recent.length,1);
  let pattern='';
  if(recent.length>=3){
    if(recentNet<0&&S2.net>0)pattern=`<span style="color:var(--yellow)">⚠ Last ${recent.length} trades are net negative ($${recentNet.toFixed(0)}) while overall is positive. Monitor closely — could indicate strategy drift or overtrading.`;
    else if(recentWR<0.3&&S2.wr>0.5)pattern=`<span style="color:var(--red)">⚠ Recent WR (${(recentWR*100).toFixed(0)}%) is well below your overall WR (${pct(S2.wr)}). Check if market conditions changed or you're deviating from plan.</span>`;
    else if(recentNet>0&&recentWR>=0.7)pattern=`<span style="color:var(--green)">✓ Recent ${recent.length} trades performing well (${(recentWR*100).toFixed(0)}% WR). Stay consistent — avoid increasing size impulsively.</span>`;
    else pattern=`Last ${recent.length} trades: ${recent.filter(t=>t.pnl>0).length}W / ${recent.filter(t=>t.pnl<0).length}L, net ${fmt(recentNet)}. No unusual pattern detected.`;
  }
  sections.push(['🔍 RECENT PATTERN',pattern||'Add more trades for pattern detection.']);

  const html2=sections.map(([title,body])=>`<div style="margin-bottom:14px"><div style="font-size:var(--fsxs);color:var(--text4);letter-spacing:2px;margin-bottom:5px">${title}</div><div style="font-size:var(--fsm);color:var(--text2);line-height:1.9">${body}</div></div>`).join('');
  out.innerHTML=html2+`<div style="margin-top:12px;font-size:var(--fsxs);color:var(--text5);border-top:1px solid var(--border);padding-top:8px;display:flex;justify-content:space-between;align-items:center"><span>Client-side analysis · ${tds.length} trades · ${new Date().toLocaleTimeString()}</span><button class="btn-b" style="font-size:var(--fsxs);padding:3px 10px" id="try-claude-api">TRY CLAUDE API →</button></div>`;
  // Wire up Claude API attempt button
  setTimeout(()=>{
    if(el('try-claude-api'))el('try-claude-api').onclick=()=>runClaudeAPI(tds,period,out);
  },50);
}

async function runClaudeAPI(tds,period,out){
  const S2=calcStats(tds);if(!S2)return;
  const note=document.createElement('div');note.style.cssText='font-size:var(--fsxs);color:var(--text5);margin-top:8px;padding:8px;background:var(--bg2);border:1px solid var(--border)';
  note.textContent='Attempting Claude API call... (works inside Claude.ai, may be blocked on GitHub Pages due to browser CORS policy)';
  out.appendChild(note);
  const summary={period,tradeCount:S2.total,winRate:pct(S2.wr),profitFactor:S2.pf>=99?'∞':S2.pf.toFixed(2),expectedValue:'$'+S2.ev.toFixed(2),netPnl:fmt(S2.net),grossPnl:fmt(S2.grossNet),totalFees:'$'+S2.totalFees.toFixed(2),feeDrag:S2.feeImpact.toFixed(1)+'%',avgWin:'+$'+S2.avgW.toFixed(2),avgLoss:'-$'+S2.avgL.toFixed(2),riskReward:S2.rr.toFixed(2)+'R',sharpe:S2.sharpe.toFixed(2),maxDrawdown:'-$'+S2.maxDD.toFixed(2),recovery:S2.recovery.toFixed(2)+'x',setupBreakdown:Object.entries(S2.setups).map(([k,v])=>`${k}:${v.count}tr,${(v.wins/v.count*100).toFixed(0)}%WR,${fmt(v.pnl)}`).join(';')};
  try{
    let claudeKey=localStorage.getItem('el_claude_key')||'';
    if(!claudeKey){claudeKey=prompt('Enter your Anthropic API key (stored locally, never sent anywhere except Anthropic):');if(!claudeKey)return;localStorage.setItem('el_claude_key',claudeKey);}
    const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','anthropic-version':'2023-06-01','x-api-key':claudeKey},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:800,messages:[{role:'user',content:`Futures trading coach. Analyze this data and give 3 specific, actionable improvements. Data: ${JSON.stringify(summary)}. Be direct, use their exact numbers, under 200 words.`}]})});
    const data=await res.json();
    if(data.error)throw new Error(data.error.message);
    const text=data.content?.find(b=>b.type==='text')?.text||'';
    const formatted=text.replace(/\*\*(.*?)\*\*/g,'<b style="color:var(--text)">$1</b>').replace(/\n/g,'<br/>')
    note.style.cssText='margin-top:10px;padding:12px;background:color-mix(in srgb,var(--blue) 8%,transparent);border:1px solid color-mix(in srgb,var(--blue) 25%,transparent)';
    note.innerHTML=`<div style="font-size:var(--fsxs);color:var(--blue);letter-spacing:2px;margin-bottom:6px">🤖 CLAUDE AI ANALYSIS</div><div style="font-size:var(--fsm);color:var(--text2);line-height:1.9">${formatted}</div>`;
  }catch(e){
    note.textContent=`Claude API unavailable from this URL (${e.message}). The client-side analysis above is fully accurate.`;
  }
}

  const lu=el('logo-upload');if(lu)lu.onchange=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{userLogo=ev.target.result;localStorage.setItem('el_logo',userLogo);updateFavicon();document.title='EDGE LOG — Trade Tracker';renderApp();};r.readAsDataURL(f);};

      const thresh=thresholdFrac!==undefined?thresholdFrac:0.5;

      const tx1=cx+(r-7)*Math.cos(threshRad),ty1=cy+(r-7)*Math.sin(threshRad);
      const tx2=cx+(r+5)*Math.cos(threshRad),ty2=cy+(r+5)*Math.sin(threshRad);

        const dd=peak-cum;if(dd>maxDD)maxDD=dd;

    const _min=Math.min(..._pnls,0),_max=Math.max(..._pnls,0);

        <span style="font-size:var(--fsxs);color:${gch(moPnl)};font-family:'Bebas Neue',monospace">${fmt(moPnl)} · ${(moWR*100).toFixed(0)}% WR · ${moT.length} trades</span>
      </div>
      <div style="padding:8px;display:grid;grid-template-columns:repeat(7,1fr);gap:3px">${cells}</div>`;
    })();

    content.innerHTML=`

      ${heroKPI('WIN RATE', (tfS.wr*100).toFixed(0)+'%', tfS.wins+' wins · '+tfS.losses+' losses', tfS.wr>=0.5?'#00e5a0':tfS.wr>=0.4?'#f5c842':'#ff3d5a', _running.wr.map(w=>w*100), 'WIN RATE', tfS.wr, 0.5, '50%')}
      ${heroKPI('PROFIT FACTOR', tfS.pf>=99?'∞':tfS.pf.toFixed(2), tfS.pf>=1.5?'Healthy':tfS.pf>=1?'Marginal':'Losing edge', tfS.pf>=1.5?'#00e5a0':tfS.pf>=1?'#f5c842':'#ff3d5a', _running.pf, 'PROFIT FACTOR', Math.min(1,tfS.pf/3), 0.333, '1.0')}
      ${heroKPI('EXP VALUE', '$'+tfS.ev.toFixed(2), 'Per trade · '+(tfS.ev*tfTrades.length).toFixed(0)+' projected', tfS.ev>0?'#00e5a0':'#ff3d5a', _running.ev, 'EXP VALUE', tfS.ev>0?Math.min(1,tfS.ev/50):0, 0, '$0')}

      ${miniKPI('TOTAL FEES', '-$'+tfS.totalFees.toFixed(0), Math.abs(tfS.totalFees/(tfS.grossNet||1)*100).toFixed(1)+'% of gross', '#f5c842', null, 'FEES')}
      ${miniKPI('LONGS', '$'+tfS.longPnl.toFixed(0), tfS.longs+' trades · '+(tfS.longWR*100).toFixed(0)+'% WR', tfS.longPnl>=0?'#00e5a0':'#ff3d5a', null, null)}

      ${miniKPI('GROSS', '$'+tfS.grossNet.toFixed(0), 'Before fees', tfS.grossNet>=0?'#00e5a0':'#ff3d5a', null, null)}
    </div>

    <!-- ROW 3: CUMULATIVE P&L (full width, 380px tall) -->
    <div class="section" style="margin-bottom:12px">

          let cutoff=null;

          else if(chartTF==='90d'){cutoff=new Date(now);cutoff.setDate(now.getDate()-90);}
          else if(chartTF==='ytd'){cutoff=new Date(now.getFullYear(),0,1);}
          const cutStr=cutoff?cutoff.toISOString().slice(0,10):null;
          const filtTr=cutStr?trades.filter(t=>t.date>=cutStr):trades;
          if(!filtTr.length){return '<div style="padding:120px;text-align:center;color:var(--text5);font-size:11px;letter-spacing:2px">NO TRADES IN '+chartTF.toUpperCase()+'</div>';}
          ensureSPYData();
          // EQUITY MODE: track actual account value over time, applying deposits as they happen
          const chartColor=chartMode==='equity'?'#4a9eff':'#00e5a0';
          if(chartMode==='equity'){
            // Build ledger map by date
            const _ledgerByDate={};
            (ledgerEvents||[]).forEach(e=>{_ledgerByDate[e.date]=(_ledgerByDate[e.date]||0)+e.amount;});
            // Sort filtered trades by date (already sorted but ensure)
            const sortedTr=[...filtTr].sort((a,b)=>a.date<b.date?-1:a.date>b.date?1:0);
            // Find any deposits that happen BEFORE first filtered trade — use as starting balance
            let bal=accountEquity||0;
            const _appliedDates=new Set();
            const firstTradeDate=sortedTr[0]?.date;
            if(firstTradeDate){
              // Add any deposits dated on or before the first trade as starting balance
              Object.keys(_ledgerByDate).filter(d=>d<firstTradeDate).forEach(d=>{
                bal+=_ledgerByDate[d];
                _appliedDates.add(d);
              });
            }
            const startPt={y:+bal.toFixed(2),pnl:0,id:null,date:null,symbol:null};
            const points=sortedTr.map(t=>{
              // Apply any deposits on this trade's date BEFORE the trade pnl
              if(_ledgerByDate[t.date]&&!_appliedDates.has(t.date)){
                bal+=_ledgerByDate[t.date];
                _appliedDates.add(t.date);
              }
              bal=+(bal+t.pnl).toFixed(2);
              return {y:bal,pnl:t.pnl,id:t.id,date:t.date,symbol:t.symbol,type:t.type};
            });
            return svgLineLabeled([startPt,...points], chartColor,1400,380,true);
          }

              return svgLineLabeled([startPoint,...points], chartColor,1400,380,true, [{y:0},...spyPts]);
            }
            return svgLineLabeled([startPoint,...points], chartColor,1400,380,true);
          }
          const startPoint={y:0,pnl:0,id:null,date:null,symbol:null};
          return svgLineLabeled([startPoint,...filtTr.map(t=>{c=+(c+t.pnl).toFixed(2);if(c>pk)pk=c;return{y:c,pnl:t.pnl,id:t.id,date:t.date,symbol:t.symbol,type:t.type};})], chartColor,1400,380,true);

    <!-- ROW 4-5: LEFT (Calendar+Dist+Breakdowns) + RIGHT (AI sticky) -->

      // Inline grade/setup changes — save immediately

  // ══ LESSONS ══
  if(activeTab==='journal'){

  // ══ ANALYTICS ══
  if(activeTab==='analytics'){
    if(!S){content.innerHTML='<div style="border:1px dashed var(--border);padding:80px;text-align:center;color:var(--text5);font-size:11px;letter-spacing:3px">ADD TRADES TO SEE ANALYTICS</div>';return;}

    // Sub-tabs: summary (default) | charts | deep
    const subBar=document.createElement('div');
    subBar.style.cssText='display:flex;gap:5px;margin-bottom:12px;flex-wrap:wrap;align-items:center;border-bottom:1px solid var(--border);padding-bottom:10px';
    subBar.innerHTML=`<div style="display:flex;gap:4px">
      ${[['summary','SUMMARY'],['charts','CHARTS']].map(([st,lbl])=>`<button class="btn-${analyticsSubTab===st||(!['summary','charts','deep'].includes(analyticsSubTab)&&st==='summary')?'g':'d'}" style="font-size:var(--fsxs);padding:5px 16px" onclick="analyticsSubTab='${st}';renderApp()">${lbl}</button>`).join('')}
    </div>
    ${analyticsSubTab==='charts'?`<div style="display:flex;gap:4px;flex-wrap:wrap;margin-left:8px">
      ${['equity','daily','monthly','dow','grade','tf','wr_ev','pf_ev','dist'].map(c=>`<button class="btn-${activeChart===c?'y':'d'}" style="font-size:var(--fsxs);padding:3px 9px" onclick="activeChart='${c}';renderApp()">${{equity:'EQ+DD',daily:'DAILY',monthly:'MONTHLY',dow:'DOW',grade:'GRADE',tf:'TF',wr_ev:'WR→EV',pf_ev:'PF→EV',dist:'DIST'}[c]}</button>`).join('')}

    // ── SUMMARY (default) ─────────────────────────────────────────
    const curSub = ['summary','charts','deep'].includes(analyticsSubTab) ? analyticsSubTab : 'summary';

    if(curSub==='summary'){
      // ═══ APPLE FITNESS RINGS — WR / PF / R:R ═══
      const ringWR=S.wr*100; // 0-100
      const ringPF=Math.min(1,S.pf/3)*100; // PF target 3 = 100%
      const ringRR=Math.min(1,S.rr/3)*100; // R:R target 3 = 100%
      const ringHTML=document.createElement('div');
      ringHTML.style.cssText='background:transparent;padding:24px 16px 14px;margin-bottom:14px;display:flex;justify-content:center;align-items:center;gap:32px;flex-wrap:wrap';
      // Render each ring
      const ringSvg=(pct,color,size,strokeW)=>{
        const r=size/2-strokeW;
        const cx=size/2,cy=size/2;
        const circ=2*Math.PI*r;
        const dashOffset=circ*(1-Math.min(1,pct/100));
        // Glow effect from filter
        return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
          <defs><filter id="glow_${color.replace('#','')}_${size}"><feGaussianBlur stdDeviation="3"/><feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>
          <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${color}" stroke-width="${strokeW}" stroke-opacity="0.15"/>
          <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${color}" stroke-width="${strokeW}" stroke-dasharray="${circ}" stroke-dashoffset="${dashOffset}" stroke-linecap="round" transform="rotate(-90 ${cx} ${cy})" filter="url(#glow_${color.replace('#','')}_${size})"/>
        </svg>`;
      };
      // Triple-nested concentric rings
      const tripleRing=()=>{
        const size=220;
        const cx=size/2,cy=size/2;
        const ring=(r,strokeW,color,pct)=>{
          const circ=2*Math.PI*r;
          const dashOffset=circ*(1-Math.min(1,pct/100));
          return `<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${color}" stroke-width="${strokeW}" stroke-opacity="0.15"/>
          <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${color}" stroke-width="${strokeW}" stroke-dasharray="${circ}" stroke-dashoffset="${dashOffset}" stroke-linecap="round" transform="rotate(-90 ${cx} ${cy})"/>`;
        };
        // Outer ring: Win Rate (cyan/green), middle: Profit Factor (yellow), inner: R:R (pink)
        return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}" style="filter:drop-shadow(0 0 20px rgba(125,211,252,0.15))">
          ${ring(95,16,'#34d399',ringWR)}
          ${ring(72,16,'#fbbf24',ringPF)}
          ${ring(49,16,'#f87171',ringRR)}
        </svg>`;
      };
      ringHTML.innerHTML=`
        <div style="position:relative;display:flex;flex-direction:column;align-items:center">
          ${tripleRing()}

        <div style="display:flex;flex-direction:column;gap:14px;min-width:200px">
          <div style="padding:10px 14px;background:rgba(52,211,153,0.06);border:1px solid rgba(52,211,153,0.2);border-radius:12px">

            </div>
            <div style="font-size:var(--fsxs);color:var(--text4)">${S.wins}W / ${S.losses}L · target 50%+</div>
          </div>
          <div style="padding:10px 14px;background:rgba(251,191,36,0.06);border:1px solid rgba(251,191,36,0.2);border-radius:12px">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
              <span style="font-size:10px;letter-spacing:2px;color:#fbbf24;font-weight:bold">● PROFIT FACTOR</span>

            <div style="font-size:var(--fsxs);color:var(--text4)">$${S.grossW.toFixed(0)} won ÷ $${S.grossL.toFixed(0)} lost · target 1.5+</div>

          <div style="padding:10px 14px;background:rgba(248,113,113,0.06);border:1px solid rgba(248,113,113,0.2);border-radius:12px">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
              <span style="font-size:10px;letter-spacing:2px;color:#f87171;font-weight:bold">● RISK : REWARD</span>
              <span style="font-family:'Bebas Neue',monospace;font-size:24px;color:#f87171">${S.rr.toFixed(2)}R</span>
            </div>
            <div style="font-size:var(--fsxs);color:var(--text4)">$${S.avgW.toFixed(0)} avg win ÷ $${S.avgL.toFixed(0)} avg loss · target 2.0+</div>

      `;
      content.appendChild(ringHTML);


      // Customizable distribution under rings (with metric toggle buttons)
      if(trades.length>=3){
        const distSection=document.createElement('div');
        distSection.className='section';
        distSection.style.cssText='margin-bottom:14px';
        const cs={innerHTML:''};
// Build dataset based on selected metric
        const DIST_METRICS={
          pnl:{label:'Net P&L per Trade',unit:'$',vals:()=>trades.map(t=>t.pnl),fmt:v=>'$'+v.toFixed(0),desc:'Distribution of net profit/loss per trade. Positive skew (tail right) is ideal — means occasional large wins relative to losses.'},
          gross:{label:'Gross P&L per Trade',unit:'$',vals:()=>trades.map(t=>t.grossPnl||t.pnl),fmt:v=>'$'+v.toFixed(0),desc:'Distribution of gross P&L before fees. Reveals your raw edge before commissions.'},
          pts:{label:'Points / Ticks per Trade',unit:'pts',vals:()=>trades.map(t=>{const p=PRESETS[t.symbol];if(!p)return 0;const dir=t.type==='LONG'?1:-1;return+((t.exit-t.entry)*dir/p.ts).toFixed(1);}),fmt:v=>v.toFixed(1)+'pts',desc:'Raw tick/point movement captured per trade. Separates P&L from position sizing and fees.'},
          pct:{label:'% Account Gain/Loss',unit:'%',vals:()=>{let bal=accountEquity>0?accountEquity:50000;return trades.map(t=>{const p=(t.pnl/bal)*100;bal+=t.pnl;return+p.toFixed(3);});},fmt:v=>v.toFixed(2)+'%',desc:'P&L as % of account equity at time of trade. Shows risk exposure and position sizing consistency.'},
          dur:{label:'Trade Duration (minutes)',unit:'min',vals:()=>trades.filter(t=>t.durationMins>0).map(t=>t.durationMins),fmt:v=>v.toFixed(0)+'m',desc:'Time held per trade in minutes. Clusters reveal your typical holding period and whether longer holds correlate with better outcomes.'},
          rr:{label:'Realized R:R per Trade',unit:'R',vals:()=>trades.map(t=>{const avgL=trades.filter(x=>x.pnl<0).reduce((s,x)=>s+Math.abs(x.pnl),0)/Math.max(1,trades.filter(x=>x.pnl<0).length)||1;return+(t.pnl/avgL).toFixed(2);}),fmt:v=>v.toFixed(2)+'R',desc:"P&L as a multiple of avg loss. How often you achieve 1R, 2R, etc."},
        };
        const dm=DIST_METRICS[distMetric]||DIST_METRICS.pnl;
        const vals=dm.vals().filter(v=>!isNaN(v)&&isFinite(v));
        const mean=vals.reduce((a,b)=>a+b,0)/Math.max(vals.length,1);
        const std=Math.sqrt(vals.reduce((s,v)=>s+(v-mean)**2,0)/Math.max(vals.length,1))||1;
        const skew=vals.reduce((s,v)=>s+Math.pow((v-mean)/std,3),0)/Math.max(vals.length,1);
        const kurt=vals.reduce((s,v)=>s+Math.pow((v-mean)/std,4),0)/Math.max(vals.length,1)-3;
        const metricBtns=['pnl','gross','pts','pct','dur','rr'].map(m=>`<button class="btn-${distMetric===m?'y':'d'}" style="font-size:var(--fsxs);padding:3px 10px" onclick="distMetric='${m}';renderApp()">${{pnl:'NET P&L',gross:'GROSS P&L',pts:'POINTS',pct:'% ACCOUNT',dur:'DURATION',rr:'R-MULTIPLE'}[m]}</button>`).join('');
        // Definitions panel
        const DEFS=[
          ['BELL CURVE','A histogram of your trades overlaid with a theoretical normal distribution (yellow curve). The shape reveals whether your edge is consistent or driven by outliers.'],
          ['MEAN (μ)','Average value across all trades. Your expected outcome per trade for this metric.'],
          ['STD DEV (σ)','Standard deviation — how spread out your results are. Lower = more consistent. Higher = more volatile/streaky.'],

          ['EXCESS KURTOSIS','Fat tails vs normal distribution. Positive = more extreme outliers than expected. Negative = fewer extremes.'],
        ];
        cs.innerHTML=`<div class="sec-hd">
            <span>DISTRIBUTION — ${dm.label}</span>
            <div style="display:flex;gap:4px;flex-wrap:wrap">${metricBtns}</div>

          <div style="padding:0 14px 12px;display:grid;grid-template-columns:repeat(4,1fr);gap:8px">
            ${[['MEAN',dm.fmt(mean),mean>=0?'var(--green)':'var(--red)'],['STD DEV',dm.fmt(std),'var(--text2)'],['SKEWNESS',skew.toFixed(3),skew>0?'var(--green)':'var(--red)'],['KURTOSIS',kurt.toFixed(3),Math.abs(kurt)<1?'var(--green)':kurt>0?'var(--yellow)':'var(--text2)']].map(([l,v,c])=>`<div style="background:var(--bg3);padding:8px 10px;border:1px solid var(--border2)"><div class="stat-lbl">${l}</div><div style="font-family:'Bebas Neue',monospace;font-size:18px;color:${c}">${v}</div></div>`).join('')}
          </div>
          <div style="padding:0 14px 12px;background:var(--bg3);margin:0 14px 14px;border:1px solid var(--border2)">
            <div style="font-size:var(--fsxs);color:var(--text3);padding:8px 0 6px;letter-spacing:1px">${dm.desc}</div>
            <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:6px">
              ${DEFS.map(([t,d])=>`<div><div style="font-size:var(--fsxs);color:var(--yellow);margin-bottom:3px">${t}</div><div style="font-size:9px;color:var(--text4);line-height:1.6">${d}</div></div>`).join('')}
            </div>
          </div>`;
        distSection.innerHTML=cs.innerHTML;
        content.appendChild(distSection);
      }

      
      // KPI scores
      const scores={'WIN RATE':Math.min(100,Math.max(0,(S.wr-0.3)/0.4*100)),'PROFIT FACTOR':Math.min(100,Math.max(0,(S.pf-0.5)/2.5*100)),'EXP VALUE':Math.min(100,Math.max(0,S.ev>0?Math.min(100,S.ev/50*100):0)),'RISK:REWARD':Math.min(100,Math.max(0,(S.rr-0.5)/2*100)),'SHARPE':Math.min(100,Math.max(0,(S.sharpe+0.5)/3.5*100)),'FEE DRAG':Math.min(100,Math.max(0,100-S.feeImpact*2)),'DRAWDOWN':Math.min(100,Math.max(0,S.net>0?(S.recovery/3)*100:0))};
      const scored=Object.entries(scores).sort(([,a],[,b])=>a-b);

using System; using System.IO;
using NinjaTrader.NinjaScript.Strategies;
namespace NinjaTrader.NinjaScript.Strategies {
  public class EdgeLogExport : Strategy {
    string csv = @"C:\EdgeLog\trades.csv";
    protected override void OnStateChange() {
      if (State == State.SetDefaults) { Name = "EdgeLogExport"; }
      if (State == State.DataLoaded) {
        if (!Directory.Exists(@"C:\EdgeLog")) Directory.CreateDirectory(@"C:\EdgeLog");
        if (!File.Exists(csv)) File.WriteAllText(csv,
          "Symbol,BuyPrice,SellPrice,Qty,BoughtTimestamp,SoldTimestamp,Commission\n");
      }
    }
    protected override void OnExecutionUpdate(Execution ex, string id, double price,
      int qty, MarketPosition pos, string orderId, DateTime time) {
      if (ex.Order.OrderState != OrderState.Filled) return;
      File.AppendAllText(csv, string.Format("{0},{1},{2},{3},{4},{5},{6}\n",
        Instrument.FullName,
        pos == MarketPosition.Long ? price.ToString("F2") : "",
        pos == MarketPosition.Short ? price.ToString("F2") : "",
        qty,
        pos == MarketPosition.Long ? time.ToString("MM/dd/yyyy HH:mm:ss") : "",
        pos == MarketPosition.Short ? time.ToString("MM/dd/yyyy HH:mm:ss") : "",
        ex.Commission));
    }
  }
}</pre>

        ${userLogo?`<img src="${userLogo}" style="height:48px;max-width:130px;object-fit:contain;border:1px solid var(--border)"/>`:'<div style="color:var(--text5);font-size:var(--fsm)">No logo — appears in tab and top bar</div>'}
        <label class="btn-b" style="cursor:pointer">UPLOAD LOGO<input type="file" accept="image/*" id="logo-upload2" style="display:none"/></label>
        ${userLogo?'<button class="btn-r" id="rm-logo">REMOVE</button>':''}
      </div>
    </div>
    </div>`;

    setTimeout(()=>{
      if(el('add-setup-btn'))el('add-setup-btn').onclick=()=>{const v=(el('new-setup')?.value||'').trim();if(!v)return;if(!customSetups.includes(v)){customSetups.push(v);localStorage.setItem('el_setups',JSON.stringify(customSetups));el('new-setup').value='';renderApp();}};
      if(el('new-setup'))el('new-setup').onkeydown=e=>{if(e.key==='Enter')el('add-setup-btn').click();};
      if(el('reset-setups-btn'))el('reset-setups-btn').onclick=()=>{customSetups=[...DEFAULT_SETUPS];localStorage.setItem('el_setups',JSON.stringify(customSetups));renderApp();};
      if(el('add-tag-btn'))el('add-tag-btn').onclick=()=>{const v=(el('new-tag-inp')?.value||'').trim();if(v&&!customTags.includes(v)){customTags.push(v);localStorage.setItem('el_tags',JSON.stringify(customTags));renderApp();}};
      if(el('new-tag-inp'))el('new-tag-inp').onkeydown=e=>{if(e.key==='Enter')el('add-tag-btn').click();};
      if(el('save-equity'))el('save-equity').onclick=()=>{const v=parseFloat(el('acct-equity-input')?.value||'0');if(v>0){accountEquity=v;localStorage.setItem('el_equity',v);renderApp();}};
      if(el('save-acct-info'))el('save-acct-info').onclick=()=>{
        const aid=(el('acct-id-input')?.value||'').trim();
        const brk=(el('broker-input')?.value||'').trim();
        if(aid)localStorage.setItem('el_account_id',aid); else localStorage.removeItem('el_account_id');
        if(brk)localStorage.setItem('el_broker_name',brk); else localStorage.removeItem('el_broker_name');
        const s=el('acct-info-saved');if(s){s.style.display='block';setTimeout(()=>s.style.display='none',2000);}
      };
      if(el('apply-acct-all'))el('apply-acct-all').onclick=async()=>{
        const aid=localStorage.getItem('el_account_id')||'';
        const brk=localStorage.getItem('el_broker_name')||'';
        if(!aid&&!brk){el('apply-acct-status').textContent='Set an account ID or broker name first.';return;}
        const upd={};if(aid)upd.account=aid;if(brk)upd.broker=brk;
        const st=el('apply-acct-status');if(st)st.textContent='Applying…';
        let count=0;
        for(const t of trades){
          const needs=(!t.account&&aid)||(!t.broker&&brk);
          if(needs){await updateTrade(t.id,upd);count++;}
        }
        if(st)st.textContent=`✓ Updated ${count} trade(s)`;
      };
      if(el('save-fees'))el('save-fees').onclick=()=>{Object.keys(PRESETS).forEach(sym=>{const i=el('fee_'+sym);if(i)instrumentFees[sym]=parseFloat(i.value)||DEFAULT_FEES[sym];});localStorage.setItem('el_fees',JSON.stringify(instrumentFees));const s=el('fees-saved');if(s){s.style.display='block';setTimeout(()=>s.style.display='none',2000);}};
      if(el('reset-fees'))el('reset-fees').onclick=()=>{instrumentFees={...DEFAULT_FEES};localStorage.setItem('el_fees',JSON.stringify(instrumentFees));renderApp();};
      const lu2=el('logo-upload2');if(lu2)lu2.onchange=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{userLogo=ev.target.result;localStorage.setItem('el_logo',userLogo);updateFavicon();renderApp();};r.readAsDataURL(f);};
      if(el('rm-logo'))el('rm-logo').onclick=()=>{userLogo=null;localStorage.removeItem('el_logo');updateFavicon();renderApp();};
    },50);
  }

  // ══ EXPORT ══
  if(activeTab==='export'){
    content.innerHTML=`<div style="max-width:540px">
      <div style="background:var(--bg3);border:1px solid var(--border2);padding:11px 14px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center">
        <span style="font-size:var(--fsxs);color:var(--text4);letter-spacing:1px">CLOUD SYNC · v${VERSION}</span>
        <span style="color:var(--green);font-size:var(--fsxs);display:flex;align-items:center;gap:5px"><span class="pulse"></span>LIVE · ${trades.length} TRADES</span>
      </div>
      <div class="section" style="margin-bottom:10px">
        <div class="sec-hd">EXPORT</div>
        <div style="padding:11px">
          <div style="display:flex;justify-content:space-between;align-items:center;background:var(--bg3);padding:11px 13px">
            <div><div style="font-size:var(--fsm);color:var(--text);margin-bottom:2px">CSV Export</div><div style="font-size:var(--fsxs);color:var(--text4)">All fields incl. gross/net P&L, duration, timeframe, order ID, grade, source</div></div>
            <button class="btn-g" id="exp-csv" ${!trades.length?'disabled':''}>DOWNLOAD</button>
          </div>
        </div>
      </div>
      ${trades.length?`<div style="border:1px solid color-mix(in srgb,var(--red) 20%,transparent)">
        <div style="background:color-mix(in srgb,var(--red) 8%,transparent);padding:9px 14px;border-bottom:1px solid color-mix(in srgb,var(--red) 20%,transparent);font-size:var(--fsxs);letter-spacing:2px;color:var(--red)">DANGER ZONE</div>
        <div style="padding:13px;display:flex;justify-content:space-between;align-items:center">
          <div style="font-size:var(--fsm);color:var(--text4)">Delete all ${trades.length} trades from cloud.</div>
          <button class="btn-r" id="clr-all">CLEAR ALL</button>
        </div></div>`:''}
    </div>`;
    setTimeout(()=>{
      if(el('exp-csv'))el('exp-csv').onclick=exportCSV;
      if(el('clr-all'))el('clr-all').onclick=async()=>{if(!confirm(`Delete ALL ${trades.length} trades? Cannot be undone.`))return;const snap=await colRef.get();const b=db.batch();snap.docs.forEach(d=>b.delete(d.ref));await b.commit();};
    },50);
  }
}

window.renameSetup=function(idx,newName){
  newName=(newName||'').trim();
  if(!newName||newName==='—')return;
  if(customSetups.includes(newName)&&customSetups.indexOf(newName)!==idx){
    alert('Setup "'+newName+'" already exists');
    renderApp();
    return;
  }
  const oldName=customSetups[idx];
  if(oldName===newName)return;
  customSetups[idx]=newName;
  localStorage.setItem('el_setups',JSON.stringify(customSetups));
  // Update existing trades that used the old setup name
  let updated=0;
  trades.forEach(t=>{
    if(t.setup===oldName){
      t.setup=newName;
      updated++;
      // Persist to Firestore
      if(currentUser){
        firebase.firestore().collection('users').doc(currentUser.uid).collection('trades').doc(t.id).update({setup:newName}).catch(e=>console.error('Update failed:',e));
      }
    }
  });
  if(updated>0)console.log('[RENAME] Updated '+updated+' trades from "'+oldName+'" to "'+newName+'"');
  renderApp();
};

function removeSetup(idx){
  if(customSetups[idx]==='—')return;
  customSetups.splice(idx,1);
  localStorage.setItem('el_setups',JSON.stringify(customSetups));
  renderApp();
}

// Boot
window._setStage('INIT FIREBASE');
if(!initFB())document.getElementById('app').innerHTML='<div style="color:var(--red);padding:40px;text-align:center">Firebase failed to initialize.</div>';
else window._setStage('AUTH LISTENER ATTACHED');
auth.onAuthStateChanged(user=>{if(user){currentUser=user;subscribeAll(currentUser.uid);}else renderAuth();});
</script>
</body>
