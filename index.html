<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#05050a;color:#c8ccd8;font-family:'JetBrains Mono',monospace;font-size:13px}

.grade-D{color:#ff8c42;background:#ff8c4218;border:1px solid #ff8c4230;font-size:11px;padding:2px 8px;font-family:'Bebas Neue',monospace;letter-spacing:1px}
.grade-F{color:#ff3d5a;background:#ff3d5a18;border:1px solid #ff3d5a30;font-size:11px;padding:2px 8px;font-family:'Bebas Neue',monospace;letter-spacing:1px}
.grade-x{color:#505070;background:#1a1a2e;border:1px solid #252540;font-size:11px;padding:2px 8px;font-family:'Bebas Neue',monospace;letter-spacing:1px}
.filter-inp{background:#09090f;border:none;border-bottom:1px solid #1e1e36;color:#a0a4b8;font-family:'JetBrains Mono',monospace;font-size:10px;padding:4px 6px;width:100%;outline:none}
.filter-inp:focus{border-bottom-color:#00e5a066}
.vbadge{font-size:9px;color:#404060;letter-spacing:1px;font-family:'JetBrains Mono',monospace}
.lesson-card{background:#09090f;border:1px solid #181830;padding:14px 16px;margin-bottom:8px}
</style>

<body>
<div id="app"><div style="height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px"><div class="spinner" style="width:28px;height:28px"></div><div style="font-size:10px;letter-spacing:3px;color:#404060">LOADING EDGE LOG v7...</div></div></div>
<script>
// ═══════════════════════════════════════════════════════════════
//  EDGE LOG v7.0 — Futures + Stocks Trade Tracker
// ═══════════════════════════════════════════════════════════════
const VERSION='7.0';

const PRESETS={
  ES:{tv:12.50,ts:0.25},MES:{tv:1.25,ts:0.25},NQ:{tv:5.00,ts:0.25},
  MNQ:{tv:0.50,ts:0.25},CL:{tv:10.00,ts:0.01},GC:{tv:10.00,ts:0.10},
  SI:{tv:25.00,ts:0.005},ZB:{tv:31.25,ts:0.03125},RTY:{tv:5.00,ts:0.10},
  YM:{tv:5.00,ts:1.00},MGC:{tv:1.00,ts:0.10},MCL:{tv:1.00,ts:0.01},
  ZN:{tv:31.25,ts:0.015625},ZC:{tv:12.50,ts:0.25},NG:{tv:10.00,ts:0.001},
};

// Default per-instrument round-trip fees (editable in Settings)
const DEFAULT_FEES={ES:4.50,MES:1.25,NQ:4.50,MNQ:1.25,CL:4.50,GC:4.50,SI:4.50,ZB:4.50,RTY:4.50,YM:4.50,ZN:4.50,ZC:4.50,NG:4.50,MGC:1.25,MCL:1.25};
let instrumentFees=JSON.parse(localStorage.getItem('el_fees')||JSON.stringify(DEFAULT_FEES));

const SETUPS=['—','Breakout','Pullback','Reversal','Trend','Gap Fill','VWAP','S/D Zone','Momentum','ICT','Order Block','FVG','Other'];
const GRADES=['—','A+','A','B','C','D','F'];
const TIMEFRAMES=['—','5s','15s','30s','1m','2m','3m','5m','10m','15m','30m','1h','2h','4h','Daily','Weekly','Monthly'];
const TABS=['overview','journal','lessons','analytics','import','settings','export'];
const GRADE_COLORS={'A+':'#00e5a0','A':'#00e5a0','B':'#4a9eff','C':'#f5c842','D':'#ff8c42','F':'#ff3d5a','—':'#505070'};

// KPI definitions with info + thresholds
const KPI_INFO={
  'WIN RATE':{info:'The percentage of trades that are profitable. A higher win rate means you win more often, but must be paired with a healthy risk:reward ratio.',warn:v=>v<0.4?'danger':v<0.5?'warn':null,warnMsg:v=>v<0.4?'Win rate below 40% — review your entries':'Below 50% — ensure R:R compensates'},
  'PROFIT FACTOR':{info:'Gross profit divided by gross loss. PF > 1.5 is healthy. PF > 2.0 is excellent. PF < 1.0 means you are losing money overall.',warn:v=>v<1?'danger':v<1.5?'warn':null,warnMsg:v=>v<1?'PF < 1 — losing strategy':'PF < 1.5 — marginal edge'},
  'EXP. VALUE':{info:'Expected Value (EV) = (WR × AvgWin) − (LossRate × AvgLoss). Positive EV means the strategy is profitable on average per trade.',warn:v=>v<0?'danger':v<5?'warn':null,warnMsg:v=>v<0?'Negative EV — losing money per trade':'Low EV — small edge per trade'},
  'NET P&L':{info:'Total profit and loss after all fees are deducted. This is your actual take-home performance.',warn:v=>v<0?'danger':null,warnMsg:()=>'Net P&L is negative'},
  'SHARPE (ANN.)':{info:'Annualized Sharpe Ratio measures risk-adjusted return. >1 is acceptable, >2 is good, >3 is excellent. Negative means strategy loses money relative to risk.',warn:v=>v<0?'danger':v<1?'warn':null,warnMsg:v=>v<0?'Negative Sharpe — poor risk-adjusted return':'Sharpe < 1 — consider improving consistency'},
  'MAX DRAWDOWN':{info:'The largest peak-to-trough decline in your account equity. Lower is better. Monitor this relative to your account size.',warn:()=>null,warnMsg:()=>''},
  'RECOVERY':{info:'Recovery Factor = Net P&L ÷ Max Drawdown. Tells you how efficiently you recover from drawdowns. > 2 is good.',warn:v=>v<1?'danger':v<2?'warn':null,warnMsg:v=>v<1?'Not recovered from max drawdown':'Recovery factor below 2'},
  'RISK:REWARD':{info:'Average winning trade divided by average losing trade. A 1.5R or higher is generally desirable. Combined with win rate determines profitability.',warn:v=>v<1?'danger':v<1.5?'warn':null,warnMsg:v=>v<1?'Avg loss > avg win — fix R:R':'R:R below 1.5 — aim higher'},
  'TOTAL FEES':{info:'Total commissions and fees paid. High fee drag can erode a profitable strategy. Check "Fee Drag %" to see impact.',warn:()=>null,warnMsg:()=>''},
};

let db=null,auth=null,colRef=null,lessonRef=null,unsub=null,unsubL=null;
let trades=[],lessons=[],currentUser=null;
let activeTab='overview',activeChart='equity';
let formOpen=true,expandedRows=new Set(),showAllCols=false;
let defaultFee=4.50,autoHandle=null,autoTimer=null,autoInterval=60;
let userLogo=localStorage.getItem('el_logo')||null;
let filters={sym:'',dir:'',grade:'',setup:'',tf:'',dateFrom:'',dateTo:'',minPnl:'',maxPnl:''};
let sortCol='',sortDir=1;

// ── Helpers ──────────────────────────────────────────────────────
const el=id=>document.getElementById(id);
const gc=n=>n>=0?'#00e5a0':'#ff3d5a';
const fmt=n=>(n>=0?'+':'')+n.toFixed(2);
const pct=n=>(n*100).toFixed(1)+'%';
const isFut=sym=>!!PRESETS[sym];
const getBase=s=>(s||'').replace(/[^A-Za-z]/g,'').slice(0,3).toUpperCase()||'';
const gradeClass=g=>({'+':'grade-A','A':'grade-A','B':'grade-B','C':'grade-C','D':'grade-D','F':'grade-F'}[g?.slice(-1)]||'grade-x');
function fmtDur(m){if(!m||m<0)return'—';if(m<60)return m+'m';return Math.floor(m/60)+'h'+(m%60>0?' '+m%60+'m':'');}
function getFee(sym){return instrumentFees[sym]??instrumentFees[getBase(sym)]??defaultFee;}

function tipHTML(kpiName){
  const k=KPI_INFO[kpiName];if(!k)return'';
  return`<span class="tip-wrap"><i class="tip-icon">i</i><span class="tip-box">${k.info}</span></span>`;
}
function warnHTML(kpiName,val){
  const k=KPI_INFO[kpiName];if(!k||!k.warn)return'';
  const w=k.warn(val);
  if(!w)return'';
  return`<span class="${w==='danger'?'danger-badge':'warn-badge'}">⚠ ${k.warnMsg(val)}</span>`;
}

function calcPnl(sym,type,entry,exit,size,fees){
  const dir=type==='LONG'?1:-1;
  let gross;
  if(isFut(sym)){const p=PRESETS[sym];gross=(((exit-entry)*dir)/p.ts)*p.tv*size;}
  else{gross=(exit-entry)*dir*size;}
  return{gross:+gross.toFixed(2),net:+(gross-(fees||0)).toFixed(2)};
}

function stdDev(arr){if(arr.length<2)return 0;const m=arr.reduce((a,b)=>a+b,0)/arr.length;return Math.sqrt(arr.reduce((s,v)=>s+(v-m)**2,0)/(arr.length-1));}

// ── Stats ─────────────────────────────────────────────────────────
function calcStats(tds){
  if(!tds||!tds.length)return null;
  const wins=tds.filter(t=>t.pnl>0),losses=tds.filter(t=>t.pnl<0);
  const wr=wins.length/tds.length;
  const avgW=wins.length?wins.reduce((s,t)=>s+t.pnl,0)/wins.length:0;
  const avgL=losses.length?Math.abs(losses.reduce((s,t)=>s+t.pnl,0)/losses.length):0;
  const grossW=wins.reduce((s,t)=>s+t.pnl,0),grossL=Math.abs(losses.reduce((s,t)=>s+t.pnl,0));
  const net=tds.reduce((s,t)=>s+t.pnl,0);
  const grossNet=tds.reduce((s,t)=>s+(t.grossPnl||t.pnl),0);
  const totalFees=tds.reduce((s,t)=>s+(t.fees||0),0);
  const pf=grossL>0?grossW/grossL:grossW>0?99:0;
  const ev=wr*avgW-(1-wr)*(avgL||0);
  const feeImpact=grossNet>0?(totalFees/Math.abs(grossNet))*100:0;
  let peak=0,maxDD=0,cur=0;
  tds.forEach(t=>{cur+=t.pnl;if(cur>peak)peak=cur;maxDD=Math.max(maxDD,peak-cur);});
  let maxWS=0,maxLS=0,cWS=0,cLS=0,streak=0,sdir=0;
  for(let i=tds.length-1;i>=0;i--){const d=tds[i].pnl>0?1:-1;if(!streak){streak=1;sdir=d;}else if(d===sdir)streak++;else break;}
  tds.forEach(t=>{if(t.pnl>0){cWS++;cLS=0;maxWS=Math.max(maxWS,cWS);}else{cLS++;cWS=0;maxLS=Math.max(maxLS,cLS);}});
  const byDay={};tds.forEach(t=>{byDay[t.date]=(byDay[t.date]||0)+t.pnl;});
  const dv=Object.values(byDay),meanD=dv.length?dv.reduce((a,b)=>a+b,0)/dv.length:0;
  const sharpe=dv.length>1?(meanD/(stdDev(dv)||1))*Math.sqrt(252):0;
  const recovery=maxDD>0?net/maxDD:0,rr=avgL>0?avgW/avgL:0;
  const longs=tds.filter(t=>t.type==='LONG'),shorts=tds.filter(t=>t.type==='SHORT');
  const syms={},setups={},monthly={},byGrade={},byTF={};
  const dowK=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'],dow={Mon:{pnl:0,t:0},Tue:{pnl:0,t:0},Wed:{pnl:0,t:0},Thu:{pnl:0,t:0},Fri:{pnl:0,t:0}};
  tds.forEach(t=>{
    if(!syms[t.symbol])syms[t.symbol]={count:0,pnl:0,grossPnl:0,wins:0,fees:0};
    syms[t.symbol].count++;syms[t.symbol].pnl+=t.pnl;syms[t.symbol].grossPnl+=(t.grossPnl||t.pnl);syms[t.symbol].fees+=(t.fees||0);if(t.pnl>0)syms[t.symbol].wins++;
    const k=t.setup||'—';if(!setups[k])setups[k]={count:0,pnl:0,wins:0};setups[k].count++;setups[k].pnl+=t.pnl;if(t.pnl>0)setups[k].wins++;
    const mo=t.date?t.date.slice(0,7):'?';if(!monthly[mo])monthly[mo]={pnl:0,trades:0,wins:0};monthly[mo].pnl+=t.pnl;monthly[mo].trades++;if(t.pnl>0)monthly[mo].wins++;
    const g=t.grade||'—';if(!byGrade[g])byGrade[g]={count:0,pnl:0,wins:0};byGrade[g].count++;byGrade[g].pnl+=t.pnl;if(t.pnl>0)byGrade[g].wins++;
    const tf=t.timeframe||'—';if(!byTF[tf])byTF[tf]={count:0,pnl:0,wins:0};byTF[tf].count++;byTF[tf].pnl+=t.pnl;if(t.pnl>0)byTF[tf].wins++;
    if(t.date){const dk=dowK[new Date(t.date+'T12:00:00').getDay()];if(dow[dk]){dow[dk].pnl+=t.pnl;dow[dk].t++;}}
  });
  const wDur=tds.filter(t=>t.durationMins>0);
  const avgDur=wDur.length?wDur.reduce((s,t)=>s+t.durationMins,0)/wDur.length:0;
  const wWD=wDur.filter(t=>t.pnl>0),wLD=wDur.filter(t=>t.pnl<0);
  const avgWinDur=wWD.length?wWD.reduce((s,t)=>s+t.durationMins,0)/wWD.length:0;
  const avgLossDur=wLD.length?wLD.reduce((s,t)=>s+t.durationMins,0)/wLD.length:0;
  const best=tds.reduce((a,b)=>b.pnl>a.pnl?b:a),worst=tds.reduce((a,b)=>b.pnl<a.pnl?b:a);
  const dayE=Object.entries(byDay);
  const bestDay=dayE.reduce((a,b)=>b[1]>a[1]?b:a,['—',0]),worstDay=dayE.reduce((a,b)=>b[1]<a[1]?b:a,['—',0]);
  const rolling={wr:[],pf:[],ev:[],net:[]};let rW=0,rL=0,rGW=0,rGL=0,rNet=0;
  tds.forEach(t=>{rNet+=t.pnl;if(t.pnl>0){rW++;rGW+=t.pnl;}else if(t.pnl<0){rL++;rGL+=Math.abs(t.pnl);}
    const rt=rW+rL;rolling.net.push(+rNet.toFixed(2));rolling.wr.push(rt>0?+(rW/rt).toFixed(3):0);rolling.pf.push(rGL>0?+(rGW/rGL).toFixed(3):rGW>0?5:0);
    const rwr=rt>0?rW/rt:0,rawW=rW>0?rGW/rW:0,rawL=rL>0?rGL/rL:0;rolling.ev.push(+(rwr*rawW-(1-rwr)*rawL).toFixed(2));});
  return{wr,avgW,avgL,pf,ev,net,grossNet,grossW,grossL,totalFees,feeImpact,maxDD,sharpe,recovery,rr,streak,sdir,maxWS,maxLS,
    wins:wins.length,losses:losses.length,total:tds.length,longs:longs.length,shorts:shorts.length,
    longPnl:longs.reduce((s,t)=>s+t.pnl,0),shortPnl:shorts.reduce((s,t)=>s+t.pnl,0),
    longWR:longs.length?longs.filter(t=>t.pnl>0).length/longs.length:0,shortWR:shorts.length?shorts.filter(t=>t.pnl>0).length/shorts.length:0,
    best,worst,bestDay,worstDay,avgDur,avgWinDur,avgLossDur,syms,setups,monthly,byGrade,byTF,dow,byDay,rolling};

// ── P&L helpers ───────────────────────────────────────────────────
function tradeCalc(sym,type,entry,exit,size,fees){const r=calcPnl(sym,type,entry,exit,size,fees);return{grossPnl:r.gross,pnl:r.net,fees:fees||0};}

// ── CSV Parsing ───────────────────────────────────────────────────
function parseLine(line){const r=[];let cur='',inQ=false;for(const c of line){if(c==='"')inQ=!inQ;else if(c===','&&!inQ){r.push(cur.trim());cur='';}else cur+=c;}r.push(cur.trim());return r.map(f=>f.replace(/^"|"$/g,'').trim());}
function parseDate(s){if(!s)return'';let m=s.match(/(\d{1,2})\/(\d{1,2})\/(\d{4})/);if(m)return m[3]+'-'+m[1].padStart(2,'0')+'-'+m[2].padStart(2,'0');m=s.match(/(\d{4})-(\d{2})-(\d{2})/);if(m)return m[0];return s.slice(0,10);}
function parseDT(s){if(!s)return null;const m=s.match(/(\d{1,2})\/(\d{1,2})\/(\d{4})\s+(\d{1,2}):(\d{2})(?::(\d{2}))?/);if(m)return new Date(+m[3],+m[1]-1,+m[2],+m[4],+m[5],+(m[6]||0));return null;}
function detectType(hdr){const h=hdr.join(' ');if(h.includes('buyprice')||h.includes('boughttimestamp'))return'performance';if(h.includes('amount')&&(h.includes('balance')||h.includes('description')))return'cash';if(h.includes('fillprice')||h.includes('fill price'))return'fills';if(h.includes('orderstatus'))return'orders';return'generic';}

function importCSV(text,label){
  const lines=text.split('\n').filter(l=>l.trim());
  if(lines.length<2)return{imported:0,skipped:0,merged:0,type:'empty',batch:[],merges:[],feeUpdates:[]};
  const hdr=parseLine(lines[0]).map(h=>h.toLowerCase().replace(/\s+/g,''));
  const type=detectType(hdr);
  const gc2=(row,keys)=>{for(const k of keys){const i=hdr.findIndex(h=>h.includes(k.replace(/\s/g,'')));if(i!==-1&&row[i]!=null&&row[i]!=='')return row[i];}return'';};

  // ── Cash History / Account Balance CSV ──────────────────────────
  if(type==='cash'){
    let feeUpdates=[],balanceUpdates=[];
    for(let i=1;i<lines.length;i++){
      const row=parseLine(lines[i]);if(row.length<3)continue;
      const amount=parseFloat(gc2(row,['amount','value']));
      const desc=(gc2(row,['description','type','transaction'])||'').toLowerCase();
      const date=parseDate(gc2(row,['date','time','timestamp']));
      const balance=parseFloat(gc2(row,['balance','runningbalance','accountbalance','endbalance']));
      if(isNaN(amount)||!date)continue;
      // Identify fee entries
      if(desc.includes('commission')||desc.includes('fee')||amount<0&&(desc.includes('trade')||desc.includes('exec'))){
        // Try to match to existing trade by date
        const matchTrades=trades.filter(t=>t.date===date&&!t.feeFromCash);
        if(matchTrades.length===1)feeUpdates.push({id:matchTrades[0].id,fees:Math.abs(amount),source:'cash_history'});
      }
      if(!isNaN(balance))balanceUpdates.push({date,balance});
    }
    return{imported:0,skipped:0,merged:0,type:'cash',batch:[],merges:[],feeUpdates,balanceUpdates};
  }

  const batch=[],merges=[];let skipped=0;
  for(let i=1;i<lines.length;i++){
    const row=parseLine(lines[i]);if(row.length<4)continue;
    const rawSym=gc2(row,['symbol','instrument'])||'MES';
    const base=getBase(rawSym),sym=PRESETS[base]?base:(rawSym.toUpperCase().slice(0,6));
    const qty=parseInt(gc2(row,['qty','quantity','contracts','size','shares']))||1;
    const buyR=parseFloat(gc2(row,['buyprice','buy price'])),sellR=parseFloat(gc2(row,['sellprice','sell price']));
    const entR=parseFloat(gc2(row,['entryprice','entry price','avg entry','entry','open'])),extR=parseFloat(gc2(row,['exitprice','exit price','avg exit','exit','close']));
    let entry,exit,dir;
    if(!isNaN(buyR)&&!isNaN(sellR)&&buyR>0&&sellR>0){entry=buyR;exit=sellR;dir=buyR<=sellR?'LONG':'SHORT';}
    else if(!isNaN(entR)&&!isNaN(extR)&&entR>0&&extR>0){entry=entR;exit=extR;const ds=(gc2(row,['action','side','direction','type'])||'').toLowerCase();dir=ds.includes('buy')||ds.includes('long')?'LONG':'SHORT';}
    else continue;
    const dtR=gc2(row,['boughttimestamp','soldtimestamp','entrytime','entry time','entrydate','date','time']);
    const date=parseDate(dtR);if(!date)continue;
    const buyDT=parseDT(gc2(row,['boughttimestamp','entrytime','entry time'])),sellDT=parseDT(gc2(row,['soldtimestamp','exittime','exit time']));
    const durationMins=buyDT&&sellDT?Math.round(Math.abs(sellDT-buyDT)/60000):null;
    const entryTime=buyDT?buyDT.toTimeString().slice(0,5):null,exitTime=sellDT?sellDT.toTimeString().slice(0,5):null;
    const feeR=parseFloat(gc2(row,['commission','fee','fees','comm']));
    const fees=isNaN(feeR)?getFee(sym):feeR;
    const orderId=gc2(row,['orderid','order id','id','ordernum'])||null;
    const calc=tradeCalc(sym,dir,entry,exit,qty,fees);
    const existing=trades.find(t=>t.date===date&&t.symbol===sym&&Math.abs(t.entry-entry)<0.01&&t.size===qty);
    if(existing){
      const upd={};
      if(durationMins&&!existing.durationMins){upd.durationMins=durationMins;}
      if(entryTime&&!existing.entryTime){upd.entryTime=entryTime;}
      if(exitTime&&!existing.exitTime){upd.exitTime=exitTime;}
      if(orderId&&!existing.orderId){upd.orderId=orderId;}
      if(Object.keys(upd).length>0)merges.push({id:existing.id,updates:upd,desc:Object.keys(upd).join(', ')});
      else skipped++;
      continue;
    }
    batch.push({date,symbol:sym,type:dir,entry:+entry.toFixed(4),exit:+exit.toFixed(4),size:qty,fees,...calc,setup:'—',grade:'—',timeframe:'—',notes:'',chartUrl:'',orderId:orderId||'',durationMins,entryTime,exitTime,source:label||'Import',assetType:isFut(sym)?'futures':'stock'});
  }
  return{imported:batch.length,skipped,merged:merges.length,type,batch,merges,feeUpdates:[],balanceUpdates:[]};
}

async function commitImport(r){
  for(const t of r.batch)await addTrade(t);
  for(const m of r.merges)await updateTrade(m.id,m.updates);
  for(const f of r.feeUpdates){const calc=tradeCalc;const t=trades.find(x=>x.id===f.id);if(t){const newCalc=tradeCalc(t.symbol,t.type,t.entry,t.exit,t.size,f.fees);await updateTrade(f.id,{fees:f.fees,pnl:newCalc.pnl,feeFromCash:true});}}
}

// ── Sparkline SVG ─────────────────────────────────────────────────
function sparkline(data,color,w,h){
  if(!data||data.length<2)return'';
  const min=Math.min(...data),max=Math.max(...data),range=max-min||1;
  const sx=i=>i/(data.length-1)*w,sy=v=>h-((v-min)/range*h)*0.8-h*0.1;
  const path='M'+data.map((v,i)=>sx(i)+','+sy(v)).join('L');
  const fill='M'+sx(0)+','+h+' L'+data.map((v,i)=>sx(i)+','+sy(v)).join(' L')+' L'+sx(data.length-1)+','+h+' Z';
  return'<svg width="'+w+'" height="'+h+'" viewBox="0 0 '+w+' '+h+'" style="display:block;opacity:.55"><defs><linearGradient id="sg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="'+color+'" stop-opacity=".3"/><stop offset="100%" stop-color="'+color+'" stop-opacity="0"/></linearGradient></defs><path d="'+fill+'" fill="url(#sg)"/><path d="'+path+'" stroke="'+color+'" stroke-width="1.5" fill="none"/></svg>';
}

    if(filters.dir&&t.type!==filters.dir)return false;
    if(filters.grade&&filters.grade!=='—'&&(t.grade||'—')!==filters.grade)return false;

function openEditModal(tradeId){

  const mid='em_'+Date.now();
  const div=document.createElement('div');div.className='modal-bg';div.id=mid;
  div.innerHTML=`<div class="modal fade" onclick="event.stopPropagation()">
    <div class="modal-hd">
      <span>EDIT TRADE · ${t.date} · ${t.symbol}</span>
      <button onclick="document.getElementById('${mid}').remove()" style="background:none;border:none;color:#6868a0;font-size:20px;cursor:pointer;line-height:1">✕</button>
    </div>
    <div style="padding:20px;display:flex;flex-direction:column;gap:12px">
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px">
        <div><label class="lbl">DIRECTION</label>
          <select id="${mid}_type"><option${t.type==='LONG'?' selected':''}>LONG</option><option${t.type==='SHORT'?' selected':''}>SHORT</option></select></div>
        <div><label class="lbl">SETUP</label>
          <select id="${mid}_setup">${SETUPS.map(s=>'<option'+(s===(t.setup||'—')?' selected':'')+'>'+s+'</option>').join('')}</select></div>
        <div><label class="lbl">GRADE</label>
          <select id="${mid}_grade">${GRADES.map(g=>'<option'+(g===(t.grade||'—')?' selected':'')+'>'+g+'</option>').join('')}</select></div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px">
        <div><label class="lbl">TIMEFRAME</label>
          <select id="${mid}_tf">${TIMEFRAMES.map(tf=>'<option'+(tf===(t.timeframe||'—')?' selected':'')+'>'+tf+'</option>').join('')}</select></div>
        <div><label class="lbl">ORDER ID</label>
          <input id="${mid}_oid" value="${t.orderId||''}" placeholder="Optional"/></div>
        <div><label class="lbl">FEES ($)</label>
          <input id="${mid}_fees" type="number" step="0.01" value="${t.fees||0}"/></div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:8px">
        <div><label class="lbl">ENTRY</label><input id="${mid}_entry" value="${t.entry}"/></div>
        <div><label class="lbl">EXIT</label><input id="${mid}_exit" value="${t.exit}"/></div>
        <div><label class="lbl">CONTRACTS</label><input id="${mid}_size" value="${t.size}"/></div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:4px;align-items:end">
          <div><label class="lbl">ENTRY TIME</label><input id="${mid}_et" value="${t.entryTime||''}" placeholder="09:30"/></div>
          <div><label class="lbl">EXIT TIME</label><input id="${mid}_xt" value="${t.exitTime||''}" placeholder="10:15"/></div>
        </div>
      </div>
      <div><label class="lbl">TRADINGVIEW CHART URL</label>
        <input id="${mid}_chart" value="${t.chartUrl||''}" placeholder="https://www.tradingview.com/chart/..."/></div>
      <div><label class="lbl">NOTES</label>
        <textarea id="${mid}_notes" rows="3" style="resize:vertical">${t.notes||''}</textarea></div>
      <div id="${mid}_prev" style="font-size:12px;color:#6868a0;min-height:18px"></div>
      <div style="display:flex;gap:8px;justify-content:flex-end">
        <button class="btn-d" onclick="document.getElementById('${mid}').remove()">CANCEL</button>
        <button class="btn-g" id="${mid}_save">SAVE CHANGES</button>
      </div>
    </div></div>`;
  document.body.appendChild(div);
  div.onclick=e=>{if(e.target===div)div.remove();};

  const upd=()=>{
    const entry=parseFloat(el(mid+'_entry').value),exit=parseFloat(el(mid+'_exit').value);
    const size=parseInt(el(mid+'_size').value)||1,fees=parseFloat(el(mid+'_fees').value)||0;
    const type=el(mid+'_type').value;
    if(entry&&exit){const r=tradeCalc(t.symbol,type,entry,exit,size,fees);el(mid+'_prev').innerHTML='<span style="color:#7070a0">Gross: '+fmt(r.grossPnl)+'</span> &nbsp; <span style="color:'+gc(r.pnl)+'">Net: '+fmt(r.pnl)+'</span>';}
  };
  [mid+'_entry',mid+'_exit',mid+'_size',mid+'_fees'].forEach(id=>{const inp=el(id);if(inp){inp.oninput=upd;}});
  if(el(mid+'_type'))el(mid+'_type').onchange=upd;

  el(mid+'_save').onclick=async()=>{
    const btn=el(mid+'_save');
    btn.innerHTML='<span class="spinner"></span>';btn.disabled=true;
    try{
      const entry=parseFloat(el(mid+'_entry').value)||t.entry;
      const exit=parseFloat(el(mid+'_exit').value)||t.exit;
      const size=parseInt(el(mid+'_size').value)||t.size;
      const fees=parseFloat(el(mid+'_fees').value)||0;
      const type=el(mid+'_type').value;
      const calc=tradeCalc(t.symbol,type,entry,exit,size,fees);
      const et=el(mid+'_et').value,xt=el(mid+'_xt').value;
      let durationMins=t.durationMins||null;
      if(et&&xt){const[eh,em]=et.split(':').map(Number),[xh,xm]=xt.split(':').map(Number);durationMins=Math.abs((xh*60+xm)-(eh*60+em));}
      const updateData={
        type,
        setup:el(mid+'_setup').value,
        grade:el(mid+'_grade').value,
        timeframe:el(mid+'_tf').value,
        orderId:el(mid+'_oid').value,
        fees,entry,exit,size,
        grossPnl:calc.grossPnl,
        pnl:calc.pnl,
        durationMins,
        entryTime:et||t.entryTime||null,
        exitTime:xt||t.exitTime||null,
        chartUrl:el(mid+'_chart').value,
        notes:el(mid+'_notes').value,
      };
      await updateTrade(t.id,updateData);
      div.remove();
    }catch(e){alert('Save failed: '+e.message);btn.innerHTML='SAVE CHANGES';btn.disabled=false;}
  };
}

// Add as a Strategy, attach to chart, runs in background
using System;
using System.IO;
using NinjaTrader.NinjaScript.Strategies;

namespace NinjaTrader.NinjaScript.Strategies
{
    public class EdgeLogExport : Strategy
    {
        string csvPath = @"C:\\EdgeLog\\trades.csv";

        protected override void OnStateChange()
        {
            if (State == State.SetDefaults)
            {
                Name = "EdgeLogExport";
                Description = "Auto-exports fills to EdgeLog CSV";
            }
            if (State == State.DataLoaded)
            {
                if (!Directory.Exists(@"C:\\EdgeLog"))
                    Directory.CreateDirectory(@"C:\\EdgeLog");
                if (!File.Exists(csvPath))
                    File.WriteAllText(csvPath,
                        "Symbol,BuyPrice,SellPrice,Qty,BoughtTimestamp,SoldTimestamp,Commission\\n");
            }
        }

        protected override void OnExecutionUpdate(Execution execution,
            string executionId, double price, int quantity,
            MarketPosition marketPosition, string orderId, DateTime time)
        {
            if (execution.Order.OrderState != OrderState.Filled) return;
            string line = string.Format("{0},{1},{2},{3},{4},{5},{6}\\n",
                Instrument.FullName,
                marketPosition == MarketPosition.Long ? price.ToString() : "",
                marketPosition == MarketPosition.Short ? price.ToString() : "",
                quantity,
                marketPosition == MarketPosition.Long ? time.ToString("MM/dd/yyyy HH:mm:ss") : "",
                marketPosition == MarketPosition.Short ? time.ToString("MM/dd/yyyy HH:mm:ss") : "",
                execution.Commission);
            File.AppendAllText(csvPath, line);
        }
    }
}`}</pre>

        <div style="display:flex;gap:12px;align-items:flex-end;margin-bottom:12px">
          <div style="width:130px"><label class="lbl">DEFAULT FEE/TRADE ($)</label><input type="number" id="fee-input" value="${defaultFee}" step="0.01" min="0" style="color:#f5c842"/></div>
          <div style="font-size:10px;color:#505070;line-height:1.8;padding-bottom:2px">Overridden by per-instrument fees in Settings. Cash history CSV fees override all.</div>
        </div>
        <div class="drop-zone" id="drop-zone">
          <div style="font-size:36px;margin-bottom:10px">📂</div>
          <div style="font-size:13px;color:#8080a0;letter-spacing:1px">DROP CSV(S) HERE or CLICK TO BROWSE</div>
          <div style="font-size:10px;color:#404060;margin-top:10px;line-height:2">
            ✓ NT8 Performance &nbsp;·&nbsp; ✓ Fills CSV &nbsp;·&nbsp; ✓ Cash History &nbsp;·&nbsp; ✓ Account Balance<br>
            ✓ Stocks / ETFs &nbsp;·&nbsp; ✓ Multiple files at once &nbsp;·&nbsp; ✓ Smart merge for partial data
          </div>
          <input type="file" id="csv-input" accept=".csv" multiple style="display:none"/>
        </div>
        <div id="import-result" style="display:none;margin-top:10px;padding:14px;background:#09090f;border:1px solid #181830;font-size:11px;color:#8080a0"></div>
      </div>
    </div>
    </div>`;

    setTimeout(()=>{
      const fi=el('fee-input');if(fi)fi.onchange=()=>{defaultFee=parseFloat(fi.value)||4.50;};
      const ai=el('auto-interval');if(ai)ai.onchange=()=>{autoInterval=parseInt(ai.value)||60;};
      if(el('auto-start-btn'))el('auto-start-btn').onclick=startAutoImport;
      if(el('auto-stop-btn'))el('auto-stop-btn').onclick=stopAutoImport;
      const nst=el('ns-toggle');if(nst)nst.onclick=e=>{e.preventDefault();const nsc=el('ns-code');if(nsc)nsc.style.display=nsc.style.display==='none'?'block':'none';};
      const dz=el('drop-zone'),ci=el('csv-input');if(!dz||!ci)return;
      const handle=async files=>{
        let tot=0,totS=0,totM=0,totFees=0;const results=[];
        for(const f of files){
          const text=await f.text(),r=importCSV(text,f.name);
          await commitImport(r);
          results.push({name:f.name,type:r.type,imported:r.imported,skipped:r.skipped,merged:r.merged,merges:r.merges,feeUpdates:r.feeUpdates||[]});
          tot+=r.imported;totS+=r.skipped;totM+=r.merged;totFees+=(r.feeUpdates||[]).length;
        }
        const rd=el('import-result');
        if(rd){rd.style.display='block';
          rd.innerHTML='<div style="color:#00e5a0;margin-bottom:10px;font-size:12px">✅ IMPORT DONE · '+tot+' added · '+totM+' merged · '+(totFees>0?totFees+' fee updates · ':'')+totS+' exact dupes skipped</div>'+
            results.map(r=>{
              const md=r.merges&&r.merges.length?'<div style="margin-top:4px;padding:6px 10px;background:#0d0d1a;font-size:10px;color:#7070a0">Merged into '+r.merges.length+' trade(s): <span style="color:#f5c842">'+r.merges.map(m=>m.desc).join(', ')+'</span></div>':'';
              const fd2=r.feeUpdates&&r.feeUpdates.length?'<div style="margin-top:4px;padding:6px 10px;background:#0d0d1a;font-size:10px;color:#f5c842">Updated fees on '+r.feeUpdates.length+' trade(s) from cash history</div>':'';
              const typeNote=r.type==='cash'?'<span class="tag" style="color:#f5c842">CASH HISTORY</span>':'<span class="tag">'+r.type+'</span>';
              return'<div style="border-top:1px solid #181830;padding:6px 0"><div style="display:flex;gap:14px;flex-wrap:wrap">'+
                '<span style="color:#8080a0">'+r.name+'</span>'+typeNote+(r.imported?'<span style="color:#00e5a0">+'+r.imported+'</span>':'')+
                (r.merged?'<span style="color:#f5c842">~'+r.merged+' merged</span>':'')+(r.skipped?'<span style="color:#505070">'+r.skipped+' dupes</span>':'')+'</div>'+md+fd2+'</div>';
            }).join('');}
        if(tot>0)setTimeout(()=>{activeTab='journal';renderApp();},1800);
      };
      dz.onclick=()=>ci.click();dz.ondragover=e=>{e.preventDefault();dz.classList.add('drag');};dz.ondragleave=()=>dz.classList.remove('drag');
      dz.ondrop=e=>{e.preventDefault();dz.classList.remove('drag');handle([...e.dataTransfer.files]);};
      ci.onchange=e=>{if(e.target.files.length)handle([...e.target.files]);};
    },50);
  }

  // ══ SETTINGS ══
  if(activeTab==='settings'){
    content.innerHTML=`<div style="max-width:700px">
    <div style="font-size:10px;color:#7070a0;letter-spacing:2px;margin-bottom:16px">SETTINGS · v${VERSION}</div>
    <div class="section" style="margin-bottom:14px">
      <div class="sec-hd">PER-INSTRUMENT ROUND-TRIP FEES ($)</div>
      <div style="padding:16px">
        <div style="font-size:11px;color:#7070a0;margin-bottom:14px;line-height:1.8">Set your actual round-trip commission per contract for each instrument. These override the global default fee when adding or importing trades.</div>
        <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px" id="fee-grid">
          ${Object.keys(PRESETS).map(sym=>`
            <div style="background:#09090f;border:1px solid #181830;padding:10px 12px">
              <label class="lbl">${sym}</label>
              <input type="number" step="0.01" min="0" id="fee_${sym}" value="${getFee(sym)}" style="color:#f5c842"/>
            </div>`).join('')}
        </div>
        <div style="display:flex;gap:8px;margin-top:14px">
          <button class="btn-g" id="save-fees">SAVE FEES</button>
          <button class="btn-d" id="reset-fees">RESET TO DEFAULTS</button>
        </div>
        <div id="fees-saved" style="display:none;color:#00e5a0;font-size:11px;margin-top:8px">✓ Saved</div>
      </div>
    </div>
    <div class="section" style="margin-bottom:14px">
      <div class="sec-hd">LOGO</div>
      <div style="padding:14px;display:flex;gap:12px;align-items:center">
        ${userLogo?'<img src="'+userLogo+'" style="height:48px;max-width:120px;object-fit:contain;border:1px solid #1e1e36"/>':'<div style="color:#404060;font-size:11px">No logo uploaded</div>'}
        <label class="btn-b" style="cursor:pointer">UPLOAD LOGO<input type="file" accept="image/*" id="logo-upload2" style="display:none"/></label>
        ${userLogo?'<button class="btn-r" id="rm-logo">REMOVE</button>':''}
      </div>
    </div>
    </div>`;
    setTimeout(()=>{
      const sf=el('save-fees');if(sf)sf.onclick=()=>{
        Object.keys(PRESETS).forEach(sym=>{const inp=el('fee_'+sym);if(inp)instrumentFees[sym]=parseFloat(inp.value)||DEFAULT_FEES[sym];});
        localStorage.setItem('el_fees',JSON.stringify(instrumentFees));
        const saved=el('fees-saved');if(saved){saved.style.display='block';setTimeout(()=>saved.style.display='none',2000);}
      };
      const rf=el('reset-fees');if(rf)rf.onclick=()=>{instrumentFees={...DEFAULT_FEES};localStorage.setItem('el_fees',JSON.stringify(instrumentFees));renderApp();};
      const lu2=el('logo-upload2');if(lu2)lu2.onchange=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{userLogo=ev.target.result;localStorage.setItem('el_logo',userLogo);renderApp();};r.readAsDataURL(f);};
      if(el('rm-logo'))el('rm-logo').onclick=()=>{userLogo=null;localStorage.removeItem('el_logo');renderApp();};
    },50);
  }

  // ══ EXPORT ══
  if(activeTab==='export'){
    content.innerHTML=`<div style="max-width:560px">
      <div style="background:#09090f;border:1px solid #181830;padding:12px 16px;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center">
        <span style="font-size:10px;color:#6060a0;letter-spacing:1px">CLOUD SYNC · v${VERSION}</span>
        <span style="color:#00e5a0;font-size:10px;display:flex;align-items:center"><span class="pulse"></span>LIVE · ${trades.length} TRADES</span>
      </div>
      <div class="section" style="margin-bottom:12px">
        <div class="sec-hd">EXPORT</div>
        <div style="padding:12px">
          <div style="display:flex;justify-content:space-between;align-items:center;background:#09090f;padding:12px 14px">
            <div><div style="font-size:12px;color:#c8ccd8;margin-bottom:3px">Full CSV Export</div><div style="font-size:10px;color:#606080">Includes gross/net P&L, duration, timeframe, order ID, grade</div></div>
            <button class="btn-g" id="exp-csv" ${!trades.length?'disabled':''}>DOWNLOAD CSV</button>
          </div>
        </div>
      </div>
      ${trades.length?`<div style="border:1px solid #ff3d5a20">
        <div style="background:#0d0008;padding:10px 16px;border-bottom:1px solid #ff3d5a20;font-size:10px;letter-spacing:2px;color:#ff3d5a">DANGER ZONE</div>
        <div style="padding:14px;display:flex;justify-content:space-between;align-items:center">
          <div style="font-size:11px;color:#6060a0">Permanently delete all ${trades.length} trades from cloud.</div>
          <button class="btn-r" id="clr-all">CLEAR ALL</button>
        </div></div>`:''}
    </div>`;
    setTimeout(()=>{
      if(el('exp-csv'))el('exp-csv').onclick=exportCSV;
      if(el('clr-all'))el('clr-all').onclick=async()=>{if(!confirm('Delete ALL '+trades.length+' trades?'))return;const snap=await colRef.get();const b=db.batch();snap.docs.forEach(d=>b.delete(d.ref));await b.commit();};
    },50);
  }
}

// ── Boot ──────────────────────────────────────────────────────────
if(!initFB())document.getElementById('app').innerHTML='<div style="color:#ff3d5a;padding:40px;text-align:center">Firebase failed to initialize.</div>';
else auth.onAuthStateChanged(user=>{if(user){currentUser=user;subscribeAll(currentUser.uid);}else renderAuth();});
</script>
</body>
</html>
