// ── AI Summary — client-side engine (always works) + Claude API ──
async function runAISummary(tds,period){
  const out=el('ai-output');if(!out)return;
  out.innerHTML='<div style="display:flex;align-items:center;gap:10px;color:var(--text3);font-size:var(--fsm)"><div class="spinner"></div>Analyzing...</div>';
  const S2=calcStats(tds);if(!S2){out.innerHTML='<div style="color:var(--text4)">Not enough data for this period.</div>';return;}

  // Client-side rule-based analysis — always works
  const sections=[];
  const periodLabel=period==='all'?'All time':period==='day'?'Last 24h':period==='week'?'Last 7 days':'Last 30 days';
  // 1. Summary
  const trend=S2.rolling.net.slice(-5);
  const recentSlope=trend.length>1?trend[trend.length-1]-trend[0]:0;
  let summ=`<b style="color:var(--text)">${periodLabel}:</b> ${S2.total} trades, net P&L <span style="color:${gch(S2.net)}">${fmt(S2.net)}</span> (gross ${fmt(S2.grossNet)}). `;
  summ+=S2.ev>0?`Positive EV of <span style="color:var(--green)">$${S2.ev.toFixed(2)}/trade</span> — strategy has edge.`:`<span style="color:var(--red)">Negative EV of $${S2.ev.toFixed(2)}/trade</span> — strategy currently losing money on expectation.`;
  summ+=recentSlope>0?' Recent trend is <span style="color:var(--green)">improving ↑</span>.':recentSlope<-20?' Recent trend is <span style="color:var(--red)">declining ↓</span> — something changed recently.':'';
  sections.push(['📊 SUMMARY',summ]);

  // 2. Strengths
  const strengths=[];
  if(S2.wr>=0.55)strengths.push(`Strong win rate of <b>${pct(S2.wr)}</b> — trade selection is disciplined.`);
  if(S2.pf>=1.8)strengths.push(`Excellent profit factor of <b>${S2.pf.toFixed(2)}×</b> — winners significantly outpace losers.`);
  if(S2.rr>=1.5)strengths.push(`Good risk:reward of <b>${S2.rr.toFixed(2)}R</b> — cutting losses appropriately vs wins.`);
  if(S2.sharpe>1)strengths.push(`Annualized Sharpe of <b>${S2.sharpe.toFixed(2)}</b> — consistent, low-variance returns.`);
  if(S2.maxWS>=4)strengths.push(`Win streak of <b>${S2.maxWS}</b> shows ability to execute when in rhythm.`);
  if(S2.feeImpact<8)strengths.push(`Fee drag at <b>${S2.feeImpact.toFixed(1)}%</b> is well controlled.`);
  const bestSetup=Object.entries(S2.setups).sort(([,a],[,b])=>b.pnl-a.pnl)[0];
  if(bestSetup&&bestSetup[0]!=='—')strengths.push(`Best setup is <b>${bestSetup[0]}</b>: ${fmt(bestSetup[1].pnl)} net P&L, ${(bestSetup[1].wins/bestSetup[1].count*100).toFixed(0)}% WR.`);
  sections.push(['💪 STRENGTHS',strengths.length?strengths.slice(0,2).join(' '):'Not enough data to identify clear strengths yet.']);

  // 3. Critical weakness
  const weaknesses=[];
  if(S2.wr<0.45)weaknesses.push({sev:3,msg:`Win rate of <b style="color:var(--red)">${pct(S2.wr)}</b> is below 45%. With your avg win of $${S2.avgW.toFixed(0)} and avg loss of $${S2.avgL.toFixed(0)}, you need >45% WR to stay profitable. Be more selective — only take A/B grade setups.`});
  if(S2.rr<1)weaknesses.push({sev:3,msg:`Risk:Reward of <b style="color:var(--red)">${S2.rr.toFixed(2)}R</b> — your average loss ($${S2.avgL.toFixed(0)}) exceeds your average win ($${S2.avgW.toFixed(0)}). Set a hard rule: minimum 1.5R per trade or pass.`});
  if(S2.maxLS>=4)weaknesses.push({sev:2,msg:`Max loss streak of <b>${S2.maxLS}</b>. Continuing to trade through streaks amplifies damage. Consider a 3-loss stop rule.`});
  if(S2.feeImpact>15)weaknesses.push({sev:2,msg:`Fee drag is <b style="color:var(--yellow)">${S2.feeImpact.toFixed(1)}%</b> of gross — commissions are eating a significant portion. Reduce overtrading or renegotiate fees.`});
  if(S2.pf<1)weaknesses.push({sev:3,msg:`Profit factor <b style="color:var(--red)">${S2.pf.toFixed(2)}</b> means for every $1 won you lose $${(1/S2.pf).toFixed(2)}. Strategy is currently net-losing. Pause and review trade criteria.`});
  weaknesses.sort((a,b)=>b.sev-a.sev);
  sections.push(['⚠ CRITICAL WEAKNESS',weaknesses.length?weaknesses[0].msg:'No critical weaknesses detected — focus on maintaining consistency.']);

  // 4. Action plan
  const actions=[];
  if(S2.wr<0.5)actions.push(`<b>1. Tighten entry criteria</b> — before entering, confirm: setup matches your best-performing type (${bestSetup?bestSetup[0]:'check stats'}), grade is A or B, and RR is >1.5.`);
  else actions.push(`<b>1. Protect the edge</b> — WR is ${pct(S2.wr)}. Stay disciplined. Don't increase size until you have 50+ trades at this WR.`);
  if(S2.rr<1.5)actions.push(`<b>2. Fix stops and targets</b> — move stops only to reduce loss, never to give a trade "more room." Set a minimum target of 1.5× your stop size before entry.`);
  else actions.push(`<b>2. Capitalize on your ${S2.rr.toFixed(2)}R ratio</b> — consider scaling out 50% at 1R and letting the rest run to 2R+.`);
  if(S2.feeImpact>10)actions.push(`<b>3. Reduce frequency</b> — at ${S2.feeImpact.toFixed(1)}% fee drag, fewer, higher-quality trades will improve net P&L.`);
  else if(S2.maxLS>=3)actions.push(`<b>3. Implement a daily loss limit</b> — 3 losses in a session = done for the day. Review those trades the next morning before trading again.`);
  else actions.push(`<b>3. Document every trade</b> — grade each trade A-F and track patterns. Your best setups deserve larger size once identified.`);
  sections.push(['📋 ACTION PLAN',actions.join('<br/>')]);

  // 5. Pattern alert
  const recent=tds.slice(-5);
  const recentNet=recent.reduce((s,t)=>s+t.pnl,0);
  const recentWR=recent.filter(t=>t.pnl>0).length/Math.max(recent.length,1);
  let pattern='';
  if(recent.length>=3){
    if(recentNet<0&&S2.net>0)pattern=`<span style="color:var(--yellow)">⚠ Last ${recent.length} trades are net negative ($${recentNet.toFixed(0)}) while overall is positive. Monitor closely — could indicate strategy drift or overtrading.`;
    else if(recentWR<0.3&&S2.wr>0.5)pattern=`<span style="color:var(--red)">⚠ Recent WR (${(recentWR*100).toFixed(0)}%) is well below your overall WR (${pct(S2.wr)}). Check if market conditions changed or you're deviating from plan.</span>`;
    else if(recentNet>0&&recentWR>=0.7)pattern=`<span style="color:var(--green)">✓ Recent ${recent.length} trades performing well (${(recentWR*100).toFixed(0)}% WR). Stay consistent — avoid increasing size impulsively.</span>`;
    else pattern=`Last ${recent.length} trades: ${recent.filter(t=>t.pnl>0).length}W / ${recent.filter(t=>t.pnl<0).length}L, net ${fmt(recentNet)}. No unusual pattern detected.`;
  }
  sections.push(['🔍 RECENT PATTERN',pattern||'Add more trades for pattern detection.']);

  const html2=sections.map(([title,body])=>`<div style="margin-bottom:14px"><div style="font-size:var(--fsxs);color:var(--text4);letter-spacing:2px;margin-bottom:5px">${title}</div><div style="font-size:var(--fsm);color:var(--text2);line-height:1.9">${body}</div></div>`).join('');
  out.innerHTML=html2+`<div style="margin-top:12px;font-size:var(--fsxs);color:var(--text5);border-top:1px solid var(--border);padding-top:8px;display:flex;justify-content:space-between;align-items:center"><span>Client-side analysis · ${tds.length} trades · ${new Date().toLocaleTimeString()}</span><button class="btn-b" style="font-size:var(--fsxs);padding:3px 10px" id="try-claude-api">TRY CLAUDE API →</button></div>`;
  // Wire up Claude API attempt button
  setTimeout(()=>{
    if(el('try-claude-api'))el('try-claude-api').onclick=()=>runClaudeAPI(tds,period,out);
  },50);
}

async function runClaudeAPI(tds,period,out){
  const S2=calcStats(tds);if(!S2)return;
  const note=document.createElement('div');note.style.cssText='font-size:var(--fsxs);color:var(--text5);margin-top:8px;padding:8px;background:var(--bg2);border:1px solid var(--border)';
  note.textContent='Attempting Claude API call... (works inside Claude.ai, may be blocked on GitHub Pages due to browser CORS policy)';
  out.appendChild(note);
  const summary={period,tradeCount:S2.total,winRate:pct(S2.wr),profitFactor:S2.pf>=99?'∞':S2.pf.toFixed(2),expectedValue:'$'+S2.ev.toFixed(2),netPnl:fmt(S2.net),grossPnl:fmt(S2.grossNet),totalFees:'$'+S2.totalFees.toFixed(2),feeDrag:S2.feeImpact.toFixed(1)+'%',avgWin:'+$'+S2.avgW.toFixed(2),avgLoss:'-$'+S2.avgL.toFixed(2),riskReward:S2.rr.toFixed(2)+'R',sharpe:S2.sharpe.toFixed(2),maxDrawdown:'-$'+S2.maxDD.toFixed(2),recovery:S2.recovery.toFixed(2)+'x',setupBreakdown:Object.entries(S2.setups).map(([k,v])=>`${k}:${v.count}tr,${(v.wins/v.count*100).toFixed(0)}%WR,${fmt(v.pnl)}`).join(';')};
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:800,messages:[{role:'user',content:`Futures trading coach. Analyze this data and give 3 specific, actionable improvements. Data: ${JSON.stringify(summary)}. Be direct, use their exact numbers, under 200 words.`}]})});
    const data=await res.json();
    if(data.error)throw new Error(data.error.message);
    const text=data.content?.find(b=>b.type==='text')?.text||'';
    const formatted=text.replace(/\*\*(.*?)\*\*/g,'<b style="color:var(--text)">$1</b>').replace(/\n/g,'<br/>')
    note.style.cssText='margin-top:10px;padding:12px;background:color-mix(in srgb,var(--blue) 8%,transparent);border:1px solid color-mix(in srgb,var(--blue) 25%,transparent)';
    note.innerHTML=`<div style="font-size:var(--fsxs);color:var(--blue);letter-spacing:2px;margin-bottom:6px">🤖 CLAUDE AI ANALYSIS</div><div style="font-size:var(--fsm);color:var(--text2);line-height:1.9">${formatted}</div>`;
  }catch(e){
    note.textContent=`Claude API unavailable from this URL (${e.message}). The client-side analysis above is fully accurate.`;
  }
}

      ${kpiCard('EXP VALUE','$'+S.ev.toFixed(2),'Per trade',S.ev>0?'#00e5a0':'#ff3d5a',S.rolling.ev,S.ev>0?'#00e5a0':'#ff3d5a',true)}

    <div class="section" style="margin-bottom:8px">
      <div class="sec-hd" style="flex-wrap:wrap;gap:6px">

        <div style="display:flex;gap:14px;font-size:var(--fsxs)">
          <span style="color:var(--text4)">MAX DD <span style="color:var(--red)">-$${S.maxDD.toFixed(0)}</span></span>
          <span style="color:var(--text4)">TOTAL FEES <span style="color:var(--yellow)">-$${S.totalFees.toFixed(0)}</span></span>
          ${accountEquity>0?`<span style="color:var(--text4)">START EQUITY <span style="color:var(--blue)">$${accountEquity.toLocaleString()}</span></span>`:''}
        </div>
      </div>
      <div style="padding:10px 6px 6px;overflow-x:auto">
        ${(()=>{let c=accountEquity>0?accountEquity:0,pk=c;return svgLineLabeled([{y:c,pnl:0},...trades.map(t=>{c=+(c+t.pnl).toFixed(2);if(c>pk)pk=c;return{y:c,pnl:t.pnl};})], '#00e5a0',1200,260,true);})()}
      </div>
      ${balanceHistory.length>1?`<div style="border-top:1px solid var(--border);padding:6px 6px 4px;margin-top:6px">
        <div style="font-size:var(--fsxs);color:var(--blue);padding:3px 8px;letter-spacing:2px">DAILY ACCOUNT BALANCE (from NT8)</div>
        ${svgLine(balanceHistory.map((b,i)=>({y:b.balance,pnl:i>0?b.balance-balanceHistory[i-1].balance:0})),'#4a9eff',1200,100)}
      </div>`:''}

    <!-- DISTRIBUTION + 7 KPI tiles in two columns -->
    <div style="display:grid;grid-template-columns:1.4fr 1fr;gap:8px;margin-bottom:8px">
      <!-- P&L Distribution (Std Dev histogram) -->
      <div class="section">
        <div class="sec-hd" style="flex-wrap:wrap;gap:6px">
          <span>P&L DISTRIBUTION</span>
          <div style="display:flex;gap:14px;font-size:var(--fsxs)">
            <span style="color:var(--text4)">MEAN <span style="color:${_mean>=0?'var(--green)':'var(--red)'}">${_mean>=0?'+':''}$${_mean.toFixed(2)}</span></span>
            <span style="color:var(--text4)">STD DEV <span style="color:var(--yellow)">$${_std.toFixed(2)}</span></span>
            <span style="color:var(--text4)">SHARPE <span style="color:${S.sharpe>1?'var(--green)':S.sharpe>0?'var(--yellow)':'var(--red)'}">${S.sharpe.toFixed(2)}</span></span>
          </div>
        </div>
        <div style="padding:14px 12px">
          <svg viewBox="0 0 700 200" width="100%" style="display:block">
            <!-- baseline -->
            <line x1="0" y1="180" x2="700" y2="180" stroke="var(--border)" stroke-width="1"/>
            <!-- zero line -->
            ${_min<0&&_max>0?(()=>{const zx=((0-_min)/(_max-_min))*700;return `<line x1="${zx}" y1="0" x2="${zx}" y2="180" stroke="var(--text5)" stroke-width="1" stroke-dasharray="2,3"/><text x="${zx+3}" y="13" fill="var(--text5)" font-size="9">$0</text>`})():''}
            <!-- mean line -->
            ${(()=>{const mx=((_mean-_min)/(_max-_min))*700;return `<line x1="${mx}" y1="0" x2="${mx}" y2="180" stroke="#f5c842" stroke-width="1" stroke-dasharray="3,2" opacity=".6"/><text x="${mx+3}" y="26" fill="#f5c842" font-size="9">μ</text>`})()}
            <!-- ±1 std dev band -->
            ${_std>0?(()=>{const lx=((_mean-_std-_min)/(_max-_min))*700,rx=((_mean+_std-_min)/(_max-_min))*700;return `<rect x="${lx}" y="0" width="${rx-lx}" height="180" fill="#f5c842" opacity=".06"/><text x="${lx+3}" y="40" fill="#f5c842" font-size="9" opacity=".7">−1σ</text><text x="${rx-22}" y="40" fill="#f5c842" font-size="9" opacity=".7">+1σ</text>`})():''}
            <!-- bars -->
            ${_bins.map((cnt,i)=>{
              const bx=(i/_binCount)*700;
              const bw=700/_binCount-2;
              const bh=(cnt/_maxBin)*170;
              const by=180-bh;
              const binMid=_min+(i+0.5)*_binSize;
              const color=binMid>=0?'#00e5a0':'#ff3d5a';
              return `<rect x="${bx+1}" y="${by}" width="${bw}" height="${bh}" fill="${color}" opacity=".75"><title>$${(_min+i*_binSize).toFixed(0)} to $${(_min+(i+1)*_binSize).toFixed(0)}: ${cnt} trade${cnt!==1?'s':''}</title></rect>${cnt>0?`<text x="${bx+bw/2+1}" y="${by-3}" fill="var(--text4)" font-size="9" text-anchor="middle">${cnt}</text>`:''}`;
            }).join('')}
            <!-- x-axis labels -->
            <text x="2" y="196" fill="var(--text5)" font-size="9">$${_min.toFixed(0)}</text>

              <div style="font-family:'Bebas Neue',monospace;font-size:14px;color:var(--green)">+$${(_mean+2*_std).toFixed(0)}</div>
            </div>
          </div>
        </div>
      </div>

      <!-- KPI tile grid: 2x4 -->
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:5px;align-content:start">
        ${[['MAX DD','-$'+S.maxDD.toFixed(0),'#ff3d5a','Largest equity drawdown'],
           ['R:R',S.rr.toFixed(2)+'R',S.rr>=1.5?'#00e5a0':S.rr>=1?'#f5c842':'#ff3d5a','Avg win ÷ avg loss'],

          ].map(([l,v,c,sub])=>`<div class="mini-card" style="padding:10px 12px">

    <!-- BREAKDOWNS: monthly + by symbol + long/short -->

      <div class="section">
        <div class="sec-hd">MONTHLY P&L</div>
        <table><thead><tr><th>MONTH</th><th>TRADES</th><th>WR</th><th>NET</th></tr></thead><tbody>
          ${Object.entries(S.monthly).sort(([a],[b])=>b>a?1:-1).slice(0,6).map(([m,d])=>`<tr class="tr-row">
            <td style="color:var(--text);font-family:'Bebas Neue',monospace">${m}</td>
            <td style="color:var(--text4)">${d.trades}</td>
            <td style="color:${d.wins/d.trades>=.5?'var(--green)':'var(--red)'}">${(d.wins/d.trades*100).toFixed(0)}%</td>
            <td style="color:${gch(d.pnl)};font-family:'Bebas Neue',monospace;font-size:14px">${fmt(d.pnl)}</td>
          </tr>`).join('')}
        </tbody></table>
      </div>
      <div class="section">
        <div class="sec-hd">BY SYMBOL</div>
        <table><thead><tr><th>SYM</th><th>WR</th><th>GROSS</th><th>NET</th></tr></thead><tbody>
          ${Object.entries(S.syms).sort(([,a],[,b])=>b.pnl-a.pnl).map(([sym,s])=>`<tr class="tr-row">
            <td style="color:var(--text);font-weight:bold">${sym}<sup style="font-size:8px;color:var(--text5)">${isFut(sym)?'F':'S'}</sup></td>

          </tr>`).join('')}

        <div class="sec-hd">L / S SPLIT</div>

    <!-- CALENDAR at bottom (exploratory) -->
    <div class="section">

          el('nfadd').innerHTML='<span class="spinner"></span>';
          const et=el('nfet')?.value,xt=el('nfxt')?.value;
          let dur=null;if(et&&xt){const[eh,em]=et.split(':').map(Number),[xh,xm]=xt.split(':').map(Number);dur=Math.abs((xh*60+xm)-(eh*60+em));}

        <div><label class="lbl">MIN P&L</label><input class="filter-inp" id="fi-mn" placeholder="-500" value="${filters.minPnl}"/></div>
        <div><label class="lbl">MAX P&L</label><input class="filter-inp" id="fi-mx" placeholder="500" value="${filters.maxPnl}"/></div>
        <button onclick="clearFilters()" class="btn-d" style="font-size:9px;padding:3px 6px;height:26px;align-self:flex-end">✕</button>
      </div>`;
    content.appendChild(fb);
    setTimeout(()=>{const fmap={sym:'fi-sym',dir:'fi-dir',grade:'fi-grade',setup:'fi-setup',dateFrom:'fi-df',dateTo:'fi-dt',minPnl:'fi-mn',maxPnl:'fi-mx'};Object.entries(fmap).forEach(([k,id])=>{const inp=el(id);if(!inp)return;inp.addEventListener(inp.tagName==='SELECT'?'change':'input',()=>{filters[k]=inp.value;renderApp();});});},50);

    const cr=document.createElement('div');

      });
      // Compute running balance + % gain per trade
      // Build chronological timeline merging trades + ledger events (deposits/withdrawals)
      const _tradesByDate=[...trades].sort((a,b)=>{
        if(a.date!==b.date)return a.date>b.date?1:-1;
        return (a.entryTime||'')>(b.entryTime||'')?1:-1;
      });
      // Sum deposits up to each trade's date
      const _ledgerByDate={};
      (ledgerEvents||[]).forEach(ev=>{
        if(!_ledgerByDate[ev.date])_ledgerByDate[ev.date]=0;

      });
      // Find earliest deposit date to use as starting point (or accountEquity)
      const _firstDeposit=Object.keys(_ledgerByDate).sort()[0];
      let _runBal=0;
      // Apply any deposits with date earlier than first trade
      const _firstTradeDate=_tradesByDate[0]?.date;
      const _appliedDates=new Set();
      Object.keys(_ledgerByDate).sort().forEach(d=>{
        if(!_firstTradeDate||d<=_firstTradeDate){
          _runBal+=_ledgerByDate[d];
          _appliedDates.add(d);
        }
      });
      // Fallback: if no deposits, use accountEquity
      if(_runBal===0&&accountEquity>0)_runBal=accountEquity;
      const _runBals={},_eqPcts={};

        // Apply any deposits/withdrawals that happen on or before this trade's date
        Object.keys(_ledgerByDate).forEach(d=>{
          if(!_appliedDates.has(d)&&d<=t.date){
            _runBal+=_ledgerByDate[d];
            _appliedDates.add(d);
          }
        });
        const prev=_runBal;
        _runBal=+(_runBal+t.pnl).toFixed(2);
        _runBals[t.id]=_runBal;
        _eqPcts[t.id]=Math.abs(prev)>0?+((t.pnl/Math.abs(prev))*100).toFixed(2):null;
      });

      Object.keys(_ledgerByDate).forEach(d=>{

              return `<tr class="tr-row" style="border-bottom:1px solid var(--border);cursor:pointer" onclick="window._expHist=window._expHist===${i}?null:${i};renderApp()">
                <td style="color:var(--text4);white-space:nowrap;font-size:var(--fsxs)">${new Date(u.ts).toLocaleString()}</td>
                <td style="color:var(--text2);font-size:var(--fsxs)">${u.label}</td>
                <td><span class="tag">${u.type}</span></td>
                <td style="color:var(--green)">${u.added>0?'+'+u.added:'—'}</td>
                <td style="color:var(--yellow)">${u.merged>0?'~'+u.merged:'—'}</td>
                <td style="color:var(--yellow)">${u.feeUpdates>0?u.feeUpdates+' trades':'—'}</td>
                <td><span style="color:var(--text5);font-size:var(--fsxs)">${window._expHist===i?'▼':'▶'}</span></td>
              </tr>
              ${window._expHist===i?`<tr style="background:var(--bg3)">
                <td colspan="7" style="padding:14px 18px;border-bottom:1px solid var(--border)">
                  ${u.addedDetails&&u.addedDetails.length?`<div style="margin-bottom:14px">
                    <div style="color:var(--green);letter-spacing:1px;margin-bottom:6px;font-size:var(--fsxs)">＋ TRADES ADDED (${u.addedDetails.length})</div>
                    <table style="width:100%;font-size:var(--fsxs)"><thead><tr style="color:var(--text5)"><th style="text-align:left;padding:3px 6px">DATE</th><th style="text-align:left">SYM</th><th>DIR</th><th>SIZE</th><th>ENTRY</th><th>EXIT</th><th style="text-align:right">P&L</th></tr></thead><tbody>
                    ${u.addedDetails.slice(0,20).map(a=>`<tr style="border-top:1px solid var(--border)"><td style="padding:3px 6px;color:var(--text3)">${a.date}</td><td style="color:var(--text);font-weight:bold">${a.symbol}</td><td style="text-align:center;color:${a.type==='LONG'?'var(--green)':'var(--blue)'}">${a.type}</td><td style="text-align:center">${a.size}</td><td style="text-align:center;color:var(--text3)">${a.entry}</td><td style="text-align:center;color:var(--text3)">${a.exit}</td><td style="text-align:right;color:${a.pnl>=0?'var(--green)':'var(--red)'};font-family:'Bebas Neue',monospace">${a.pnl>=0?'+':''}$${a.pnl.toFixed(2)}</td></tr>`).join('')}
                    ${u.addedDetails.length>20?`<tr><td colspan="7" style="text-align:center;color:var(--text5);padding:4px">… and ${u.addedDetails.length-20} more</td></tr>`:''}
                    </tbody></table>
                  </div>`:''}
                  
                  ${u.mergeDetails&&u.mergeDetails.length?`<div style="margin-bottom:14px">
                    <div style="color:var(--yellow);letter-spacing:1px;margin-bottom:6px;font-size:var(--fsxs)">~ TRADES MERGED / UPDATED (${u.mergeDetails.length})</div>
                    <table style="width:100%;font-size:var(--fsxs)"><thead><tr style="color:var(--text5)"><th style="text-align:left;padding:3px 6px">DATE</th><th style="text-align:left">SYM</th><th style="text-align:left">FIELDS CHANGED</th></tr></thead><tbody>
                    ${u.mergeDetails.slice(0,20).map(m=>`<tr style="border-top:1px solid var(--border)"><td style="padding:3px 6px;color:var(--text3)">${m.date}</td><td style="color:var(--text);font-weight:bold">${m.symbol}</td><td style="color:var(--text3)">${m.updates||m.desc||'(none)'}</td></tr>`).join('')}
                    ${u.mergeDetails.length>20?`<tr><td colspan="3" style="text-align:center;color:var(--text5);padding:4px">… and ${u.mergeDetails.length-20} more</td></tr>`:''}
                    </tbody></table>
                  </div>`:''}
                  
                  ${u.feeDetails&&u.feeDetails.length?`<div style="margin-bottom:14px">
                    <div style="color:var(--blue);letter-spacing:1px;margin-bottom:6px;font-size:var(--fsxs)">$ FEE UPDATES (${u.feeDetails.length})</div>
                    <table style="width:100%;font-size:var(--fsxs)"><thead><tr style="color:var(--text5)"><th style="text-align:left;padding:3px 6px">DATE</th><th style="text-align:left">SYM</th><th>OLD FEE</th><th>NEW FEE</th><th>DIFF</th></tr></thead><tbody>
                    ${u.feeDetails.slice(0,20).map(f=>{const diff=f.newFee-f.oldFee;return `<tr style="border-top:1px solid var(--border)"><td style="padding:3px 6px;color:var(--text3)">${f.date}</td><td style="color:var(--text);font-weight:bold">${f.symbol}</td><td style="text-align:center;color:var(--text4)">$${(f.oldFee||0).toFixed(2)}</td><td style="text-align:center;color:var(--yellow)">$${(f.newFee||0).toFixed(2)}</td><td style="text-align:center;color:${diff>0?'var(--red)':'var(--green)'}">${diff>=0?'+':''}$${diff.toFixed(2)}</td></tr>`}).join('')}
                    </tbody></table>
                  </div>`:''}
                  
                  ${u.added===0&&u.merged===0&&u.feeUpdates===0?`<div style="color:var(--text5);font-style:italic;text-align:center;padding:20px">No changes were made by this import (no new data found or all data was duplicates).</div>`:''}
                  
                  <div style="display:flex;gap:8px;margin-top:14px;padding-top:10px;border-top:1px solid var(--border)">
                    ${u.added>0?`<button class="btn-r" style="font-size:var(--fsxs);padding:6px 14px" onclick="event.stopPropagation();revertImport(${i})">REVERT — DELETE ${u.added} ADDED TRADES</button>`:''}
                    <span style="font-size:var(--fsxs);color:var(--text5);align-self:center">Merged/fee changes cannot be auto-undone. Re-import Position History to fix direction issues.</span>
                  </div>
                </td>
              </tr>`:''}`;
            }).join('')}
          </tbody></table>
        </div>`:`<div style="border:1px dashed var(--border);padding:48px;text-align:center;color:var(--text5);font-size:11px;letter-spacing:2px">NO IMPORTS YET — IMPORT FILES IN THE IMPORT TAB</div>`}
        
        <div style="border:1px solid color-mix(in srgb,var(--red) 25%,transparent);background:color-mix(in srgb,var(--red) 5%,transparent);margin-top:14px">
          <div style="padding:9px 14px;border-bottom:1px solid color-mix(in srgb,var(--red) 20%,transparent);font-size:var(--fsxs);letter-spacing:2px;color:var(--red)">⚠ DANGER ZONE</div>
          <div style="padding:13px">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
              <div>
                <div style="font-size:var(--fsm);color:var(--text2);margin-bottom:4px">Delete all trades</div>
                <div style="font-size:var(--fsxs);color:var(--text5)">Permanently removes all ${trades.length} trades from cloud. Cannot be undone.</div>
              </div>
              <button class="btn-r" id="clr-all-h" ${!trades.length?'disabled':''}>CLEAR ALL TRADES</button>
            </div>
            <div style="display:flex;justify-content:space-between;align-items:center;padding-top:10px;border-top:1px solid var(--border)">
              <div>
                <div style="font-size:var(--fsm);color:var(--text2);margin-bottom:4px">Clear ledger (deposits/withdrawals)</div>
                <div style="font-size:var(--fsxs);color:var(--text5)">Removes all ${(ledgerEvents||[]).length} ledger entries. Trade data unaffected.</div>
              </div>
              <button class="btn-r" id="clr-ledger" ${!ledgerEvents||!ledgerEvents.length?'disabled':''}>CLEAR LEDGER</button>
            </div>
          </div>
        </div>`;
      content.appendChild(hDiv);
      setTimeout(()=>{
        if(el('clr-all-h'))el('clr-all-h').onclick=async()=>{
          if(!confirm(`Delete ALL ${trades.length} trades? This cannot be undone.`))return;
          const snap=await colRef.get();
          const b=db.batch();
          snap.docs.forEach(d=>b.delete(d.ref));
          await b.commit();
        };
        if(el('clr-ledger'))el('clr-ledger').onclick=()=>{
          if(!confirm('Clear all deposit/withdrawal entries?'))return;
          ledgerEvents=[];
          localStorage.removeItem('el_ledger');
          renderApp();
        };
      },50);
    }
  }

  // ══ SETTINGS ══
  if(activeTab==='settings'){
    const themes=[{id:'dark',color:'#00e5a0',label:'Dark'},{id:'ocean',color:'#00d4ff',label:'Ocean'},{id:'carbon',color:'#00e060',label:'Carbon'},{id:'terminal',color:'#00ff80',label:'Terminal'}];
    content.innerHTML=`<div style="max-width:760px">
    <div style="font-size:var(--fsxs);color:var(--text4);letter-spacing:2px;margin-bottom:14px">SETTINGS · v${VERSION}</div>

    <!-- THEME + DENSITY -->
    <div class="section" style="margin-bottom:12px">
      <div class="sec-hd">APPEARANCE</div>
      <div style="padding:14px;display:flex;gap:28px;flex-wrap:wrap">
        <div>
          <div class="lbl" style="margin-bottom:8px">THEME</div>
          <div style="display:flex;gap:12px;align-items:center">
            ${themes.map(t=>`<div style="display:flex;flex-direction:column;align-items:center;gap:5px;cursor:pointer" onclick="savePref('theme','${t.id}');applyTheme();renderApp()">
              <div class="theme-dot ${prefs.theme===t.id||(!prefs.theme&&t.id==='dark')?'active':''}" style="background:${t.color}"></div>
              <span style="font-size:var(--fsxs);color:var(--text4)">${t.label}</span>
            </div>`).join('')}
          </div>
        </div>
        <div>
          <div class="lbl" style="margin-bottom:8px">DENSITY</div>
          <div class="toggle-pill">
            <button class="${prefs.density==='compact'?'on':''}" onclick="savePref('density','compact');applyTheme();renderApp()">COMPACT</button>
            <button class="${!prefs.density||prefs.density==='normal'?'on':''}" onclick="savePref('density','normal');applyTheme();renderApp()">NORMAL</button>
            <button class="${prefs.density==='large'?'on':''}" onclick="savePref('density','large');applyTheme();renderApp()">LARGE</button>
          </div>
        </div>
      </div>
    </div>

    <!-- CUSTOM SETUPS -->
    <div class="section" style="margin-bottom:12px">
      <div class="sec-hd">CUSTOM SETUP TYPES</div>
      <div style="padding:14px">
        <div style="font-size:var(--fsm);color:var(--text4);margin-bottom:10px;line-height:1.8">Add your own trade setup labels (EBU, CBU, ENGU, HOD, etc.). These replace the default list in the trades view and analytics.</div>
        <div id="setups-list" style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px">
          ${customSetups.map((s,i)=>`<div style="display:flex;align-items:center;gap:0;background:var(--bg2);border:1px solid var(--border)"><span style="padding:4px 10px;font-size:var(--fsm);color:var(--text2)">${s}</span>${s!=='—'?`<button onclick="removeSetup(${i})" style="background:none;border:none;color:var(--text5);padding:4px 7px;cursor:pointer;font-size:12px">✕</button>`:''}</div>`).join('')}
        </div>
        <div style="display:flex;gap:8px">
          <input id="new-setup" placeholder="Add setup type (e.g. EBU, CBU, HOD...)" style="max-width:260px"/>
          <button class="btn-g" id="add-setup-btn">ADD</button>
          <button class="btn-d" id="reset-setups-btn">RESET DEFAULTS</button>
        </div>
      </div>
    </div>

    <!-- PER-INSTRUMENT FEES -->
    <div class="section" style="margin-bottom:12px">
      <div class="sec-hd">PER-INSTRUMENT ROUND-TRIP FEES ($)</div>
      <div style="padding:14px">
        <div style="font-size:var(--fsm);color:var(--text4);margin-bottom:12px;line-height:1.8">Set your actual round-trip commission per contract. Overrides the default fee when adding or importing trades. Cash History CSV takes highest priority when available.</div>
        <div style="display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-bottom:12px">
          ${Object.keys(PRESETS).map(sym=>`<div style="background:var(--bg3);border:1px solid var(--border2);padding:8px 10px"><label class="lbl">${sym}</label><input type="number" step="0.01" min="0" id="fee_${sym}" value="${getFee(sym)}" style="color:var(--yellow)"/></div>`).join('')}
        </div>
        <div style="display:flex;gap:8px">
          <button class="btn-g" id="save-fees">SAVE FEES</button>
          <button class="btn-d" id="reset-fees">RESET DEFAULTS</button>
        </div>
        <div id="fees-saved" style="display:none;color:var(--green);font-size:var(--fsm);margin-top:8px">✓ Saved successfully</div>
      </div>
    </div>

    <!-- ACCOUNT EQUITY -->
    <div class="section" style="margin-bottom:12px">
      <div class="sec-hd">ACCOUNT EQUITY</div>
      <div style="padding:14px">
        <div style="font-size:var(--fsm);color:var(--text4);margin-bottom:10px;line-height:1.8">Your current account balance. Used to calculate position size as % of account on each trade. Auto-detected from Cash History CSV or enter manually.</div>
        <div style="display:flex;gap:10px;align-items:flex-end">
          <div style="width:200px"><label class="lbl">ACCOUNT BALANCE ($)</label><input type="number" id="acct-equity-input" value="${accountEquity||''}" placeholder="50000" step="100"/></div>
          <button class="btn-g" id="save-equity">SET</button>
          ${accountEquity>0?`<span style="font-size:var(--fsxs);color:var(--green)">Current: $${accountEquity.toLocaleString()}</span>`:''}
        </div>
      </div>
    </div>

    <!-- CUSTOM TAGS -->
    <div class="section" style="margin-bottom:12px">
      <div class="sec-hd">CUSTOM TAGS</div>
      <div style="padding:14px">
        <div style="font-size:var(--fsm);color:var(--text4);margin-bottom:10px;line-height:1.8">Create reusable tags to label trades (e.g. "revenge trade", "news play", "trend day"). Tags appear in the trades view and can be filtered.</div>
        <div id="tags-list" style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px">
          ${customTags.map((tag,i)=>`<div style="display:flex;align-items:center;background:var(--bg3);border:1px solid var(--border);padding:4px 10px;gap:6px"><span style="font-size:var(--fsm);color:var(--text2)">${tag}</span><button onclick="removeCustomTag(${i})" style="background:none;border:none;color:var(--text5);cursor:pointer;font-size:12px;padding:0">✕</button></div>`).join('')}
          ${!customTags.length?'<span style="color:var(--text5);font-size:var(--fsm)">No tags yet</span>':''}
        </div>
        <div style="display:flex;gap:8px">
          <input id="new-tag-inp" placeholder="e.g. revenge trade, news play, trend day" style="max-width:300px"/>
          <button class="btn-g" id="add-tag-btn">ADD TAG</button>
        </div>
      </div>
    </div>

    <!-- LOGO -->
    <div class="section">
      <div class="sec-hd">LOGO</div>
      <div style="padding:14px;display:flex;gap:12px;align-items:center;flex-wrap:wrap">
        ${userLogo?`<img src="${userLogo}" style="height:48px;max-width:130px;object-fit:contain;border:1px solid var(--border)"/>`:'<div style="color:var(--text5);font-size:var(--fsm)">No logo — appears in tab and top bar</div>'}
        <label class="btn-b" style="cursor:pointer">UPLOAD LOGO<input type="file" accept="image/*" id="logo-upload2" style="display:none"/></label>
        ${userLogo?'<button class="btn-r" id="rm-logo">REMOVE</button>':''}
      </div>
    </div>
    </div>`;

    setTimeout(()=>{
      if(el('add-setup-btn'))el('add-setup-btn').onclick=()=>{const v=(el('new-setup')?.value||'').trim();if(!v)return;if(!customSetups.includes(v)){customSetups.push(v);localStorage.setItem('el_setups',JSON.stringify(customSetups));el('new-setup').value='';renderApp();}};
      if(el('new-setup'))el('new-setup').onkeydown=e=>{if(e.key==='Enter')el('add-setup-btn').click();};
      if(el('reset-setups-btn'))el('reset-setups-btn').onclick=()=>{customSetups=[...DEFAULT_SETUPS];localStorage.setItem('el_setups',JSON.stringify(customSetups));renderApp();};
      if(el('add-tag-btn'))el('add-tag-btn').onclick=()=>{const v=(el('new-tag-inp')?.value||'').trim();if(v&&!customTags.includes(v)){customTags.push(v);localStorage.setItem('el_tags',JSON.stringify(customTags));renderApp();}};
      if(el('new-tag-inp'))el('new-tag-inp').onkeydown=e=>{if(e.key==='Enter')el('add-tag-btn').click();};
      if(el('save-equity'))el('save-equity').onclick=()=>{const v=parseFloat(el('acct-equity-input')?.value||'0');if(v>0){accountEquity=v;localStorage.setItem('el_equity',v);renderApp();}};
      if(el('save-fees'))el('save-fees').onclick=()=>{Object.keys(PRESETS).forEach(sym=>{const i=el('fee_'+sym);if(i)instrumentFees[sym]=parseFloat(i.value)||DEFAULT_FEES[sym];});localStorage.setItem('el_fees',JSON.stringify(instrumentFees));const s=el('fees-saved');if(s){s.style.display='block';setTimeout(()=>s.style.display='none',2000);}};
      if(el('reset-fees'))el('reset-fees').onclick=()=>{instrumentFees={...DEFAULT_FEES};localStorage.setItem('el_fees',JSON.stringify(instrumentFees));renderApp();};
      const lu2=el('logo-upload2');if(lu2)lu2.onchange=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{userLogo=ev.target.result;localStorage.setItem('el_logo',userLogo);updateFavicon();renderApp();};r.readAsDataURL(f);};
      if(el('rm-logo'))el('rm-logo').onclick=()=>{userLogo=null;localStorage.removeItem('el_logo');updateFavicon();renderApp();};
    },50);
  }

  // ══ EXPORT ══
  if(activeTab==='export'){
    content.innerHTML=`<div style="max-width:540px">
      <div style="background:var(--bg3);border:1px solid var(--border2);padding:11px 14px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center">
        <span style="font-size:var(--fsxs);color:var(--text4);letter-spacing:1px">CLOUD SYNC · v${VERSION}</span>
        <span style="color:var(--green);font-size:var(--fsxs);display:flex;align-items:center;gap:5px"><span class="pulse"></span>LIVE · ${trades.length} TRADES</span>
      </div>
      <div class="section" style="margin-bottom:10px">
        <div class="sec-hd">EXPORT</div>
        <div style="padding:11px">
          <div style="display:flex;justify-content:space-between;align-items:center;background:var(--bg3);padding:11px 13px">
            <div><div style="font-size:var(--fsm);color:var(--text);margin-bottom:2px">CSV Export</div><div style="font-size:var(--fsxs);color:var(--text4)">All fields incl. gross/net P&L, duration, timeframe, order ID, grade, source</div></div>
            <button class="btn-g" id="exp-csv" ${!trades.length?'disabled':''}>DOWNLOAD</button>
          </div>
        </div>
      </div>
      ${trades.length?`<div style="border:1px solid color-mix(in srgb,var(--red) 20%,transparent)">
        <div style="background:color-mix(in srgb,var(--red) 8%,transparent);padding:9px 14px;border-bottom:1px solid color-mix(in srgb,var(--red) 20%,transparent);font-size:var(--fsxs);letter-spacing:2px;color:var(--red)">DANGER ZONE</div>
        <div style="padding:13px;display:flex;justify-content:space-between;align-items:center">
          <div style="font-size:var(--fsm);color:var(--text4)">Delete all ${trades.length} trades from cloud.</div>
          <button class="btn-r" id="clr-all">CLEAR ALL</button>
        </div></div>`:''}
    </div>`;
    setTimeout(()=>{
      if(el('exp-csv'))el('exp-csv').onclick=exportCSV;
      if(el('clr-all'))el('clr-all').onclick=async()=>{if(!confirm(`Delete ALL ${trades.length} trades? Cannot be undone.`))return;const snap=await colRef.get();const b=db.batch();snap.docs.forEach(d=>b.delete(d.ref));await b.commit();};
    },50);
  }
}

function removeSetup(idx){
  if(customSetups[idx]==='—')return;
  customSetups.splice(idx,1);
  localStorage.setItem('el_setups',JSON.stringify(customSetups));
  renderApp();
}

// Boot
window._setStage('INIT FIREBASE');
if(!initFB())document.getElementById('app').innerHTML='<div style="color:var(--red);padding:40px;text-align:center">Firebase failed to initialize.</div>';
else window._setStage('AUTH LISTENER ATTACHED');
auth.onAuthStateChanged(user=>{if(user){currentUser=user;subscribeAll(currentUser.uid);}else renderAuth();});
</script>
</body>
</html>
