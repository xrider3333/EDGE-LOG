<body>
<div id="app">
  <div style="height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px">
    <div class="spinner" style="width:28px;height:28px"></div>
    <div style="font-size:10px;letter-spacing:3px;color:#252538">LOADING...</div>

<script>
// ═══════════════════════════════════════════════════════════
//  EDGE LOG — Vanilla JS Trade Tracker
// ═══════════════════════════════════════════════════════════


const PRESETS = {
  ES:{tv:12.50,ts:0.25}, NQ:{tv:5.00,ts:0.25}, MES:{tv:1.25,ts:0.25},
  MNQ:{tv:0.50,ts:0.25}, CL:{tv:10.00,ts:0.01}, GC:{tv:10.00,ts:0.10},
  SI:{tv:25.00,ts:0.005}, ZB:{tv:31.25,ts:0.03125}, RTY:{tv:5.00,ts:0.10},
  YM:{tv:5.00,ts:1.00}, MGC:{tv:1.00,ts:0.10}, MCL:{tv:1.00,ts:0.01},
  ZN:{tv:31.25,ts:0.015625}, ZC:{tv:12.50,ts:0.25}, NG:{tv:10.00,ts:0.001},
};
let defaultFee = 4.50;

const SETUPS = ["—","Breakout","Pullback","Reversal","Trend","Gap Fill","VWAP","S/D Zone","Momentum","ICT","Order Block","FVG","Other"];
const SYM_LIST = Object.keys(PRESETS);

let db=null, auth=null, colRef=null, unsubTrades=null;
let trades=[], currentUser=null, activeTab='overview', activeChart='equity';
let formOpen=true, ntDrag=false;

// ── Helpers ──────────────────────────────────────────────────────────
function calcPnl(sym,type,entry,exit,size,fees){
  const p=PRESETS[sym]; if(!p) return 0;
  const dir=type==='LONG'?1:-1;
  const gross=((exit-entry)*dir/p.ts)*p.tv*size;
  return +((gross-(fees||0)).toFixed(2));
}
function fmt(n){return (n>=0?'+':'')+n.toFixed(2);}
function gc(n){return n>=0?'#00e5a0':'#ff3d5a';}
function stdDev(arr){
  if(arr.length<2)return 0;
  const m=arr.reduce((a,b)=>a+b,0)/arr.length;
  return Math.sqrt(arr.reduce((s,v)=>s+(v-m)**2,0)/(arr.length-1));
}
function el(id){return document.getElementById(id);}
function h(tag,attrs,children){
  const e=document.createElement(tag);
  if(attrs) Object.entries(attrs).forEach(([k,v])=>{
    if(k==='style'&&typeof v==='object')Object.assign(e.style,v);
    else if(k.startsWith('on'))e.addEventListener(k.slice(2).toLowerCase(),v);
    else if(k==='className')e.className=v;
    else e.setAttribute(k,v);
  });
  if(children){
    (Array.isArray(children)?children:[children]).forEach(c=>{
      if(c==null||c===false)return;
      e.appendChild(typeof c==='string'?document.createTextNode(c):c);
    });
  }
  return e;
}
function render(node){el('app').innerHTML='';el('app').appendChild(node);}

// ── Stats calculation ─────────────────────────────────────────────────
function calcStats(){
  if(!trades.length)return null;
  const wins=trades.filter(t=>t.pnl>0), losses=trades.filter(t=>t.pnl<0);
  const wr=wins.length/trades.length;
  const avgW=wins.length?wins.reduce((s,t)=>s+t.pnl,0)/wins.length:0;
  const avgL=losses.length?Math.abs(losses.reduce((s,t)=>s+t.pnl,0)/losses.length):0;
  const grossW=wins.reduce((s,t)=>s+t.pnl,0);
  const grossL=Math.abs(losses.reduce((s,t)=>s+t.pnl,0));
  const pf=grossL>0?grossW/grossL:grossW>0?Infinity:0;
  const ev=wr*avgW-(1-wr)*(avgL||0);
  const net=trades.reduce((s,t)=>s+t.pnl,0);
  let peak=0,maxDD=0,cur=0;
  trades.forEach(t=>{cur+=t.pnl;if(cur>peak)peak=cur;maxDD=Math.max(maxDD,peak-cur);});
  const byDay={};
  trades.forEach(t=>{byDay[t.date]=(byDay[t.date]||0)+t.pnl;});
  const dv=Object.values(byDay);
  const meanD=dv.length?dv.reduce((a,b)=>a+b,0)/dv.length:0;
  const sharpe=dv.length>1?(meanD/(stdDev(dv)||1))*Math.sqrt(252):0;
  let streak=0,sdir=0;
  for(let i=trades.length-1;i>=0;i--){
    const d=trades[i].pnl>0?1:-1;
    if(!streak){streak=d;sdir=d;}else if(d===sdir)streak+=d;else break;
  }
  const syms={},setups={};
  trades.forEach(t=>{
    if(!syms[t.symbol])syms[t.symbol]={count:0,pnl:0,wins:0};
    syms[t.symbol].count++;syms[t.symbol].pnl+=t.pnl;if(t.pnl>0)syms[t.symbol].wins++;
    const k=t.setup||'—';
    if(!setups[k])setups[k]={count:0,pnl:0,wins:0};
    setups[k].count++;setups[k].pnl+=t.pnl;if(t.pnl>0)setups[k].wins++;
  });
  const rr=avgL>0?avgW/avgL:0;
  const totalFees=trades.reduce((s,t)=>s+(t.fees||0),0);
  return{wr,avgW,avgL,pf,ev,net,maxDD,sharpe,streak,sdir,wins:wins.length,losses:losses.length,
         total:trades.length,syms,setups,totalFees,rr,byDay};
}

// ── SVG Charts ────────────────────────────────────────────────────────
function makeSVG(w,h,content){
  return `<svg width="100%" height="${h}" viewBox="0 0 ${w} ${h}" xmlns="http://www.w3.org/2000/svg" style="display:block">${content}</svg>`;
}

function equityChart(){
  if(trades.length<2)return '<p style="color:#252538;font-size:11px;padding:20px">Add at least 2 trades to see chart</p>';
  const W=900,H=180,PAD={t:10,r:20,b:30,l:55};
  const cw=W-PAD.l-PAD.r, ch=H-PAD.t-PAD.b;
  let cum=0,pk=0; const pts=trades.map((t,i)=>{cum=+(cum+t.pnl).toFixed(2);if(cum>pk)pk=cum;return{x:i,y:cum,pnl:t.pnl};});
  const minY=Math.min(0,...pts.map(p=>p.y));
  const maxY=Math.max(0,...pts.map(p=>p.y));
  const rangeY=maxY-minY||1;
  const sx=i=>PAD.l+(i/(pts.length-1))*cw;
  const sy=v=>PAD.t+ch-(((v-minY)/rangeY)*ch);
  const y0=sy(0);
  let path='M'+pts.map((p,i)=>`${sx(i)},${sy(p.y)}`).join('L');
  let dots=pts.map((p,i)=>`<circle cx="${sx(i)}" cy="${sy(p.y)}" r="3" fill="${p.pnl>=0?'#00e5a0':'#ff3d5a'}"/>`).join('');
  // Y axis ticks
  const yticks=5;
  let yaxis='',ygrid='';
  for(let i=0;i<=yticks;i++){
    const v=minY+(rangeY*i/yticks);
    const y=sy(v);
    yaxis+=`<text x="${PAD.l-8}" y="${y+4}" text-anchor="end" fill="#383850" font-size="10" font-family="JetBrains Mono,monospace">$${v.toFixed(0)}</text>`;
    ygrid+=`<line x1="${PAD.l}" y1="${y}" x2="${W-PAD.r}" y2="${y}" stroke="#0d0d18" stroke-dasharray="2,6"/>`;
  }
  // X axis
  const xstep=Math.max(1,Math.floor(pts.length/8));
  let xaxis='';
  for(let i=0;i<pts.length;i+=xstep){
    xaxis+=`<text x="${sx(i)}" y="${H-6}" text-anchor="middle" fill="#383850" font-size="10" font-family="JetBrains Mono,monospace">${i+1}</text>`;
  }
  const zeroLine=minY<=0&&maxY>=0?`<line x1="${PAD.l}" y1="${y0}" x2="${W-PAD.r}" y2="${y0}" stroke="#1a1a2a" stroke-dasharray="4,4"/>`:'';
  return makeSVG(W,H,`${ygrid}${zeroLine}<path d="${path}" stroke="#00e5a0" stroke-width="2" fill="none"/>${dots}${yaxis}${xaxis}`);
}

function drawdownChart(){
  if(trades.length<2)return '';
  const W=900,H=90,PAD={t:5,r:20,b:25,l:55};
  const cw=W-PAD.l-PAD.r,ch=H-PAD.t-PAD.b;
  let cum=0,pk=0;
  const pts=trades.map((t,i)=>{cum=+(cum+t.pnl).toFixed(2);if(cum>pk)pk=cum;return{x:i,y:+(pk-cum).toFixed(2)};});
  const maxDD=Math.max(...pts.map(p=>p.y),1);
  const sx=i=>PAD.l+(i/(pts.length-1||1))*cw;
  const sy=v=>PAD.t+(v/maxDD)*ch;
  let path=`M${sx(0)},${PAD.t+ch} L${pts.map((p,i)=>`${sx(i)},${sy(p.y)}`).join('L')} L${sx(pts.length-1)},${PAD.t+ch} Z`;
  let line='M'+pts.map((p,i)=>`${sx(i)},${sy(p.y)}`).join('L');
  const ytick=`<text x="${PAD.l-8}" y="${PAD.t+10}" text-anchor="end" fill="#383850" font-size="9" font-family="JetBrains Mono,monospace">$${maxDD.toFixed(0)}</text>`;
  return makeSVG(W,H,`<path d="${path}" fill="#ff3d5a0c"/><path d="${line}" stroke="#ff3d5a80" stroke-width="1.5" fill="none"/>${ytick}`);
}

function dailyChart(){
  const S=calcStats();if(!S)return '';
  const days=Object.entries(S.byDay).sort(([a],[b])=>a>b?1:-1);
  if(!days.length)return '';
  const W=900,H=220,PAD={t:10,r:20,b:30,l:65};
  const cw=W-PAD.l-PAD.r,ch=H-PAD.t-PAD.b;
  const vals=days.map(([,v])=>v);
  const minY=Math.min(0,...vals),maxY=Math.max(0,...vals);
  const rangeY=maxY-minY||1;
  const bw=Math.max(4,(cw/days.length)-3);
  const sy=v=>PAD.t+ch-(((v-minY)/rangeY)*ch);
  const y0=sy(0);
  let bars='',xlabels='';
  days.forEach(([d,v],i)=>{
    const x=PAD.l+(i/(days.length))*cw+(cw/days.length-bw)/2;
    const yv=sy(v),barH=Math.abs(yv-y0);
    const by=v>=0?yv:y0;
    bars+=`<rect x="${x}" y="${by}" width="${bw}" height="${Math.max(1,barH)}" fill="${v>=0?'#00e5a0':'#ff3d5a'}" rx="1"/>`;
    if(i%(Math.ceil(days.length/10))===0){
      xlabels+=`<text x="${x+bw/2}" y="${H-6}" text-anchor="middle" fill="#383850" font-size="9" font-family="JetBrains Mono,monospace">${d.slice(5)}</text>`;
    }
  });
  const yticks=4;let yaxis='',ygrid='';
  for(let i=0;i<=yticks;i++){
    const v=minY+(rangeY*i/yticks);const y=sy(v);
    yaxis+=`<text x="${PAD.l-8}" y="${y+4}" text-anchor="end" fill="#383850" font-size="10" font-family="JetBrains Mono,monospace">$${v.toFixed(0)}</text>`;
    ygrid+=`<line x1="${PAD.l}" y1="${y}" x2="${W-PAD.r}" y2="${y}" stroke="#0d0d18" stroke-dasharray="2,6"/>`;
  }
  return makeSVG(W,H,`${ygrid}<line x1="${PAD.l}" y1="${y0}" x2="${W-PAD.r}" y2="${y0}" stroke="#1e1e2e"/>${bars}${yaxis}${xlabels}`);
}

function lineChart(data,xKey,yKey,color,xFmt,yFmt,refX,W=900,H=220){
  if(!data.length)return '';
  const PAD={t:10,r:60,b:30,l:65};
  const cw=W-PAD.l-PAD.r,ch=H-PAD.t-PAD.b;
  const xs=data.map(d=>d[xKey]),ys=data.map(d=>d[yKey]);
  const minX=Math.min(...xs),maxX=Math.max(...xs);
  const minY=Math.min(0,...ys),maxY=Math.max(0,...ys);
  const rX=maxX-minX||1,rY=maxY-minY||1;
  const sx=v=>PAD.l+((v-minX)/rX)*cw;
  const sy=v=>PAD.t+ch-(((v-minY)/rY)*ch);
  const y0=sy(0);
  const path='M'+data.map(d=>`${sx(d[xKey])},${sy(d[yKey])}`).join('L');
  const yticks=4;let yaxis='',ygrid='';
  for(let i=0;i<=yticks;i++){
    const v=minY+(rY*i/yticks);const y=sy(v);
    yaxis+=`<text x="${PAD.l-8}" y="${y+4}" text-anchor="end" fill="#383850" font-size="10" font-family="JetBrains Mono,monospace">${yFmt?yFmt(v):'$'+v.toFixed(0)}</text>`;
    ygrid+=`<line x1="${PAD.l}" y1="${y}" x2="${W-PAD.r}" y2="${y}" stroke="#0d0d18" stroke-dasharray="2,6"/>`;
  }
  const xticks=Math.min(6,data.length);let xaxis='';
  for(let i=0;i<data.length;i+=Math.ceil(data.length/xticks)){
    const d=data[i];
    xaxis+=`<text x="${sx(d[xKey])}" y="${H-6}" text-anchor="middle" fill="#383850" font-size="10" font-family="JetBrains Mono,monospace">${xFmt?xFmt(d[xKey]):d[xKey]}</text>`;
  }
  const zeroLine=`<line x1="${PAD.l}" y1="${y0}" x2="${W-PAD.r}" y2="${y0}" stroke="#252538" stroke-dasharray="4,4"/>
    <text x="${W-PAD.r+4}" y="${y0+4}" fill="#404058" font-size="9" font-family="JetBrains Mono,monospace">0</text>`;
  const youLine=refX!=null?`<line x1="${sx(refX)}" y1="${PAD.t}" x2="${sx(refX)}" y2="${PAD.t+ch}" stroke="#00e5a044" stroke-dasharray="3,3"/>
    <text x="${sx(refX)}" y="${PAD.t-2}" text-anchor="middle" fill="#00e5a0" font-size="9" font-family="JetBrains Mono,monospace">YOU</text>`:'';
  return makeSVG(W,H,`${ygrid}${zeroLine}${youLine}<path d="${path}" stroke="${color}" stroke-width="2.5" fill="none"/>${yaxis}${xaxis}`);
}

// ── Firebase ──────────────────────────────────────────────────────────
function initFB(cfg){
  try{
    if(firebase.apps.length)return true;
    firebase.initializeApp(cfg);
    auth=firebase.auth();
    db=firebase.firestore();
    return true;
  }catch(e){console.error(e);return false;}
}

function subscribeToTrades(uid){
  colRef=db.collection('users').doc(uid).collection('trades');
  if(unsubTrades)unsubTrades();
  unsubTrades=colRef.orderBy('date','asc').onSnapshot(snap=>{
    trades=snap.docs.map(d=>({id:d.id,...d.data()}));
    renderApp();
  },e=>console.error('Firestore error',e));
}

async function addTrade(t){
  if(!colRef)return;
  await colRef.add({...t,createdAt:firebase.firestore.FieldValue.serverTimestamp()});
}
async function deleteTrade(id){
  if(!colRef||!confirm('Delete this trade?'))return;
  await colRef.doc(id).delete();
}

// ── CSV Import ────────────────────────────────────────────────────────
function parseLine(line){
  const r=[];let cur='',inQ=false;
  for(const c of line){
    if(c==='"')inQ=!inQ;
    else if(c===','&&!inQ){r.push(cur.trim());cur='';}
    else cur+=c;
  }
  r.push(cur.trim());
  return r.map(f=>f.replace(/^"|"$/g,'').trim());
}
function getBaseSym(sym){
  return (sym||'').replace(/[^A-Za-z]/g,'').slice(0,3).toUpperCase()||'ES';
}
function parseCSV(text){
  const lines=text.split('\n').filter(l=>l.trim());
  if(lines.length<2)return alert('CSV appears empty — make sure you exported from NinjaTrader correctly.');
  const hdr=parseLine(lines[0]).map(h=>h.toLowerCase().trim());
  const getCol=(row,keys)=>{
    for(const k of keys){
      const i=hdr.findIndex(h=>h.includes(k));
      if(i!==-1&&row[i])return row[i];
    }
    return '';
  };
  let imported=0,skipped=0;
  const batch=[];
  for(let i=1;i<lines.length;i++){
    const row=parseLine(lines[i]);
    if(row.length<4)continue;
    const rawSym=getCol(row,['symbol','instrument'])||'MES';
    const sym=getBaseSym(rawSym);
    const useSym=PRESETS[sym]?sym:'MES';
    const qty=parseInt(getCol(row,['qty','quantity','contracts','size']))||1;
    const buyPrice=parseFloat(getCol(row,['buyprice','buy price']));
    const sellPrice=parseFloat(getCol(row,['sellprice','sell price']));
    const entryCol=parseFloat(getCol(row,['entry price','avg entry','entryprice','entry']));
    const exitCol=parseFloat(getCol(row,['exit price','avg exit','exitprice','exit']));
    let entry,exit,dir;
    if(!isNaN(buyPrice)&&!isNaN(sellPrice)&&buyPrice>0&&sellPrice>0){
      entry=buyPrice;exit=sellPrice;
      dir=buyPrice<=sellPrice?'LONG':'SHORT';
    } else if(!isNaN(entryCol)&&!isNaN(exitCol)&&entryCol>0&&exitCol>0){
      entry=entryCol;exit=exitCol;
      const ds=getCol(row,['action','side','direction']).toLowerCase();
      dir=ds.includes('buy')||ds.includes('long')?'LONG':'SHORT';
    } else continue;
    let date='';
    const dtRaw=getCol(row,['boughttimestamp','soldtimestamp','entry time','entrydate','date','time']);
    if(dtRaw){
      const m=dtRaw.match(/(\d{1,2})\/(\d{1,2})\/(\d{4})/);
      if(m)date=m[3]+'-'+m[1].padStart(2,'0')+'-'+m[2].padStart(2,'0');
      else date=dtRaw.slice(0,10);
    }
    if(!date)continue;
    const feeRaw=parseFloat(getCol(row,['commission','fee','fees']));
    const fee=isNaN(feeRaw)?defaultFee:feeRaw;
    const isDupe=trades.some(t=>t.date===date&&t.symbol===useSym&&Math.abs(t.entry-entry)<0.01&&t.size===qty);
    if(isDupe){skipped++;continue;}
    const pnl=calcPnl(useSym,dir,entry,exit,qty,fee);
    batch.push({date,symbol:useSym,type:dir,entry:+entry.toFixed(4),exit:+exit.toFixed(4),
      size:qty,fees:fee,setup:'—',notes:'NT8 Import',chartUrl:'',pnl});
    imported++;
  }
  (async()=>{
    for(const t of batch)await addTrade(t);
    alert('Import complete!\n\nImported: '+imported+' trades\nSkipped (duplicates): '+skipped+'\nFee used: $'+defaultFee+'/trade');
    activeTab='journal';
    renderApp();
  })();
}

function exportCSV(){
  const hdr='Date,Symbol,Direction,Entry,Exit,Contracts,Fees,Net P&L,Setup,Notes,Chart URL\n';
  const rows=trades.map(t=>`${t.date},${t.symbol},${t.type},${t.entry},${t.exit},${t.size},${t.fees||0},${t.pnl},"${t.setup||'—'}","${(t.notes||'').replace(/"/g,"'")}","${t.chartUrl||''}"`).join('\n');
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([hdr+rows],{type:'text/csv'}));
  a.download=`edgelog_${new Date().toISOString().slice(0,10)}.csv`;a.click();
}

    formula.innerHTML=`EV = (WR × AvgWin) − ((1−WR) × AvgLoss) = (${(S.wr*100).toFixed(0)}% × $${S.avgW.toFixed(0)}) − (${((1-S.wr)*100).toFixed(0)}% × $${S.avgL.toFixed(0)}) <span style="color:${gc(S.ev)};margin-left:8px">= $${S.ev.toFixed(2)}/trade</span>`;
    content.appendChild(formula);
  }

  // ── IMPORT ───────────────────────────────────────────────────────────
  if(activeTab==='import'){
    content.innerHTML=`
    <div style="max-width:660px">
      <div style="background:#09090f;border:1px solid #111120;padding:16px 20px;margin-bottom:20px">
        <div style="font-size:10px;color:#f5c842;letter-spacing:2px;margin-bottom:8px">NINJATRADE 8 CSV IMPORT</div>
        <div style="font-size:11px;color:#505070;line-height:2">Export your trade history from NinjaTrader 8, then drop the CSV file below. Entry/exit, P&L, direction, symbol, and fees auto-detected.</div>
      </div>
      <div class="section" style="margin-bottom:16px">
        <div class="sec-hd">HOW TO EXPORT FROM NINJATRADE 8</div>
        <div style="padding:20px;display:flex;flex-direction:column;gap:12px">
          ${[['1','Open NinjaTrader 8'],['2','Go to Account Performance (top menu → Account → Performance)'],
             ['3','Set your date range → click Generate Report'],['4','Click Export → CSV (top right of report)'],
             ['5','Drop the file in the zone below']].map(([n,s])=>`
            <div style="display:flex;gap:14px;align-items:flex-start">
              <div style="font-family:'Bebas Neue',monospace;font-size:20px;color:#00e5a0;line-height:1;min-width:20px">${n}</div>
              <div style="font-size:11px;color:#606080;padding-top:3px">${s}</div>
            </div>`).join('')}
        </div>
      </div>
      <div style="background:#09090f;border:1px solid #141422;padding:14px 16px;margin-bottom:12px;display:flex;align-items:center;gap:16px;flex-wrap:wrap">
        <div>
          <div style="font-size:9px;letter-spacing:2px;color:#383850;margin-bottom:5px">DEFAULT FEE PER TRADE (round-turn $)</div>
          <input type="number" id="fee-input" value="4.50" step="0.01" min="0" style="width:120px;background:#0d0d16;border:1px solid #1e1e2e;color:#f5c842;font-family:'JetBrains Mono',monospace;font-size:13px;padding:8px 10px"/>
        </div>
        <div style="font-size:10px;color:#404060;max-width:420px">
          Used when the CSV has no commission column. NinjaTrader typically charges per contract — enter your broker's round-turn rate.
        </div>
      </div>
      <div class="drop-zone" id="drop-zone" style="margin-bottom:12px;padding:40px 20px">
        <div style="font-size:28px;margin-bottom:12px">📂</div>
        <div style="font-size:11px;color:#505070;letter-spacing:1px">DROP NT8 CSV HERE or CLICK TO BROWSE</div>
        <div style="font-size:10px;color:#252538;margin-top:8px">Supports NinjaTrader 8 exports · Strips contract month codes (ESZ24 → ES) · Detects duplicates</div>
        <input type="file" id="csv-input" accept=".csv" style="display:none"/>
      </div>
    </div>`;
    setTimeout(()=>{
      const dz=el('drop-zone'),ci=el('csv-input'),fi=el('fee-input');
      if(!dz)return;
      if(fi){fi.value=defaultFee;fi.onchange=()=>{defaultFee=parseFloat(fi.value)||4.50;};}
      dz.onclick=()=>ci.click();
      dz.ondragover=e=>{e.preventDefault();dz.classList.add('drag');};
      dz.ondragleave=()=>dz.classList.remove('drag');
      dz.ondrop=e=>{e.preventDefault();dz.classList.remove('drag');const f=e.dataTransfer.files[0];if(f){const r=new FileReader();r.onload=ev=>parseCSV(ev.target.result);r.readAsText(f);}};
      ci.onchange=e=>{const f=e.target.files[0];if(f){const r=new FileReader();r.onload=ev=>parseCSV(ev.target.result);r.readAsText(f);}};
    },50);
  }

  // ── EXPORT ───────────────────────────────────────────────────────────
  if(activeTab==='export'){
    content.innerHTML=`
    <div style="max-width:560px">
      <div style="background:#09090f;border:1px solid #111120;padding:12px 16px;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center">
        <span style="font-size:10px;color:#383850;letter-spacing:1px">CLOUD SYNC</span>
        <span style="color:#00e5a0;display:flex;align-items:center;font-size:10px"><span class="pulse"></span>LIVE — ${trades.length} TRADES SYNCED TO FIREBASE</span>
      </div>
      <div class="section" style="margin-bottom:12px">
        <div class="sec-hd">EXPORT DATA</div>
        <div style="padding:12px">
          <div style="display:flex;justify-content:space-between;align-items:center;background:#09090f;padding:12px 14px">
            <div>
              <div style="font-size:12px;color:#dde0ec;margin-bottom:2px">CSV Export</div>
              <div style="font-size:10px;color:#404060">Import into Excel, Google Sheets, TradingView...</div>
            </div>
            <button class="btn-g" id="export-csv-btn" ${!trades.length?'disabled':''}>DOWNLOAD CSV</button>
          </div>
        </div>
      </div>
      ${trades.length?`
      <div style="border:1px solid #ff3d5a18">
        <div style="background:#0d0008;padding:10px 16px;border-bottom:1px solid #ff3d5a18;font-size:10px;letter-spacing:2px;color:#ff3d5a">DANGER ZONE</div>
        <div style="padding:14px;display:flex;justify-content:space-between;align-items:center">
          <div style="font-size:11px;color:#404060">Permanently delete all ${trades.length} trades from cloud.</div>
          <button class="btn-r" id="clear-all-btn">CLEAR ALL</button>
        </div>
      </div>`:''}
    </div>`;
    setTimeout(()=>{
      const eb=el('export-csv-btn');if(eb)eb.onclick=exportCSV;
      const cb=el('clear-all-btn');
      if(cb)cb.onclick=async()=>{
        if(!confirm(`Delete ALL ${trades.length} trades? This CANNOT be undone.`))return;
        const snap=await colRef.get();
        const batch=db.batch();
        snap.docs.forEach(d=>batch.delete(d.ref));
        await batch.commit();
      };
    },50);
  }
}
