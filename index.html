<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>EDGE LOG — NT Import Test</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Bebas+Neue&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#05050a;color:#dde0ec;font-family:'JetBrains Mono',monospace;font-size:13px}
.spinner{display:inline-block;width:28px;height:28px;border:3px solid #1e1e2e;border-top-color:#00e5a0;border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.btn-g{background:#00e5a014;border:1px solid #00e5a0;color:#00e5a0;padding:10px 20px;cursor:pointer}
.drop-zone{border:2px dashed #252538;padding:60px 20px;text-align:center;background:#09090f;cursor:pointer;transition:all .2s}
.drop-zone:hover,.drop-zone.drag{border-color:#00e5a0;background:#00e5a008}
h1{font-family:'Bebas Neue',sans-serif;font-size:42px;letter-spacing:4px;color:#00e5a0}
</style>
</head>
<body>

<div style="padding:40px;max-width:800px;margin:0 auto">
  <h1 style="text-align:center">EDGE LOG</h1>
  <p style="text-align:center;color:#505070;margin-bottom:30px">NinjaTrader CSV Import Tester</p>

  <div style="background:#0b0b12;border:1px solid #141422;padding:30px;border-radius:8px">
    <div id="status" style="margin-bottom:20px;padding:12px;background:#1a1a2a;border-radius:4px;font-size:14px">
      Drop your NinjaTrader CSV file below
    </div>

    <div id="drop-zone" class="drop-zone">
      <div style="font-size:60px;margin-bottom:20px">📂</div>
      <div style="font-size:16px">DROP NINJATRADER CSV HERE</div>
      <div style="font-size:12px;color:#606080;margin-top:10px">or click to select file</div>
      <input type="file" id="file-input" accept=".csv" style="display:none">
    </div>

    <div id="result" style="margin-top:30px;white-space:pre-wrap;font-size:12px;max-height:400px;overflow:auto"></div>
  </div>

  <div style="margin-top:25px;text-align:center;font-size:11px;color:#383850">
    After testing, paste the first 5 lines of your CSV here if it still shows 0 trades.
  </div>
</div>

<script>
const PRESETS = {
  ES:{tv:12.50,ts:0.25}, NQ:{tv:5.00,ts:0.25}, MES:{tv:1.25,ts:0.25},
  MNQ:{tv:0.50,ts:0.25}, CL:{tv:10.00,ts:0.01}, GC:{tv:10.00,ts:0.10}
};

function calcPnl(sym, type, entry, exit, size, fees) {
  const p = PRESETS[sym] || PRESETS.ES;
  const dir = type === 'LONG' ? 1 : -1;
  const gross = ((exit - entry) * dir / p.ts) * p.tv * size;
  return +((gross - (fees || 0)).toFixed(2));
}

function parseCSV(text) {
  const lines = text.split('\n').filter(l => l.trim());
  if (lines.length < 2) {
    document.getElementById('result').innerHTML = '<span style="color:#ff3d5a">CSV appears empty.</span>';
    return;
  }

  // Robust CSV line parser
  function parseLine(line) {
    const result = [];
    let current = '';
    let inQuotes = false;
    for (let char of line) {
      if (char === '"') inQuotes = !inQuotes;
      else if (char === ',' && !inQuotes) {
        result.push(current.trim());
        current = '';
      } else {
        current += char;
      }
    }
    result.push(current.trim());
    return result.map(f => f.replace(/^"|"$/g, '').trim());
  }

  const headers = parseLine(lines[0]).map(h => h.toLowerCase());
  console.log("Headers found:", headers);

  let imported = 0;
  const preview = [];

  for (let i = 1; i < lines.length; i++) {
    const row = parseLine(lines[i]);
    if (row.length < 5) continue;

    const get = (possible) => {
      for (let key of possible) {
        const idx = headers.findIndex(h => h.includes(key.toLowerCase()));
        if (idx !== -1 && row[idx]) return row[idx];
      }
      return '';
    };

    let symbol = (get(['instrument', 'symbol', 'market']) || 'ES').split(' ')[0].toUpperCase();
    const action = get(['action', 'side', 'buy/sell', 'direction', 'order']).toUpperCase();
    const type = (action.includes('BUY') || action.includes('LONG') || action.includes('ENTRY')) ? 'LONG' : 'SHORT';

    const size = parseInt(get(['qty', 'quantity', 'contracts', 'size', 'shares'])) || 1;
    const entry = parseFloat(get(['avg entry', 'entry price', 'average entry', 'entryprice', 'entry']));
    const exitPrice = parseFloat(get(['avg exit', 'exit price', 'average exit', 'exitprice', 'exit']));
    const fees = parseFloat(get(['commission', 'fee', 'fees', 'comms'])) || 0;

    let dateTime = get(['entry time', 'time', 'date', 'exec time', 'timestamp']);
    let date = '';
    if (dateTime) {
      const match = dateTime.match(/(\d{4}-\d{2}-\d{2})|(\d{1,2}\/\d{1,2}\/\d{2,4})/);
      if (match) date = match[1] ? match[1] : match[2].split('/').reverse().join('-');
    }

    if (entry && exitPrice && !isNaN(entry) && !isNaN(exitPrice)) {
      const pnl = calcPnl(symbol, type, entry, exitPrice, size, fees);
      preview.push(`${date || 'no-date'} | ${symbol} ${type} ${size}x | ${entry} → ${exitPrice} | P&L $${pnl}`);
      imported++;
    }
  }

  const resultEl = document.getElementById('result');
  if (imported === 0) {
    resultEl.innerHTML = `<span style="color:#ff3d5a">0 trades imported.</span><br><br>Headers found: ${headers.join(' | ')}<br><br>Try exporting from <b>New → Trade Performance → Executions</b> or <b>Trades</b> view.`;
  } else {
    resultEl.innerHTML = `<span style="color:#00e5a0">✅ ${imported} trades imported successfully (preview)</span><br><br>${preview.join('<br>')}`;
  }
}

// Setup drop zone
const dropZone = document.getElementById('drop-zone');
const fileInput = document.getElementById('file-input');

dropZone.onclick = () => fileInput.click();
fileInput.onchange = e => {
  const file = e.target.files[0];
  if (file) {
    document.getElementById('status').innerHTML = `Processing <b>${file.name}</b>...`;
    const reader = new FileReader();
    reader.onload = ev => parseCSV(ev.target.result);
    reader.readAsText(file);
  }
};

dropZone.ondragover = e => { e.preventDefault(); dropZone.classList.add('drag'); };
dropZone.ondragleave = () => dropZone.classList.remove('drag');
dropZone.ondrop = e => {
  e.preventDefault();
  dropZone.classList.remove('drag');
  const file = e.dataTransfer.files[0];
  if (file) {
    document.getElementById('status').innerHTML = `Processing <b>${file.name}</b>...`;
    const reader = new FileReader();
    reader.onload = ev => parseCSV(ev.target.result);
    reader.readAsText(file);
  }
};
</script>
</body>
</html>
