// ═══════════════════════════════════════════════════════════════
//  EDGE LOG v6.0
//  Futures + Stocks · Firebase: edge-tracker-b55af
// ═══════════════════════════════════════════════════════════════
const VERSION='6.0';
const PRESETS={
  ES:{tv:12.50,ts:0.25},MES:{tv:1.25,ts:0.25},NQ:{tv:5.00,ts:0.25},
  MNQ:{tv:0.50,ts:0.25},CL:{tv:10.00,ts:0.01},GC:{tv:10.00,ts:0.10},
  SI:{tv:25.00,ts:0.005},ZB:{tv:31.25,ts:0.03125},RTY:{tv:5.00,ts:0.10},
  YM:{tv:5.00,ts:1.00},MGC:{tv:1.00,ts:0.10},MCL:{tv:1.00,ts:0.01},
  ZN:{tv:31.25,ts:0.015625},ZC:{tv:12.50,ts:0.25},NG:{tv:10.00,ts:0.001},
};
const SETUPS=['—','Breakout','Pullback','Reversal','Trend','Gap Fill','VWAP','S/D Zone','Momentum','ICT','Order Block','FVG','Other'];
const GRADES=['—','A+','A','B','C','D','F'];
const TABS=['overview','journal','lessons','analytics','import','export'];
const GRADE_COLORS={'A+':'#00e5a0','A':'#00e5a0','B':'#4a9eff','C':'#f5c842','D':'#ff8c42','F':'#ff3d5a','—':'#505070'};

let db=null,auth=null,colRef=null,lessonRef=null,settingsRef=null,unsub=null,unsubL=null;
let trades=[],lessons=[],currentUser=null;
let activeTab='overview',activeChart='equity';
let formOpen=true,editTrade=null,expandedRows=new Set(),showAllCols=false;
let defaultFee=4.50,autoHandle=null,autoTimer=null,autoInterval=60;
let userLogo=localStorage.getItem('el_logo')||null;
let filters={sym:'',dir:'',grade:'',setup:'',dateFrom:'',dateTo:'',minPnl:'',maxPnl:''};

// ── Helpers ──────────────────────────────────────────────────────
const el=id=>document.getElementById(id);
const gc=n=>n>=0?'#00e5a0':'#ff3d5a';
const fmt=n=>(n>=0?'+':'')+n.toFixed(2);
const pct=n=>(n*100).toFixed(1)+'%';
const getBaseSym=s=>(s||'').replace(/[^A-Za-z]/g,'').slice(0,3).toUpperCase()||'';
const isFutures=sym=>!!PRESETS[sym];
const gradeClass=g=>({'+':'grade-A','A':'grade-A','B':'grade-B','C':'grade-C','D':'grade-D','F':'grade-F'}[g?.slice(-1)]||'grade-x');

function fmtDuration(mins){
  if(!mins||mins<0)return '—';
  if(mins<60)return mins+'m';
  const h=Math.floor(mins/60),m=mins%60;
  return h+'h'+(m>0?' '+m+'m':'');
}

function calcPnl(sym,type,entry,exit,size,fees){
  const dir=type==='LONG'?1:-1;
  let gross;
  if(isFutures(sym)){
    const p=PRESETS[sym];
    gross=(((exit-entry)*dir)/p.ts)*p.tv*size;
  } else {
    // Stocks / ETFs: straight dollar P&L
    gross=(exit-entry)*dir*size;
  }
  return{gross:+gross.toFixed(2),net:+(gross-(fees||0)).toFixed(2)};
}

function stdDev(arr){
  if(arr.length<2)return 0;
  const m=arr.reduce((a,b)=>a+b,0)/arr.length;
  return Math.sqrt(arr.reduce((s,v)=>s+(v-m)**2,0)/(arr.length-1));
}

// ── Stats ─────────────────────────────────────────────────────────
function calcStats(tds){
  if(!tds||!tds.length)return null;
  const wins=tds.filter(t=>t.pnl>0),losses=tds.filter(t=>t.pnl<0);
  const wr=wins.length/tds.length;
  const avgW=wins.length?wins.reduce((s,t)=>s+t.pnl,0)/wins.length:0;
  const avgL=losses.length?Math.abs(losses.reduce((s,t)=>s+t.pnl,0)/losses.length):0;
  const grossW=wins.reduce((s,t)=>s+t.pnl,0);
  const grossL=Math.abs(losses.reduce((s,t)=>s+t.pnl,0));
  const net=tds.reduce((s,t)=>s+t.pnl,0);
  const grossNet=tds.reduce((s,t)=>s+(t.grossPnl||t.pnl),0);
  const totalFees=tds.reduce((s,t)=>s+(t.fees||0),0);
  const pf=grossL>0?grossW/grossL:grossW>0?99:0;
  const ev=wr*avgW-(1-wr)*(avgL||0);
  const feeImpact=grossNet>0?(totalFees/grossNet)*100:0;

  let peak=0,maxDD=0,cur=0;
  tds.forEach(t=>{cur+=t.pnl;if(cur>peak)peak=cur;maxDD=Math.max(maxDD,peak-cur);});

  let maxWS=0,maxLS=0,curWS=0,curLS=0,streak=0,sdir=0;
  for(let i=tds.length-1;i>=0;i--){
    const d=tds[i].pnl>0?1:-1;
    if(!streak){streak=1;sdir=d;}else if(d===sdir)streak++;else break;
  }
  tds.forEach(t=>{
    if(t.pnl>0){curWS++;curLS=0;maxWS=Math.max(maxWS,curWS);}
    else{curLS++;curWS=0;maxLS=Math.max(maxLS,curLS);}
  });

  const byDay={};
  tds.forEach(t=>{byDay[t.date]=(byDay[t.date]||0)+t.pnl;});
  const dv=Object.values(byDay);
  const meanD=dv.length?dv.reduce((a,b)=>a+b,0)/dv.length:0;
  const sharpe=dv.length>1?(meanD/(stdDev(dv)||1))*Math.sqrt(252):0;
  const recovery=maxDD>0?net/maxDD:0;

  const longs=tds.filter(t=>t.type==='LONG'),shorts=tds.filter(t=>t.type==='SHORT');

  const syms={},setups={},monthly={},byGrade={};
  const dowKeys=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const dow={Mon:{pnl:0,t:0},Tue:{pnl:0,t:0},Wed:{pnl:0,t:0},Thu:{pnl:0,t:0},Fri:{pnl:0,t:0}};

  tds.forEach(t=>{
    if(!syms[t.symbol])syms[t.symbol]={count:0,pnl:0,grossPnl:0,wins:0,fees:0};
    syms[t.symbol].count++;syms[t.symbol].pnl+=t.pnl;syms[t.symbol].grossPnl+=(t.grossPnl||t.pnl);
    syms[t.symbol].fees+=(t.fees||0);if(t.pnl>0)syms[t.symbol].wins++;
    const k=t.setup||'—';
    if(!setups[k])setups[k]={count:0,pnl:0,wins:0};
    setups[k].count++;setups[k].pnl+=t.pnl;if(t.pnl>0)setups[k].wins++;
    const mo=t.date?t.date.slice(0,7):'?';
    if(!monthly[mo])monthly[mo]={pnl:0,trades:0,wins:0};
    monthly[mo].pnl+=t.pnl;monthly[mo].trades++;if(t.pnl>0)monthly[mo].wins++;
    const g=t.grade||'—';
    if(!byGrade[g])byGrade[g]={count:0,pnl:0,wins:0};
    byGrade[g].count++;byGrade[g].pnl+=t.pnl;if(t.pnl>0)byGrade[g].wins++;
    if(t.date){const dk=dowKeys[new Date(t.date+'T12:00:00').getDay()];if(dow[dk]){dow[dk].pnl+=t.pnl;dow[dk].t++;}}
  });

  // Duration stats
  const withDur=tds.filter(t=>t.durationMins>0);
  const avgDur=withDur.length?withDur.reduce((s,t)=>s+t.durationMins,0)/withDur.length:0;
  const winDur=withDur.filter(t=>t.pnl>0);
  const lossDur=withDur.filter(t=>t.pnl<0);
  const avgWinDur=winDur.length?winDur.reduce((s,t)=>s+t.durationMins,0)/winDur.length:0;
  const avgLossDur=lossDur.length?lossDur.reduce((s,t)=>s+t.durationMins,0)/lossDur.length:0;

  const best=tds.reduce((a,b)=>b.pnl>a.pnl?b:a);
  const worst=tds.reduce((a,b)=>b.pnl<a.pnl?b:a);
  const dayEntries=Object.entries(byDay);
  const bestDay=dayEntries.reduce((a,b)=>b[1]>a[1]?b:a,['—',0]);
  const worstDay=dayEntries.reduce((a,b)=>b[1]<a[1]?b:a,['—',0]);
  const rr=avgL>0?avgW/avgL:0;

  // Rolling series for sparklines
  const rolling={wr:[],pf:[],ev:[],net:[]};
  let rW=0,rL=0,rGW=0,rGL=0,rNet=0;
  tds.forEach(t=>{
    rNet+=t.pnl;
    if(t.pnl>0){rW++;rGW+=t.pnl;}else if(t.pnl<0){rL++;rGL+=Math.abs(t.pnl);}
    const rTotal=rW+rL;
    rolling.net.push(+rNet.toFixed(2));
    rolling.wr.push(rTotal>0?+(rW/rTotal).toFixed(3):0);
    rolling.pf.push(rGL>0?+(rGW/rGL).toFixed(3):rGW>0?5:0);
    const rwr=rTotal>0?rW/rTotal:0;
    const rawW=rW>0?rGW/rW:0;
    const rawL=rL>0?rGL/rL:0;
    rolling.ev.push(+(rwr*rawW-(1-rwr)*rawL).toFixed(2));
  });

  return{wr,avgW,avgL,pf,ev,net,grossNet,grossW,grossL,totalFees,feeImpact,
         maxDD,sharpe,recovery,rr,streak,sdir,maxWS,maxLS,
         wins:wins.length,losses:losses.length,total:tds.length,
         longs:longs.length,shorts:shorts.length,
         longPnl:longs.reduce((s,t)=>s+t.pnl,0),shortPnl:shorts.reduce((s,t)=>s+t.pnl,0),
         longWR:longs.length?longs.filter(t=>t.pnl>0).length/longs.length:0,
         shortWR:shorts.length?shorts.filter(t=>t.pnl>0).length/shorts.length:0,
         best,worst,bestDay,worstDay,avgDur,avgWinDur,avgLossDur,
         syms,setups,monthly,byGrade,dow,byDay,rolling};
}

// ── P&L Calc ──────────────────────────────────────────────────────
function tradeCalc(sym,type,entry,exit,size,fees){
  const r=calcPnl(sym,type,entry,exit,size,fees);
  return{grossPnl:r.gross,pnl:r.net,fees:fees||0};
}

// ── CSV Parsing ───────────────────────────────────────────────────
function parseLine(line){
  const r=[];let cur='',inQ=false;
  for(const c of line){if(c==='"')inQ=!inQ;else if(c===','&&!inQ){r.push(cur.trim());cur='';}else cur+=c;}
  r.push(cur.trim());return r.map(f=>f.replace(/^"|"$/g,'').trim());
}
function parseDate(s){
  if(!s)return'';
  let m=s.match(/(\d{1,2})\/(\d{1,2})\/(\d{4})/);
  if(m)return m[3]+'-'+m[1].padStart(2,'0')+'-'+m[2].padStart(2,'0');
  m=s.match(/(\d{4})-(\d{2})-(\d{2})/);if(m)return m[0];
  return s.slice(0,10);
}
function parseDateTime(s){
  if(!s)return null;
  const m=s.match(/(\d{1,2})\/(\d{1,2})\/(\d{4})\s+(\d{1,2}):(\d{2})(?::(\d{2}))?/);
  if(m)return new Date(+m[3],+m[1]-1,+m[2],+m[4],+m[5],+(m[6]||0));
  return null;
}

function detectType(hdr){
  const h=hdr.join(' ');
  if(h.includes('buyprice')||h.includes('boughttimestamp'))return'performance';
  if(h.includes('fillprice')||h.includes('fill price'))return'fills';
  if(h.includes('orderstatus')||h.includes('order status'))return'orders';
  if(h.includes('openqty')||h.includes('open qty'))return'positions';
  return'generic';
}

function importCSV(text,label){
  const lines=text.split('\n').filter(l=>l.trim());
  if(lines.length<2)return{imported:0,skipped:0,merged:0,type:'empty',batch:[],merges:[]};
  const hdr=parseLine(lines[0]).map(h=>h.toLowerCase().replace(/\s+/g,''));
  const type=detectType(hdr);
  const gc2=(row,keys)=>{for(const k of keys){const i=hdr.findIndex(h=>h.includes(k.replace(/\s/g,'')));if(i!==-1&&row[i]!=null&&row[i]!=='')return row[i];}return'';};
  const batch=[],merges=[];let skipped=0;

  for(let i=1;i<lines.length;i++){
    const row=parseLine(lines[i]);if(row.length<4)continue;
    const rawSym=gc2(row,['symbol','instrument'])||'MES';
    const baseSym=getBaseSym(rawSym);
    const sym=PRESETS[baseSym]?baseSym:(rawSym.toUpperCase().slice(0,6));// stocks keep full ticker up to 6 chars
    const qty=parseInt(gc2(row,['qty','quantity','contracts','size','shares']))||1;
    const buyRaw=parseFloat(gc2(row,['buyprice','buy price']));
    const sellRaw=parseFloat(gc2(row,['sellprice','sell price']));
    const entryRaw=parseFloat(gc2(row,['entryprice','entry price','avg entry','entry','open']));
    const exitRaw=parseFloat(gc2(row,['exitprice','exit price','avg exit','exit','close']));
    let entry,exit,dir;
    if(!isNaN(buyRaw)&&!isNaN(sellRaw)&&buyRaw>0&&sellRaw>0){
      entry=buyRaw;exit=sellRaw;dir=buyRaw<=sellRaw?'LONG':'SHORT';
    } else if(!isNaN(entryRaw)&&!isNaN(exitRaw)&&entryRaw>0&&exitRaw>0){
      entry=entryRaw;exit=exitRaw;
      const ds=(gc2(row,['action','side','direction','type'])||'').toLowerCase();
      dir=ds.includes('buy')||ds.includes('long')?'LONG':'SHORT';
    } else continue;
    const dtRaw=gc2(row,['boughttimestamp','soldtimestamp','entrytime','entry time','entrydate','date','time']);
    const date=parseDate(dtRaw);if(!date)continue;
    // Duration
    const buyDT=parseDateTime(gc2(row,['boughttimestamp','entrytime','entry time']));
    const sellDT=parseDateTime(gc2(row,['soldtimestamp','exittime','exit time']));
    const durationMins=buyDT&&sellDT?Math.round(Math.abs(sellDT-buyDT)/60000):null;
    const entryTime=buyDT?buyDT.toTimeString().slice(0,5):null;
    const exitTime=sellDT?sellDT.toTimeString().slice(0,5):null;
    const feeRaw=parseFloat(gc2(row,['commission','fee','fees','comm']));
    const fees=isNaN(feeRaw)?defaultFee:feeRaw;
    const calc=tradeCalc(sym,dir,entry,exit,qty,fees);

    // Dupe check + merge logic
    const existing=trades.find(t=>t.date===date&&t.symbol===sym&&Math.abs(t.entry-entry)<0.01&&t.size===qty);
    if(existing){
      // Check if new data adds info
      const updates={};
      if(durationMins&&!existing.durationMins)updates.durationMins=durationMins;
      if(entryTime&&!existing.entryTime)updates.entryTime=entryTime;
      if(exitTime&&!existing.exitTime)updates.exitTime=exitTime;
      if(Object.keys(updates).length>0)merges.push({id:existing.id,updates,desc:Object.keys(updates).join(', ')});
      else skipped++;
      continue;
    }
    batch.push({date,symbol:sym,type:dir,entry:+entry.toFixed(4),exit:+exit.toFixed(4),
      size:qty,fees,...calc,setup:'—',grade:'—',notes:'',chartUrl:'',
      durationMins,entryTime,exitTime,source:label||'Import',assetType:isFutures(sym)?'futures':'stock'});
  }
  return{imported:batch.length,skipped,merged:merges.length,type,batch,merges};
}

async function commitImport(batch,merges){
  for(const t of batch)await addTrade(t);
  for(const m of merges)await updateTrade(m.id,m.updates);
}

async function startAutoImport(){

}
async function runAutoImport(){
  if(!autoHandle)return;
  try{
    const file=await autoHandle.getFile(),text=await file.text();
    const r=importCSV(text,'Auto-Import');
    if(r.batch.length>0||r.merges.length>0){
      await commitImport(r.batch,r.merges);
      if(el('auto-last'))el('auto-last').textContent='Last sync: '+new Date().toLocaleTimeString()+' (+'+r.imported+' new, '+r.merged+' merged)';

// ── SVG Helpers ───────────────────────────────────────────────────
function sparkline(data,color,w,h){
  if(!data||data.length<2)return'';
  const min=Math.min(...data),max=Math.max(...data),range=max-min||1;
  const sx=i=>i/(data.length-1)*w;
  const sy=v=>h-((v-min)/range*h)*0.85-h*0.075;
  const path='M'+data.map((v,i)=>sx(i)+','+sy(v)).join('L');
  const fill='M'+sx(0)+','+h+' L'+data.map((v,i)=>sx(i)+','+sy(v)).join(' L')+' L'+sx(data.length-1)+','+h+' Z';
  return'<svg width="'+w+'" height="'+h+'" viewBox="0 0 '+w+' '+h+'" style="display:block;opacity:.6"><path d="'+fill+'" fill="'+color+'" opacity=".15"/><path d="'+path+'" stroke="'+color+'" stroke-width="1.5" fill="none"/></svg>';
}

function svgLine(pts,color,W,H){
  if(!pts||pts.length<2)return'<p style="color:#404060;font-size:11px;padding:20px;text-align:center">Add at least 2 trades</p>';
  const PAD={t:12,r:20,b:32,l:62};const cw=W-PAD.l-PAD.r,ch=H-PAD.t-PAD.b;
  const ys=pts.map(p=>p.y),minY=Math.min(0,...ys),maxY=Math.max(0,...ys),rY=maxY-minY||1;
  const sx=i=>PAD.l+(i/(pts.length-1||1))*cw,sy=v=>PAD.t+ch-((v-minY)/rY)*ch,y0=sy(0);
  const path='M'+pts.map((p,i)=>sx(i)+','+sy(p.y)).join('L');
  const fill='M'+sx(0)+','+sy(pts[0].y)+' L'+pts.map((p,i)=>sx(i)+','+sy(p.y)).join(' L')+' L'+sx(pts.length-1)+','+y0+' L'+sx(0)+','+y0+' Z';
  const dots=pts.map((p,i)=>'<circle cx="'+sx(i)+'" cy="'+sy(p.y)+'" r="3" fill="'+(p.pnl>=0?'#00e5a0':'#ff3d5a')+'" stroke="#05050a" stroke-width="1.5"/>').join('');
  let yg='',yt='';
  for(let i=0;i<=4;i++){const v=minY+rY*i/4,y=sy(v);yg+='<line x1="'+PAD.l+'" y1="'+y+'" x2="'+(W-PAD.r)+'" y2="'+y+'" stroke="#111128" stroke-dasharray="2,6"/>';yt+='<text x="'+(PAD.l-6)+'" y="'+(y+4)+'" text-anchor="end" fill="#6868a0" font-size="10" font-family="JetBrains Mono,monospace">$'+v.toFixed(0)+'</text>';}
  let xt='';const step=Math.max(1,Math.floor(pts.length/8));
  for(let i=0;i<pts.length;i+=step)xt+='<text x="'+sx(i)+'" y="'+(H-5)+'" text-anchor="middle" fill="#6868a0" font-size="10" font-family="JetBrains Mono,monospace">'+(i+1)+'</text>';
  const zero=minY<=0&&maxY>=0?'<line x1="'+PAD.l+'" y1="'+y0+'" x2="'+(W-PAD.r)+'" y2="'+y0+'" stroke="#252540" stroke-dasharray="4,4"/>':'';
  return'<svg width="100%" height="'+H+'" viewBox="0 0 '+W+' '+H+'" xmlns="http://www.w3.org/2000/svg" style="display:block">'+yg+zero+'<path d="'+fill+'" fill="'+color+'14"/><path d="'+path+'" stroke="'+color+'" stroke-width="2" fill="none"/>'+dots+yt+xt+'</svg>';
}

function svgBar(bars,W,H){
  if(!bars.length)return'';
  const PAD={t:10,r:20,b:30,l:65};const cw=W-PAD.l-PAD.r,ch=H-PAD.t-PAD.b;
  const vals=bars.map(b=>b.v),minY=Math.min(0,...vals),maxY=Math.max(0,...vals),rY=maxY-minY||1;
  const bw=Math.max(3,(cw/bars.length)-2),sy=v=>PAD.t+ch-((v-minY)/rY)*ch,y0=sy(0);
  let rects='',xl='';
  bars.forEach((b,i)=>{const x=PAD.l+(i/bars.length)*cw+(cw/bars.length-bw)/2,yv=sy(b.v);rects+='<rect x="'+x+'" y="'+(b.v>=0?yv:y0)+'" width="'+bw+'" height="'+Math.max(1,Math.abs(yv-y0))+'" fill="'+(b.v>=0?'#00e5a040':'#ff3d5a40')+'" stroke="'+(b.v>=0?'#00e5a0':'#ff3d5a')+'" stroke-width="1" rx="1"/>';if(i%(Math.ceil(bars.length/8))===0)xl+='<text x="'+(x+bw/2)+'" y="'+(H-5)+'" text-anchor="middle" fill="#6868a0" font-size="9" font-family="JetBrains Mono,monospace">'+b.d+'</text>';});
  let yg='',yt='';
  for(let i=0;i<=4;i++){const v=minY+rY*i/4,y=sy(v);yg+='<line x1="'+PAD.l+'" y1="'+y+'" x2="'+(W-PAD.r)+'" y2="'+y+'" stroke="#111128" stroke-dasharray="2,6"/>';yt+='<text x="'+(PAD.l-6)+'" y="'+(y+4)+'" text-anchor="end" fill="#6868a0" font-size="10" font-family="JetBrains Mono,monospace">$'+v.toFixed(0)+'</text>';}
  return'<svg width="100%" height="'+H+'" viewBox="0 0 '+W+' '+H+'" xmlns="http://www.w3.org/2000/svg" style="display:block">'+yg+'<line x1="'+PAD.l+'" y1="'+y0+'" x2="'+(W-PAD.r)+'" y2="'+y0+'" stroke="#2a2a40"/>'+rects+yt+xl+'</svg>';
}

function svgXY(data,color,xFmt,W,H,refX){
  if(!data.length)return'';
  const PAD={t:16,r:65,b:32,l:65};const cw=W-PAD.l-PAD.r,ch=H-PAD.t-PAD.b;
  const xs=data.map(d=>d.x),ys=data.map(d=>d.y);
  const minX=Math.min(...xs),maxX=Math.max(...xs),minY=Math.min(0,...ys),maxY=Math.max(0,...ys);
  const rX=maxX-minX||1,rY=maxY-minY||1;
  const sx=v=>PAD.l+((v-minX)/rX)*cw,sy=v=>PAD.t+ch-((v-minY)/rY)*ch,y0=sy(0);
  const path='M'+data.map(d=>sx(d.x)+','+sy(d.y)).join('L');
  let yg='',yt='';
  for(let i=0;i<=4;i++){const v=minY+rY*i/4,y=sy(v);yg+='<line x1="'+PAD.l+'" y1="'+y+'" x2="'+(W-PAD.r)+'" y2="'+y+'" stroke="#111128" stroke-dasharray="2,6"/>';yt+='<text x="'+(PAD.l-6)+'" y="'+(y+4)+'" text-anchor="end" fill="#6868a0" font-size="10" font-family="JetBrains Mono,monospace">$'+v.toFixed(0)+'</text>';}
  const xtickStep=Math.ceil(data.length/6);let xt='';
  data.forEach((d,i)=>{if(i%xtickStep===0)xt+='<text x="'+sx(d.x)+'" y="'+(H-5)+'" text-anchor="middle" fill="#6868a0" font-size="10" font-family="JetBrains Mono,monospace">'+(xFmt?xFmt(d.x):d.x)+'</text>';});
  const zero='<line x1="'+PAD.l+'" y1="'+y0+'" x2="'+(W-PAD.r)+'" y2="'+y0+'" stroke="#303050" stroke-dasharray="4,4"/><text x="'+(W-PAD.r+4)+'" y="'+(y0+4)+'" fill="#505070" font-size="9">0</text>';
  const you=refX!=null?'<line x1="'+sx(refX)+'" y1="'+PAD.t+'" x2="'+sx(refX)+'" y2="'+(PAD.t+ch)+'" stroke="#00e5a033" stroke-dasharray="3,3"/><text x="'+sx(refX)+'" y="'+(PAD.t-3)+'" text-anchor="middle" fill="#00e5a0" font-size="9">YOU</text>':'';
  return'<svg width="100%" height="'+H+'" viewBox="0 0 '+W+' '+H+'" xmlns="http://www.w3.org/2000/svg" style="display:block">'+yg+zero+you+'<path d="'+path+'" stroke="'+color+'" stroke-width="2.5" fill="none"/>'+yt+xt+'</svg>';
}

// ── KPI Card with sparkline ───────────────────────────────────────
function kpiCard(label,val,sub,color,sparkData,sparkColor,big){

// ── Export CSV ────────────────────────────────────────────────────
function exportCSV(){
  const h='Date,Symbol,AssetType,Direction,Entry,Exit,Contracts,Fees,Gross P&L,Net P&L,Duration,Grade,Setup,Notes,Chart URL,Source\n';
  const rows=trades.map(t=>`${t.date},${t.symbol},${t.assetType||'futures'},${t.type},${t.entry},${t.exit},${t.size},${t.fees||0},${(t.grossPnl||t.pnl).toFixed(2)},${t.pnl},"${fmtDuration(t.durationMins)}","${t.grade||'—'}","${t.setup||'—'}","${(t.notes||'').replace(/"/g,"'")}","${t.chartUrl||''}","${t.source||''}"`).join('\n');
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([h+rows],{type:'text/csv'}));
  a.download='edgelog_v'+VERSION+'_'+new Date().toISOString().slice(0,10)+'.csv';a.click();
}

// ── Filtered trades ───────────────────────────────────────────────
function applyFilters(tds){
  return tds.filter(t=>{
    if(filters.sym&&!t.symbol.toLowerCase().includes(filters.sym.toLowerCase()))return false;
    if(filters.dir&&t.type!==filters.dir)return false;
    if(filters.grade&&filters.grade!=='—'&&(t.grade||'—')!==filters.grade)return false;
    if(filters.setup&&filters.setup!=='—'&&(t.setup||'—')!==filters.setup)return false;
    if(filters.dateFrom&&t.date<filters.dateFrom)return false;
    if(filters.dateTo&&t.date>filters.dateTo)return false;
    if(filters.minPnl!==''&&t.pnl<parseFloat(filters.minPnl))return false;
    if(filters.maxPnl!==''&&t.pnl>parseFloat(filters.maxPnl))return false;
    return true;
  });
}

        if(!body){alert('Write something first.');return;}
        el('ladd').innerHTML='<span class="spinner"></span>';
        await addLesson({title:title||'Untitled Entry',body,date:date||new Date().toISOString().slice(0,10),tags:tags.split(',').map(t=>t.trim()).filter(Boolean)});
        el('ladd').textContent='SAVE ENTRY';
        ['lt','lb','ld','ltags'].forEach(id=>{if(el(id))el(id).value='';});
      };
    },50);

    if(!lessons.length){
      const emp=document.createElement('div');emp.style.cssText='border:1px dashed #1e1e36;padding:48px;text-align:center;color:#404060;font-size:11px;letter-spacing:2px';emp.textContent='NO ENTRIES YET — START DOCUMENTING YOUR LESSONS ABOVE';content.appendChild(emp);
    } else {
      const list=document.createElement('div');
      lessons.forEach(l=>{
        const card=document.createElement('div');card.className='lesson-card';
        card.innerHTML=`
          <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px">
            <div>
              <div style="font-size:13px;color:#c8ccd8;margin-bottom:3px">${l.title||'Untitled'}</div>
              <div style="font-size:10px;color:#505070">${l.date||''} ${l.tags&&l.tags.length?'· '+l.tags.map(t=>'<span class="tag" style="margin-right:3px">'+t+'</span>').join(''):''}</div>
            </div>
            <button class="del-btn" data-lid="${l.id}" style="flex-shrink:0">✕</button>
          </div>
          <div style="font-size:12px;color:#9090b0;line-height:1.8;white-space:pre-wrap">${l.body}</div>`;
        list.appendChild(card);
      });
      content.appendChild(list);
      list.querySelectorAll('.del-btn[data-lid]').forEach(b=>{b.onclick=()=>deleteLesson(b.dataset.lid);});
    }
  }

  // ══ ANALYTICS ══
  if(activeTab==='analytics'){
    if(!S){content.innerHTML='<div style="border:1px dashed #1e1e36;padding:80px;text-align:center;color:#404060;font-size:11px;letter-spacing:2px">ADD TRADES TO SEE ANALYTICS</div>';return;}
    const charts=['equity','daily','monthly','dow','grade','wr_ev','pf_ev'];
    const cLabels={equity:'EQUITY + DD',daily:'DAILY P&L',monthly:'MONTHLY',dow:'DAY OF WEEK',grade:'BY GRADE',wr_ev:'WR → EV',pf_ev:'PF → EV'};
    const brow=document.createElement('div');brow.style.cssText='display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap';
    charts.forEach(c=>{const b=document.createElement('button');b.className='btn-'+(activeChart===c?'g':'d');b.textContent=cLabels[c];b.onclick=()=>{activeChart=c;renderApp();};brow.appendChild(b);});
    content.appendChild(brow);
    const cs=document.createElement('div');cs.className='section';

    if(activeChart==='equity'){
      let c=0,pk=0;
      const eqPts=trades.map(t=>{c=+(c+t.pnl).toFixed(2);if(c>pk)pk=c;return{y:c,pnl:t.pnl};});
      let c2=0,pk2=0;
      const ddPts=trades.map(t=>{c2+=t.pnl;if(c2>pk2)pk2=c2;return{y:+(pk2-c2).toFixed(2),pnl:0};});
      cs.innerHTML='<div class="sec-hd"><span>EQUITY CURVE</span><span style="color:#ff3d5a">MAX DD -$'+S.maxDD.toFixed(2)+'</span></div>'+
        '<div style="padding:14px 4px 4px;overflow-x:auto">'+svgLine(eqPts,'#00e5a0',940,170)+
        '<div style="padding:8px 14px 4px;font-size:9px;letter-spacing:2px;color:#505070;border-top:1px solid #111128;margin-top:6px">DRAWDOWN FROM PEAK</div>'+
        svgLine(ddPts,'#ff3d5a',940,90)+'</div>';
    }
    if(activeChart==='daily'){
      const bars=Object.entries(S.byDay).sort(([a],[b])=>a>b?1:-1).map(([d,v])=>({d:d.slice(5),v:+v.toFixed(2)}));
      cs.innerHTML='<div class="sec-hd"><span>DAILY P&L</span><span>'+bars.length+' DAYS</span></div><div style="padding:14px 4px 8px;overflow-x:auto">'+svgBar(bars,940,240)+'</div>';
    }
    if(activeChart==='monthly'){
      const months=Object.entries(S.monthly).sort(([a],[b])=>a>b?1:-1);
      cs.innerHTML='<div class="sec-hd">MONTHLY P&L</div><table><thead><tr><th>MONTH</th><th>TRADES</th><th>WR</th><th>GROSS</th><th>NET P&L</th><th></th></tr></thead><tbody>'+
        months.map(([m,d])=>`<tr class="tr-row" style="border-bottom:1px solid #0f0f20">
          <td style="color:#c8ccd8;font-family:'Bebas Neue',monospace;font-size:15px">${m}</td>
          <td>${d.trades}</td><td style="color:${d.wins/d.trades>=.5?'#00e5a0':'#ff3d5a'}">${(d.wins/d.trades*100).toFixed(0)}%</td>
          <td style="color:#8080c0">${fmt(d.pnl+(d.fees||0))}</td>
          <td style="color:${gc(d.pnl)};font-family:'Bebas Neue',monospace;font-size:16px">${fmt(d.pnl)}</td>
          <td><span style="font-size:9px;padding:2px 8px;background:${d.pnl>=0?'#00e5a018':'#ff3d5a18'};color:${d.pnl>=0?'#00e5a0':'#ff3d5a'}">${d.pnl>=0?'PROFIT':'LOSS'}</span></td></tr>`).join('')+'</tbody></table>';
    }
    if(activeChart==='dow'){
      const order=['Mon','Tue','Wed','Thu','Fri'];
      const maxA=Math.max(...order.map(d=>Math.abs(S.dow[d].pnl)),1);
      cs.innerHTML='<div class="sec-hd">DAY OF WEEK PERFORMANCE</div><div style="padding:20px;display:flex;flex-direction:column;gap:12px">'+
        order.map(d=>{const{pnl,t}=S.dow[d],bw=Math.round(Math.abs(pnl)/maxA*100);
          return`<div style="display:grid;grid-template-columns:50px 1fr 70px 90px;gap:12px;align-items:center">
            <div style="font-family:'Bebas Neue',monospace;font-size:18px;color:#a0a4b8">${d}</div>
            <div style="background:#111120;height:10px"><div style="width:${bw}%;height:100%;background:${pnl>=0?'#00e5a040':'#ff3d5a40'};border-right:2px solid ${pnl>=0?'#00e5a0':'#ff3d5a'}"></div></div>
            <div style="font-size:10px;color:#6060a0">${t} trades</div>
            <div style="font-family:'Bebas Neue',monospace;font-size:16px;color:${gc(pnl)};text-align:right">${fmt(pnl)}</div></div>`;}).join('')+'</div>';
    }
    if(activeChart==='grade'){
      cs.innerHTML='<div class="sec-hd">PERFORMANCE BY GRADE</div><div style="padding:16px;display:flex;flex-direction:column;gap:8px">'+
        Object.entries(S.byGrade).sort(([a],[b])=>GRADES.indexOf(a)-GRADES.indexOf(b)).map(([g,s])=>`
          <div style="display:grid;grid-template-columns:80px 80px 80px 1fr 100px;gap:12px;align-items:center;padding:10px 14px;background:#09090f;border:1px solid #181830">
            <span class="${gradeClass(g)}">${g}</span>
            <span style="font-size:11px;color:#8080a0">${s.count} trades</span>
            <span style="font-size:11px;color:${s.wins/s.count>=.5?'#00e5a0':'#ff3d5a'}">${(s.wins/s.count*100).toFixed(0)}% WR</span>
            <div style="background:#111120;height:8px"><div style="width:${Math.round(Math.max(0,(s.pnl/Math.max(...Object.values(S.byGrade).map(x=>Math.abs(x.pnl)),1))*100))}%;height:100%;background:${gc(s.pnl)}"></div></div>
            <div style="font-family:'Bebas Neue',monospace;font-size:16px;color:${gc(s.pnl)};text-align:right">${fmt(s.pnl)}</div>
          </div>`).join('')+'</div>';
    }
    if(activeChart==='wr_ev'){
      const data=Array.from({length:21},(_,i)=>{const w=i/20;return{x:+(w*100).toFixed(0),y:+(w*S.avgW-(1-w)*(S.avgL||0)).toFixed(2)};});
      cs.innerHTML='<div class="sec-hd">WIN RATE → EXPECTED VALUE</div><div style="padding:14px 4px 8px;overflow-x:auto">'+svgXY(data,'#f5c842',v=>v+'%',940,240,+(S.wr*100).toFixed(0))+'</div>';
    }
    if(activeChart==='pf_ev'){
      const data=Array.from({length:20},(_,i)=>{const pf=0.25+i*0.2;return{x:+pf.toFixed(2),y:+(S.wr*(pf*(S.avgL||1))-(1-S.wr)*(S.avgL||1)).toFixed(2)};});
      cs.innerHTML='<div class="sec-hd">PROFIT FACTOR → EXPECTED VALUE</div><div style="padding:14px 4px 8px;overflow-x:auto">'+svgXY(data,'#2196f3',v=>v+'×',940,240,S.pf<99?+S.pf.toFixed(2):null)+'</div>';
    }
    content.appendChild(cs);
  }

  // ══ IMPORT ══
  if(activeTab==='import'){
    content.innerHTML=`<div style="max-width:740px">
    <div style="background:#0e0e1e;border:1px solid #1e1e36;padding:12px 18px;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center">
      <span style="font-size:10px;color:#7070a0;letter-spacing:2px">IMPORT CENTER · v${VERSION}</span>
      <span style="font-size:9px;color:#6060a0">Futures · Stocks · ETFs · Any CSV</span>
    </div>
    <div class="section" style="margin-bottom:12px">
      <div class="sec-hd"><span>AUTO-IMPORT <span style="color:#f5c842;font-size:9px;margin-left:8px">(Chrome/Edge only)</span></span></div>
      <div style="padding:16px">
        <div style="font-size:11px;color:#7070a0;margin-bottom:12px;line-height:1.8">Select your NT8 export file once — Edge Log re-reads it on your chosen interval and imports new trades automatically, including merging in new data (e.g. timestamps) for existing trades.</div>
        <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:10px">
          <button class="btn-y" id="auto-start-btn" style="display:${autoHandle?'none':'inline-block'}">📂 SELECT FILE FOR AUTO-SYNC</button>
          <button class="btn-r" id="auto-stop-btn" style="display:${autoHandle?'inline-block':'none'}">■ STOP</button>
          <div style="display:flex;align-items:center;gap:8px">
            <label class="lbl" style="margin:0;white-space:nowrap">EVERY</label>
            <input id="auto-interval" type="number" value="${autoInterval}" min="10" max="3600" style="width:70px"/>
            <span style="font-size:11px;color:#6060a0">sec</span>
          </div>
        </div>
        <div id="auto-status" style="display:${autoHandle?'flex':'none'};align-items:center;gap:8px;font-size:11px;color:#8080a0;background:#09090f;padding:10px 14px;border:1px solid #181830">
          <span class="pulse-y"></span><span id="auto-last">Waiting...</span>
        </div>
      </div>
    </div>
    <div class="section" style="margin-bottom:12px">
      <div class="sec-hd">MANUAL IMPORT</div>
      <div style="padding:16px">
        <div style="display:flex;gap:12px;align-items:flex-end;margin-bottom:12px">
          <div style="width:130px"><label class="lbl">DEFAULT FEE/TRADE ($)</label><input type="number" id="fee-input" value="${defaultFee}" step="0.01" min="0" style="color:#f5c842"/></div>
          <div style="font-size:10px;color:#505070;line-height:1.8;padding-bottom:2px">Used when CSV has no commission column. Stocks & futures both supported — P&L calculated automatically based on symbol type.</div>
        </div>
        <div class="drop-zone" id="drop-zone">
          <div style="font-size:36px;margin-bottom:10px">📂</div>
          <div style="font-size:13px;color:#8080a0;letter-spacing:1px">DROP CSV(S) HERE or CLICK TO BROWSE</div>
          <div style="font-size:10px;color:#404060;margin-top:10px;line-height:2">
            ✓ NT8 Performance &nbsp;·&nbsp; ✓ NT8 Orders &nbsp;·&nbsp; ✓ Fills CSV &nbsp;·&nbsp; ✓ Stocks / ETFs<br>
            Drop multiple files at once · Duplicate detection + smart merge
          </div>
          <input type="file" id="csv-input" accept=".csv" multiple style="display:none"/>
        </div>
        <div id="import-result" style="display:none;margin-top:10px;padding:14px;background:#09090f;border:1px solid #181830;font-size:11px;color:#8080a0"></div>
      </div>
    </div>
    <div class="section">
      <div class="sec-hd">EXPORT FROM NINJATRADE 8</div>
      <div style="padding:18px;display:flex;flex-direction:column;gap:10px">
        ${[['1','Open NinjaTrader 8'],['2','Control Center → Account → Performance'],['3','Set date range → Generate'],['4','Export → CSV (top right of report)'],['5','Also useful: export Orders, Fills, Position History separately'],['6','Drop any or all files above — data is merged automatically']].map(([n,s])=>`
          <div style="display:flex;gap:14px;align-items:flex-start">
            <div style="font-family:'Bebas Neue',monospace;font-size:20px;color:#00e5a0;min-width:22px;line-height:1">${n}</div>
            <div style="font-size:11px;color:#7070a0;padding-top:3px">${s}</div>
          </div>`).join('')}
      </div>
    </div>
    </div>`;

    setTimeout(()=>{
      const fi=el('fee-input');if(fi){fi.onchange=()=>{defaultFee=parseFloat(fi.value)||4.50;};}
      const ai=el('auto-interval');if(ai){ai.onchange=()=>{autoInterval=parseInt(ai.value)||60;};}
      if(el('auto-start-btn'))el('auto-start-btn').onclick=startAutoImport;
      if(el('auto-stop-btn'))el('auto-stop-btn').onclick=stopAutoImport;
      const dz=el('drop-zone'),ci=el('csv-input');if(!dz||!ci)return;
      const handle=async files=>{
        let tot=0,totS=0,totM=0;const results=[];
        for(const f of files){
          const text=await f.text(),r=importCSV(text,f.name);
          results.push({name:f.name,type:r.type,imported:r.imported,skipped:r.skipped,merged:r.merged,merges:r.merges});
          if(r.batch.length>0||r.merges.length>0)await commitImport(r.batch,r.merges);
          tot+=r.imported;totS+=r.skipped;totM+=r.merged;
        }
        const rd=el('import-result');
        if(rd){
          rd.style.display='block';
          rd.innerHTML='<div style="color:#00e5a0;margin-bottom:10px;font-size:12px">✅ IMPORT DONE — '+tot+' added · '+totM+' merged · '+totS+' exact dupes skipped</div>'+
            results.map(r=>{
              const mergeDetail=r.merges&&r.merges.length?'<div style="margin-top:4px;padding:6px 10px;background:#0d0d1a;font-size:10px;color:#7070a0">Merged new data into '+r.merges.length+' existing trade(s): <span style="color:#f5c842">'+r.merges.map(m=>m.desc).join(', ')+'</span></div>':'';
              return'<div style="border-top:1px solid #181830;padding:6px 0"><div style="display:flex;gap:14px"><span style="color:#8080a0">'+r.name+'</span><span class="tag">'+r.type+'</span><span style="color:#00e5a0">+'+r.imported+'</span>'+(r.merged?'<span style="color:#f5c842">~'+r.merged+' merged</span>':'')+(r.skipped?'<span style="color:#505070">'+r.skipped+' dupes</span>':'')+'</div>'+mergeDetail+'</div>';
            }).join('');
        }
        if(tot>0){activeTab='journal';setTimeout(()=>renderApp(),1800);}
      };
      dz.onclick=()=>ci.click();
      dz.ondragover=e=>{e.preventDefault();dz.classList.add('drag');};
      dz.ondragleave=()=>dz.classList.remove('drag');
      dz.ondrop=e=>{e.preventDefault();dz.classList.remove('drag');handle([...e.dataTransfer.files]);};
      ci.onchange=e=>{if(e.target.files.length)handle([...e.target.files]);};
    },50);
  }

  // ══ EXPORT ══
  if(activeTab==='export'){
    content.innerHTML=`<div style="max-width:560px">
      <div style="background:#09090f;border:1px solid #181830;padding:12px 16px;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center">
        <span style="font-size:10px;color:#6060a0;letter-spacing:1px">CLOUD SYNC · v${VERSION}</span>
        <span style="color:#00e5a0;font-size:10px;display:flex;align-items:center"><span class="pulse"></span>LIVE · ${trades.length} TRADES</span>
      </div>
      <div class="section" style="margin-bottom:12px">
        <div class="sec-hd">EXPORT</div>
        <div style="padding:12px">
          <div style="display:flex;justify-content:space-between;align-items:center;background:#09090f;padding:12px 14px">
            <div><div style="font-size:12px;color:#c8ccd8;margin-bottom:3px">Full CSV Export</div><div style="font-size:10px;color:#606080">All trades incl. gross P&L, net P&L, duration, grade, source</div></div>
            <button class="btn-g" id="exp-csv" ${!trades.length?'disabled':''}>DOWNLOAD CSV</button>
          </div>
        </div>
      </div>
      <div class="section" style="margin-bottom:12px">
        <div class="sec-hd">LOGO</div>
        <div style="padding:14px;display:flex;gap:12px;align-items:center">
          ${userLogo?'<img src="'+userLogo+'" style="height:48px;max-width:120px;object-fit:contain;border:1px solid #1e1e36"/>':'<div style="color:#404060;font-size:11px">No logo uploaded</div>'}
          <label class="btn-b" style="cursor:pointer">UPLOAD LOGO<input type="file" accept="image/*" id="logo-upload2" style="display:none"/></label>
          ${userLogo?'<button class="btn-r" id="rm-logo">REMOVE</button>':''}
        </div>
      </div>
      ${trades.length?`<div style="border:1px solid #ff3d5a20">
        <div style="background:#0d0008;padding:10px 16px;border-bottom:1px solid #ff3d5a20;font-size:10px;letter-spacing:2px;color:#ff3d5a">DANGER ZONE</div>
        <div style="padding:14px;display:flex;justify-content:space-between;align-items:center">
          <div style="font-size:11px;color:#6060a0">Permanently delete all ${trades.length} trades from cloud.</div>
          <button class="btn-r" id="clr-all">CLEAR ALL</button>
        </div></div>`:''}
    </div>`;
    setTimeout(()=>{
      if(el('exp-csv'))el('exp-csv').onclick=exportCSV;
      if(el('clr-all'))el('clr-all').onclick=async()=>{if(!confirm('Delete ALL '+trades.length+' trades?'))return;const snap=await colRef.get();const b=db.batch();snap.docs.forEach(d=>b.delete(d.ref));await b.commit();};
      const lu2=el('logo-upload2');if(lu2)lu2.onchange=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{userLogo=ev.target.result;localStorage.setItem('el_logo',userLogo);renderApp();};r.readAsDataURL(f);};
      if(el('rm-logo'))el('rm-logo').onclick=()=>{userLogo=null;localStorage.removeItem('el_logo');renderApp();};
    },50);
  }
}

function clearFilters(){filters={sym:'',dir:'',grade:'',setup:'',dateFrom:'',dateTo:'',minPnl:'',maxPnl:''};renderApp();}

// ── Boot ──────────────────────────────────────────────────────────
if(!initFB()){document.getElementById('app').innerHTML='<div style="color:#ff3d5a;padding:40px;text-align:center">Firebase failed to initialize.</div>';}
else{auth.onAuthStateChanged(user=>{if(user){currentUser=user;subscribeAll(currentUser.uid);}else renderAuth();});}
</script>
</body>
</html>
