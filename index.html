<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>EDGE LOG</title>
<link id="favicon" rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' fill='%2300e5a0' rx='4'/><text x='4' y='24' font-size='22' font-family='monospace' fill='%23050a05' font-weight='bold'>E</text></svg>"/>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>

<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Bebas+Neue&display=swap" rel="stylesheet"/>
<style>
/* ── THEMES ── */
:root{
  --bg:#05050a;--bg1:#0e0e1e;--bg2:#0a0a18;--bg3:#09090f;
  --border:#1e1e36;--border2:#181830;
  --text:#c8ccd8;--text2:#a0a4b8;--text3:#7070a0;--text4:#505070;--text5:#303048;
  --green:#00e5a0;--red:#ff3d5a;--yellow:#f5c842;--blue:#4a9eff;--purple:#a78bfa;
  --pad:16px;--fs:13px;--fsm:11px;--fss:10px;--fsxs:9px;
  --card-pad:14px 16px;--mini-pad:11px 14px;
}
[data-theme="ocean"]{--bg:#020810;--bg1:#060e1e;--bg2:#040a18;--bg3:#030810;--border:#0e2040;--border2:#0a1830;--text:#b8d0e8;--text2:#8090a8;--text3:#506080;--text4:#304050;--text5:#202838;--green:#00d4ff;--red:#ff4060;--yellow:#ffd060;}
[data-theme="carbon"]{--bg:#080808;--bg1:#111111;--bg2:#0d0d0d;--bg3:#0a0a0a;--border:#222;--border2:#1a1a1a;--text:#d0d0d0;--text2:#a0a0a0;--text3:#686868;--text4:#484848;--text5:#282828;--green:#00e060;--red:#ff3040;--yellow:#ffc840;}
[data-theme="terminal"]{--bg:#000a00;--bg1:#001000;--bg2:#000c00;--bg3:#000800;--border:#003000;--border2:#002000;--text:#00e060;--text2:#00a040;--text3:#007030;--text4:#005020;--text5:#003010;--green:#00ff80;--red:#ff4000;--yellow:#c0e000;}
[data-density="compact"]{--pad:10px;--card-pad:9px 12px;--mini-pad:7px 10px;--fs:12px;--fsm:10px;--fss:9px;--fsxs:8px;}
[data-density="large"]{--pad:22px;--card-pad:18px 22px;--mini-pad:14px 18px;--fs:14px;--fsm:12px;--fss:11px;--fsxs:10px;}

*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'JetBrains Mono',monospace;font-size:var(--fs)}
::-webkit-scrollbar{width:3px;height:3px}::-webkit-scrollbar-track{background:var(--bg1)}::-webkit-scrollbar-thumb{background:var(--text5)}
input,select,textarea{background:var(--bg2);border:1px solid var(--border);color:var(--text);font-family:'JetBrains Mono',monospace;font-size:var(--fsm);padding:8px 10px;width:100%;outline:none;transition:border-color .15s}
input:focus,select:focus,textarea:focus{border-color:color-mix(in srgb, var(--green) 40%, transparent)}
select{-webkit-appearance:none;cursor:pointer}
button{cursor:pointer;font-family:'JetBrains Mono',monospace;border:none;transition:all .15s}
.btn-g{background:color-mix(in srgb,var(--green) 12%,transparent);border:1px solid color-mix(in srgb,var(--green) 30%,transparent);color:var(--green);padding:7px 16px;font-size:var(--fsxs);letter-spacing:1px}
.btn-g:hover{background:color-mix(in srgb,var(--green) 22%,transparent)}.btn-g:disabled{opacity:.4;cursor:not-allowed}
.btn-r{background:color-mix(in srgb,var(--red) 12%,transparent);border:1px solid color-mix(in srgb,var(--red) 30%,transparent);color:var(--red);padding:7px 16px;font-size:var(--fsxs);letter-spacing:1px}
.btn-r:hover{background:color-mix(in srgb,var(--red) 22%,transparent)}
.btn-y{background:color-mix(in srgb,var(--yellow) 12%,transparent);border:1px solid color-mix(in srgb,var(--yellow) 30%,transparent);color:var(--yellow);padding:7px 16px;font-size:var(--fsxs);letter-spacing:1px}
.btn-b{background:color-mix(in srgb,var(--blue) 12%,transparent);border:1px solid color-mix(in srgb,var(--blue) 30%,transparent);color:var(--blue);padding:7px 16px;font-size:var(--fsxs);letter-spacing:1px}
.btn-d{background:var(--bg2);border:1px solid var(--border);color:var(--text3);padding:7px 16px;font-size:var(--fsxs);letter-spacing:1px}
.btn-d:hover{border-color:var(--text4);color:var(--text2)}
.btn-ghost{background:none;border:none;color:var(--text4);font-size:var(--fss);letter-spacing:2px;padding:13px 16px;border-bottom:2px solid transparent}
.btn-ghost:hover{color:var(--text2)}.btn-ghost.active{color:var(--green);border-bottom-color:var(--green)}
.del-btn{background:none;border:none;color:var(--text5);font-size:14px;padding:2px 7px}.del-btn:hover{color:var(--red)}
.edit-btn{background:none;border:none;color:var(--text4);font-size:var(--fss);padding:2px 7px}.edit-btn:hover{color:var(--yellow)}
.card{background:var(--bg1);border:1px solid var(--border);padding:var(--card-pad);position:relative;overflow:visible}
.mini-card{background:var(--bg2);border:1px solid var(--border2);padding:var(--mini-pad);position:relative;overflow:visible}
.section{border:1px solid var(--border)}
.sec-hd{background:var(--bg1);padding:10px 16px;border-bottom:1px solid var(--border);font-size:var(--fsxs);letter-spacing:2px;color:var(--text3);display:flex;justify-content:space-between;align-items:center;gap:8px}
.lbl{display:block;font-size:var(--fsxs);letter-spacing:2px;color:var(--text3);margin-bottom:4px}
.tag{font-size:var(--fsxs);letter-spacing:1px;padding:1px 7px;background:var(--bg2);color:var(--text3);border:1px solid var(--border2)}
.tr-row:hover{background:var(--bg2)}
.topbar{background:color-mix(in srgb,var(--bg) 85%,var(--bg1));border-bottom:1px solid var(--border);display:flex;align-items:stretch;padding:0 16px;position:sticky;top:0;z-index:100;flex-wrap:wrap}
.content{padding:var(--pad) calc(var(--pad)*1.5);max-width:1280px;margin:0 auto}
table{width:100%;border-collapse:collapse;font-size:var(--fsm)}
th{padding:7px 9px;text-align:left;color:var(--text3);font-weight:normal;font-size:var(--fsxs);letter-spacing:2px;border-bottom:1px solid var(--border);white-space:nowrap;background:var(--bg2);cursor:pointer}
th:hover{color:var(--text2)}
td{padding:6px 9px;border-bottom:1px solid color-mix(in srgb,var(--border) 50%,transparent);color:var(--text2);vertical-align:middle}
.drop-zone{border:1px dashed var(--border);padding:28px 20px;text-align:center;cursor:pointer;transition:all .15s;background:var(--bg3)}
.drop-zone:hover,.drop-zone.drag{border-color:color-mix(in srgb,var(--green) 50%,transparent);background:color-mix(in srgb,var(--green) 5%,transparent)}
a.clink{color:var(--blue);font-size:var(--fsxs);text-decoration:none}
/* tooltip */
.tip-wrap{position:relative;display:inline-flex;align-items:center;gap:4px;vertical-align:middle}
.tip-icon{display:inline-flex;align-items:center;justify-content:center;width:13px;height:13px;border-radius:50%;background:var(--bg3);border:1px solid var(--border);color:var(--text4);font-size:8px;cursor:help;font-style:normal;font-family:serif;flex-shrink:0}
.tip-icon:hover+.tip-box{display:block}
.tip-box{display:none;position:absolute;top:18px;left:0;background:var(--bg1);border:1px solid var(--border);padding:10px 12px;font-size:var(--fss);color:var(--text2);letter-spacing:.3px;line-height:1.7;width:240px;z-index:60;pointer-events:none;box-shadow:0 8px 24px #00000099}
/* warning */
.warn-stripe{position:absolute;top:0;left:0;right:0;height:2px}
.warn-badge{font-size:var(--fsxs);color:var(--yellow);display:flex;align-items:center;gap:4px;margin-top:4px}
.danger-badge{font-size:var(--fsxs);color:var(--red);display:flex;align-items:center;gap:4px;margin-top:4px}
/* modal */
.modal-bg{position:fixed;inset:0;background:#000000cc;z-index:200;display:flex;align-items:center;justify-content:center;padding:20px}
.modal{background:var(--bg1);border:1px solid var(--border);width:100%;max-width:640px;max-height:92vh;overflow-y:auto}
.modal-hd{background:var(--bg);padding:13px 18px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;font-size:var(--fsxs);letter-spacing:2px;color:var(--text3);position:sticky;top:0;z-index:3}
/* grades */
.grade-A{color:var(--green);background:color-mix(in srgb,var(--green) 12%,transparent);border:1px solid color-mix(in srgb,var(--green) 25%,transparent);font-size:var(--fss);padding:1px 7px;font-family:'Bebas Neue',monospace}
.grade-B{color:var(--blue);background:color-mix(in srgb,var(--blue) 12%,transparent);border:1px solid color-mix(in srgb,var(--blue) 25%,transparent);font-size:var(--fss);padding:1px 7px;font-family:'Bebas Neue',monospace}
.grade-C{color:var(--yellow);background:color-mix(in srgb,var(--yellow) 12%,transparent);border:1px solid color-mix(in srgb,var(--yellow) 25%,transparent);font-size:var(--fss);padding:1px 7px;font-family:'Bebas Neue',monospace}
.grade-D{color:#ff8c42;background:#ff8c4218;border:1px solid #ff8c4230;font-size:var(--fss);padding:1px 7px;font-family:'Bebas Neue',monospace}
.grade-F{color:var(--red);background:color-mix(in srgb,var(--red) 12%,transparent);border:1px solid color-mix(in srgb,var(--red) 25%,transparent);font-size:var(--fss);padding:1px 7px;font-family:'Bebas Neue',monospace}
.grade-x{color:var(--text4);background:var(--bg2);border:1px solid var(--border2);font-size:var(--fss);padding:1px 7px;font-family:'Bebas Neue',monospace}
/* inline select */
.inline-sel{background:var(--bg2);border:1px solid var(--border);color:var(--text2);font-family:'JetBrains Mono',monospace;font-size:var(--fsxs);padding:2px 4px;outline:none;cursor:pointer;max-width:120px}
.inline-sel:focus{border-color:color-mix(in srgb,var(--green) 40%,transparent)}
/* filter */
.filter-inp{background:transparent;border:none;border-bottom:1px solid var(--border);color:var(--text2);font-family:'JetBrains Mono',monospace;font-size:var(--fsxs);padding:3px 5px;width:100%;outline:none}
.filter-inp:focus{border-bottom-color:var(--green)}
.vbadge{font-size:var(--fsxs);color:var(--text5);letter-spacing:1px;font-family:'JetBrains Mono',monospace}
.lesson-card{background:var(--bg3);border:1px solid var(--border2);padding:13px 15px;margin-bottom:8px}
/* spinner / pulse */
.pulse{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 2s infinite;vertical-align:middle}
.pulse-y{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--yellow);animation:pulse 2s infinite;vertical-align:middle}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.25}}
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{display:inline-block;width:15px;height:15px;border:2px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
.fade{animation:fadeIn .2s ease}
/* auth */
.auth-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
/* theme switcher */
.theme-dot{width:16px;height:16px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all .15s}
.theme-dot.active{border-color:var(--text2)}
/* toggle */
.toggle-pill{display:inline-flex;background:var(--bg2);border:1px solid var(--border);border-radius:0;overflow:hidden}
.toggle-pill button{background:none;border:none;color:var(--text4);padding:4px 12px;font-size:var(--fsxs);letter-spacing:1px;transition:all .15s}
.toggle-pill button.on{background:color-mix(in srgb,var(--green) 15%,transparent);color:var(--green)}
</style>
</head>
<body>
<div id="app"><div style="height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px"><div class="spinner" style="width:26px;height:26px"></div><div style="font-size:10px;letter-spacing:3px;color:var(--text5)">LOADING EDGE LOG v9...</div></div></div>
<script>
const VERSION='9.0';
const PRESETS={ES:{tv:12.50,ts:0.25},MES:{tv:1.25,ts:0.25},NQ:{tv:5.00,ts:0.25},MNQ:{tv:0.50,ts:0.25},CL:{tv:10.00,ts:0.01},GC:{tv:10.00,ts:0.10},SI:{tv:25.00,ts:0.005},ZB:{tv:31.25,ts:0.03125},RTY:{tv:5.00,ts:0.10},YM:{tv:5.00,ts:1.00},MGC:{tv:1.00,ts:0.10},MCL:{tv:1.00,ts:0.01},ZN:{tv:31.25,ts:0.015625},ZC:{tv:12.50,ts:0.25},NG:{tv:10.00,ts:0.001}};
const DEFAULT_FEES={ES:4.50,MES:1.25,NQ:4.50,MNQ:1.25,CL:4.50,GC:4.50,SI:4.50,ZB:4.50,RTY:4.50,YM:4.50,ZN:4.50,ZC:4.50,NG:4.50,MGC:1.25,MCL:1.25};
const GRADES=['—','A+','A','B','C','D','F'];
const TIMEFRAMES=['—','5s','15s','30s','1m','2m','3m','5m','10m','15m','30m','1h','2h','4h','Daily','Weekly'];
const TABS=['overview','journal','lessons','analytics','diagnostics','import','settings','export'];
const DEFAULT_SETUPS=['—','Breakout','Pullback','Reversal','Trend','Gap Fill','VWAP','S/D Zone','Momentum','ICT','Order Block','FVG'];
const KPI_INFO={
  'WIN RATE':{info:'% of trades that are profitable. Must be paired with good R:R — a 40% WR can be profitable with 2R+.',warn:v=>v<0.4?'danger':v<0.5?'warn':null,msg:v=>v<0.4?'Win rate below 40% — review entries':'Below 50% — ensure R:R compensates'},
  'PROFIT FACTOR':{info:'Gross profit ÷ gross loss. > 1.5 healthy · > 2.0 excellent · < 1.0 losing money overall.',warn:v=>v<1?'danger':v<1.5?'warn':null,msg:v=>v<1?'PF < 1 — losing strategy':'PF below 1.5 — marginal edge'},
  'EXP VALUE':{info:'EV = (WR × AvgWin) − (LossRate × AvgLoss). Positive = edge per trade. This is the most important single number.',warn:v=>v<0?'danger':v<5?'warn':null,msg:v=>v<0?'Negative EV — losing per trade on average':'Low EV — small edge'},
  'NET P&L':{info:'Total P&L after all fees deducted. Your actual take-home.',warn:v=>v<0?'danger':null,msg:()=>'Net P&L is negative'},
  'SHARPE':{info:'Annualized risk-adjusted return. > 1 acceptable · > 2 good · > 3 excellent.',warn:v=>v<0?'danger':v<1?'warn':null,msg:v=>v<0?'Negative Sharpe':'Sharpe below 1'},
  'MAX DD':{info:'Largest peak-to-trough equity decline. Monitor vs account size.',warn:()=>null,msg:()=>''},
  'RECOVERY':{info:'Net P&L ÷ Max Drawdown. How efficiently you recover. > 2 good.',warn:v=>v<1?'danger':v<2?'warn':null,msg:v=>v<1?'Not yet recovered from max DD':'Recovery below 2'},
  'RISK:REWARD':{info:'AvgWin ÷ AvgLoss. Target 1.5R+. Combined with WR determines profitability.',warn:v=>v<1?'danger':v<1.5?'warn':null,msg:v=>v<1?'Avg loss > avg win':'R:R below 1.5'},
};

// Preferences
let prefs=JSON.parse(localStorage.getItem('el_prefs')||'{}');
let instrumentFees=JSON.parse(localStorage.getItem('el_fees')||JSON.stringify(DEFAULT_FEES));
let customSetups=JSON.parse(localStorage.getItem('el_setups')||JSON.stringify(DEFAULT_SETUPS));
let userLogo=localStorage.getItem('el_logo')||null;

function savePref(k,v){prefs[k]=v;localStorage.setItem('el_prefs',JSON.stringify(prefs));}
function applyTheme(){document.documentElement.setAttribute('data-theme',prefs.theme||'dark');document.documentElement.setAttribute('data-density',prefs.density||'normal');}
applyTheme();

// State
let db=null,auth=null,colRef=null,lessonRef=null,unsub=null,unsubL=null;
let trades=[],lessons=[],balanceHistory=[],currentUser=null;
let activeTab='overview',activeChart='equity';
let formOpen=true,showAllCols=false;
let autoHandle=null,autoTimer=null,autoInterval=60;
let useGross=false; // gross vs net toggle for KPI stats
let filters={sym:'',dir:'',grade:'',setup:'',tf:'',dateFrom:'',dateTo:'',minPnl:'',maxPnl:''};
let sortCol='date',sortDir=-1; // -1=desc, 1=asc
let pendingMerges=[],pendingApprovalCb=null; // change approval queue

// Helpers
const el=id=>document.getElementById(id);
const gc=n=>n>=0?'var(--green)':'var(--red)';
const gch=n=>n>=0?'#00e5a0':'#ff3d5a';
const fmt=n=>(n>=0?'+':'')+n.toFixed(2);
const pct=n=>(n*100).toFixed(1)+'%';
const isFut=sym=>!!PRESETS[sym];
const getBase=s=>(s||'').replace(/[^A-Za-z]/g,'').slice(0,3).toUpperCase()||'';
const gradeClass=g=>({'+':'grade-A','A':'grade-A','B':'grade-B','C':'grade-C','D':'grade-D','F':'grade-F'}[g?.slice(-1)]||'grade-x');
function fmtDur(m){if(!m||m<0)return'—';if(m<60)return m+'m';return Math.floor(m/60)+'h'+(m%60>0?' '+m%60+'m':'');}
function getFee(sym){return instrumentFees[sym]??instrumentFees[getBase(sym)]??4.50;}
function setFavicon(dataUrl){const l=el('favicon')||document.createElement('link');l.id='favicon';l.rel='icon';l.href=dataUrl;document.head.appendChild(l);if(el('favicon')!==l)document.head.appendChild(l);}
function updateFavicon(){
  if(!userLogo){setFavicon("data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' fill='%2300e5a0' rx='4'/><text x='4' y='24' font-size='22' font-family='monospace' fill='%23050a05' font-weight='bold'>E</text></svg>");return;}
  const canvas=document.createElement('canvas');canvas.width=32;canvas.height=32;
  const ctx=canvas.getContext('2d');const img=new Image();
  img.onload=()=>{ctx.drawImage(img,0,0,32,32);setFavicon(canvas.toDataURL());};
  img.src=userLogo;
}
updateFavicon();

function calcPnl(sym,type,entry,exit,size,fees){
  const dir=type==='LONG'?1:-1;
  let gross=isFut(sym)?(((exit-entry)*dir)/PRESETS[sym].ts)*PRESETS[sym].tv*size:(exit-entry)*dir*size;
  return{gross:+gross.toFixed(2),net:+(gross-(fees||0)).toFixed(2)};
}
function stdDev(arr){if(arr.length<2)return 0;const m=arr.reduce((a,b)=>a+b,0)/arr.length;return Math.sqrt(arr.reduce((s,v)=>s+(v-m)**2,0)/(arr.length-1));}
function tradeCalc(sym,type,entry,exit,size,fees){const r=calcPnl(sym,type,entry,exit,size,fees);return{grossPnl:r.gross,pnl:r.net,fees:fees||0};}

// pnlVal = which value to use for win/loss decisions
function pnlVal(t){return useGross?(t.grossPnl||t.pnl):t.pnl;}

function calcStats(tds){
  if(!tds||!tds.length)return null;
  const wins=tds.filter(t=>pnlVal(t)>0),losses=tds.filter(t=>pnlVal(t)<0);
  const wr=wins.length/tds.length;
  const avgW=wins.length?wins.reduce((s,t)=>s+pnlVal(t),0)/wins.length:0;
  const avgL=losses.length?Math.abs(losses.reduce((s,t)=>s+pnlVal(t),0)/losses.length):0;
  const grossW=wins.reduce((s,t)=>s+pnlVal(t),0),grossL=Math.abs(losses.reduce((s,t)=>s+pnlVal(t),0));
  const net=tds.reduce((s,t)=>s+t.pnl,0),grossNet=tds.reduce((s,t)=>s+(t.grossPnl||t.pnl),0);
  const totalFees=tds.reduce((s,t)=>s+(t.fees||0),0);
  const pf=grossL>0?grossW/grossL:grossW>0?99:0,ev=wr*avgW-(1-wr)*(avgL||0);
  const feeImpact=Math.abs(grossNet)>0?(totalFees/Math.abs(grossNet))*100:0;
  let peak=0,maxDD=0,cur=0;tds.forEach(t=>{cur+=t.pnl;if(cur>peak)peak=cur;maxDD=Math.max(maxDD,peak-cur);});
  let maxWS=0,maxLS=0,cW=0,cL=0,streak=0,sdir=0;
  for(let i=tds.length-1;i>=0;i--){const d=pnlVal(tds[i])>0?1:-1;if(!streak){streak=1;sdir=d;}else if(d===sdir)streak++;else break;}
  tds.forEach(t=>{if(pnlVal(t)>0){cW++;cL=0;maxWS=Math.max(maxWS,cW);}else{cL++;cW=0;maxLS=Math.max(maxLS,cL);}});
  const byDay={};tds.forEach(t=>{byDay[t.date]=(byDay[t.date]||0)+t.pnl;});
  const dv=Object.values(byDay),meanD=dv.length?dv.reduce((a,b)=>a+b,0)/dv.length:0;
  const sharpe=dv.length>1?(meanD/(stdDev(dv)||1))*Math.sqrt(252):0;
  const recovery=maxDD>0?net/maxDD:0,rr=avgL>0?avgW/avgL:0;
  const longs=tds.filter(t=>t.type==='LONG'),shorts=tds.filter(t=>t.type==='SHORT');
  const syms={},setups={},monthly={},byGrade={},byTF={};
  const dowK=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'],dow={Mon:{pnl:0,t:0},Tue:{pnl:0,t:0},Wed:{pnl:0,t:0},Thu:{pnl:0,t:0},Fri:{pnl:0,t:0}};
  tds.forEach(t=>{
    if(!syms[t.symbol])syms[t.symbol]={count:0,pnl:0,grossPnl:0,wins:0,fees:0};
    syms[t.symbol].count++;syms[t.symbol].pnl+=t.pnl;syms[t.symbol].grossPnl+=(t.grossPnl||t.pnl);syms[t.symbol].fees+=(t.fees||0);if(pnlVal(t)>0)syms[t.symbol].wins++;
    const k=t.setup||'—';if(!setups[k])setups[k]={count:0,pnl:0,wins:0};setups[k].count++;setups[k].pnl+=t.pnl;if(pnlVal(t)>0)setups[k].wins++;
    const mo=t.date?t.date.slice(0,7):'?';if(!monthly[mo])monthly[mo]={pnl:0,trades:0,wins:0};monthly[mo].pnl+=t.pnl;monthly[mo].trades++;if(pnlVal(t)>0)monthly[mo].wins++;
    const g=t.grade||'—';if(!byGrade[g])byGrade[g]={count:0,pnl:0,wins:0};byGrade[g].count++;byGrade[g].pnl+=t.pnl;if(pnlVal(t)>0)byGrade[g].wins++;
    const tf=t.timeframe||'—';if(!byTF[tf])byTF[tf]={count:0,pnl:0,wins:0};byTF[tf].count++;byTF[tf].pnl+=t.pnl;if(pnlVal(t)>0)byTF[tf].wins++;
    if(t.date){const dk=dowK[new Date(t.date+'T12:00:00').getDay()];if(dow[dk]){dow[dk].pnl+=t.pnl;dow[dk].t++;}}
  });
  const wD=tds.filter(t=>t.durationMins>0);
  const avgDur=wD.length?wD.reduce((s,t)=>s+t.durationMins,0)/wD.length:0;
  const avgWinDur=wD.filter(t=>pnlVal(t)>0).reduce((s,t,_,a)=>s+t.durationMins/a.length,0);
  const avgLossDur=wD.filter(t=>pnlVal(t)<0).reduce((s,t,_,a)=>s+t.durationMins/a.length,0);
  const best=tds.reduce((a,b)=>pnlVal(b)>pnlVal(a)?b:a),worst=tds.reduce((a,b)=>pnlVal(b)<pnlVal(a)?b:a);
  const dayE=Object.entries(byDay);
  const bestDay=dayE.length?dayE.reduce((a,b)=>b[1]>a[1]?b:a,['—',0]):['—',0];
  const worstDay=dayE.length?dayE.reduce((a,b)=>b[1]<a[1]?b:a,['—',0]):['—',0];
  const rolling={wr:[],pf:[],ev:[],net:[]};let rW=0,rL=0,rGW=0,rGL=0,rNet=0;
  tds.forEach(t=>{rNet+=t.pnl;const pv=pnlVal(t);if(pv>0){rW++;rGW+=pv;}else if(pv<0){rL++;rGL+=Math.abs(pv);}
    const rt=rW+rL;rolling.net.push(+rNet.toFixed(2));rolling.wr.push(rt>0?+(rW/rt).toFixed(3):0);rolling.pf.push(rGL>0?+(rGW/rGL).toFixed(3):rGW>0?5:0);
    const rwr=rt>0?rW/rt:0,rawW=rW>0?rGW/rW:0,rawL=rL>0?rGL/rL:0;rolling.ev.push(+(rwr*rawW-(1-rwr)*rawL).toFixed(2));});
  return{wr,avgW,avgL,pf,ev,net,grossNet,grossW,grossL,totalFees,feeImpact,maxDD,sharpe,recovery,rr,streak,sdir,maxWS,maxLS,
    wins:wins.length,losses:losses.length,total:tds.length,longs:longs.length,shorts:shorts.length,
    longPnl:longs.reduce((s,t)=>s+t.pnl,0),shortPnl:shorts.reduce((s,t)=>s+t.pnl,0),
    longWR:longs.length?longs.filter(t=>pnlVal(t)>0).length/longs.length:0,
    shortWR:shorts.length?shorts.filter(t=>pnlVal(t)>0).length/shorts.length:0,
    best,worst,bestDay,worstDay,avgDur,avgWinDur,avgLossDur,
    syms,setups,monthly,byGrade,byTF,dow,byDay,rolling};
}

// CSV Parsing
function parseLine(l){const r=[];let c='',q=false;for(const ch of l){if(ch==='"')q=!q;else if(ch===','&&!q){r.push(c.trim());c='';}else c+=ch;}r.push(c.trim());return r.map(f=>f.replace(/^"|"$/g,'').trim());}
function parseDate(s){if(!s)return'';let m=s.match(/(\d{1,2})\/(\d{1,2})\/(\d{4})/);if(m)return m[3]+'-'+m[1].padStart(2,'0')+'-'+m[2].padStart(2,'0');m=s.match(/(\d{4})-(\d{2})-(\d{2})/);if(m)return m[0];return s.slice(0,10);}
function parseDT(s){if(!s)return null;const m=s.match(/(\d{1,2})\/(\d{1,2})\/(\d{4})\s+(\d{1,2}):(\d{2})(?::(\d{2}))?/);if(m)return new Date(+m[3],+m[1]-1,+m[2],+m[4],+m[5],+(m[6]||0));return null;}
function detectType(hdr){const h=hdr.join(' ');if(h.includes('buyprice')||h.includes('boughttimestamp'))return'performance';if(h.includes('amount')&&(h.includes('balance')||h.includes('description')||h.includes('cash')))return'cash';if(h.includes('fillprice'))return'fills';if(h.includes('orderstatus'))return'orders';return'generic';}

function importCSV(text,label){
  const lines=text.split('\n').filter(l=>l.trim());
  if(lines.length<2)return{imported:0,skipped:0,merged:0,type:'empty',batch:[],merges:[],feeUpdates:[],balRows:[]};
  const hdr=parseLine(lines[0]).map(h=>h.toLowerCase().replace(/\s+/g,''));
  const type=detectType(hdr);
  const gc2=(row,keys)=>{for(const k of keys){const i=hdr.findIndex(h=>h.includes(k.replace(/\s/g,'')));if(i!==-1&&row[i]!=null&&row[i]!=='')return row[i];}return'';};

  if(type==='cash'){
    const feeUpdates=[],balRows=[];
    for(let i=1;i<lines.length;i++){
      const row=parseLine(lines[i]);if(row.length<2)continue;
      const amount=parseFloat(gc2(row,['amount','value','debit','credit'])||'NaN');
      const desc=(gc2(row,['description','type','transaction','detail'])||'').toLowerCase();
      const date=parseDate(gc2(row,['date','time','timestamp']));
      const balance=parseFloat(gc2(row,['balance','runningbalance','accountbalance','endbalance'])||'NaN');
      if(!date)continue;
      if(!isNaN(balance))balRows.push({date,balance});
      if(isNaN(amount))continue;
      const isCommission=desc.includes('commission')||desc.includes('fee')||desc.includes('commis');
      if(isCommission&&amount<0){
        const feeAmt=Math.abs(amount);
        const matchedTrades=trades.filter(t=>t.date===date);
        if(matchedTrades.length===1&&!matchedTrades[0].feeFromCash){
          feeUpdates.push({id:matchedTrades[0].id,fees:feeAmt,trade:matchedTrades[0]});
        }
      }
    }
    return{imported:0,skipped:0,merged:0,type:'cash',batch:[],merges:[],feeUpdates,balRows};
  }

  const batch=[],merges=[];let skipped=0;
  for(let i=1;i<lines.length;i++){
    const row=parseLine(lines[i]);if(row.length<4)continue;
    const rawSym=gc2(row,['symbol','instrument'])||'MES',base=getBase(rawSym);
    const sym=PRESETS[base]?base:(rawSym.toUpperCase().slice(0,6));
    const qty=parseInt(gc2(row,['qty','quantity','contracts','size','shares']))||1;
    const buyR=parseFloat(gc2(row,['buyprice','buy price'])),sellR=parseFloat(gc2(row,['sellprice','sell price']));
    const entR=parseFloat(gc2(row,['entryprice','entry price','avg entry','entry','open'])),extR=parseFloat(gc2(row,['exitprice','exit price','avg exit','exit','close']));
    let entry,exit,dir;
    if(!isNaN(buyR)&&!isNaN(sellR)&&buyR>0&&sellR>0){entry=buyR;exit=sellR;dir=buyR<=sellR?'LONG':'SHORT';}
    else if(!isNaN(entR)&&!isNaN(extR)&&entR>0&&extR>0){entry=entR;exit=extR;const ds=(gc2(row,['action','side','direction','type'])||'').toLowerCase();dir=ds.includes('buy')||ds.includes('long')?'LONG':'SHORT';}
    else continue;
    const dtR=gc2(row,['boughttimestamp','soldtimestamp','entrytime','entry time','entrydate','date','time']);
    const date=parseDate(dtR);if(!date)continue;
    const buyDT=parseDT(gc2(row,['boughttimestamp','entrytime','entry time'])),sellDT=parseDT(gc2(row,['soldtimestamp','exittime','exit time']));
    const durationMins=buyDT&&sellDT?Math.round(Math.abs(sellDT-buyDT)/60000):null;
    const entryTime=buyDT?buyDT.toTimeString().slice(0,5):null,exitTime=sellDT?sellDT.toTimeString().slice(0,5):null;
    // Fee: use CSV commission column if present, else use per-instrument fee
    // Fee detection — try many NT8 column name variants
    const feeRaw=parseFloat(gc2(row,[
      'commission','commissions','fee','fees','comm','comms',
      'brokerfee','roundtripfee','transactionfee','execfee',
      'totalcommission','fillcommission','tradingfee'
    ]));
    // Only fall back to default if column truly absent (NaN). Honor 0 fees.
    // If fee looks per-contract (very small), multiply by qty
    let fees=isNaN(feeRaw)?getFee(sym):feeRaw;
    if(!isNaN(feeRaw)&&feeRaw>0&&feeRaw<1&&qty>1) fees=feeRaw*qty; // per-contract detection
    const orderId=gc2(row,['orderid','order id','id','ordernum'])||'';
    const calc=tradeCalc(sym,dir,entry,exit,qty,fees);
    const existing=trades.find(t=>t.date===date&&t.symbol===sym&&Math.abs(t.entry-entry)<0.01&&t.size===qty);
    if(existing){
      const upd={},needsApproval={};
      if(durationMins&&!existing.durationMins)upd.durationMins=durationMins;
      if(entryTime&&!existing.entryTime)upd.entryTime=entryTime;
      if(exitTime&&!existing.exitTime)upd.exitTime=exitTime;
      if(orderId&&!existing.orderId)upd.orderId=orderId;
      // Fee override — if user manually set fee, require approval before changing
      if(!isNaN(feeRaw)&&feeRaw>0&&Math.abs((existing.fees||0)-feeRaw)>0.001){
        const newCalc=tradeCalc(sym,existing.type,existing.entry,existing.exit,existing.size,feeRaw);
        if(existing.feeFromCash||existing.feeFromCsv||existing.fees===getFee(sym)){
          // Auto-set fee — safe to override without approval
          upd.fees=feeRaw;upd.pnl=newCalc.pnl;upd.grossPnl=newCalc.grossPnl;upd.feeFromCsv=true;
        } else {
          // User may have manually set this — queue for approval
          needsApproval.fees={old:existing.fees,new:feeRaw,pnlOld:existing.pnl,pnlNew:newCalc.pnl,calc:newCalc};
        }
      }
      if(Object.keys(needsApproval).length>0){
        merges.push({id:existing.id,updates:upd,needsApproval,desc:Object.keys(upd).join(', ')||'none',trade:existing});
      } else if(Object.keys(upd).length>0){
        merges.push({id:existing.id,updates:upd,desc:Object.keys(upd).join(', ')});
      } else skipped++;
      continue;
    }
    batch.push({date,symbol:sym,type:dir,entry:+entry.toFixed(4),exit:+exit.toFixed(4),size:qty,fees,...calc,setup:'—',grade:'—',timeframe:'—',notes:'',chartUrl:'',orderId,durationMins,entryTime,exitTime,source:label||'Import',assetType:isFut(sym)?'futures':'stock'});
  }
  return{imported:batch.length,skipped,merged:merges.length,type,batch,merges,feeUpdates:[],balRows:[]};
}

async function commitImport(r,skipApproval){
  for(const t of r.batch)await addTrade(t);
  // Separate merges that need approval from safe ones
  const safeMerges=r.merges.filter(m=>!m.needsApproval||Object.keys(m.needsApproval).length===0);
  const approvalMerges=r.merges.filter(m=>m.needsApproval&&Object.keys(m.needsApproval).length>0);
  for(const m of safeMerges)await updateTrade(m.id,m.updates);
  // Queue approval merges (unless already approved)
  if(!skipApproval&&approvalMerges.length>0){
    pendingMerges=[...pendingMerges,...approvalMerges];
    setTimeout(showApprovalModal,200);
  } else if(skipApproval){
    for(const m of approvalMerges)await updateTrade(m.id,{...m.updates,...Object.fromEntries(Object.entries(m.needsApproval).map(([k,v])=>[k,v.new]))});
  }
  // Cash fee updates
  for(const f of r.feeUpdates){
    const t=f.trade;
    const newCalc=tradeCalc(t.symbol,t.type,t.entry,t.exit,t.size,f.fees);
    await updateTrade(f.id,{fees:f.fees,pnl:newCalc.pnl,grossPnl:newCalc.grossPnl,feeFromCash:true});
  }
  if(r.balRows&&r.balRows.length){balanceHistory=[...balanceHistory,...r.balRows].sort((a,b)=>a.date>b.date?1:-1);}
}

async function approveChange(idx){
  const m=pendingMerges[idx];if(!m)return;
  const upd={...m.updates};
  if(m.needsApproval.fees){const f=m.needsApproval.fees;upd.fees=f.new;upd.pnl=f.pnlNew;upd.grossPnl=f.calc.grossPnl;upd.feeFromCsv=true;}
  await updateTrade(m.id,upd);
  pendingMerges.splice(idx,1);
  if(!pendingMerges.length){const el2=document.getElementById('approval-modal');if(el2)el2.remove();}
  else showApprovalModal();
}
async function rejectChange(idx){pendingMerges.splice(idx,1);if(!pendingMerges.length){const el2=document.getElementById('approval-modal');if(el2)el2.remove();}else showApprovalModal();}
async function approveAllChanges(){const ms=[...pendingMerges];pendingMerges=[];document.getElementById('approval-modal')?.remove();for(const m of ms)await approveChange.call(null,-1)||updateTrade(m.id,{...m.updates,...(m.needsApproval.fees?{fees:m.needsApproval.fees.new,pnl:m.needsApproval.fees.pnlNew,grossPnl:m.needsApproval.fees.calc.grossPnl,feeFromCsv:true}:{})});}
function rejectAllChanges(){pendingMerges=[];document.getElementById('approval-modal')?.remove();}

function sparkline(data,color,w,h,showAxis){

  const min=Math.min(...data),max=Math.max(...data),range=max-min||1;
  const sx=i=>i/(data.length-1)*w,sy=v=>h*0.85-((v-min)/range*h*0.75);
  const path='M'+data.map((v,i)=>sx(i).toFixed(1)+','+sy(v).toFixed(1)).join('L');
  const fill='M'+sx(0)+','+h+' L'+data.map((v,i)=>sx(i).toFixed(1)+','+sy(v).toFixed(1)).join(' L')+' L'+sx(data.length-1)+','+h+' Z';
  let axis='';
  if(showAxis){
    const lastVal=data[data.length-1],curY=sy(lastVal);
    axis+=`<text x="${w-1}" y="${Math.max(8,curY-2)}" text-anchor="end" fill="${lastVal>=0?'#00e5a0':'#ff3d5a'}" font-size="8" font-family="JetBrains Mono,monospace">$${lastVal>=0?'+':''}${lastVal.toFixed(0)}</text>`;
    axis+=`<text x="1" y="9" text-anchor="start" fill="#505070" font-size="7" font-family="JetBrains Mono,monospace">$${max.toFixed(0)}</text>`;
    if(min<0)axis+=`<text x="1" y="${h-2}" text-anchor="start" fill="#505070" font-size="7" font-family="JetBrains Mono,monospace">$${min.toFixed(0)}</text>`;
  }
  return`<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}" style="display:block;overflow:visible"><defs><linearGradient id="sg${color.replace('#','')}" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="${color}" stop-opacity=".25"/><stop offset="100%" stop-color="${color}" stop-opacity="0"/></linearGradient></defs><path d="${fill}" fill="url(#sg${color.replace('#','')})"/><path d="${path}" stroke="${color}" stroke-width="1.5" fill="none"/>` +axis+'</svg>';
}
function svgLine(pts,color,W,H){
  if(!pts||pts.length<2)return'<p style="padding:20px;color:var(--text5);font-size:11px;text-align:center">Add at least 2 trades</p>';
  const PAD={t:12,r:22,b:30,l:62};const cw=W-PAD.l-PAD.r,ch=H-PAD.t-PAD.b;
  const ys=pts.map(p=>p.y),minY=Math.min(0,...ys),maxY=Math.max(0,...ys),rY=maxY-minY||1;
  const sx=i=>PAD.l+(i/(pts.length-1||1))*cw,sy=v=>PAD.t+ch-((v-minY)/rY)*ch,y0=sy(0);
  const path='M'+pts.map((p,i)=>sx(i).toFixed(1)+','+sy(p.y).toFixed(1)).join('L');
  const fill='M'+sx(0)+','+sy(pts[0].y)+' L'+pts.map((p,i)=>sx(i).toFixed(1)+','+sy(p.y).toFixed(1)).join(' L')+' L'+sx(pts.length-1)+','+y0+' L'+sx(0)+','+y0+' Z';

  let yg='',yt='';for(let i=0;i<=4;i++){const v=minY+rY*i/4,y=sy(v);yg+=`<line x1="${PAD.l}" y1="${y.toFixed(1)}" x2="${W-PAD.r}" y2="${y.toFixed(1)}" stroke="var(--text5)" stroke-dasharray="2,6"/>`;yt+=`<text x="${PAD.l-6}" y="${(y+4).toFixed(1)}" text-anchor="end" fill="var(--text3)" font-size="10" font-family="JetBrains Mono,monospace">$${v.toFixed(0)}</text>`;}

function svgBar(bars,W,H){if(!bars.length)return'';const PAD={t:10,r:20,b:28,l:65};const cw=W-PAD.l-PAD.r,ch=H-PAD.t-PAD.b;const vals=bars.map(b=>b.v),minY=Math.min(0,...vals),maxY=Math.max(0,...vals),rY=maxY-minY||1;const bw=Math.max(3,(cw/bars.length)-2),sy=v=>PAD.t+ch-((v-minY)/rY)*ch,y0=sy(0);let rects='',xl='';bars.forEach((b,i)=>{const x=PAD.l+(i/bars.length)*cw+(cw/bars.length-bw)/2,yv=sy(b.v);rects+=`<rect x="${x.toFixed(1)}" y="${(b.v>=0?yv:y0).toFixed(1)}" width="${bw.toFixed(1)}" height="${Math.max(1,Math.abs(yv-y0)).toFixed(1)}" fill="${b.v>=0?'#00e5a040':'#ff3d5a40'}" stroke="${b.v>=0?'#00e5a0':'#ff3d5a'}" stroke-width="1" rx="1"/>`;if(i%(Math.ceil(bars.length/8))===0)xl+=`<text x="${(x+bw/2).toFixed(1)}" y="${H-5}" text-anchor="middle" fill="var(--text3)" font-size="9" font-family="JetBrains Mono,monospace">${b.d}</text>`;});let yg='',yt='';for(let i=0;i<=4;i++){const v=minY+rY*i/4,y=sy(v);yg+=`<line x1="${PAD.l}" y1="${y.toFixed(1)}" x2="${W-PAD.r}" y2="${y.toFixed(1)}" stroke="var(--text5)" stroke-dasharray="2,6"/>`;yt+=`<text x="${PAD.l-6}" y="${(y+4).toFixed(1)}" text-anchor="end" fill="var(--text3)" font-size="10" font-family="JetBrains Mono,monospace">$${v.toFixed(0)}</text>`;}return`<svg width="100%" height="${H}" viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" style="display:block">${yg}<line x1="${PAD.l}" y1="${y0.toFixed(1)}" x2="${W-PAD.r}" y2="${y0.toFixed(1)}" stroke="var(--text4)"/>${rects}${yt}${xl}</svg>`;}
function svgXY(data,color,xFmt,W,H,refX){if(!data.length)return'';const PAD={t:16,r:65,b:30,l:65};const cw=W-PAD.l-PAD.r,ch=H-PAD.t-PAD.b;const xs=data.map(d=>d.x),ys=data.map(d=>d.y),minX=Math.min(...xs),maxX=Math.max(...xs),minY=Math.min(0,...ys),maxY=Math.max(0,...ys);const rX=maxX-minX||1,rY=maxY-minY||1,sx=v=>PAD.l+((v-minX)/rX)*cw,sy=v=>PAD.t+ch-((v-minY)/rY)*ch,y0=sy(0);const path='M'+data.map(d=>sx(d.x).toFixed(1)+','+sy(d.y).toFixed(1)).join('L');let yg='',yt='';for(let i=0;i<=4;i++){const v=minY+rY*i/4,y=sy(v);yg+=`<line x1="${PAD.l}" y1="${y.toFixed(1)}" x2="${W-PAD.r}" y2="${y.toFixed(1)}" stroke="var(--text5)" stroke-dasharray="2,6"/>`;yt+=`<text x="${PAD.l-6}" y="${(y+4).toFixed(1)}" text-anchor="end" fill="var(--text3)" font-size="10" font-family="JetBrains Mono,monospace">$${v.toFixed(0)}</text>`;}const xtS=Math.ceil(data.length/6);let xt='';data.forEach((d,i)=>{if(i%xtS===0)xt+=`<text x="${sx(d.x).toFixed(1)}" y="${H-5}" text-anchor="middle" fill="var(--text3)" font-size="10" font-family="JetBrains Mono,monospace">${xFmt?xFmt(d.x):d.x}</text>`;});const zero=`<line x1="${PAD.l}" y1="${y0.toFixed(1)}" x2="${W-PAD.r}" y2="${y0.toFixed(1)}" stroke="var(--text4)" stroke-dasharray="4,4"/>`;const you=refX!=null?`<line x1="${sx(refX).toFixed(1)}" y1="${PAD.t}" x2="${sx(refX).toFixed(1)}" y2="${PAD.t+ch}" stroke="${color}" stroke-dasharray="3,3" opacity=".4"/><text x="${sx(refX).toFixed(1)}" y="${PAD.t-3}" text-anchor="middle" fill="${color}" font-size="9">YOU</text>`:'';return`<svg width="100%" height="${H}" viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" style="display:block">${yg}${zero}${you}<path d="${path}" stroke="${color}" stroke-width="2.5" fill="none"/>` +yt+xt+'</svg>';}

// KPI card with tooltip + warning + sparkline
function kpiCard(label,val,sub,color,sparkData,sparkColor,big,showAxisOnSpark){
  const k=KPI_INFO[label];
  const numVal=typeof val==='number'?val:parseFloat(String(val).replace(/[^0-9.\-]/g,''));
  const wLevel=k&&k.warn?k.warn(numVal):null;
  const warnStripe=wLevel?`<div class="warn-stripe" style="background:${wLevel==='danger'?'var(--red)':'var(--yellow)'}"></div>`:'';
  const warnTxt=wLevel&&k?`<div class="${wLevel==='danger'?'danger-badge':'warn-badge'}">⚠ ${k.msg(numVal)}</div>`:'';
  const warnBorder=wLevel?`border-color:${wLevel==='danger'?'color-mix(in srgb,var(--red) 25%,transparent)':'color-mix(in srgb,var(--yellow) 25%,transparent)'};`:'';
  const tip=k?`<span class="tip-wrap" style="position:absolute;top:10px;right:10px"><i class="tip-icon">i</i><span class="tip-box" style="right:0;left:auto">${k.info}</span></span>`:'';
  const sc=sparkColor||color;
  const spark=sparkData&&sparkData.length>1?`<div style="position:absolute;bottom:0;left:0;right:0;height:${big?38:30}px">${sparkline(sparkData,sc,300,big?38:30,big&&showAxisOnSpark)}</div>`:'';
  const valStr=typeof val==='number'?fmt(val):val;
  return`<div class="${big?'card':'mini-card'}" style="padding-bottom:${big?46:36}px;${warnBorder}">${warnStripe}${tip}<div class="stat-lbl">${label}</div><div class="stat-val" style="font-size:${big?'clamp(20px,2.5vw,28px)':'clamp(16px,1.8vw,20px)'};color:${color}">${valStr}</div>${sub?`<div style="font-size:var(--fsxs);color:var(--text4);margin-top:3px">${sub}</div>`:''}${warnTxt}${spark}</div>`;
}

// ── AI Summary using Claude API ────────────────────────────────────
async function runAISummary(tds, period){
  const out=el('ai-output');
  if(!out)return;
  out.innerHTML='<div style="display:flex;align-items:center;gap:10px;color:var(--text3);font-size:var(--fsm)"><div class="spinner"></div>Analyzing your trades...</div>';

  const S2=calcStats(tds);
  if(!S2){out.innerHTML='<div style="color:var(--text4)">Not enough data.</div>';return;}

  // Build a compact stats summary for the prompt
  const summary={
    period, tradeCount:S2.total, winRate:pct(S2.wr),
    profitFactor:S2.pf>=99?'∞':S2.pf.toFixed(2),
    expectedValue:'$'+S2.ev.toFixed(2),
    netPnl:fmt(S2.net), grossPnl:fmt(S2.grossNet),
    totalFees:'$'+S2.totalFees.toFixed(2), feeDrag:S2.feeImpact.toFixed(1)+'%',
    avgWin:'+$'+S2.avgW.toFixed(2), avgLoss:'-$'+S2.avgL.toFixed(2),
    riskReward:S2.rr.toFixed(2)+'R', sharpe:S2.sharpe.toFixed(2),
    maxDrawdown:'-$'+S2.maxDD.toFixed(2), recovery:S2.recovery.toFixed(2)+'x',
    maxWinStreak:S2.maxWS, maxLossStreak:S2.maxLS,
    longWR:pct(S2.longWR), shortWR:pct(S2.shortWR),
    bestDay:S2.bestDay[0]+' $'+S2.bestDay[1].toFixed(2),
    worstDay:S2.worstDay[0]+' $'+S2.worstDay[1].toFixed(2),
    setupBreakdown:Object.entries(S2.setups).map(([k,v])=>`${k}: ${v.count} trades, ${(v.wins/v.count*100).toFixed(0)}% WR, ${fmt(v.pnl)}`).join('; '),
    gradeBreakdown:Object.entries(S2.byGrade).map(([k,v])=>`Grade ${k}: ${v.count} trades, ${fmt(v.pnl)}`).join('; '),
    recentTrades: tds.slice(-5).map(t=>`${t.date} ${t.symbol} ${t.type} ${t.size}x Entry:${t.entry} Exit:${t.exit} P&L:${fmt(t.pnl)} Grade:${t.grade||'—'} Setup:${t.setup||'—'}`).join('\n')
  };

  const prompt=`You are an expert futures trading coach reviewing a trader's performance data. Provide a concise, actionable analysis.

PERFORMANCE DATA (${period==='all'?'All time':period==='day'?'Last 24h':period==='week'?'Last 7 days':'Last 30 days'}):
${JSON.stringify(summary,null,2)}

Provide:
1. SUMMARY (2-3 sentences on overall performance)
2. STRENGTHS (1-2 things they're doing well)
3. CRITICAL WEAKNESS (the single most important thing holding them back, with specific numbers)
4. ACTION PLAN (3 concrete, specific steps to improve — be direct, not generic)
5. PATTERN ALERT (any concerning pattern in the recent trades listed)

Format with clear section headers. Be direct and specific. Use the actual numbers from their data. Keep total response under 300 words.`;

  try{
    const response=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:1000,
        messages:[{role:'user',content:prompt}]
      })
    });
    const data=await response.json();
    if(data.error){throw new Error(data.error.message);}
    const text=data.content?.find(b=>b.type==='text')?.text||'No response.';
    // Format the response
    const formatted=text
      .replace(/^#{1,3}\s+/gm,'')
      .replace(/\*\*(.*?)\*\*/g,'<span style="color:var(--text);font-weight:bold">$1</span>')
      .replace(/\n\n/g,'</p><p style="margin-top:10px">')
      .replace(/\n/g,'<br/>');
    out.innerHTML=`<div style="font-size:var(--fsm);color:var(--text2);line-height:1.9"><p>${formatted}</p></div>
      <div style="margin-top:12px;font-size:var(--fsxs);color:var(--text5);border-top:1px solid var(--border);padding-top:8px">Analysis by Claude · ${tds.length} trades analyzed · ${new Date().toLocaleTimeString()}</div>`;
  }catch(e){
    out.innerHTML=`<div style="color:var(--red);font-size:var(--fsm)">AI analysis failed: ${e.message}</div><div style="color:var(--text5);font-size:var(--fsxs);margin-top:8px">This feature requires an active internet connection and the Claude API to be available in your environment.</div>`;
  }
}

      </div>
    </div></div>`;

  [`${mid}_en`,`${mid}_ex`,`${mid}_sz`,`${mid}_fees`].forEach(id=>{const inp=el(id);if(inp)inp.oninput=upd;});

  el(`${mid}_save`).onclick=async()=>{

      await updateTrade(t.id,{type:tp,setup:el(`${mid}_s`).value,grade:el(`${mid}_g`).value,timeframe:el(`${mid}_tf`).value,orderId:el(`${mid}_oid`).value,fees:fe,entry:en,exit:ex,size:sz,grossPnl:calc.grossPnl,pnl:calc.pnl,durationMins:dur,entryTime:et||t.entryTime||null,exitTime:xt||t.exitTime||null,chartUrl:el(`${mid}_cu`).value,notes:el(`${mid}_no`).value});
      div.remove();
    }catch(e){alert('Save failed: '+e.message);btn.textContent='SAVE CHANGES';btn.disabled=false;}
  };
}

      </div>
      <div id="ai-output" style="padding:16px;min-height:80px">
        <div style="color:var(--text5);font-size:var(--fsm)">Select a time period above to get an AI-powered analysis of your trading performance, patterns, and actionable recommendations.</div>
      </div>
    </div>`;

    setTimeout(()=>{
      const aiBtn=(period)=>{
        const now=new Date(),cutoff=new Date();
        if(period==='day')cutoff.setDate(now.getDate()-1);
        else if(period==='week')cutoff.setDate(now.getDate()-7);
        else if(period==='month')cutoff.setMonth(now.getMonth()-1);
        else cutoff.setFullYear(2000);
        const cutStr=cutoff.toISOString().slice(0,10);
        const relevant=period==='all'?trades:trades.filter(t=>t.date>=cutStr);
        if(!relevant.length){if(el('ai-output'))el('ai-output').innerHTML='<div style="color:var(--text4);font-size:var(--fsm)">No trades in this period.</div>';return;}
        runAISummary(relevant,period);
      };
      if(el('ai-day'))el('ai-day').onclick=()=>aiBtn('day');
      if(el('ai-week'))el('ai-week').onclick=()=>aiBtn('week');
      if(el('ai-month'))el('ai-month').onclick=()=>aiBtn('month');
      if(el('ai-all'))el('ai-all').onclick=()=>aiBtn('all');
    },50);
  }

  // ══ IMPORT ══
  if(activeTab==='import'){
    content.innerHTML=`<div style="max-width:760px">
    <div class="sec-hd" style="margin-bottom:12px">IMPORT CENTER · v${VERSION} <span style="color:var(--text5)">Futures · Stocks · Cash History · Any CSV</span></div>

    <div style="background:var(--bg2);border:1px solid color-mix(in srgb,var(--yellow) 20%,transparent);padding:13px 16px;margin-bottom:12px">
      <div style="font-size:var(--fsxs);color:var(--yellow);letter-spacing:2px;margin-bottom:7px">⚡ ABOUT NINJATRADE REALTIME PULL</div>
      <div style="font-size:var(--fsm);color:var(--text3);line-height:1.9">NT8 has no public REST API for trade history. Three options:<br>
      <b style="color:var(--text2)">1. NinjaScript (Free)</b> — A strategy in NT8 auto-writes every fill to a CSV. Auto-Import reads it. <a href="#" id="ns-toggle" style="color:var(--blue)">Show code →</a><br>
      <b style="color:var(--text2)">2. CrossTrade (~$30/mo)</b> — REST API wrapper. <a href="https://crosstrade.io" target="_blank" style="color:var(--blue)">crosstrade.io</a><br>
      <b style="color:var(--text2)">3. Manual daily export + Auto-Import</b> — Export after session, Auto-Import handles the rest.</div>
      <pre id="ns-code" style="display:none;margin-top:12px;background:var(--bg);border:1px solid var(--border);padding:12px;font-size:10px;color:var(--text3);overflow-x:auto;white-space:pre;line-height:1.6">// EdgeLog NinjaScript — paste into NT8 as a Strategy
using System; using System.IO;
using NinjaTrader.NinjaScript.Strategies;
namespace NinjaTrader.NinjaScript.Strategies {
  public class EdgeLogExport : Strategy {
    string csv = @"C:\EdgeLog\trades.csv";
    protected override void OnStateChange() {
      if (State == State.SetDefaults) { Name = "EdgeLogExport"; }
      if (State == State.DataLoaded) {
        if (!Directory.Exists(@"C:\EdgeLog")) Directory.CreateDirectory(@"C:\EdgeLog");
        if (!File.Exists(csv)) File.WriteAllText(csv,
          "Symbol,BuyPrice,SellPrice,Qty,BoughtTimestamp,SoldTimestamp,Commission\n");
      }
    }
    protected override void OnExecutionUpdate(Execution ex, string id, double price,
      int qty, MarketPosition pos, string orderId, DateTime time) {
      if (ex.Order.OrderState != OrderState.Filled) return;
      File.AppendAllText(csv, string.Format("{0},{1},{2},{3},{4},{5},{6}\n",
        Instrument.FullName,
        pos == MarketPosition.Long ? price.ToString("F2") : "",
        pos == MarketPosition.Short ? price.ToString("F2") : "",
        qty,
        pos == MarketPosition.Long ? time.ToString("MM/dd/yyyy HH:mm:ss") : "",
        pos == MarketPosition.Short ? time.ToString("MM/dd/yyyy HH:mm:ss") : "",
        ex.Commission));
    }
  }
}</pre>
    </div>

    <div class="section" style="margin-bottom:10px">
      <div class="sec-hd">AUTO-IMPORT <span style="color:var(--yellow);font-size:var(--fsxs);margin-left:8px">Chrome/Edge only</span></div>
      <div style="padding:14px">
        <div style="font-size:var(--fsm);color:var(--text4);margin-bottom:10px;line-height:1.8">Select your NT8 export file once — Edge Log re-reads it automatically and imports new trades including merging in new data fields (timestamps, fees, order IDs).</div>
        <div style="display:flex;gap:9px;align-items:center;flex-wrap:wrap;margin-bottom:9px">
          <button class="btn-y" id="auto-start-btn" style="display:${autoHandle?'none':'inline-block'}">📂 SELECT FILE FOR AUTO-SYNC</button>
          <button class="btn-r" id="auto-stop-btn" style="display:${autoHandle?'inline-block':'none'}">■ STOP</button>
          <label class="lbl" style="margin:0">EVERY</label>
          <input id="auto-interval" type="number" value="${autoInterval}" min="10" style="width:65px"/>
          <span style="font-size:var(--fsm);color:var(--text4)">sec</span>
        </div>
        <div id="auto-status" style="display:${autoHandle?'flex':'none'};align-items:center;gap:8px;font-size:var(--fsm);color:var(--text3);background:var(--bg3);padding:9px 13px;border:1px solid var(--border2)">
          <span class="pulse-y"></span><span id="auto-last">Waiting...</span>
        </div>
      </div>
    </div>

    <div class="section" style="margin-bottom:10px">
      <div class="sec-hd">MANUAL IMPORT — DROP MULTIPLE FILES</div>
      <div style="padding:14px">
        <div style="font-size:var(--fsxs);color:var(--text5);margin-bottom:10px;line-height:1.9">Fees are overridden in priority order: <span style="color:var(--yellow)">Cash History CSV</span> → <span style="color:var(--text2)">Performance CSV commission column</span> → <span style="color:var(--text3)">per-instrument Settings</span> → global default</div>
        <div class="drop-zone" id="drop-zone">
          <div style="font-size:32px;margin-bottom:8px">📂</div>
          <div style="font-size:var(--fsm);color:var(--text3)">DROP CSV(S) HERE or CLICK TO BROWSE</div>
          <div style="font-size:var(--fsxs);color:var(--text5);margin-top:8px;line-height:2">✓ NT8 Performance · ✓ Fills · ✓ Cash History · ✓ Account Balance · ✓ Stocks · ✓ Multiple files</div>
          <input type="file" id="csv-input" accept=".csv" multiple style="display:none"/>
        </div>
        <div id="import-result" style="display:none;margin-top:9px;padding:12px 14px;background:var(--bg3);border:1px solid var(--border2);font-size:var(--fsm);color:var(--text3)"></div>
      </div>
    </div>
    </div>`;

    setTimeout(()=>{
      const ai=el('auto-interval');if(ai)ai.onchange=()=>{autoInterval=parseInt(ai.value)||60;};
      if(el('auto-start-btn'))el('auto-start-btn').onclick=startAutoImport;
      if(el('auto-stop-btn'))el('auto-stop-btn').onclick=stopAutoImport;
      const nst=el('ns-toggle');if(nst)nst.onclick=e=>{e.preventDefault();const nsc=el('ns-code');if(nsc)nsc.style.display=nsc.style.display==='none'?'block':'none';};
      const dz=el('drop-zone'),ci=el('csv-input');if(!dz||!ci)return;
      const handle=async files=>{
        let tot=0,totS=0,totM=0,totF=0;const results=[];
        for(const f of files){const text=await f.text(),r=importCSV(text,f.name);await commitImport(r);results.push({name:f.name,type:r.type,imported:r.imported,skipped:r.skipped,merged:r.merged,merges:r.merges,feeUpdates:r.feeUpdates,balRows:r.balRows});tot+=r.imported;totS+=r.skipped;totM+=r.merged;totF+=(r.feeUpdates||[]).length;}
        const rd=el('import-result');
        if(rd){rd.style.display='block';
          rd.innerHTML=`<div style="color:var(--green);margin-bottom:9px">✅ DONE · ${tot} added · ${totM} merged${totF>0?' · '+totF+' fee updates':''}${totS>0?' · '+totS+' dupes':''}</div>
          <div style="font-size:var(--fsxs);color:var(--text5);margin-bottom:8px">Fee priority: Cash History > CSV commission column > per-instrument settings (${JSON.stringify(Object.fromEntries(Object.entries(instrumentFees).slice(0,4)))}...)</div>`+
            results.map(r=>{
              const md=r.merges?.length?`<div style="margin-top:4px;padding:5px 10px;background:var(--bg2);font-size:var(--fsxs);color:var(--text4)">Merged into ${r.merges.length} trade(s): <span style="color:var(--yellow)">${[...new Set(r.merges.flatMap(m=>m.desc.split(', ')))].join(', ')}</span></div>`:'';
              const fd2=r.feeUpdates?.length?`<div style="margin-top:4px;padding:5px 10px;background:var(--bg2);font-size:var(--fsxs);color:var(--yellow)">Updated fees on ${r.feeUpdates.length} trade(s) from cash history</div>`:'';
              const bd=r.balRows?.length?`<div style="margin-top:4px;padding:5px 10px;background:var(--bg2);font-size:var(--fsxs);color:var(--blue)">${r.balRows.length} balance history entries loaded</div>`:'';
              return`<div style="border-top:1px solid var(--border);padding:5px 0"><div style="display:flex;gap:12px;flex-wrap:wrap"><span style="color:var(--text3)">${r.name}</span><span class="tag">${r.type}</span>${r.imported?`<span style="color:var(--green)">+${r.imported}</span>`:''} ${r.merged?`<span style="color:var(--yellow)">~${r.merged}</span>`:''} ${r.skipped?`<span style="color:var(--text5)">${r.skipped} dupe</span>`:''}</div>${md}${fd2}${bd}</div>`;
            }).join('');}
        if(tot>0)setTimeout(()=>{activeTab='journal';renderApp();},1800);
      };
      dz.onclick=()=>ci.click();dz.ondragover=e=>{e.preventDefault();dz.classList.add('drag');};dz.ondragleave=()=>dz.classList.remove('drag');
      dz.ondrop=e=>{e.preventDefault();dz.classList.remove('drag');handle([...e.dataTransfer.files]);};
      ci.onchange=e=>{if(e.target.files.length)handle([...e.target.files]);};
    },50);
  }

  // ══ SETTINGS ══
  if(activeTab==='settings'){
    const themes=[{id:'dark',color:'#00e5a0',label:'Dark'},{id:'ocean',color:'#00d4ff',label:'Ocean'},{id:'carbon',color:'#00e060',label:'Carbon'},{id:'terminal',color:'#00ff80',label:'Terminal'}];
    content.innerHTML=`<div style="max-width:760px">
    <div style="font-size:var(--fsxs);color:var(--text4);letter-spacing:2px;margin-bottom:14px">SETTINGS · v${VERSION}</div>

    <!-- THEME + DENSITY -->
    <div class="section" style="margin-bottom:12px">
      <div class="sec-hd">APPEARANCE</div>
      <div style="padding:14px;display:flex;gap:28px;flex-wrap:wrap">
        <div>
          <div class="lbl" style="margin-bottom:8px">THEME</div>
          <div style="display:flex;gap:12px;align-items:center">
            ${themes.map(t=>`<div style="display:flex;flex-direction:column;align-items:center;gap:5px;cursor:pointer" onclick="savePref('theme','${t.id}');applyTheme();renderApp()">
              <div class="theme-dot ${prefs.theme===t.id||(!prefs.theme&&t.id==='dark')?'active':''}" style="background:${t.color}"></div>
              <span style="font-size:var(--fsxs);color:var(--text4)">${t.label}</span>
            </div>`).join('')}
          </div>
        </div>
        <div>
          <div class="lbl" style="margin-bottom:8px">DENSITY</div>
          <div class="toggle-pill">
            <button class="${prefs.density==='compact'?'on':''}" onclick="savePref('density','compact');applyTheme();renderApp()">COMPACT</button>
            <button class="${!prefs.density||prefs.density==='normal'?'on':''}" onclick="savePref('density','normal');applyTheme();renderApp()">NORMAL</button>
            <button class="${prefs.density==='large'?'on':''}" onclick="savePref('density','large');applyTheme();renderApp()">LARGE</button>
          </div>
        </div>
      </div>
    </div>

    <!-- CUSTOM SETUPS -->
    <div class="section" style="margin-bottom:12px">
      <div class="sec-hd">CUSTOM SETUP TYPES</div>
      <div style="padding:14px">
        <div style="font-size:var(--fsm);color:var(--text4);margin-bottom:10px;line-height:1.8">Add your own trade setup labels (EBU, CBU, ENGU, HOD, etc.). These replace the default list in the journal and analytics.</div>
        <div id="setups-list" style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px">
          ${customSetups.map((s,i)=>`<div style="display:flex;align-items:center;gap:0;background:var(--bg2);border:1px solid var(--border)"><span style="padding:4px 10px;font-size:var(--fsm);color:var(--text2)">${s}</span>${s!=='—'?`<button onclick="removeSetup(${i})" style="background:none;border:none;color:var(--text5);padding:4px 7px;cursor:pointer;font-size:12px">✕</button>`:''}</div>`).join('')}
        </div>
        <div style="display:flex;gap:8px">
          <input id="new-setup" placeholder="Add setup type (e.g. EBU, CBU, HOD...)" style="max-width:260px"/>
          <button class="btn-g" id="add-setup-btn">ADD</button>
          <button class="btn-d" id="reset-setups-btn">RESET DEFAULTS</button>
        </div>
      </div>
    </div>

    <!-- PER-INSTRUMENT FEES -->
    <div class="section" style="margin-bottom:12px">
      <div class="sec-hd">PER-INSTRUMENT ROUND-TRIP FEES ($)</div>
      <div style="padding:14px">
        <div style="font-size:var(--fsm);color:var(--text4);margin-bottom:12px;line-height:1.8">Set your actual round-trip commission per contract. Overrides the default fee when adding or importing trades. Cash History CSV takes highest priority when available.</div>
        <div style="display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-bottom:12px">
          ${Object.keys(PRESETS).map(sym=>`<div style="background:var(--bg3);border:1px solid var(--border2);padding:8px 10px"><label class="lbl">${sym}</label><input type="number" step="0.01" min="0" id="fee_${sym}" value="${getFee(sym)}" style="color:var(--yellow)"/></div>`).join('')}
        </div>
        <div style="display:flex;gap:8px">
          <button class="btn-g" id="save-fees">SAVE FEES</button>
          <button class="btn-d" id="reset-fees">RESET DEFAULTS</button>
        </div>
        <div id="fees-saved" style="display:none;color:var(--green);font-size:var(--fsm);margin-top:8px">✓ Saved successfully</div>
      </div>
    </div>

    <!-- LOGO -->
    <div class="section">
      <div class="sec-hd">LOGO</div>
      <div style="padding:14px;display:flex;gap:12px;align-items:center;flex-wrap:wrap">
        ${userLogo?`<img src="${userLogo}" style="height:48px;max-width:130px;object-fit:contain;border:1px solid var(--border)"/>`:'<div style="color:var(--text5);font-size:var(--fsm)">No logo — appears in tab and top bar</div>'}
        <label class="btn-b" style="cursor:pointer">UPLOAD LOGO<input type="file" accept="image/*" id="logo-upload2" style="display:none"/></label>
        ${userLogo?'<button class="btn-r" id="rm-logo">REMOVE</button>':''}
      </div>
    </div>
    </div>`;

    setTimeout(()=>{
      if(el('add-setup-btn'))el('add-setup-btn').onclick=()=>{const v=(el('new-setup')?.value||'').trim();if(!v)return;if(!customSetups.includes(v)){customSetups.push(v);localStorage.setItem('el_setups',JSON.stringify(customSetups));el('new-setup').value='';renderApp();}};
      if(el('new-setup'))el('new-setup').onkeydown=e=>{if(e.key==='Enter')el('add-setup-btn').click();};
      if(el('reset-setups-btn'))el('reset-setups-btn').onclick=()=>{customSetups=[...DEFAULT_SETUPS];localStorage.setItem('el_setups',JSON.stringify(customSetups));renderApp();};
      if(el('save-fees'))el('save-fees').onclick=()=>{Object.keys(PRESETS).forEach(sym=>{const i=el('fee_'+sym);if(i)instrumentFees[sym]=parseFloat(i.value)||DEFAULT_FEES[sym];});localStorage.setItem('el_fees',JSON.stringify(instrumentFees));const s=el('fees-saved');if(s){s.style.display='block';setTimeout(()=>s.style.display='none',2000);}};
      if(el('reset-fees'))el('reset-fees').onclick=()=>{instrumentFees={...DEFAULT_FEES};localStorage.setItem('el_fees',JSON.stringify(instrumentFees));renderApp();};
      const lu2=el('logo-upload2');if(lu2)lu2.onchange=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{userLogo=ev.target.result;localStorage.setItem('el_logo',userLogo);updateFavicon();renderApp();};r.readAsDataURL(f);};
      if(el('rm-logo'))el('rm-logo').onclick=()=>{userLogo=null;localStorage.removeItem('el_logo');updateFavicon();renderApp();};
    },50);
  }

  // ══ EXPORT ══
  if(activeTab==='export'){
    content.innerHTML=`<div style="max-width:540px">
      <div style="background:var(--bg3);border:1px solid var(--border2);padding:11px 14px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center">
        <span style="font-size:var(--fsxs);color:var(--text4);letter-spacing:1px">CLOUD SYNC · v${VERSION}</span>
        <span style="color:var(--green);font-size:var(--fsxs);display:flex;align-items:center;gap:5px"><span class="pulse"></span>LIVE · ${trades.length} TRADES</span>
      </div>
      <div class="section" style="margin-bottom:10px">
        <div class="sec-hd">EXPORT</div>
        <div style="padding:11px">
          <div style="display:flex;justify-content:space-between;align-items:center;background:var(--bg3);padding:11px 13px">
            <div><div style="font-size:var(--fsm);color:var(--text);margin-bottom:2px">CSV Export</div><div style="font-size:var(--fsxs);color:var(--text4)">All fields incl. gross/net P&L, duration, timeframe, order ID, grade, source</div></div>
            <button class="btn-g" id="exp-csv" ${!trades.length?'disabled':''}>DOWNLOAD</button>
          </div>
        </div>
      </div>
      ${trades.length?`<div style="border:1px solid color-mix(in srgb,var(--red) 20%,transparent)">
        <div style="background:color-mix(in srgb,var(--red) 8%,transparent);padding:9px 14px;border-bottom:1px solid color-mix(in srgb,var(--red) 20%,transparent);font-size:var(--fsxs);letter-spacing:2px;color:var(--red)">DANGER ZONE</div>
        <div style="padding:13px;display:flex;justify-content:space-between;align-items:center">
          <div style="font-size:var(--fsm);color:var(--text4)">Delete all ${trades.length} trades from cloud.</div>
          <button class="btn-r" id="clr-all">CLEAR ALL</button>
        </div></div>`:''}
    </div>`;
    setTimeout(()=>{
      if(el('exp-csv'))el('exp-csv').onclick=exportCSV;
      if(el('clr-all'))el('clr-all').onclick=async()=>{if(!confirm(`Delete ALL ${trades.length} trades? Cannot be undone.`))return;const snap=await colRef.get();const b=db.batch();snap.docs.forEach(d=>b.delete(d.ref));await b.commit();};
    },50);
  }
}

function removeSetup(idx){
  if(customSetups[idx]==='—')return;
  customSetups.splice(idx,1);
  localStorage.setItem('el_setups',JSON.stringify(customSetups));
  renderApp();
}

// Boot
if(!initFB())document.getElementById('app').innerHTML='<div style="color:var(--red);padding:40px;text-align:center">Firebase failed to initialize.</div>';
else auth.onAuthStateChanged(user=>{if(user){currentUser=user;subscribeAll(currentUser.uid);}else renderAuth();});
</script>
</body>
</html>
