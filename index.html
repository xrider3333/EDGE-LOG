// ── Bell curve / P&L distribution histogram ──────────────────────
function svgBellCurve(pnls, W, H){
  if(!pnls||pnls.length<3)return'<p style="color:var(--text5);font-size:11px;padding:20px;text-align:center">Need at least 3 trades</p>';
  const mean=pnls.reduce((a,b)=>a+b,0)/pnls.length;
  const std=Math.sqrt(pnls.reduce((s,v)=>s+(v-mean)**2,0)/pnls.length)||1;
  // Build histogram
  const bins=Math.max(8,Math.min(20,Math.floor(pnls.length/2)));
  const minV=Math.min(...pnls),maxV=Math.max(...pnls),range=maxV-minV||1;
  const binW=range/bins;
  const counts=Array(bins).fill(0);
  pnls.forEach(v=>{let b=Math.floor((v-minV)/binW);if(b>=bins)b=bins-1;counts[b]++;});
  const maxCount=Math.max(...counts,1);
  const PAD={t:16,r:20,b:36,l:50};
  const cw=W-PAD.l-PAD.r,ch=H-PAD.t-PAD.b;
  const bw=cw/bins;
  // Bars
  let bars='',xLabels='';
  counts.forEach((cnt,i)=>{
    const barH=(cnt/maxCount)*ch;
    const x=PAD.l+i*bw;
    const y=PAD.t+ch-barH;
    const binCenter=minV+(i+0.5)*binW;
    const isWin=binCenter>=0;
    bars+=`<rect x="${(x+1).toFixed(1)}" y="${y.toFixed(1)}" width="${(bw-2).toFixed(1)}" height="${barH.toFixed(1)}" fill="${isWin?'#00e5a040':'#ff3d5a40'}" stroke="${isWin?'#00e5a0':'#ff3d5a'}" stroke-width="1" rx="1"/>`;
    bars+=`<text x="${(x+bw/2).toFixed(1)}" y="${(y-3).toFixed(1)}" text-anchor="middle" fill="${isWin?'#00e5a0':'#ff3d5a'}" font-size="8" font-family="JetBrains Mono,monospace" opacity="${cnt>0?'1':'0'}">${cnt}</text>`;
    if(i%(Math.ceil(bins/6))===0){
      xLabels+=`<text x="${(x+bw/2).toFixed(1)}" y="${H-8}" text-anchor="middle" fill="var(--text3)" font-size="9" font-family="JetBrains Mono,monospace">$${binCenter.toFixed(0)}</text>`;
    }
  });
  // Normal curve overlay
  const normalY=x=>{const z=(x-mean)/std;return Math.exp(-0.5*z*z)/(std*Math.sqrt(2*Math.PI));};
  const normalMax=normalY(mean);
  const normalPts=Array.from({length:80},(_,i)=>{
    const v=minV+(i/79)*range;
    const nx=PAD.l+(v-minV)/range*cw;
    const ny=PAD.t+ch-(normalY(v)/normalMax)*ch*0.9;
    return`${nx.toFixed(1)},${ny.toFixed(1)}`;
  });
  const curve=`<polyline points="${normalPts.join(' ')}" fill="none" stroke="var(--yellow)" stroke-width="1.5" opacity=".7"/>`;
  // Mean and std dev lines
  const meanX=PAD.l+(mean-minV)/range*cw;
  const std1X_pos=PAD.l+(mean+std-minV)/range*cw;
  const std1X_neg=PAD.l+(mean-std-minV)/range*cw;
  const meanLine=`<line x1="${meanX.toFixed(1)}" y1="${PAD.t}" x2="${meanX.toFixed(1)}" y2="${PAD.t+ch}" stroke="var(--yellow)" stroke-width="1.5" stroke-dasharray="4,3"/><text x="${meanX.toFixed(1)}" y="${PAD.t-3}" text-anchor="middle" fill="var(--yellow)" font-size="8" font-family="JetBrains Mono,monospace">μ $${mean.toFixed(0)}</text>`;
  const stdLines=`<line x1="${std1X_pos.toFixed(1)}" y1="${PAD.t}" x2="${std1X_pos.toFixed(1)}" y2="${PAD.t+ch}" stroke="var(--text4)" stroke-width="1" stroke-dasharray="3,4"/><line x1="${std1X_neg.toFixed(1)}" y1="${PAD.t}" x2="${std1X_neg.toFixed(1)}" y2="${PAD.t+ch}" stroke="var(--text4)" stroke-width="1" stroke-dasharray="3,4"/><text x="${std1X_pos.toFixed(1)}" y="${PAD.t-3}" text-anchor="middle" fill="var(--text4)" font-size="7" font-family="JetBrains Mono,monospace">+1σ</text><text x="${std1X_neg.toFixed(1)}" y="${PAD.t-3}" text-anchor="middle" fill="var(--text4)" font-size="7" font-family="JetBrains Mono,monospace">-1σ</text>`;
  // Y axis
  let yaxis='';
  for(let i=0;i<=4;i++){
    const cnt=Math.round(maxCount*i/4);
    const y=PAD.t+ch-(cnt/maxCount)*ch;
    yaxis+=`<text x="${PAD.l-6}" y="${y+4}" text-anchor="end" fill="var(--text3)" font-size="9" font-family="JetBrains Mono,monospace">${cnt}</text>`;
    if(i>0&&i<4)yaxis+=`<line x1="${PAD.l}" y1="${y.toFixed(1)}" x2="${W-PAD.r}" y2="${y.toFixed(1)}" stroke="var(--text5)" stroke-dasharray="2,6"/>`;
  }
  const zeroX=PAD.l+(0-minV)/range*cw;
  const zeroLine=minV<0&&maxV>0?`<line x1="${zeroX.toFixed(1)}" y1="${PAD.t}" x2="${zeroX.toFixed(1)}" y2="${PAD.t+ch}" stroke="var(--text4)" stroke-dasharray="4,4"/>
    <text x="${zeroX.toFixed(1)}" y="${H-8}" text-anchor="middle" fill="var(--text4)" font-size="9">$0</text>`:'';
  return`<svg width="100%" height="${H}" viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" style="display:block">${yaxis}${bars}${curve}${zeroLine}${meanLine}${stdLines}${xLabels}</svg>`;
}

  const rows=trades.map(t=>`${t.date},${t.symbol},${t.assetType||'futures'},${t.type},"${t.timeframe||'—'}","${t.orderId||''}",${t.entry},${t.exit},${t.size},${t.fees||0},${(t.grossPnl||t.pnl).toFixed(2)},${t.pnl},"${fmtDur(t.durationMins)}","${t.grade||'—'}","${t.setup||'—'}","${(t.notes||'').replace(/"/g,"'")}","${t.chartUrl||''}","${t.source||''}"`).join('\n');
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([h+rows],{type:'text/csv'}));a.download=`edgelog_v${VERSION}_${new Date().toISOString().slice(0,10)}.csv`;a.click();
}
function applyFilters(tds){return tds.filter(t=>{if(filters.sym&&!t.symbol.toLowerCase().includes(filters.sym.toLowerCase()))return false;if(filters.dir&&t.type!==filters.dir)return false;if(filters.grade&&filters.grade!=='—'&&(t.grade||'—')!==filters.grade)return false;if(filters.setup&&filters.setup!=='—'&&(t.setup||'—')!==filters.setup)return false;if(filters.tf&&filters.tf!=='—'&&(t.timeframe||'—')!==filters.tf)return false;if(filters.dateFrom&&t.date<filters.dateFrom)return false;if(filters.dateTo&&t.date>filters.dateTo)return false;if(filters.minPnl!==''&&t.pnl<parseFloat(filters.minPnl))return false;if(filters.maxPnl!==''&&t.pnl>parseFloat(filters.maxPnl))return false;return true;});}
function clearFilters(){filters={sym:'',dir:'',grade:'',setup:'',tf:'',dateFrom:'',dateTo:'',minPnl:'',maxPnl:''};renderApp();}
async function saveInlineField(inp){
  const field=inp.dataset.field,id=inp.dataset.id,val=inp.value;
  if(!id||!field)return;
  inp.style.opacity='.5';
  try{await updateTrade(id,{[field]:val});}catch(e){console.error(e);}
  inp.style.opacity='1';
}
async function revertImport(histIdx){
  const entry=uploadHistory[histIdx];
  if(!entry||!entry.tradeIds||!entry.tradeIds.length){alert('No tracked trade IDs for this import. Clear all and re-import to fix.');return;}
  if(!confirm('Delete '+entry.tradeIds.length+' trades from "'+entry.label+'"?'))return;
  for(const id of entry.tradeIds){try{await colRef.doc(id).delete();}catch(e){}}
  uploadHistory.splice(histIdx,1);
  localStorage.setItem('el_uploads',JSON.stringify(uploadHistory));
  renderApp();
}
function addLedgerEvent(){
  const dateStr=prompt('Date of deposit/withdrawal (YYYY-MM-DD):',new Date().toISOString().slice(0,10));
  if(!dateStr)return;
  const amtStr=prompt('Amount (negative for withdrawal):','1000');
  if(!amtStr)return;
  const amount=parseFloat(amtStr);
  if(isNaN(amount)||amount===0){alert('Invalid amount');return;}
  const desc=prompt('Description (optional):','Manual deposit')||'Manual';
  ledgerEvents.push({date:dateStr,amount,type:amount>0?'DEPOSIT':'WITHDRAWAL',desc});
  ledgerEvents.sort((a,b)=>a.date>b.date?1:-1);
  localStorage.setItem('el_ledger',JSON.stringify(ledgerEvents));
  // Also adjust accountEquity if deposit (cumulative)
  if(amount>0&&accountEquity>0){accountEquity+=amount;localStorage.setItem('el_equity',accountEquity);}
  renderApp();
}
function removeLedgerEvent(idx){
  if(!confirm('Remove this ledger entry?'))return;
  const ev=ledgerEvents[idx];
  if(ev&&ev.amount>0&&accountEquity>0)accountEquity-=ev.amount;
  ledgerEvents.splice(idx,1);
  localStorage.setItem('el_ledger',JSON.stringify(ledgerEvents));
  localStorage.setItem('el_equity',accountEquity);
  renderApp();
}
function removeCustomTag(idx){customTags.splice(idx,1);localStorage.setItem('el_tags',JSON.stringify(customTags));renderApp();}
function setSortCol(col){if(sortCol===col)sortDir*=-1;else{sortCol=col;sortDir=col==='date'?-1:-1;}renderApp();}

(function(){
  let previewEl=null;
  function showPreview(url,x,y){
    if(!previewEl){
      previewEl=document.createElement('div');
      previewEl.style.cssText='position:fixed;z-index:9999;background:var(--bg1);border:1px solid var(--border);border-radius:10px;padding:8px;box-shadow:0 8px 32px rgba(0,0,0,0.5);pointer-events:none;transition:opacity 0.15s;opacity:0';

    }
    // Detect if URL is an image or a webpage we can iframe/embed
    const isImage=/\.(png|jpg|jpeg|gif|webp|bmp)(\?|$)/i.test(url);
    const isTradingView=/tradingview\.com\/x\//.test(url);
    let content='';
    if(isImage){
      content=`<img src="${url}" style="max-width:720px;max-height:480px;display:block;border-radius:6px" onerror="this.parentElement.innerHTML='<div style=\\'padding:20px;color:var(--text5);font-size:11px\\'>Preview unavailable</div>'"/>`;
    } else if(isTradingView){
      // TradingView /x/ URLs are snapshot URLs; convert to .png snapshot
      const snapId=url.match(/\/x\/([\w]+)/);
      if(snapId){
        const imgUrl=`https://s3.tradingview.com/snapshots/${snapId[1].toLowerCase().substring(0,1)}/${snapId[1]}.png`;
        content=`<img src="${imgUrl}" style="max-width:720px;max-height:480px;display:block;border-radius:6px" onerror="this.parentElement.innerHTML='<div style=\\'padding:20px;color:var(--text5);font-size:11px\\'>TradingView snapshot — click to view</div>'"/>`;
      } else {
        content='<div style="padding:20px;color:var(--text5);font-size:11px;max-width:300px">Chart link — click to open</div>';
      }
    } else {
      content='<div style="padding:14px;color:var(--text4);font-size:11px;max-width:300px">'+url.substring(0,80)+(url.length>80?'...':'')+'</div>';
    }
    previewEl.innerHTML=content;
    // Position
    let left=x+12,top=y-50;
    if(left+500>window.innerWidth)left=x-500;
    if(top<10)top=y+20;
    previewEl.style.left=left+'px';
    previewEl.style.top=top+'px';
    previewEl.style.opacity='1';
  }
  function hidePreview(){
    if(previewEl)previewEl.style.opacity='0';
  }
  // Delegate hover events
  document.addEventListener('mouseover',(e)=>{
    const link=e.target.closest('.chart-link');
    if(link&&link.dataset.url){
      showPreview(link.dataset.url,e.clientX,e.clientY);
    }
  });
  document.addEventListener('mouseout',(e)=>{
    if(e.target.closest('.chart-link'))hidePreview();
  });
  document.addEventListener('mousemove',(e)=>{
    if(previewEl&&previewEl.style.opacity==='1'){
      let left=e.clientX+12,top=e.clientY-50;
      if(left+500>window.innerWidth)left=e.clientX-500;
      if(top<10)top=e.clientY+20;
      previewEl.style.left=left+'px';
      previewEl.style.top=top+'px';
    }
  });
})();


// SPY data cache + real fetcher
let _spyCache={};
async function fetchSPYData(startDate,endDate){
  const key=startDate+'_'+endDate;
  if(_spyCache[key])return _spyCache[key];
  try{
    const p1=Math.floor(new Date(startDate).getTime()/1000);
    const p2=Math.floor(new Date(endDate).getTime()/1000)+86400;
    const url=`https://query1.finance.yahoo.com/v8/finance/chart/SPY?period1=${p1}&period2=${p2}&interval=1d`;
    const res=await fetch(url);
    if(!res.ok)throw new Error('SPY fetch failed: '+res.status);
    const j=await res.json();
    const r=j?.chart?.result?.[0];
    if(!r)throw new Error('No result');
    const ts=r.timestamp||[];
    const closes=r.indicators?.quote?.[0]?.close||[];
    const data={};
    ts.forEach((t,i)=>{
      const dt=new Date(t*1000).toISOString().slice(0,10);
      if(closes[i]!=null)data[dt]=closes[i];
    });
    _spyCache[key]=data;
    return data;
  }catch(e){
    console.warn('SPY fetch failed, using approximation:',e.message);
    return null;
  }
}
// Calculate SPY return % between two dates using real data (if cached) or approx
function spyReturnReal(startDate,endDate,spyData){
  if(!spyData)return spyReturnBetweenDates(startDate,endDate);
  // Find closest available SPY prices
  const dates=Object.keys(spyData).sort();
  if(!dates.length)return spyReturnBetweenDates(startDate,endDate);
  const sIdx=dates.findIndex(d=>d>=startDate);
  const eIdx=dates.findIndex(d=>d>=endDate);
  const sPx=spyData[dates[sIdx<0?0:sIdx]];
  const ePx=spyData[dates[eIdx<0?dates.length-1:eIdx]];
  if(!sPx||!ePx)return 0;
  return (ePx-sPx)/sPx;
}
// Trigger SPY fetch when overlay enabled and we have trades
function ensureSPYData(){
  if(!spyOverlay||!trades.length)return;
  const startD=trades[0].date,endD=trades[trades.length-1].date;
  const key=startD+'_'+endD;
  if(_spyCache[key]||_spyCache._loading===key)return;
  _spyCache._loading=key;
  fetchSPYData(startD,endD).then(d=>{
    _spyCache._loading=null;
    if(d)renderApp(); // re-render with real data
  });
}

// SPY % return calculator — uses approximate annual returns as baseline
// For accurate per-trade comparison, we'd need a real API; this provides reasonable approximation
const SPY_ANNUAL_RETURNS={2020:0.184,2021:0.287,2022:-0.181,2023:0.262,2024:0.245,2025:0.13,2026:0.08};
function spyReturnBetweenDates(startDate,endDate){
  if(!startDate||!endDate)return 0;
  const s=new Date(startDate),e=new Date(endDate);
  if(s>=e)return 0;
  const daysBetween=(e-s)/(1000*60*60*24);
  let cumReturn=1;
  let cur=new Date(s);
  while(cur<e){
    const yr=cur.getFullYear();
    const annualR=SPY_ANNUAL_RETURNS[yr]||0.10;
    const yearEnd=new Date(yr+1,0,1);
    const periodEnd=yearEnd<e?yearEnd:e;
    const daysInPeriod=(periodEnd-cur)/(1000*60*60*24);
    const dailyR=Math.pow(1+annualR,1/365)-1;
    cumReturn*=Math.pow(1+dailyR,daysInPeriod);
    cur=periodEnd;
  }
  return cumReturn-1;
}
// Build SPY return curve at each trade's date (% from start)
function buildSPYCurve(trades,startDate){
  if(!trades.length||!startDate)return [];
  return trades.map(t=>spyReturnBetweenDates(startDate,t.date)*100);
}
// Account % return at each trade
function buildAcctPctCurve(trades,startBalance){
  if(!trades.length||!startBalance)return [];
  let bal=startBalance;
  return trades.map(t=>{bal+=t.pnl;return((bal-startBalance)/startBalance)*100;});
}


window.openAllChartsForFiltered=async function(){
  const visibleRows=document.querySelectorAll('tr.tr-row[data-id]');
  const urls=[];
  visibleRows.forEach(tr=>{
    const id=tr.dataset.id;
    const t=trades.find(x=>x.id===id);
    if(t&&t.chartUrl){urls.push(t.chartUrl);}
  });
  if(!urls.length){alert('No chart links in the current view.');return;}
  if(urls.length>15&&!confirm(`Open ${urls.length} chart links? Browsers may block popups beyond ~10. Continue?`))return;
  for(let i=0;i<urls.length;i++){
    window.open(urls[i],'_blank','noopener');
    if(i<urls.length-1)await new Promise(r=>setTimeout(r,250));
  }
};

    _calHoverEl.style.left=Math.max(10,left)+'px';
    _calHoverEl.style.top=Math.max(10,top)+'px';

window.toggleTagOnTrade=async function(tid,tag){
  const t=trades.find(x=>x.id===tid);
  if(!t)return;
  const tags=[...(t.tags||[])];
  const idx=tags.indexOf(tag);
  if(idx>=0)tags.splice(idx,1);
  else tags.push(tag);
  t.tags=tags;
  try{await updateTrade(tid,{tags});}catch(e){console.error('Tag save failed',e);}
  renderApp();
};
window.removeTagFromTrade=async function(tid,tag){
  const t=trades.find(x=>x.id===tid);
  if(!t)return;
  const tags=(t.tags||[]).filter(x=>x!==tag);
  t.tags=tags;
  try{await updateTrade(tid,{tags});}catch(e){console.error('Tag save failed',e);}
  renderApp();
};

// Compact AI assessment for overview tab
window.runOverviewAI=function(){
  const out=document.getElementById('overview-ai-output');
  if(!out)return;
  out.innerHTML='<div style="display:flex;align-items:center;gap:10px;color:var(--text3);font-size:var(--fsm)"><div class="spinner"></div>Analyzing recent trades...</div>';
  // Get last 20 trades or last 7 days, whichever is more
  const sorted=[...trades].sort((a,b)=>a.date>b.date?-1:1);
  const recent=sorted.slice(0,20);
  const S=calcStats(recent);
  if(!S){out.innerHTML='<div style="color:var(--text4)">Not enough trades to analyze.</div>';return;}
  const all=calcStats(trades);
  const insights=[];
  // 1) Performance vs overall
  const wrDiff=(S.wr-all.wr)*100;
  const pfDiff=S.pf-all.pf;
  if(Math.abs(wrDiff)>3||Math.abs(pfDiff)>0.2){
    insights.push({
      type:wrDiff>=0&&pfDiff>=0?'positive':'warning',
      label:'TREND',
      text:`Recent ${recent.length} trades show <b>${wrDiff>=0?'+':''}${wrDiff.toFixed(0)}% WR</b> and <b>${pfDiff>=0?'+':''}${pfDiff.toFixed(2)} PF</b> vs overall (${(all.wr*100).toFixed(0)}% WR, ${all.pf.toFixed(2)} PF).`
    });
  } else {
    insights.push({type:'neutral',label:'TREND',text:`Recent performance is consistent with your overall stats (${(S.wr*100).toFixed(0)}% WR, ${S.pf.toFixed(2)} PF).`});
  }
  // 2) Win/loss size analysis
  if(S.avgW>0&&S.avgL>0){
    const rr=S.avgW/S.avgL;
    if(rr<1){
      insights.push({type:'warning',label:'RISK / REWARD',text:`Your average win ($${S.avgW.toFixed(0)}) is <b>smaller</b> than your average loss ($${S.avgL.toFixed(0)}) — R:R of ${rr.toFixed(2)}. You need >50% win rate to be profitable. Consider letting winners run or cutting losses faster.`});
    } else if(rr>2){
      insights.push({type:'positive',label:'RISK / REWARD',text:`Strong R:R of ${rr.toFixed(2)} — winners are ${rr.toFixed(1)}× larger than losers. Even a 40% win rate would be profitable here.`});
    } else {
      insights.push({type:'neutral',label:'RISK / REWARD',text:`R:R of ${rr.toFixed(2)} — balanced. Win rate of ${(S.wr*100).toFixed(0)}% keeps you profitable.`});
    }
  }
  // 3) Streak analysis
  if(S.streak>=3){
    insights.push({type:S.sdir>0?'positive':'warning',label:'STREAK',text:`Currently on a <b>${S.streak} ${S.sdir>0?'WIN':'LOSS'} streak</b>.${S.sdir<0?' Consider taking a break or reviewing recent setups before continuing.':' Be aware of overconfidence — stick to your plan.'}`});
  }
  // 4) Symbol concentration
  const symCounts={};
  recent.forEach(t=>symCounts[t.symbol]=(symCounts[t.symbol]||0)+1);
  const topSym=Object.entries(symCounts).sort((a,b)=>b[1]-a[1])[0];
  if(topSym&&topSym[1]/recent.length>0.7){
    insights.push({type:'neutral',label:'CONCENTRATION',text:`<b>${(topSym[1]/recent.length*100).toFixed(0)}%</b> of recent trades are <b>${topSym[0]}</b>. Concentration helps you learn one instrument deeply, but diversification can reduce single-instrument risk.`});
  }
  // 5) Fees impact
  const feeDrag=all.totalFees/Math.abs(all.grossNet||1)*100;
  if(feeDrag>15){
    insights.push({type:'warning',label:'FEES',text:`Fees are eating <b>${feeDrag.toFixed(0)}%</b> of gross P&L ($${all.totalFees.toFixed(0)} on $${Math.abs(all.grossNet).toFixed(0)} gross). High-frequency trading on micros amplifies this. Consider fewer, larger setups.`});
  }
  // 6) Day of week / time pattern
  const byDow={0:[],1:[],2:[],3:[],4:[],5:[],6:[]};
  recent.forEach(t=>{if(t.date)byDow[new Date(t.date).getDay()].push(t.pnl);});
  const dowNames=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  let worstDow=null,worstPnl=0;
  Object.entries(byDow).forEach(([d,ps])=>{if(ps.length>=3){const sum=ps.reduce((a,b)=>a+b,0);if(sum<worstPnl){worstPnl=sum;worstDow=d;}}});
  if(worstDow!==null&&worstPnl<-10){
    insights.push({type:'warning',label:'PATTERN',text:`<b>${dowNames[worstDow]}</b> is your worst day in recent trades (${byDow[worstDow].length} trades, ${worstPnl.toFixed(0)} total). Worth reviewing what's different.`});
  }
  // Render
  out.innerHTML=insights.map(i=>{
    const colors={positive:'var(--green)',warning:'var(--yellow)',neutral:'var(--blue)'};
    const c=colors[i.type]||'var(--text3)';
    return `<div style="border-left:3px solid ${c};padding:8px 14px;margin-bottom:6px;background:color-mix(in srgb,${c} 5%,transparent)">
      <div style="font-size:var(--fsxs);letter-spacing:2px;color:${c};margin-bottom:3px">${i.label}</div>
      <div style="color:var(--text2)">${i.text}</div>
    </div>`;
  }).join('')+`<div style="text-align:right;font-size:var(--fsxs);color:var(--text5);margin-top:6px">Analyzed ${recent.length} most recent trades</div>`;
};
function runAISummary(tds,period){
  const out=el('ai-output');if(!out)return;
  out.innerHTML='<div style="display:flex;align-items:center;gap:10px;color:var(--text3);font-size:var(--fsm)"><div class="spinner"></div>Analyzing...</div>';
  const S2=calcStats(tds);if(!S2){out.innerHTML='<div style="color:var(--text4)">Not enough data for this period.</div>';return;}

  // Client-side rule-based analysis — always works
  const sections=[];
  const periodLabel=period==='all'?'All time':period==='day'?'Last 24h':period==='week'?'Last 7 days':'Last 30 days';
  // 1. Summary
  const trend=S2.rolling.net.slice(-5);
  const recentSlope=trend.length>1?trend[trend.length-1]-trend[0]:0;
  let summ=`<b style="color:var(--text)">${periodLabel}:</b> ${S2.total} trades, net P&L <span style="color:${gch(S2.net)}">${fmt(S2.net)}</span> (gross ${fmt(S2.grossNet)}). `;
  summ+=S2.ev>0?`Positive EV of <span style="color:var(--green)">$${S2.ev.toFixed(2)}/trade</span> — strategy has edge.`:`<span style="color:var(--red)">Negative EV of $${S2.ev.toFixed(2)}/trade</span> — strategy currently losing money on expectation.`;
  summ+=recentSlope>0?' Recent trend is <span style="color:var(--green)">improving ↑</span>.':recentSlope<-20?' Recent trend is <span style="color:var(--red)">declining ↓</span> — something changed recently.':'';
  sections.push(['📊 SUMMARY',summ]);

  // 2. Strengths
  const strengths=[];
  if(S2.wr>=0.55)strengths.push(`Strong win rate of <b>${pct(S2.wr)}</b> — trade selection is disciplined.`);
  if(S2.pf>=1.8)strengths.push(`Excellent profit factor of <b>${S2.pf.toFixed(2)}×</b> — winners significantly outpace losers.`);
  if(S2.rr>=1.5)strengths.push(`Good risk:reward of <b>${S2.rr.toFixed(2)}R</b> — cutting losses appropriately vs wins.`);
  if(S2.sharpe>1)strengths.push(`Annualized Sharpe of <b>${S2.sharpe.toFixed(2)}</b> — consistent, low-variance returns.`);
  if(S2.maxWS>=4)strengths.push(`Win streak of <b>${S2.maxWS}</b> shows ability to execute when in rhythm.`);
  if(S2.feeImpact<8)strengths.push(`Fee drag at <b>${S2.feeImpact.toFixed(1)}%</b> is well controlled.`);
  const bestSetup=Object.entries(S2.setups).sort(([,a],[,b])=>b.pnl-a.pnl)[0];
  if(bestSetup&&bestSetup[0]!=='—')strengths.push(`Best setup is <b>${bestSetup[0]}</b>: ${fmt(bestSetup[1].pnl)} net P&L, ${(bestSetup[1].wins/bestSetup[1].count*100).toFixed(0)}% WR.`);
  sections.push(['💪 STRENGTHS',strengths.length?strengths.slice(0,2).join(' '):'Not enough data to identify clear strengths yet.']);

  // 3. Critical weakness
  const weaknesses=[];
  if(S2.wr<0.45)weaknesses.push({sev:3,msg:`Win rate of <b style="color:var(--red)">${pct(S2.wr)}</b> is below 45%. With your avg win of $${S2.avgW.toFixed(0)} and avg loss of $${S2.avgL.toFixed(0)}, you need >45% WR to stay profitable. Be more selective — only take A/B grade setups.`});
  if(S2.rr<1)weaknesses.push({sev:3,msg:`Risk:Reward of <b style="color:var(--red)">${S2.rr.toFixed(2)}R</b> — your average loss ($${S2.avgL.toFixed(0)}) exceeds your average win ($${S2.avgW.toFixed(0)}). Set a hard rule: minimum 1.5R per trade or pass.`});
  if(S2.maxLS>=4)weaknesses.push({sev:2,msg:`Max loss streak of <b>${S2.maxLS}</b>. Continuing to trade through streaks amplifies damage. Consider a 3-loss stop rule.`});
  if(S2.feeImpact>15)weaknesses.push({sev:2,msg:`Fee drag is <b style="color:var(--yellow)">${S2.feeImpact.toFixed(1)}%</b> of gross — commissions are eating a significant portion. Reduce overtrading or renegotiate fees.`});
  if(S2.pf<1)weaknesses.push({sev:3,msg:`Profit factor <b style="color:var(--red)">${S2.pf.toFixed(2)}</b> means for every $1 won you lose $${(1/S2.pf).toFixed(2)}. Strategy is currently net-losing. Pause and review trade criteria.`});
  weaknesses.sort((a,b)=>b.sev-a.sev);
  sections.push(['⚠ CRITICAL WEAKNESS',weaknesses.length?weaknesses[0].msg:'No critical weaknesses detected — focus on maintaining consistency.']);

  // 4. Action plan
  const actions=[];
  if(S2.wr<0.5)actions.push(`<b>1. Tighten entry criteria</b> — before entering, confirm: setup matches your best-performing type (${bestSetup?bestSetup[0]:'check stats'}), grade is A or B, and RR is >1.5.`);
  else actions.push(`<b>1. Protect the edge</b> — WR is ${pct(S2.wr)}. Stay disciplined. Don't increase size until you have 50+ trades at this WR.`);
  if(S2.rr<1.5)actions.push(`<b>2. Fix stops and targets</b> — move stops only to reduce loss, never to give a trade "more room." Set a minimum target of 1.5× your stop size before entry.`);
  else actions.push(`<b>2. Capitalize on your ${S2.rr.toFixed(2)}R ratio</b> — consider scaling out 50% at 1R and letting the rest run to 2R+.`);
  if(S2.feeImpact>10)actions.push(`<b>3. Reduce frequency</b> — at ${S2.feeImpact.toFixed(1)}% fee drag, fewer, higher-quality trades will improve net P&L.`);
  else if(S2.maxLS>=3)actions.push(`<b>3. Implement a daily loss limit</b> — 3 losses in a session = done for the day. Review those trades the next morning before trading again.`);
  else actions.push(`<b>3. Document every trade</b> — grade each trade A-F and track patterns. Your best setups deserve larger size once identified.`);
  sections.push(['📋 ACTION PLAN',actions.join('<br/>')]);

  // 5. Pattern alert
  const recent=tds.slice(-5);
  const recentNet=recent.reduce((s,t)=>s+t.pnl,0);
  const recentWR=recent.filter(t=>t.pnl>0).length/Math.max(recent.length,1);
  let pattern='';
  if(recent.length>=3){
    if(recentNet<0&&S2.net>0)pattern=`<span style="color:var(--yellow)">⚠ Last ${recent.length} trades are net negative ($${recentNet.toFixed(0)}) while overall is positive. Monitor closely — could indicate strategy drift or overtrading.`;
    else if(recentWR<0.3&&S2.wr>0.5)pattern=`<span style="color:var(--red)">⚠ Recent WR (${(recentWR*100).toFixed(0)}%) is well below your overall WR (${pct(S2.wr)}). Check if market conditions changed or you're deviating from plan.</span>`;
    else if(recentNet>0&&recentWR>=0.7)pattern=`<span style="color:var(--green)">✓ Recent ${recent.length} trades performing well (${(recentWR*100).toFixed(0)}% WR). Stay consistent — avoid increasing size impulsively.</span>`;
    else pattern=`Last ${recent.length} trades: ${recent.filter(t=>t.pnl>0).length}W / ${recent.filter(t=>t.pnl<0).length}L, net ${fmt(recentNet)}. No unusual pattern detected.`;
  }
  sections.push(['🔍 RECENT PATTERN',pattern||'Add more trades for pattern detection.']);

  const html2=sections.map(([title,body])=>`<div style="margin-bottom:14px"><div style="font-size:var(--fsxs);color:var(--text4);letter-spacing:2px;margin-bottom:5px">${title}</div><div style="font-size:var(--fsm);color:var(--text2);line-height:1.9">${body}</div></div>`).join('');
  out.innerHTML=html2+`<div style="margin-top:12px;font-size:var(--fsxs);color:var(--text5);border-top:1px solid var(--border);padding-top:8px;display:flex;justify-content:space-between;align-items:center"><span>Client-side analysis · ${tds.length} trades · ${new Date().toLocaleTimeString()}</span><button class="btn-b" style="font-size:var(--fsxs);padding:3px 10px" id="try-claude-api">TRY CLAUDE API →</button></div>`;
  // Wire up Claude API attempt button
  setTimeout(()=>{
    if(el('try-claude-api'))el('try-claude-api').onclick=()=>runClaudeAPI(tds,period,out);
  },50);
}

async function runClaudeAPI(tds,period,out){
  const S2=calcStats(tds);if(!S2)return;
  const note=document.createElement('div');note.style.cssText='font-size:var(--fsxs);color:var(--text5);margin-top:8px;padding:8px;background:var(--bg2);border:1px solid var(--border)';
  note.textContent='Attempting Claude API call... (works inside Claude.ai, may be blocked on GitHub Pages due to browser CORS policy)';
  out.appendChild(note);
  const summary={period,tradeCount:S2.total,winRate:pct(S2.wr),profitFactor:S2.pf>=99?'∞':S2.pf.toFixed(2),expectedValue:'$'+S2.ev.toFixed(2),netPnl:fmt(S2.net),grossPnl:fmt(S2.grossNet),totalFees:'$'+S2.totalFees.toFixed(2),feeDrag:S2.feeImpact.toFixed(1)+'%',avgWin:'+$'+S2.avgW.toFixed(2),avgLoss:'-$'+S2.avgL.toFixed(2),riskReward:S2.rr.toFixed(2)+'R',sharpe:S2.sharpe.toFixed(2),maxDrawdown:'-$'+S2.maxDD.toFixed(2),recovery:S2.recovery.toFixed(2)+'x',setupBreakdown:Object.entries(S2.setups).map(([k,v])=>`${k}:${v.count}tr,${(v.wins/v.count*100).toFixed(0)}%WR,${fmt(v.pnl)}`).join(';')};
  try{
    let claudeKey=localStorage.getItem('el_claude_key')||'';
    if(!claudeKey){claudeKey=prompt('Enter your Anthropic API key (stored locally, never sent anywhere except Anthropic):');if(!claudeKey)return;localStorage.setItem('el_claude_key',claudeKey);}
    const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','anthropic-version':'2023-06-01','x-api-key':claudeKey},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:800,messages:[{role:'user',content:`Futures trading coach. Analyze this data and give 3 specific, actionable improvements. Data: ${JSON.stringify(summary)}. Be direct, use their exact numbers, under 200 words.`}]})});
    const data=await res.json();
    if(data.error)throw new Error(data.error.message);
    const text=data.content?.find(b=>b.type==='text')?.text||'';
    const formatted=text.replace(/\*\*(.*?)\*\*/g,'<b style="color:var(--text)">$1</b>').replace(/\n/g,'<br/>')
    note.style.cssText='margin-top:10px;padding:12px;background:color-mix(in srgb,var(--blue) 8%,transparent);border:1px solid color-mix(in srgb,var(--blue) 25%,transparent)';
    note.innerHTML=`<div style="font-size:var(--fsxs);color:var(--blue);letter-spacing:2px;margin-bottom:6px">🤖 CLAUDE AI ANALYSIS</div><div style="font-size:var(--fsm);color:var(--text2);line-height:1.9">${formatted}</div>`;
  }catch(e){
    note.textContent=`Claude API unavailable from this URL (${e.message}). The client-side analysis above is fully accurate.`;
  }
}

  el('so-btn').onclick=()=>{if(unsub)unsub();if(unsubL)unsubL();if(unsubBT)unsubBT();stopAutoImport();auth.signOut();renderAuth();};
  const lu=el('logo-upload');if(lu)lu.onchange=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{userLogo=ev.target.result;localStorage.setItem('el_logo',userLogo);updateFavicon();document.title='EDGE LOG — Trade Tracker';renderApp();};r.readAsDataURL(f);};
  const la=el('logo-area');if(la)la.onclick=()=>{if(userLogo){if(confirm('Remove logo?')){userLogo=null;localStorage.removeItem('el_logo');updateFavicon();renderApp();}}else el('logo-upload').click();};
  if(el('tog-net'))el('tog-net').onclick=()=>{useGross=false;renderApp();};
  if(el('tog-grs'))el('tog-grs').onclick=()=>{useGross=true;renderApp();};

  // ══ OVERVIEW ══
  if(activeTab==='overview'){

    // Filter trades by chartTF for hero KPIs and breakdowns
    const _filterByTF=(tds)=>{
      const now=new Date();
      let cutoff=null;
      if(chartTF==='7d'){cutoff=new Date(now);cutoff.setDate(now.getDate()-7);}
      else if(chartTF==='30d'){cutoff=new Date(now);cutoff.setDate(now.getDate()-30);}
      else if(chartTF==='90d'){cutoff=new Date(now);cutoff.setDate(now.getDate()-90);}
      else if(chartTF==='ytd'){cutoff=new Date(now.getFullYear(),0,1);}
      if(!cutoff)return tds;
      const cs=cutoff.toISOString().slice(0,10);
      return tds.filter(t=>t.date>=cs);
    };
    const tfTrades=_filterByTF(trades);
    const tfS=calcStats(tfTrades)||S;
    // Use tfS for hero KPI display; original S is still available for chart-independent stats
    const modeLabel=useGross?'<span style="color:var(--yellow);font-size:var(--fsxs);margin-left:6px">[GROSS]</span>':'';
    const tfLabel=chartTF==='all'?'all time':chartTF.toUpperCase();

    // === Helpers ===
    const sparkline=(values,color,w=110,h=24)=>{
      if(!values||values.length<2)return '';
      const mn=Math.min(...values),mx=Math.max(...values),range=mx-mn||1;
      const pts=values.map((v,i)=>{const x=(i/(values.length-1))*w;const y=h-((v-mn)/range)*h;return x+','+y;}).join(' ');
      const areaPath=`M 0,${h} L ${pts.split(' ').join(' L ')} L ${w},${h} Z`;
      return `<svg viewBox="0 0 ${w} ${h}" width="100%" height="${h}" preserveAspectRatio="none" style="position:absolute;bottom:0;left:0;right:0;opacity:.22;pointer-events:none"><path d="${areaPath}" fill="${color}"/><polyline points="${pts}" fill="none" stroke="${color}" stroke-width="1.5" opacity=".8"/></svg>`;
    };

    const miniKPI=(label,valueText,subText,color,sparkData,infoKey)=>{

    // Mini radial gauge for hero KPIs (small semicircle showing % to target)
    const heroGauge=(t,color,thresholdFrac,thresholdLabel)=>{
      // Arc geometry — fits cleanly in viewBox 100x70
      const cx=50,cy=50,r=38;
      const tClamped=Math.max(0,Math.min(1,t));
      const endAngle=-90+tClamped*180;
      const rad=(endAngle-90)*Math.PI/180;
      const px=cx+r*Math.cos(rad),py=cy+r*Math.sin(rad);
      const large=0; // partial arc of semicircle never exceeds 180°
      const thresh=thresholdFrac!==undefined?thresholdFrac:0.5;
      const threshRad=(-90+thresh*180-90)*Math.PI/180;
      const tx1=cx+(r-7)*Math.cos(threshRad),ty1=cy+(r-7)*Math.sin(threshRad);
      const tx2=cx+(r+5)*Math.cos(threshRad),ty2=cy+(r+5)*Math.sin(threshRad);
      const tlx=cx+(r+11)*Math.cos(threshRad),tly=cy+(r+11)*Math.sin(threshRad);
      const pctText=(tClamped*100).toFixed(0)+'%';
      // viewBox 0 0 100 70 - arc spans y=12 to y=50 (38 tall), text at y=65
      return `<svg viewBox="-2 -8 104 80" width="128" height="80" style="display:block">
        <path d="M ${cx-r} ${cy} A ${r} ${r} 0 0 1 ${cx+r} ${cy}" stroke="#3a3a55" stroke-width="5" fill="none" stroke-linecap="round"/>
        ${tClamped>0.01?`<path d="M ${cx-r} ${cy} A ${r} ${r} 0 ${large} 1 ${px.toFixed(1)} ${py.toFixed(1)}" stroke="${color}" stroke-width="5" fill="none" stroke-linecap="round"/>`:''}
        <line x1="${tx1.toFixed(1)}" y1="${ty1.toFixed(1)}" x2="${tx2.toFixed(1)}" y2="${ty2.toFixed(1)}" stroke="#a0a0c0" stroke-width="1.3"/>
        ${thresholdLabel?`<text x="${tlx.toFixed(1)}" y="${tly.toFixed(1)}" text-anchor="middle" fill="#b0b0c8" font-size="7" font-family="JetBrains Mono,monospace" font-weight="bold">${thresholdLabel}</text>`:''}

    const heroKPI=(label,valueText,subText,color,sparkData,infoKey,gaugeVal,thresholdFrac,thresholdLabel)=>{

    // === Running stats for sparklines ===
    const _running={net:[],wr:[],pf:[],ev:[],avgW:[],avgL:[],rr:[],maxDD:[]};
    {
      let cum=0,wins=0,losses=0,gw=0,gl=0,peak=0,maxDD=0;
      [...tfTrades].forEach(t=>{
        cum+=t.pnl;
        if(t.pnl>=0){wins++;gw+=t.pnl;}else{losses++;gl+=Math.abs(t.pnl);}
        if(cum>peak)peak=cum;
        const dd=peak-cum;if(dd>maxDD)maxDD=dd;
        _running.net.push(cum);

    // === Distribution stats ===

    const _mean=_pnls.length?_pnls.reduce((a,b)=>a+b,0)/_pnls.length:0;
    const _std=_pnls.length>1?Math.sqrt(_pnls.reduce((a,b)=>a+(b-_mean)**2,0)/(_pnls.length-1)):0;
    const _min=Math.min(..._pnls,0),_max=Math.max(..._pnls,0);
    const _binCount=Math.min(20,Math.max(8,Math.ceil(Math.sqrt(_pnls.length))));
    const _binSize=(_max-_min)/_binCount||1;
    const _bins=Array(_binCount).fill(0);

    const _maxBin=Math.max(..._bins,1);

    // === Calendar HTML ===
    const calHTML=(()=>{

        cells+=`<div class="cal-day-cell" data-date="${ds}" style="text-align:center;font-size:11px;padding:5px 3px;background:${bg};border:${border};min-height:52px;display:flex;flex-direction:column;justify-content:center;position:relative;cursor:${dt.length?'pointer':'default'}" onmouseenter="window.showCalHover('${ds}')" onmouseleave="window.hideCalHover()" onclick="${dt.length?`window.gotoTradesByDate('${ds}')`:''}">

          <button class="btn-d" style="padding:3px 8px;font-size:var(--fsxs)" onclick="resetCalMonth()">TODAY</button>
        </div>
        <span style="font-size:var(--fsxs);color:${gch(moPnl)};font-family:'Bebas Neue',monospace">${fmt(moPnl)} · ${(moWR*100).toFixed(0)}% WR · ${moT.length} trades</span>
      </div>
      <div style="padding:8px;display:grid;grid-template-columns:repeat(7,1fr);gap:3px">${cells}</div>`;
    })();

    content.innerHTML=`
    <!-- ROW 0: TIMEFRAME SELECTOR -->
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;padding:6px 4px">
      <div style="display:flex;gap:6px;align-items:center">
        <span style="font-size:var(--fsxs);color:var(--text4);letter-spacing:2px;margin-right:4px">TIMEFRAME</span>
        ${['7D','30D','90D','YTD','ALL'].map(tf=>`<button onclick="chartTF='${tf.toLowerCase()}';renderApp()" style="background:${chartTF===tf.toLowerCase()?'var(--green)':'var(--bg3)'};color:${chartTF===tf.toLowerCase()?'var(--bg)':'var(--text3)'};border:1px solid var(--border);padding:5px 13px;font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:1px;cursor:pointer;transition:all 0.1s">${tf}</button>`).join('')}

      ${heroKPI('WIN RATE', (tfS.wr*100).toFixed(0)+'%', tfS.wins+' wins · '+tfS.losses+' losses', tfS.wr>=0.5?'#00e5a0':tfS.wr>=0.4?'#f5c842':'#ff3d5a', _running.wr.map(w=>w*100), 'WIN RATE', tfS.wr, 0.5, '50%')}
      ${heroKPI('PROFIT FACTOR', tfS.pf>=99?'∞':tfS.pf.toFixed(2), tfS.pf>=1.5?'Healthy':tfS.pf>=1?'Marginal':'Losing edge', tfS.pf>=1.5?'#00e5a0':tfS.pf>=1?'#f5c842':'#ff3d5a', _running.pf, 'PROFIT FACTOR', Math.min(1,tfS.pf/3), 0.333, '1.0')}
      ${heroKPI('EXP VALUE', '$'+tfS.ev.toFixed(2), 'Per trade · '+(tfS.ev*tfTrades.length).toFixed(0)+' projected', tfS.ev>0?'#00e5a0':'#ff3d5a', _running.ev, 'EXP VALUE', tfS.ev>0?Math.min(1,tfS.ev/50):0, 0, '$0')}
    </div>

    <!-- ROW 2: 8 MINI KPIs (compact strip) -->

      ${miniKPI('AVG WIN', '+$'+tfS.avgW.toFixed(0), 'Per winning trade', '#00e5a0', _running.avgW, 'AVG WIN')}
      ${miniKPI('AVG LOSS', '-$'+tfS.avgL.toFixed(0), 'Per losing trade', '#ff3d5a', _running.avgL, 'AVG LOSS')}
      ${miniKPI('MAX DD', '-$'+tfS.maxDD.toFixed(0), 'Worst drawdown', '#ff3d5a', _running.maxDD, 'MAX DD')}
      ${miniKPI('STREAK', (tfS.sdir>0?'+':'-')+tfS.streak+(tfS.sdir>0?'W':'L'), tfS.sdir>0?'Winning streak':'Losing streak', tfS.sdir>0?'#00e5a0':'#ff3d5a', null, null)}
      ${miniKPI('TOTAL FEES', '-$'+tfS.totalFees.toFixed(0), Math.abs(tfS.totalFees/(tfS.grossNet||1)*100).toFixed(1)+'% of gross', '#f5c842', null, 'FEES')}
      ${miniKPI('LONGS', '$'+tfS.longPnl.toFixed(0), tfS.longs+' trades · '+(tfS.longWR*100).toFixed(0)+'% WR', tfS.longPnl>=0?'#00e5a0':'#ff3d5a', null, null)}
      ${miniKPI('SHORTS', '$'+tfS.shortPnl.toFixed(0), tfS.shorts+' trades · '+(tfS.shortWR*100).toFixed(0)+'% WR', tfS.shortPnl>=0?'#00e5a0':'#ff3d5a', null, null)}
      ${miniKPI('GROSS', '$'+tfS.grossNet.toFixed(0), 'Before fees', tfS.grossNet>=0?'#00e5a0':'#ff3d5a', null, null)}
    </div>

    <!-- ROW 3: CUMULATIVE P&L (full width, 380px tall) -->
    <div class="section" style="margin-bottom:12px">
      <div class="sec-hd" style="flex-wrap:wrap;gap:8px">
        <span>${chartMode==='equity'?'ACCOUNT EQUITY':'CUMULATIVE P&L'}${modeLabel}</span>
        <div style="display:flex;gap:5px;align-items:center;flex-wrap:wrap">
          <!-- PNL/EQUITY toggle -->
          <div style="display:flex;border:1px solid var(--border);margin-right:8px">
            <button onclick="chartMode='pnl';renderApp()" style="background:${chartMode==='pnl'?'var(--green)':'var(--bg3)'};color:${chartMode==='pnl'?'var(--bg)':'var(--text3)'};border:none;padding:4px 11px;font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:1px;cursor:pointer">P&L</button>
            <button onclick="chartMode='equity';renderApp()" style="background:${chartMode==='equity'?'var(--blue)':'var(--bg3)'};color:${chartMode==='equity'?'var(--bg)':'var(--text3)'};border:none;border-left:1px solid var(--border);padding:4px 11px;font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:1px;cursor:pointer">EQUITY</button>
          </div>
          
          <button onclick="chartPctMode=!chartPctMode;window.chartPctMode=chartPctMode;renderApp()" style="background:${chartPctMode?'var(--blue)':'var(--bg3)'};color:${chartPctMode?'var(--bg)':'var(--text3)'};border:1px solid var(--border);padding:4px 11px;font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:1px;cursor:pointer;margin-left:8px">${chartPctMode?'%':'\$'}</button>

            <button class="btn-d" style="font-size:var(--fsxs);padding:4px 10px;margin-left:8px" onclick="expandChart('${chartMode==='equity'?'ACCOUNT EQUITY':'CUMULATIVE P&L'}', document.querySelector('.cum-pl-chart').innerHTML)">⛶ EXPAND</button>

      <div class="cum-pl-chart" style="padding:8px 10px 4px;overflow-x:auto;background:linear-gradient(180deg, transparent 0%, var(--bg2) 100%)">
        ${(()=>{
          const now=new Date();
          let cutoff=null;
          if(chartTF==='7d'){cutoff=new Date(now);cutoff.setDate(now.getDate()-7);}
          else if(chartTF==='30d'){cutoff=new Date(now);cutoff.setDate(now.getDate()-30);}
          else if(chartTF==='90d'){cutoff=new Date(now);cutoff.setDate(now.getDate()-90);}
          else if(chartTF==='ytd'){cutoff=new Date(now.getFullYear(),0,1);}
          const cutStr=cutoff?cutoff.toISOString().slice(0,10):null;
          const filtTr=cutStr?trades.filter(t=>t.date>=cutStr):trades;
          if(!filtTr.length){return '<div style="padding:120px;text-align:center;color:var(--text5);font-size:11px;letter-spacing:2px">NO TRADES IN '+chartTF.toUpperCase()+'</div>';}
          ensureSPYData();

                bal+=_ledgerByDate[t.date];
                _appliedDates.add(t.date);
              }
              bal=+(bal+t.pnl).toFixed(2);
              return {y:bal,pnl:t.pnl,id:t.id,date:t.date,symbol:t.symbol,type:t.type};

            return svgLineLabeled([startPt,...points], chartColor,1400,380,true);
          }
          // PNL MODE: pure cumulative trade P&L
          let c=0,pk=0;
          if(chartPctMode){
            // % MODE: show account % return based on starting balance
            const startB=accountEquity||(ledgerEvents||[]).filter(e=>e.amount>0).reduce((s,e)=>s+e.amount,0)||1000;
            const startPoint={y:0,pnl:0,id:null,date:null,symbol:null};
            let bal=startB;
            const points=filtTr.map(t=>{bal=bal+t.pnl;const pct=((bal-startB)/startB)*100;return{y:pct,pnl:t.pnl,id:t.id,date:t.date,symbol:t.symbol,type:t.type};});
            // Add SPY overlay points if enabled
            if(spyOverlay&&filtTr.length){
              const startDate=filtTr[0].date;
              const spyDataKey=trades[0]?.date+'_'+trades[trades.length-1]?.date;
              const spyData=_spyCache[spyDataKey];
              const spyPts=filtTr.map(t=>({y:spyReturnReal(startDate,t.date,spyData)*100}));
              return svgLineLabeled([startPoint,...points], chartColor,1400,380,true, [{y:0},...spyPts]);
            }

        })()}
      </div>
      <div style="padding:8px 16px 10px;display:flex;gap:18px;font-size:var(--fsxs);border-top:1px solid var(--border);justify-content:space-around;flex-wrap:wrap">

        ${(()=>{

          const alpha=acctPct-spyPct;
          return `<span style="color:var(--text4)">vs SPY <span style="color:${alpha>=0?'var(--green)':'var(--red)'};font-family:'Bebas Neue',monospace;font-size:13px;margin-left:4px" title="Alpha = your return - SPY return for same period">${alpha>=0?'+':''}${alpha.toFixed(1)}% α</span></span>`;
        })()}

          <div style="font-size:var(--fsm);color:var(--text4)">Delete all ${trades.length} trades from cloud.</div>
          <button class="btn-r" id="clr-all">CLEAR ALL</button>
        </div></div>`:''}
    </div>`;
    setTimeout(()=>{
      if(el('exp-csv'))el('exp-csv').onclick=exportCSV;
      if(el('clr-all'))el('clr-all').onclick=async()=>{if(!confirm(`Delete ALL ${trades.length} trades? Cannot be undone.`))return;const snap=await colRef.get();const b=db.batch();snap.docs.forEach(d=>b.delete(d.ref));await b.commit();};
    },50);
  }
}

window.renameSetup=function(idx,newName){
  newName=(newName||'').trim();
  if(!newName||newName==='—')return;
  if(customSetups.includes(newName)&&customSetups.indexOf(newName)!==idx){
    alert('Setup "'+newName+'" already exists');
    renderApp();
    return;
  }
  const oldName=customSetups[idx];
  if(oldName===newName)return;
  customSetups[idx]=newName;
  localStorage.setItem('el_setups',JSON.stringify(customSetups));
  // Update existing trades that used the old setup name
  let updated=0;
  trades.forEach(t=>{
    if(t.setup===oldName){
      t.setup=newName;
      updated++;
      // Persist to Firestore
      if(currentUser){
        firebase.firestore().collection('users').doc(currentUser.uid).collection('trades').doc(t.id).update({setup:newName}).catch(e=>console.error('Update failed:',e));
      }
    }
  });
  if(updated>0)console.log('[RENAME] Updated '+updated+' trades from "'+oldName+'" to "'+newName+'"');
  renderApp();
};

function removeSetup(idx){
  if(customSetups[idx]==='—')return;
  customSetups.splice(idx,1);
  localStorage.setItem('el_setups',JSON.stringify(customSetups));
  renderApp();
}

// Boot
window._setStage('INIT FIREBASE');
if(!initFB())document.getElementById('app').innerHTML='<div style="color:var(--red);padding:40px;text-align:center">Firebase failed to initialize.</div>';
else window._setStage('AUTH LISTENER ATTACHED');
auth.onAuthStateChanged(user=>{if(user){currentUser=user;subscribeAll(currentUser.uid);}else renderAuth();});
</script>
