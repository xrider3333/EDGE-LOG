<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>EDGE LOG — NT Import</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Bebas+Neue&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#05050a;color:#dde0ec;font-family:'JetBrains Mono',monospace;font-size:13px}
.drop-zone{border:2px dashed #252538;padding:60px 20px;text-align:center;background:#09090f;cursor:pointer;transition:all .2s}
.drop-zone:hover,.drop-zone.drag{border-color:#00e5a0;background:#00e5a008}
h1{font-family:'Bebas Neue',sans-serif;font-size:42px;letter-spacing:4px;color:#00e5a0}
</style>
</head>
<body>

<div style="padding:40px;max-width:900px;margin:0 auto">
  <h1 style="text-align:center">EDGE LOG</h1>
  <p style="text-align:center;color:#505070;margin-bottom:30px">NinjaTrader Import — Final Fix</p>

  <div style="background:#0b0b12;border:1px solid #141422;padding:30px;border-radius:8px">
    <div id="status" style="margin-bottom:20px;padding:12px;background:#1a1a2a;border-radius:4px;font-size:14px">
      Drop your CSV file below
    </div>

    <div id="drop-zone" class="drop-zone">
      <div style="font-size:60px;margin-bottom:20px">📂</div>
      <div style="font-size:16px">DROP YOUR NINJATRADER CSV HERE</div>
      <div style="font-size:12px;color:#606080;margin-top:10px">or click to browse</div>
      <input type="file" id="file-input" accept=".csv" style="display:none">
    </div>

    <div id="result" style="margin-top:30px;font-size:12.5px;max-height:500px;overflow:auto;line-height:1.6"></div>
  </div>
</div>

<script>
// Correct tick values
const PRESETS = {
  ES:  {tv:12.50, ts:0.25},
  MES: {tv:1.25, ts:0.25},
  NQ:  {tv:5.00,  ts:0.25},
  MNQ: {tv:0.50, ts:0.25},
  CL:  {tv:10.00, ts:0.01}
};

function getBaseSymbol(sym) {
  // Convert MESM6, MESU6, etc. → MES
  return sym.replace(/[^A-Za-z]/g, '').slice(0,3).toUpperCase();
}

function calcPnl(sym, type, entry, exit, size) {
  const base = getBaseSymbol(sym);
  const p = PRESETS[base] || PRESETS.ES;
  const dir = type === 'LONG' ? 1 : -1;
  const ticks = (exit - entry) / p.ts;
  const gross = ticks * p.tv * size;
  return +gross.toFixed(2);
}

function parseCSV(text) {
  const lines = text.split('\n').filter(l => l.trim());
  if (lines.length < 2) return;

  function parseLine(line) {
    const result = [];
    let current = '', inQuotes = false;
    for (let char of line) {
      if (char === '"') inQuotes = !inQuotes;
      else if (char === ',' && !inQuotes) {
        result.push(current.trim());
        current = '';
      } else current += char;
    }
    result.push(current.trim());
    return result.map(f => f.replace(/^"|"$/g, '').trim());
  }

  const headers = parseLine(lines[0]).map(h => h.toLowerCase().trim());

  let imported = 0;
  const preview = [];

  for (let i = 1; i < lines.length; i++) {
    const row = parseLine(lines[i]);
    if (row.length < headers.length) continue;

    const get = (keys) => {
      for (let key of keys) {
        const idx = headers.findIndex(h => h.includes(key));
        if (idx !== -1 && row[idx]) return row[idx];
      }
      return '';
    };

    let symbol = get(['symbol']) || 'MES';
    const qty = parseInt(get(['qty'])) || 1;
    const buyPrice = parseFloat(get(['buyprice']));
    const sellPrice = parseFloat(get(['sellprice']));

    let type = 'LONG';
    let entry = buyPrice;
    let exitPrice = sellPrice;

    if (!buyPrice && sellPrice) {
      type = 'SHORT';
      entry = sellPrice;
      exitPrice = buyPrice || sellPrice;
    }

    // Date parsing
    let dateTime = get(['boughttimestamp']) || get(['soldtimestamp']);
    let date = '';
    if (dateTime) {
      const match = dateTime.match(/(\d{2})\/(\d{2})\/(\d{4})/);
      if (match) date = `${match[3]}-${match[1].padStart(2,'0')}-${match[2].padStart(2,'0')}`;
    }

    if (entry && exitPrice && !isNaN(entry) && !isNaN(exitPrice)) {
      const pnl = calcPnl(symbol, type, entry, exitPrice, qty);

      preview.push(`${date} | ${symbol} ${type} ${qty}x | ${entry} → ${exitPrice} | 
        <span style="color:${pnl >= 0 ? '#00e5a0' : '#ff3d5a'}">P&L ${pnl >= 0 ? '+' : ''}$${pnl}</span>`);
      imported++;
    }
  }

  const resultEl = document.getElementById('result');
  resultEl.innerHTML = `
    <div style="color:#00e5a0;font-size:15px;margin-bottom:15px">✅ ${imported} trades imported successfully!</div>
    ${preview.join('<br>')}
    <div style="margin-top:25px;color:#f5c842;font-size:11px">
      Middle trade should now show <b>+$18.75</b>
    </div>`;
}

// Drop zone
const dropZone = document.getElementById('drop-zone');
const fileInput = document.getElementById('file-input');

dropZone.onclick = () => fileInput.click();
fileInput.onchange = e => {
  const file = e.target.files[0];
  if (file) {
    document.getElementById('status').textContent = `Processing ${file.name}...`;
    const reader = new FileReader();
    reader.onload = ev => parseCSV(ev.target.result);
    reader.readAsText(file);
  }
};

dropZone.ondragover = e => { e.preventDefault(); dropZone.classList.add('drag'); };
dropZone.ondragleave = () => dropZone.classList.remove('drag');
dropZone.ondrop = e => {
  e.preventDefault();
  dropZone.classList.remove('drag');
  const file = e.dataTransfer.files[0];
  if (file) {
    document.getElementById('status').textContent = `Processing ${file.name}...`;
    const reader = new FileReader();
    reader.onload = ev => parseCSV(ev.target.result);
    reader.readAsText(file);
  }
};
</script>
</body>
</html>
