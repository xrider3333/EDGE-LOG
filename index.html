<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>EDGE LOG — Trade Tracker</title>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Bebas+Neue&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#05050a;color:#dde0ec;font-family:'JetBrains Mono',monospace;font-size:13px}
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-track{background:#0b0b12}
::-webkit-scrollbar-thumb{background:#252538}
input,select,textarea{background:#0d0d16;border:1px solid #1e1e2e;color:#dde0ec;font-family:'JetBrains Mono',monospace;font-size:12px;padding:9px 11px;width:100%;outline:none}
input:focus,select:focus,textarea:focus{border-color:#00e5a066}
button{cursor:pointer;font-family:'JetBrains Mono',monospace;border:none;transition:all .15s}
.btn-g{background:#00e5a014;border:1px solid #00e5a030;color:#00e5a0;padding:8px 18px;font-size:10px;letter-spacing:1px}
.btn-g:hover{background:#00e5a024}
.btn-r{background:#ff3d5a14;border:1px solid #ff3d5a30;color:#ff3d5a;padding:8px 18px;font-size:10px;letter-spacing:1px}
.btn-d{background:#0d0d16;border:1px solid #1e1e2e;color:#505068;padding:8px 18px;font-size:10px;letter-spacing:1px}
.btn-ghost{background:none;border:none;color:#404058;font-size:10px;letter-spacing:2px;padding:12px 18px;border-bottom:2px solid transparent}
.btn-ghost:hover{color:#8080a0}
.btn-ghost.active{color:#00e5a0;border-bottom-color:#00e5a0}
.drop-zone{border:1px dashed #252538;padding:50px 20px;text-align:center;cursor:pointer;background:#09090f;transition:all .15s}
.drop-zone:hover,.drop-zone.drag{border-color:#00e5a0;background:#00e5a008}
.topbar{background:#080810;border-bottom:1px solid #141422;display:flex;align-items:stretch;padding:0 20px;gap:2px;position:sticky;top:0;z-index:100}
.content{padding:20px 24px;max-width:1120px;margin:0 auto}
.section{border:1px solid #141422}
.sec-hd{background:#0b0b12;padding:10px 16px;border-bottom:1px solid #141422;font-size:10px;letter-spacing:2px;color:#505068}
</style>
</head>
<body>
<div id="app"></div>

<script>
// PRESETS + Helpers
const PRESETS = {
  ES:{tv:12.50,ts:0.25}, MES:{tv:1.25,ts:0.25}, NQ:{tv:5.00,ts:0.25},
  MNQ:{tv:0.50,ts:0.25}, CL:{tv:10.00,ts:0.01}
};

function getBaseSymbol(sym) {
  return sym.replace(/[^A-Za-z]/g, '').slice(0,3).toUpperCase();
}

function calcPnl(sym, type, entry, exit, size, fees=0) {
  const base = getBaseSymbol(sym);
  const p = PRESETS[base] || PRESETS.ES;
  const dir = type === 'LONG' ? 1 : -1;
  const ticks = (exit - entry) / p.ts;
  return +((ticks * p.tv * size) - fees).toFixed(2);
}

let db=null, auth=null, colRef=null, unsubTrades=null;
let trades=[], currentUser=null, activeTab='import';

// ── Fixed NinjaTrader Parser ─────────────────────────────────────
function parseCSV(text) {
  const lines = text.split('\n').filter(l => l.trim());
  if (lines.length < 2) return alert('CSV is empty');

  function parseLine(line) {
    const result = [];
    let current = '', inQuotes = false;
    for (let char of line) {
      if (char === '"') inQuotes = !inQuotes;
      else if (char === ',' && !inQuotes) {
        result.push(current.trim());
        current = '';
      } else current += char;
    }
    result.push(current.trim());
    return result.map(f => f.replace(/^"|"$/g, '').trim());
  }

  const headers = parseLine(lines[0]).map(h => h.toLowerCase().trim());
  let imported = 0;

  for (let i = 1; i < lines.length; i++) {
    const row = parseLine(lines[i]);
    if (row.length < 5) continue;

    const get = (keys) => {
      for (let k of keys) {
        const idx = headers.findIndex(h => h.includes(k));
        if (idx !== -1 && row[idx]) return row[idx];
      }
      return '';
    };

    let symbol = get(['symbol']) || 'MES';
    const qty = parseInt(get(['qty'])) || 1;
    const buyPrice = parseFloat(get(['buyprice']));
    const sellPrice = parseFloat(get(['sellprice']));

    let type = 'LONG';
    let entry = buyPrice;
    let exitPrice = sellPrice;

    if (!buyPrice && sellPrice) {
      type = 'SHORT';
      entry = sellPrice;
      exitPrice = buyPrice || sellPrice;
    }

    let date = '';
    let dt = get(['boughttimestamp']) || get(['soldtimestamp']);
    if (dt) {
      const m = dt.match(/(\d{2})\/(\d{2})\/(\d{4})/);
      if (m) date = `${m[3]}-${m[1]}-${m[2]}`;
    }

    if (entry && exitPrice && !isNaN(entry) && !isNaN(exitPrice)) {
      const pnl = calcPnl(symbol, type, entry, exitPrice, qty);
      addTrade({
        date: date,
        symbol: getBaseSymbol(symbol),
        type: type,
        entry: entry,
        exit: exitPrice,
        size: qty,
        fees: 0,
        setup: '—',
        notes: 'Imported from NinjaTrader',
        chartUrl: '',
        pnl: pnl
      });
      imported++;
    }
  }

  setTimeout(() => {
    alert(`✅ Successfully imported ${imported} trades!`);
    activeTab = 'journal';
    renderApp();
  }, 500);
}

async function addTrade(t) {
  if (colRef) await colRef.add({...t, createdAt: firebase.firestore.FieldValue.serverTimestamp()});
}

// Simple render for now (you can expand later)
function renderApp() {
  let html = `
  <div class="topbar">
    <div class="topbar-brand">
      <div style="font-family:'Bebas Neue';font-size:24px;color:#00e5a0">EDGE LOG</div>
    </div>
    <button class="btn-ghost ${activeTab==='overview'?'active':''}" onclick="activeTab='overview';renderApp()">OVERVIEW</button>
    <button class="btn-ghost ${activeTab==='journal'?'active':''}" onclick="activeTab='journal';renderApp()">JOURNAL</button>
    <button class="btn-ghost ${activeTab==='import'?'active':''}" onclick="activeTab='import';renderApp()">IMPORT</button>
  </div>
  <div class="content">`;

  if (activeTab === 'import') {
    html += `
    <div style="max-width:700px">
      <div class="section">
        <div class="sec-hd">NINJATRADER IMPORT (Fixed)</div>
        <div style="padding:25px">
          <div id="drop-zone" class="drop-zone">
            <div style="font-size:48px;margin-bottom:15px">📂</div>
            <div>Drop your NinjaTrader CSV here</div>
            <div style="font-size:11px;color:#606080;margin-top:8px">Supports your Performance.csv format</div>
            <input type="file" id="csv-input" accept=".csv" style="display:none">
          </div>
        </div>
      </div>
      <div style="margin-top:20px;text-align:center;font-size:11px;color:#505070">
        ${trades.length} trades currently loaded
      </div>
    </div>`;
  } else if (activeTab === 'journal') {
    html += `<div style="color:#00e5a0">Journal tab - ${trades.length} trades loaded</div>`;
  } else {
    html += `<div style="color:#00e5a0">Overview - Total P&L: ${trades.reduce((a,t)=>a+t.pnl,0).toFixed(2)}</div>`;
  }

  html += `</div>`;
  document.getElementById('app').innerHTML = html;

  // Setup drop zone
  setTimeout(() => {
    const dz = document.getElementById('drop-zone');
    const input = document.getElementById('csv-input');
    if (dz) {
      dz.onclick = () => input.click();
      input.onchange = e => {
        const file = e.target.files[0];
        if (file) {
          const reader = new FileReader();
          reader.onload = ev => parseCSV(ev.target.result);
          reader.readAsText(file);
        }
      };
      dz.ondragover = e => {e.preventDefault(); dz.classList.add('drag');};
      dz.ondragleave = () => dz.classList.remove('drag');
      dz.ondrop = e => {
        e.preventDefault();
        dz.classList.remove('drag');
        const file = e.dataTransfer.files[0];
        if (file) {
          const reader = new FileReader();
          reader.onload = ev => parseCSV(ev.target.result);
          reader.readAsText(file);
        }
      };
    }
  }, 100);
}

// Boot
(function boot() {
  document.getElementById('app').innerHTML = `
    <div style="height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px">
      <div class="spinner" style="width:32px;height:32px"></div>
      <div style="letter-spacing:2px;color:#505070">LOADING EDGE LOG...</div>
    </div>`;

  const cfg = { /* your firebase config */ 
    apiKey: "AIzaSyD0Q3ms5xZJ5SFl7aHh3oYIkGJJAUiRRBI",
    authDomain: "edge-tracker-b55af.firebaseapp.com",
    projectId: "edge-tracker-b55af",
    storageBucket: "edge-tracker-b55af.firebasestorage.app",
    messagingSenderId: "351905859153",
    appId: "1:351905859153:web:9657ca100cf3463ca89a70"
  };

  try {
    firebase.initializeApp(cfg);
    auth = firebase.auth();
    db = firebase.firestore();

    auth.onAuthStateChanged(user => {
      if (user) {
        colRef = db.collection('users').doc(user.uid).collection('trades');
        colRef.orderBy('date','asc').onSnapshot(snap => {
          trades = snap.docs.map(d => ({id:d.id, ...d.data()}));
          renderApp();
        });
      } else {
        renderApp();   // Skip login for now
      }
    });
  } catch(e) {
    console.error(e);
    alert("Firebase error - check console");
  }
})();
</script>
</body>
</html>
