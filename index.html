<script>
// ═══════════════════════════════════════════════════════════
// EDGE LOG — Vanilla JS Trade Tracker (with improved NT8 import)
// ═══════════════════════════════════════════════════════════
const PRESETS = {
  ES:{tv:12.50,ts:0.25}, NQ:{tv:5.00,ts:0.25}, MES:{tv:1.25,ts:0.25},
  MNQ:{tv:0.50,ts:0.25}, CL:{tv:10.00,ts:0.01}, GC:{tv:10.00,ts:0.10},
  SI:{tv:25.00,ts:0.005}, ZB:{tv:31.25,ts:0.03125}, RTY:{tv:5.00,ts:0.10},
  YM:{tv:5.00,ts:1.00}, MGC:{tv:1.00,ts:0.10}, MCL:{tv:1.00,ts:0.01},
  ZN:{tv:31.25,ts:0.015625}, ZC:{tv:12.50,ts:0.25}, NG:{tv:10.00,ts:0.001},
};
const SETUPS = ["—","Breakout","Pullback","Reversal","Trend","Gap Fill","VWAP","S/D Zone","Momentum","ICT","Order Block","FVG","Other"];
const SYM_LIST = Object.keys(PRESETS);

let db=null, auth=null, colRef=null, unsubTrades=null;
let trades=[], currentUser=null, activeTab='overview', activeChart='equity';
let formOpen=true;

// ── Helpers ──────────────────────────────────────────────────────────
function calcPnl(sym,type,entry,exit,size,fees){
  const p=PRESETS[sym]; if(!p) return 0;
  const dir=type==='LONG'?1:-1;
  const gross=((exit-entry)*dir/p.ts)*p.tv*size;
  return +((gross-(fees||0)).toFixed(2));
}
function fmt(n){return (n>=0?'+':'')+n.toFixed(2);}
function gc(n){return n>=0?'#00e5a0':'#ff3d5a';}
function stdDev(arr){
  if(arr.length<2)return 0;
  const m=arr.reduce((a,b)=>a+b,0)/arr.length;
  return Math.sqrt(arr.reduce((s,v)=>s+(v-m)**2,0)/(arr.length-1));
}
function el(id){return document.getElementById(id);}

// ── Stats calculation ─────────────────────────────────────────────────
function calcStats(){
  if(!trades.length)return null;
  const wins=trades.filter(t=>t.pnl>0), losses=trades.filter(t=>t.pnl<0);
  const wr=wins.length/trades.length;
  const avgW=wins.length?wins.reduce((s,t)=>s+t.pnl,0)/wins.length:0;
  const avgL=losses.length?Math.abs(losses.reduce((s,t)=>s+t.pnl,0)/losses.length):0;
  const grossW=wins.reduce((s,t)=>s+t.pnl,0);
  const grossL=Math.abs(losses.reduce((s,t)=>s+t.pnl,0));
  const pf=grossL>0?grossW/grossL:grossW>0?Infinity:0;
  const ev=wr*avgW-(1-wr)*(avgL||0);
  const net=trades.reduce((s,t)=>s+t.pnl,0);
  let peak=0,maxDD=0,cur=0;
  trades.forEach(t=>{cur+=t.pnl;if(cur>peak)peak=cur;maxDD=Math.max(maxDD,peak-cur);});
  const byDay={};
  trades.forEach(t=>{byDay[t.date]=(byDay[t.date]||0)+t.pnl;});
  const dv=Object.values(byDay);
  const meanD=dv.length?dv.reduce((a,b)=>a+b,0)/dv.length:0;
  const sharpe=dv.length>1?(meanD/(stdDev(dv)||1))*Math.sqrt(252):0;
  let streak=0,sdir=0;
  for(let i=trades.length-1;i>=0;i--){
    const d=trades[i].pnl>0?1:-1;
    if(!streak){streak=d;sdir=d;}else if(d===sdir)streak+=d;else break;
  }
  const syms={},setups={};
  trades.forEach(t=>{
    if(!syms[t.symbol])syms[t.symbol]={count:0,pnl:0,wins:0};
    syms[t.symbol].count++;syms[t.symbol].pnl+=t.pnl;if(t.pnl>0)syms[t.symbol].wins++;
    const k=t.setup||'—';
    if(!setups[k])setups[k]={count:0,pnl:0,wins:0};
    setups[k].count++;setups[k].pnl+=t.pnl;if(t.pnl>0)setups[k].wins++;
  });
  const rr=avgL>0?avgW/avgL:0;
  const totalFees=trades.reduce((s,t)=>s+(t.fees||0),0);
  return{wr,avgW,avgL,pf,ev,net,maxDD,sharpe,streak,sdir,wins:wins.length,losses:losses.length,
         total:trades.length,syms,setups,totalFees,rr,byDay};
}

function makeSVG(w,h,content){

// ── Firebase (unchanged) ─────────────────────────────────────────────
function initFB(cfg){ /* your original initFB */ 
  try{
    if(firebase.apps.length)return true;
    firebase.initializeApp(cfg);
    auth=firebase.auth();
    db=firebase.firestore();
    return true;
  }catch(e){console.error(e);return false;}
}
function subscribeToTrades(uid){ /* your original */ 
  colRef=db.collection('users').doc(uid).collection('trades');
  if(unsubTrades)unsubTrades();
  unsubTrades=colRef.orderBy('date','asc').onSnapshot(snap=>{
    trades=snap.docs.map(d=>({id:d.id,...d.data()}));
    renderApp();
  },e=>console.error('Firestore error',e));
}
async function addTrade(t){
  if(!colRef)return;
  await colRef.add({...t,createdAt:firebase.firestore.FieldValue.serverTimestamp()});
}
async function deleteTrade(id){
  if(!colRef||!confirm('Delete this trade?'))return;
  await colRef.doc(id).delete();
}

// ── IMPROVED CSV IMPORT FOR NINJATRADER 8 ─────────────────────────────
function parseCSV(text){
  const lines = text.split('\n').map(l => l.trim()).filter(Boolean);
  if(lines.length < 2) return alert('CSV appears empty.');

  // Robust CSV parser that handles quoted fields with commas
  function parseCSVLine(line) {
    const result = [];
    let current = '';
    let inQuotes = false;
    for (let i = 0; i < line.length; i++) {
      const char = line[i];
      if (char === '"') {
        inQuotes = !inQuotes;
      } else if (char === ',' && !inQuotes) {
        result.push(current.trim());
        current = '';
      } else {
        current += char;
      }
    }
    result.push(current.trim());
    return result.map(field => field.replace(/^"|"$/g, '').trim());
  }

  const headers = parseCSVLine(lines[0]).map(h => h.toLowerCase().trim());
  console.log('CSV Headers detected:', headers);

  let imported = 0;
  let skipped = 0;

  for (let i = 1; i < lines.length; i++) {
    const row = parseCSVLine(lines[i]);
    if (row.length < 5) continue;

    const getValue = (keys) => {
      for (const key of keys) {
        const idx = headers.findIndex(h => h.includes(key));
        if (idx >= 0 && row[idx]) {
          return row[idx].replace(/"/g, '').trim();
        }
      }
      return '';
    };

    // Symbol
    let symbolRaw = getValue(['instrument','symbol','market','product']);
    const symbol = (symbolRaw || 'ES').split(' ')[0].toUpperCase();

    // Direction
    const action = getValue(['action','side','orderaction','buy/sell','direction','e/x']).toUpperCase();
    const type = (action.includes('BUY') || action.includes('LONG') || action.includes('ENTRY')) ? 'LONG' : 'SHORT';

    // Quantity
    const qtyStr = getValue(['qty','quantity','contracts','size','shares']);
    const size = parseInt(qtyStr) || 1;

    // Prices
    const entry = parseFloat(getValue(['avg entry','entry price','entryprice','averageprice','entry']));
    const exitPrice = parseFloat(getValue(['avg exit','exit price','exitprice','averageexitprice','exit']));

    // Fees
    const fees = parseFloat(getValue(['commission','fee','fees','comms'])) || 0;

    // Date (handles various formats)
    let dateTime = getValue(['entry time','time','date','entrydate','exec time','timestamp','exit time']);
    let date = '';
    if (dateTime) {
      const dateMatch = dateTime.match(/(\d{4}-\d{2}-\d{2})|(\d{1,2}\/\d{1,2}\/\d{2,4})/);
      if (dateMatch) {
        if (dateMatch[1]) date = dateMatch[1];
        else {
          const parts = dateMatch[2].split('/');
          if (parts.length === 3) date = `${parts[2]}-${parts[0].padStart(2,'0')}-${parts[1].padStart(2,'0')}`;
        }
      }
    }

    if (!entry || !exitPrice || !date || isNaN(entry) || isNaN(exitPrice)) {
      skipped++;
      continue;
    }

    const useSym = PRESETS[symbol] ? symbol : 'ES';
    const pnl = calcPnl(useSym, type, entry, exitPrice, size, fees);

    addTrade({
      date: date,
      symbol: useSym,
      type: type,
      entry: entry,
      exit: exitPrice,
      size: size,
      fees: fees,
      setup: '—',
      notes: 'Imported from NinjaTrader',
      chartUrl: '',
      pnl: pnl
    });

    imported++;
  }

  setTimeout(() => {
    alert(`✅ Import finished!\n\nImported: ${imported} trades\nSkipped: ${skipped} rows (missing required data)`);
    activeTab = 'journal';
    renderApp();
  }, 800);
}

// ── Export (unchanged) ───────────────────────────────────────────────
function exportCSV(){
  const hdr='Date,Symbol,Direction,Entry,Exit,Contracts,Fees,Net P&L,Setup,Notes,Chart URL\n';
  const rows=trades.map(t=>`${t.date},${t.symbol},${t.type},${t.entry},${t.exit},${t.size},${t.fees||0},${t.pnl},"${t.setup||'—'}","${(t.notes||'').replace(/"/g,"'")}","${t.chartUrl||''}"`).join('\n');
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([hdr+rows],{type:'text/csv'}));
  a.download=`edgelog_${new Date().toISOString().slice(0,10)}.csv`;a.click();
}
