<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>EDGE LOG — Trade Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Bebas+Neue&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#05050a;color:#dde0ec;font-family:'JetBrains Mono',monospace;font-size:13px}
.spinner{display:inline-block;width:28px;height:28px;border:3px solid #1e1e2e;border-top-color:#00e5a0;border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.btn-g{background:#00e5a014;border:1px solid #00e5a0;color:#00e5a0;padding:10px 20px;cursor:pointer}
.drop-zone{border:2px dashed #252538;padding:50px;text-align:center;background:#09090f;cursor:pointer}
.drop-zone:hover{border-color:#00e5a0}
</style>
</head>
<body>

<div id="app" style="min-height:100vh;padding:40px">
  <h1 style="font-family:'Bebas Neue',sans-serif;font-size:48px;letter-spacing:4px;color:#00e5a0;text-align:center;margin-bottom:10px">EDGE LOG</h1>
  <p style="text-align:center;color:#505070;margin-bottom:40px">Futures Trade Tracker</p>

  <div style="max-width:700px;margin:0 auto">
    <div style="background:#0b0b12;border:1px solid #141422;padding:25px;border-radius:8px">
      <h2 style="margin-bottom:20px;color:#00e5a0">NinjaTrader CSV Import Test</h2>
      
      <div id="status" style="margin-bottom:20px;font-size:14px;color:#f5c842">
        Ready — Drop your NinjaTrader CSV file below
      </div>

      <div id="drop-zone" class="drop-zone">
        <div style="font-size:48px;margin-bottom:15px">📂</div>
        <div style="font-size:15px">DROP NINJATRADER CSV HERE</div>
        <div style="font-size:12px;color:#606080;margin-top:10px">or click to browse</div>
        <input type="file" id="file-input" accept=".csv" style="display:none">
      </div>

      <div id="result" style="margin-top:25px;min-height:100px;font-size:13px"></div>
    </div>

    <div style="margin-top:30px;text-align:center;font-size:12px;color:#383850">
      Firebase is currently disabled to avoid loading issues.<br>
      You can still test the CSV import. Trades will NOT be saved.
    </div>
  </div>
</div>

<script>
// Simple CSV parser + P&L calculator for testing
const PRESETS = {
  ES:{tv:12.50,ts:0.25}, NQ:{tv:5.00,ts:0.25}, MES:{tv:1.25,ts:0.25},
  MNQ:{tv:0.50,ts:0.25}, CL:{tv:10.00,ts:0.01}
};

function calcPnl(sym, type, entry, exit, size, fees) {
  const p = PRESETS[sym] || PRESETS.ES;
  const dir = type === 'LONG' ? 1 : -1;
  const gross = ((exit - entry) * dir / p.ts) * p.tv * size;
  return +((gross - (fees || 0)).toFixed(2));
}

function parseCSV(text) {
  const lines = text.split('\n').filter(l => l.trim());
  if (lines.length < 2) return alert("CSV is empty");

  const headers = lines[0].toLowerCase().split(',').map(h => h.trim().replace(/"/g,''));

  let imported = 0;
  const results = [];

  for (let i = 1; i < lines.length; i++) {
    const row = lines[i].split(',').map(field => field.replace(/"/g,'').trim());
    if (row.length < 4) continue;

    const get = (keys) => {
      for (let key of keys) {
        const idx = headers.findIndex(h => h.includes(key));
        if (idx > -1 && row[idx]) return row[idx];
      }
      return '';
    };

    const symbolRaw = get(['instrument','symbol']);
    const symbol = (symbolRaw || 'ES').split(' ')[0].toUpperCase();

    const action = get(['action','side','direction']).toUpperCase();
    const type = action.includes('BUY') || action.includes('LONG') ? 'LONG' : 'SHORT';

    const size = parseInt(get(['qty','quantity','contracts','size'])) || 1;
    const entry = parseFloat(get(['avg entry','entry price','entry']));
    const exitPrice = parseFloat(get(['avg exit','exit price','exit']));
    const fees = parseFloat(get(['commission','fee','fees'])) || 0;

    if (!entry || !exitPrice) continue;

    const pnl = calcPnl(symbol, type, entry, exitPrice, size, fees);

    results.push(`${symbol} ${type} ${size} @ ${entry} → ${exitPrice} | P&L: ${pnl > 0 ? '+' : ''}$${pnl}`);
    imported++;
  }

  document.getElementById('result').innerHTML = `
    <div style="color:#00e5a0">✅ Imported ${imported} trades successfully (preview only)</div>
    <div style="margin-top:15px;font-size:12px;max-height:300px;overflow:auto">${results.join('<br>')}</div>
  `;
}

// Drop zone setup
const dropZone = document.getElementById('drop-zone');
const fileInput = document.getElementById('file-input');

dropZone.onclick = () => fileInput.click();
fileInput.onchange = e => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => parseCSV(ev.target.result);
  reader.readAsText(file);
};

dropZone.ondragover = e => { e.preventDefault(); dropZone.style.borderColor = '#00e5a0'; };
dropZone.ondragleave = () => dropZone.style.borderColor = '#252538';
dropZone.ondrop = e => {
  e.preventDefault();
  dropZone.style.borderColor = '#252538';
  const file = e.dataTransfer.files[0];
  if (file) {
    const reader = new FileReader();
    reader.onload = ev => parseCSV(ev.target.result);
    reader.readAsText(file);
  }
};
</script>
</body>
</html>
