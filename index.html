<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>EDGE LOG — NT Import</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Bebas+Neue&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#05050a;color:#dde0ec;font-family:'JetBrains Mono',monospace;font-size:13px}
.spinner{display:inline-block;width:28px;height:28px;border:3px solid #1e1e2e;border-top-color:#00e5a0;border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.drop-zone{border:2px dashed #252538;padding:60px 20px;text-align:center;background:#09090f;cursor:pointer;transition:all .2s}
.drop-zone:hover,.drop-zone.drag{border-color:#00e5a0;background:#00e5a008}
h1{font-family:'Bebas Neue',sans-serif;font-size:42px;letter-spacing:4px;color:#00e5a0}
</style>
</head>
<body>

<div style="padding:40px;max-width:900px;margin:0 auto">
  <h1 style="text-align:center">EDGE LOG</h1>
  <p style="text-align:center;color:#505070;margin-bottom:30px">NinjaTrader Import (Fixed for your headers)</p>

  <div style="background:#0b0b12;border:1px solid #141422;padding:30px;border-radius:8px">
    <div id="status" style="margin-bottom:20px;padding:12px;background:#1a1a2a;border-radius:4px;font-size:14px">
      Drop your CSV file below
    </div>

    <div id="drop-zone" class="drop-zone">
      <div style="font-size:60px;margin-bottom:20px">📂</div>
      <div style="font-size:16px">DROP YOUR NINJATRADER CSV HERE</div>
      <div style="font-size:12px;color:#606080;margin-top:10px">or click to browse</div>
      <input type="file" id="file-input" accept=".csv" style="display:none">
    </div>

    <div id="result" style="margin-top:30px;font-size:12.5px;max-height:450px;overflow:auto;line-height:1.5"></div>
  </div>
</div>

<script>
const PRESETS = {
  ES:{tv:12.50,ts:0.25}, NQ:{tv:5.00,ts:0.25}, MES:{tv:1.25,ts:0.25},
  MNQ:{tv:0.50,ts:0.25}, CL:{tv:10.00,ts:0.01}, GC:{tv:10.00,ts:0.10}
};

function calcPnl(sym, type, entry, exit, size, fees) {
  const p = PRESETS[sym] || PRESETS.ES;
  const dir = type === 'LONG' ? 1 : -1;
  const gross = ((exit - entry) * dir / p.ts) * p.tv * size;
  return +((gross - (fees || 0)).toFixed(2));
}

function parseCSV(text) {
  const lines = text.split('\n').filter(l => l.trim());
  if (lines.length < 2) {
    document.getElementById('result').innerHTML = '<span style="color:#ff3d5a">CSV is empty.</span>';
    return;
  }

  function parseLine(line) {
    const result = [];
    let current = '', inQuotes = false;
    for (let char of line) {
      if (char === '"') inQuotes = !inQuotes;
      else if (char === ',' && !inQuotes) {
        result.push(current.trim());
        current = '';
      } else current += char;
    }
    result.push(current.trim());
    return result.map(f => f.replace(/^"|"$/g, '').trim());
  }

  const headers = parseLine(lines[0]).map(h => h.toLowerCase().trim());
  console.log("Headers:", headers);

  let imported = 0;
  const preview = [];

  for (let i = 1; i < lines.length; i++) {
    const row = parseLine(lines[i]);
    if (row.length < headers.length) continue;

    const get = (keys) => {
      for (let key of keys) {
        const idx = headers.findIndex(h => h.includes(key));
        if (idx !== -1 && row[idx]) return row[idx];
      }
      return '';
    };

    const symbol = (get(['symbol']) || 'ES').split(' ')[0].toUpperCase();

    // Direction from buy/sell
    const buyPrice = parseFloat(get(['buyprice']));
    const sellPrice = parseFloat(get(['sellprice']));
    const qty = parseInt(get(['qty', 'quantity'])) || 1;

    let type = 'LONG';
    let entry = buyPrice;
    let exitPrice = sellPrice;

    // If sellprice exists and is used for closing a long, or if buyprice is missing
    if (!buyPrice && sellPrice) {
      type = 'SHORT';
      entry = sellPrice;
      exitPrice = buyPrice || sellPrice; // fallback
    }

    const fees = 0; // your file doesn't seem to have commission column

    const boughtts = get(['boughttimestamp']);
    const soldts = get(['soldtimestamp']);
    let date = '';
    if (boughtts) {
      const match = boughtts.match(/(\d{4}-\d{2}-\d{2})/);
      date = match ? match[1] : boughtts.slice(0,10);
    }

    if (entry && exitPrice && !isNaN(entry) && !isNaN(exitPrice)) {
      const pnl = calcPnl(symbol, type, entry, exitPrice, qty, fees);
      preview.push(`${date || '—'} | ${symbol} ${type} ${qty}x | Entry ${entry} → Exit ${exitPrice} | <span style="color:${pnl>=0?'#00e5a0':'#ff3d5a'}">P&L ${pnl>=0?'+' : ''}$${pnl}</span>`);
      imported++;
    }
  }

  const resultEl = document.getElementById('result');
  if (imported === 0) {
    resultEl.innerHTML = `<span style="color:#ff3d5a">Still 0 trades found.</span><br><br>Please paste the first 5 lines of your CSV here so I can adjust further.`;
  } else {
    resultEl.innerHTML = `
      <div style="color:#00e5a0;font-size:15px;margin-bottom:15px">✅ ${imported} trades imported successfully!</div>
      ${preview.join('<br>')}
      <div style="margin-top:25px;color:#505070;font-size:11px">
        This is a preview only. Once it works, we can add it back to your full app with saving.
      </div>`;
  }
}

// Drop zone
const dropZone = document.getElementById('drop-zone');
const fileInput = document.getElementById('file-input');

dropZone.onclick = () => fileInput.click();
fileInput.onchange = e => {
  const file = e.target.files[0];
  if (file) {
    document.getElementById('status').textContent = `Processing ${file.name}...`;
    const reader = new FileReader();
    reader.onload = ev => parseCSV(ev.target.result);
    reader.readAsText(file);
  }
};

dropZone.ondragover = e => { e.preventDefault(); dropZone.classList.add('drag'); };
dropZone.ondragleave = () => dropZone.classList.remove('drag');
dropZone.ondrop = e => {
  e.preventDefault();
  dropZone.classList.remove('drag');
  const file = e.dataTransfer.files[0];
  if (file) {
    document.getElementById('status').textContent = `Processing ${file.name}...`;
    const reader = new FileReader();
    reader.onload = ev => parseCSV(ev.target.result);
    reader.readAsText(file);
  }
};
</script>
</body>
</html>
