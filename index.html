// ═══════════════════════════════════════════════════════════════

const VERSION = '5.0';

const PRESETS = {
  ES:{tv:12.50,ts:0.25}, MES:{tv:1.25,ts:0.25}, NQ:{tv:5.00,ts:0.25},
  MNQ:{tv:0.50,ts:0.25}, CL:{tv:10.00,ts:0.01}, GC:{tv:10.00,ts:0.10},
  SI:{tv:25.00,ts:0.005}, ZB:{tv:31.25,ts:0.03125}, RTY:{tv:5.00,ts:0.10},
  YM:{tv:5.00,ts:1.00}, MGC:{tv:1.00,ts:0.10}, MCL:{tv:1.00,ts:0.01},
  ZN:{tv:31.25,ts:0.015625}, ZC:{tv:12.50,ts:0.25}, NG:{tv:10.00,ts:0.001},
};
const SETUPS = ['—','Breakout','Pullback','Reversal','Trend','Gap Fill','VWAP','S/D Zone','Momentum','ICT','Order Block','FVG','Other'];
const SYM_LIST = Object.keys(PRESETS);
const TABS = ['overview','journal','analytics','import','export'];

let db=null, auth=null, colRef=null, unsub=null;
let trades=[], currentUser=null, activeTab='overview', activeChart='equity';
let formOpen=true, editTrade=null, showModal=false;
let defaultFee=4.50, autoHandle=null, autoTimer=null, autoInterval=60;

// ── Helpers ──────────────────────────────────────────────────────
function el(id){return document.getElementById(id);}
function gc(n){return n>=0?'#00e5a0':'#ff3d5a';}
function fmt(n){return (n>=0?'+':'')+n.toFixed(2);}
function pct(n){return (n*100).toFixed(1)+'%';}
function getBaseSym(s){return (s||'').replace(/[^A-Za-z]/g,'').slice(0,3).toUpperCase()||'ES';}

function calcPnl(sym,type,entry,exit,size,fees){
  const p=PRESETS[sym]||PRESETS.MES;
  const dir=type==='LONG'?1:-1;
  return +((((exit-entry)*dir)/p.ts)*p.tv*size-(fees||0)).toFixed(2);
}

function stdDev(arr){
  if(arr.length<2)return 0;
  const m=arr.reduce((a,b)=>a+b,0)/arr.length;
  return Math.sqrt(arr.reduce((s,v)=>s+(v-m)**2,0)/(arr.length-1));
}

// ── Stats ─────────────────────────────────────────────────────────
function calcStats(tds){
  if(!tds||!tds.length)return null;
  const wins=tds.filter(t=>t.pnl>0), losses=tds.filter(t=>t.pnl<0);
  const wr=wins.length/tds.length;
  const avgW=wins.length?wins.reduce((s,t)=>s+t.pnl,0)/wins.length:0;
  const avgL=losses.length?Math.abs(losses.reduce((s,t)=>s+t.pnl,0)/losses.length):0;
  const grossW=wins.reduce((s,t)=>s+t.pnl,0);
  const grossL=Math.abs(losses.reduce((s,t)=>s+t.pnl,0));
  const gross=tds.reduce((s,t)=>s+(t.pnl+(t.fees||0)),0);
  const pf=grossL>0?grossW/grossL:grossW>0?99:0;
  const ev=wr*avgW-(1-wr)*(avgL||0);
  const net=tds.reduce((s,t)=>s+t.pnl,0);
  const totalFees=tds.reduce((s,t)=>s+(t.fees||0),0);
  const feeImpact=gross>0?(totalFees/gross)*100:0;

  // Drawdown
  let peak=0,maxDD=0,cur=0,ddStart='',ddEnd='';
  let tempPeak=0,tempStart='';
  tds.forEach(t=>{
    cur+=t.pnl;
    if(cur>peak){peak=cur;}
    const dd=peak-cur;
    if(dd>maxDD){maxDD=dd;}
  });

  // Streaks
  let maxWS=0,maxLS=0,curWS=0,curLS=0,curStreak=0,curDir=0;
  tds.forEach(t=>{
    const d=t.pnl>0?1:-1;
    if(!curDir){curDir=d;}
    if(d===curDir)curStreak++;
    else{curStreak=1;curDir=d;}
    if(d>0){maxWS=Math.max(maxWS,curStreak);curWS=curStreak;curLS=0;}
    else{maxLS=Math.max(maxLS,curStreak);curLS=curStreak;curWS=0;}
  });

  // Daily / sharpe
  const byDay={};
  tds.forEach(t=>{byDay[t.date]=(byDay[t.date]||0)+t.pnl;});
  const dv=Object.values(byDay);
  const meanD=dv.length?dv.reduce((a,b)=>a+b,0)/dv.length:0;
  const sharpe=dv.length>1?(meanD/(stdDev(dv)||1))*Math.sqrt(252):0;

  // Recovery factor
  const recovery=maxDD>0?net/maxDD:0;

  // Calmar
  const calmar=maxDD>0?net/maxDD:0;

  // Long vs Short
  const longs=tds.filter(t=>t.type==='LONG'), shorts=tds.filter(t=>t.type==='SHORT');
  const longPnl=longs.reduce((s,t)=>s+t.pnl,0);
  const shortPnl=shorts.reduce((s,t)=>s+t.pnl,0);
  const longWR=longs.length?longs.filter(t=>t.pnl>0).length/longs.length:0;
  const shortWR=shorts.length?shorts.filter(t=>t.pnl>0).length/shorts.length:0;

  // Best/Worst trade
  const best=tds.reduce((a,b)=>b.pnl>a.pnl?b:a);
  const worst=tds.reduce((a,b)=>b.pnl<a.pnl?b:a);

  // Best/Worst day
  const dayEntries=Object.entries(byDay);
  const bestDay=dayEntries.reduce((a,b)=>b[1]>a[1]?b:a,['',0]);
  const worstDay=dayEntries.reduce((a,b)=>b[1]<a[1]?b:a,['',0]);

  // By symbol / setup
  const syms={}, setups={};
  tds.forEach(t=>{
    if(!syms[t.symbol])syms[t.symbol]={count:0,pnl:0,wins:0,fees:0};
    syms[t.symbol].count++;syms[t.symbol].pnl+=t.pnl;syms[t.symbol].fees+=(t.fees||0);
    if(t.pnl>0)syms[t.symbol].wins++;
    const k=t.setup||'—';
    if(!setups[k])setups[k]={count:0,pnl:0,wins:0};
    setups[k].count++;setups[k].pnl+=t.pnl;if(t.pnl>0)setups[k].wins++;
  });

  // Monthly P&L
  const monthly={};
  tds.forEach(t=>{
    const m=t.date?t.date.slice(0,7):'unknown';
    if(!monthly[m])monthly[m]={pnl:0,trades:0,wins:0};
    monthly[m].pnl+=t.pnl;monthly[m].trades++;if(t.pnl>0)monthly[m].wins++;
  });

  // Day of week
  const dow={Mon:{pnl:0,t:0},Tue:{pnl:0,t:0},Wed:{pnl:0,t:0},Thu:{pnl:0,t:0},Fri:{pnl:0,t:0}};
  const dowKeys=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  tds.forEach(t=>{
    if(!t.date)return;
    const d=new Date(t.date+'T12:00:00');
    const k=dowKeys[d.getDay()];
    if(dow[k]){dow[k].pnl+=t.pnl;dow[k].t++;}
  });

  // Consecutive (current)
  let curSDir=0,curSLen=0;
  for(let i=tds.length-1;i>=0;i--){
    const d=tds[i].pnl>0?1:-1;
    if(!curSLen){curSLen=1;curSDir=d;}
    else if(d===curSDir)curSLen++;
    else break;
  }

  const rr=avgL>0?avgW/avgL:0;

  return{wr,avgW,avgL,pf,ev,net,gross,grossW,grossL,totalFees,feeImpact,
         maxDD,sharpe,recovery,calmar,rr,
         wins:wins.length,losses:losses.length,total:tds.length,
         maxWS,maxLS,curStreak:curSLen,curDir:curSDir,
         longs:longs.length,shorts:shorts.length,longPnl,shortPnl,longWR,shortWR,
         best,worst,bestDay,worstDay,
         byDay,syms,setups,monthly,dow};
}

// ── CSV Parsing ───────────────────────────────────────────────────
function parseLine(line){
  const r=[];let cur='',inQ=false;
  for(const c of line){
    if(c==='"')inQ=!inQ;
    else if(c===','&&!inQ){r.push(cur.trim());cur='';}
    else cur+=c;
  }
  r.push(cur.trim());
  return r.map(f=>f.replace(/^"|"$/g,'').trim());
}

function parseDate(str){
  if(!str)return '';
  // MM/DD/YYYY HH:MM:SS
  let m=str.match(/(\d{1,2})\/(\d{1,2})\/(\d{4})/);
  if(m)return m[3]+'-'+m[1].padStart(2,'0')+'-'+m[2].padStart(2,'0');
  // YYYY-MM-DD
  m=str.match(/(\d{4})-(\d{2})-(\d{2})/);
  if(m)return m[0];
  return str.slice(0,10);
}

// Detect CSV type from headers
function detectCSVType(hdr){
  const h=hdr.join(' ');
  if(h.includes('buyprice')||h.includes('sellprice')||h.includes('boughttimestamp'))return 'performance';
  if(h.includes('fill')&&h.includes('price'))return 'fills';
  if(h.includes('order')&&(h.includes('status')||h.includes('type')))return 'orders';
  if(h.includes('position')&&h.includes('quantity'))return 'positions';
  return 'generic';
}

function importFile(text, label){
  const lines=text.split('\n').filter(l=>l.trim());
  if(lines.length<2)return{imported:0,skipped:0,type:'empty'};
  const hdr=parseLine(lines[0]).map(h=>h.toLowerCase().replace(/\s+/g,''));
  const type=detectCSVType(hdr);
  const getCol=(row,keys)=>{
    for(const k of keys){
      const i=hdr.findIndex(h=>h.includes(k.replace(/\s/g,'')));
      if(i!==-1&&row[i]!=null)return row[i];
    }
    return '';
  };

  const batch=[];
  let skipped=0;

  if(type==='performance'||type==='generic'){
    // NinjaTrader performance / trade CSV
    for(let i=1;i<lines.length;i++){
      const row=parseLine(lines[i]);
      if(row.length<4)continue;
      const rawSym=getCol(row,['symbol','instrument'])||'MES';
      const sym=getBaseSym(rawSym);
      const useSym=PRESETS[sym]?sym:'MES';
      const qty=parseInt(getCol(row,['qty','quantity','contracts','size']))||1;

      // NT8 performance format
      const buyRaw=parseFloat(getCol(row,['buyprice','buy price','buypric']));
      const sellRaw=parseFloat(getCol(row,['sellprice','sell price','sellpric']));
      // generic entry/exit
      const entryRaw=parseFloat(getCol(row,['entry price','avg entry','entryprice','entry','open']));
      const exitRaw=parseFloat(getCol(row,['exit price','avg exit','exitprice','exit','close']));

      let entry,exit,dir;
      if(!isNaN(buyRaw)&&!isNaN(sellRaw)&&buyRaw>0&&sellRaw>0){
        entry=buyRaw;exit=sellRaw;
        dir=buyRaw<=sellRaw?'LONG':'SHORT';
      } else if(!isNaN(entryRaw)&&!isNaN(exitRaw)&&entryRaw>0&&exitRaw>0){
        entry=entryRaw;exit=exitRaw;
        const ds=(getCol(row,['action','side','direction','type'])||'').toLowerCase();
        dir=ds.includes('buy')||ds.includes('long')?'LONG':'SHORT';
      } else continue;

      const dtRaw=getCol(row,['boughttimestamp','soldtimestamp','entry time','entrydate','date','time','entrytime']);
      const date=parseDate(dtRaw);
      if(!date)continue;

      const feeRaw=parseFloat(getCol(row,['commission','fee','fees','comm']));
      const fee=isNaN(feeRaw)?defaultFee:feeRaw;

      const isDupe=trades.some(t=>t.date===date&&t.symbol===useSym&&Math.abs(t.entry-entry)<0.01&&t.size===qty);
      if(isDupe){skipped++;continue;}

      const pnl=calcPnl(useSym,dir,entry,exit,qty,fee);
      batch.push({date,symbol:useSym,type:dir,entry:+entry.toFixed(4),exit:+exit.toFixed(4),
        size:qty,fees:fee,setup:'—',notes:'',chartUrl:'',pnl,source:label||'Import'});
    }
  } else if(type==='fills'){
    // Fills — match buys to sells by symbol to construct round-turns
    const fillsBySymbol={};
    for(let i=1;i<lines.length;i++){
      const row=parseLine(lines[i]);
      const rawSym=getCol(row,['symbol','instrument'])||'MES';
      const sym=getBaseSym(rawSym);
      const useSym=PRESETS[sym]?sym:'MES';
      const side=(getCol(row,['side','action','direction'])||'').toLowerCase();
      const price=parseFloat(getCol(row,['fill price','price','fillprice']));
      const qty=parseInt(getCol(row,['qty','quantity','filled'])||'1');
      const dtRaw=getCol(row,['time','date','timestamp','filltime']);
      const date=parseDate(dtRaw);
      if(!price||!date)continue;
      if(!fillsBySymbol[useSym])fillsBySymbol[useSym]={buys:[],sells:[]};
      if(side.includes('buy')||side.includes('long'))
        fillsBySymbol[useSym].buys.push({price,qty,date});
      else
        fillsBySymbol[useSym].sells.push({price,qty,date});
    }
    Object.entries(fillsBySymbol).forEach(([sym,{buys,sells}])=>{
      const pairs=Math.min(buys.length,sells.length);
      for(let i=0;i<pairs;i++){
        const b=buys[i],s=sells[i];
        const dir=b.date<=s.date?'LONG':'SHORT';
        const entry=dir==='LONG'?b.price:s.price;
        const exit=dir==='LONG'?s.price:b.price;
        const qty=Math.min(b.qty,s.qty);
        const date=b.date<s.date?b.date:s.date;
        const isDupe=trades.some(t=>t.date===date&&t.symbol===sym&&Math.abs(t.entry-entry)<0.01);
        if(isDupe){skipped++;continue;}
        const pnl=calcPnl(sym,dir,entry,exit,qty,defaultFee);
        batch.push({date,symbol:sym,type:dir,entry:+entry.toFixed(4),exit:+exit.toFixed(4),
          size:qty,fees:defaultFee,setup:'—',notes:'',chartUrl:'',pnl,source:'Fills'});
      }
    });
  }

  return {imported:batch.length,skipped,type,batch};
}

async function commitBatch(batch){
  for(const t of batch)await addTrade(t);
}

// ── Auto-import (File System Access API) ──────────────────────────
async function startAutoImport(){
  if(!window.showOpenFilePicker){
    alert('Auto-import requires Chrome or Edge browser. Please use one of those.');return;
  }
  try{
    const [handle]=await window.showOpenFilePicker({types:[{description:'CSV',accept:{'text/csv':['.csv']}}]});
    autoHandle=handle;
    runAutoImport();
    el('auto-status').style.display='flex';
    el('auto-start-btn').style.display='none';
    el('auto-stop-btn').style.display='inline-block';
  }catch(e){if(e.name!=='AbortError')alert('Could not open file: '+e.message);}
}

async function runAutoImport(){
  if(!autoHandle)return;
  try{
    const file=await autoHandle.getFile();
    const text=await file.text();
    const result=importFile(text,'Auto-Import');
    if(result.batch&&result.batch.length>0){
      await commitBatch(result.batch);
      el('auto-last').textContent='Last sync: '+new Date().toLocaleTimeString()+' ('+result.imported+' new)';
    } else {
      el('auto-last').textContent='Last sync: '+new Date().toLocaleTimeString()+' (no new trades)';
    }
  }catch(e){console.error('Auto-import error:',e);}
  const secs=parseInt(el('auto-interval')?el('auto-interval').value:60)||60;
  autoTimer=setTimeout(runAutoImport,secs*1000);
}

function stopAutoImport(){
  autoHandle=null;
  if(autoTimer){clearTimeout(autoTimer);autoTimer=null;}
  if(el('auto-status'))el('auto-status').style.display='none';
  if(el('auto-start-btn'))el('auto-start-btn').style.display='inline-block';
  if(el('auto-stop-btn'))el('auto-stop-btn').style.display='none';
}

// ── SVG Charts ────────────────────────────────────────────────────
function svgLineChart(pts,color,W,H){
  if(pts.length<2)return '<p style="color:#404060;font-size:11px;padding:20px;text-align:center">Add at least 2 trades to see chart</p>';
  const PAD={t:12,r:20,b:32,l:60};
  const cw=W-PAD.l-PAD.r,ch=H-PAD.t-PAD.b;
  const ys=pts.map(p=>p.y);
  const minY=Math.min(0,...ys),maxY=Math.max(0,...ys),rangeY=maxY-minY||1;
  const sx=i=>PAD.l+(i/(pts.length-1))*cw;
  const sy=v=>PAD.t+ch-(((v-minY)/rangeY)*ch);
  const y0=sy(0);
  let path='M'+pts.map((p,i)=>sx(i)+','+sy(p.y)).join('L');
  // Fill under curve
  let fill='M'+sx(0)+','+sy(pts[0].y)+' L'+pts.map((p,i)=>sx(i)+','+sy(p.y)).join(' L')+' L'+sx(pts.length-1)+','+y0+' L'+sx(0)+','+y0+' Z';
  let dots=pts.map((p,i)=>'<circle cx="'+sx(i)+'" cy="'+sy(p.y)+'" r="3.5" fill="'+(p.pnl>=0?'#00e5a0':'#ff3d5a')+'" stroke="#05050a" stroke-width="1.5"/>').join('');
  let yticks='',ygrid='';
  for(let i=0;i<=4;i++){
    const v=minY+(rangeY*i/4),y=sy(v);
    yticks+='<text x="'+(PAD.l-8)+'" y="'+(y+4)+'" text-anchor="end" fill="#6060a0" font-size="10" font-family="JetBrains Mono,monospace">$'+v.toFixed(0)+'</text>';
    ygrid+='<line x1="'+PAD.l+'" y1="'+y+'" x2="'+(W-PAD.r)+'" y2="'+y+'" stroke="#111128" stroke-dasharray="2,6"/>';
  }
  const step=Math.max(1,Math.floor(pts.length/8));
  let xticks='';
  for(let i=0;i<pts.length;i+=step){
    xticks+='<text x="'+sx(i)+'" y="'+(H-6)+'" text-anchor="middle" fill="#6060a0" font-size="10" font-family="JetBrains Mono,monospace">'+(i+1)+'</text>';
  }
  const zero=minY<=0&&maxY>=0?'<line x1="'+PAD.l+'" y1="'+y0+'" x2="'+(W-PAD.r)+'" y2="'+y0+'" stroke="#252538" stroke-dasharray="4,4"/>':'';
  return '<svg width="100%" height="'+H+'" viewBox="0 0 '+W+' '+H+'" xmlns="http://www.w3.org/2000/svg" style="display:block">'+ygrid+zero+'<path d="'+fill+'" fill="'+color+'18"/>'+
    '<path d="'+path+'" stroke="'+color+'" stroke-width="2" fill="none"/>'+dots+yticks+xticks+'</svg>';
}

function svgBarChart(bars,W,H){
  if(!bars.length)return '';
  const PAD={t:10,r:20,b:30,l:65};
  const cw=W-PAD.l-PAD.r,ch=H-PAD.t-PAD.b;
  const vals=bars.map(b=>b.v);
  const minY=Math.min(0,...vals),maxY=Math.max(0,...vals),rangeY=maxY-minY||1;
  const bw=Math.max(4,(cw/bars.length)-3);
  const sy=v=>PAD.t+ch-(((v-minY)/rangeY)*ch);
  const y0=sy(0);
  let rects='',xlabels='';
  bars.forEach((b,i)=>{
    const x=PAD.l+(i/bars.length)*cw+(cw/bars.length-bw)/2;
    const yv=sy(b.v),bh=Math.abs(yv-y0);
    rects+='<rect x="'+x+'" y="'+(b.v>=0?yv:y0)+'" width="'+bw+'" height="'+Math.max(1,bh)+'" fill="'+(b.v>=0?'#00e5a040':'#ff3d5a40')+'" stroke="'+(b.v>=0?'#00e5a0':'#ff3d5a')+'" stroke-width="1" rx="1"/>';
    if(i%(Math.ceil(bars.length/8))===0)xlabels+='<text x="'+(x+bw/2)+'" y="'+(H-6)+'" text-anchor="middle" fill="#6060a0" font-size="9" font-family="JetBrains Mono,monospace">'+b.d+'</text>';
  });
  let yticks='',ygrid='';
  for(let i=0;i<=4;i++){
    const v=minY+(rangeY*i/4),y=sy(v);
    yticks+='<text x="'+(PAD.l-8)+'" y="'+(y+4)+'" text-anchor="end" fill="#6060a0" font-size="10" font-family="JetBrains Mono,monospace">$'+v.toFixed(0)+'</text>';
    ygrid+='<line x1="'+PAD.l+'" y1="'+y+'" x2="'+(W-PAD.r)+'" y2="'+y+'" stroke="#111128" stroke-dasharray="2,6" />';
  }
  return '<svg width="100%" height="'+H+'" viewBox="0 0 '+W+' '+H+'" xmlns="http://www.w3.org/2000/svg" style="display:block">'+ygrid+'<line x1="'+PAD.l+'" y1="'+y0+'" x2="'+(W-PAD.r)+'" y2="'+y0+'" stroke="#2a2a3e"/>'+rects+yticks+xlabels+'</svg>';
}

function svgLineXY(data,color,xFmt,W,H,refX){
  if(!data.length)return '';
  const PAD={t:16,r:65,b:32,l:65};
  const cw=W-PAD.l-PAD.r,ch=H-PAD.t-PAD.b;
  const xs=data.map(d=>d.x),ys=data.map(d=>d.y);
  const minX=Math.min(...xs),maxX=Math.max(...xs);
  const minY=Math.min(0,...ys),maxY=Math.max(0,...ys);
  const rX=maxX-minX||1,rY=maxY-minY||1;
  const sx=v=>PAD.l+((v-minX)/rX)*cw;
  const sy=v=>PAD.t+ch-(((v-minY)/rY)*ch);
  const y0=sy(0);
  const path='M'+data.map(d=>sx(d.x)+','+sy(d.y)).join('L');
  let yticks='',ygrid='';
  for(let i=0;i<=4;i++){
    const v=minY+(rY*i/4),y=sy(v);
    yticks+='<text x="'+(PAD.l-8)+'" y="'+(y+4)+'" text-anchor="end" fill="#6060a0" font-size="10" font-family="JetBrains Mono,monospace">$'+v.toFixed(0)+'</text>';
    ygrid+='<line x1="'+PAD.l+'" y1="'+y+'" x2="'+(W-PAD.r)+'" y2="'+y+'" stroke="#111128" stroke-dasharray="2,6"/>';
  }
  const xtickStep=Math.ceil(data.length/6);
  let xticks='';
  data.forEach((d,i)=>{
    if(i%xtickStep===0)xticks+='<text x="'+sx(d.x)+'" y="'+(H-6)+'" text-anchor="middle" fill="#6060a0" font-size="10" font-family="JetBrains Mono,monospace">'+(xFmt?xFmt(d.x):d.x)+'</text>';
  });
  const zero='<line x1="'+PAD.l+'" y1="'+y0+'" x2="'+(W-PAD.r)+'" y2="'+y0+'" stroke="#303048" stroke-dasharray="4,4"/><text x="'+(W-PAD.r+4)+'" y="'+(y0+4)+'" fill="#505070" font-size="9">0</text>';
  const you=refX!=null?'<line x1="'+sx(refX)+'" y1="'+PAD.t+'" x2="'+sx(refX)+'" y2="'+(PAD.t+ch)+'" stroke="#00e5a033" stroke-dasharray="3,3"/><text x="'+sx(refX)+'" y="'+(PAD.t-4)+'" text-anchor="middle" fill="#00e5a0" font-size="9">YOU</text>':'';
  return '<svg width="100%" height="'+H+'" viewBox="0 0 '+W+' '+H+'" xmlns="http://www.w3.org/2000/svg" style="display:block">'+ygrid+zero+you+'<path d="'+path+'" stroke="'+color+'" stroke-width="2.5" fill="none"/>'+yticks+xticks+'</svg>';
}

// ── Export ─────────────────────────────────────────────────────────
function exportCSV(){
  const h='Date,Symbol,Direction,Entry,Exit,Contracts,Fees,Net P&L,Gross P&L,Setup,Notes,Chart URL,Source\n';
  const rows=trades.map(t=>`${t.date},${t.symbol},${t.type},${t.entry},${t.exit},${t.size},${t.fees||0},${t.pnl},${(t.pnl+(t.fees||0)).toFixed(2)},"${t.setup||'—'}","${(t.notes||'').replace(/"/g,"'")}","${t.chartUrl||''}","${t.source||''}"`).join('\n');
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([h+rows],{type:'text/csv'}));
  a.download='edgelog_v'+VERSION+'_'+new Date().toISOString().slice(0,10)+'.csv';a.click();
}

          <input type="file" id="csv-input" accept=".csv" multiple style="display:none"/>
        </div>
        <div id="import-result" style="display:none;padding:12px 16px;background:#09090f;border:1px solid #181828;font-size:11px;color:#8080a0"></div>
      </div>
    </div>

    <!-- NINJATRADE GUIDE -->
    <div class="section">
      <div class="sec-hd">HOW TO EXPORT FROM NINJATRADE 8</div>
      <div style="padding:20px;display:flex;flex-direction:column;gap:10px">
        ${[['1','Open NinjaTrader 8'],
           ['2','Ctrl+P → Account Performance (or: Control Center → Account → Performance)'],
           ['3','Set date range → click Generate'],
           ['4','Click Export → CSV (top right)'],
           ['5','Also export: Orders, Fills, Position History for fuller data'],
           ['6','Drop any or all of those files into the zone above']].map(([n,s])=>`
          <div style="display:flex;gap:14px;align-items:flex-start">
            <div style="font-family:'Bebas Neue',monospace;font-size:20px;color:#00e5a0;line-height:1;min-width:22px">${n}</div>
            <div style="font-size:11px;color:#7070a0;padding-top:3px">${s}</div>
          </div>`).join('')}
      </div>
    </div>
    </div>`;

    setTimeout(()=>{
      const fi=el('fee-input');if(fi){fi.value=defaultFee;fi.onchange=()=>{defaultFee=parseFloat(fi.value)||4.50;};}
      const ai=el('auto-interval');if(ai){ai.value=autoInterval;ai.onchange=()=>{autoInterval=parseInt(ai.value)||60;};}
      el('auto-start-btn').onclick=startAutoImport;
      el('auto-stop-btn').onclick=stopAutoImport;

      const dz=el('drop-zone'),ci=el('csv-input');
      if(!dz||!ci)return;
      const handleFiles=async(files)=>{
        let totalImported=0,totalSkipped=0;
        const results=[];
        for(const file of files){
          const text=await file.text();
          const r=importFile(text,file.name);
          results.push({name:file.name,type:r.type,imported:r.imported,skipped:r.skipped});
          if(r.batch&&r.batch.length)await commitBatch(r.batch);
          totalImported+=r.imported;totalSkipped+=r.skipped;
        }
        const resDiv=el('import-result');
        if(resDiv){
          resDiv.style.display='block';
          resDiv.innerHTML='<div style="color:#00e5a0;margin-bottom:8px;font-size:12px">✅ IMPORT COMPLETE — '+totalImported+' trades added</div>'+
            results.map(r=>'<div style="display:flex;gap:16px;border-top:1px solid #181828;padding:6px 0"><span style="color:#8080a0">'+r.name+'</span><span class="tag">'+r.type+'</span><span style="color:#00e5a0">+'+r.imported+'</span><span style="color:#505070">'+r.skipped+' dupes skipped</span></div>').join('');
        }
        if(totalImported>0){activeTab='journal';setTimeout(()=>renderApp(),1500);}
      };
      dz.onclick=()=>ci.click();
      dz.ondragover=e=>{e.preventDefault();dz.classList.add('drag');};
      dz.ondragleave=()=>dz.classList.remove('drag');
      dz.ondrop=e=>{e.preventDefault();dz.classList.remove('drag');handleFiles([...e.dataTransfer.files]);};
      ci.onchange=e=>{if(e.target.files.length)handleFiles([...e.target.files]);};
    },50);
  }

  // ══ EXPORT ══
  if(activeTab==='export'){
    content.innerHTML=`<div style="max-width:560px">
      <div style="background:#09090f;border:1px solid #181828;padding:12px 16px;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center">
        <span style="font-size:10px;color:#6060a0;letter-spacing:1px">CLOUD SYNC · EDGE LOG v${VERSION}</span>
        <span style="color:#00e5a0;display:flex;align-items:center;font-size:10px"><span class="pulse"></span>LIVE · ${trades.length} TRADES SYNCED</span>
      </div>
      <div class="section" style="margin-bottom:12px">
        <div class="sec-hd">EXPORT DATA</div>
        <div style="padding:12px">
          <div style="display:flex;justify-content:space-between;align-items:center;background:#09090f;padding:12px 14px;margin-bottom:8px">
            <div><div style="font-size:12px;color:#c8ccd8;margin-bottom:3px">CSV Export</div><div style="font-size:10px;color:#606080">Import into Excel, Google Sheets, TradingView...</div></div>
            <button class="btn-g" id="exp-csv" ${!trades.length?'disabled':''}>DOWNLOAD CSV</button>
          </div>
        </div>
      </div>
      ${trades.length?`<div style="border:1px solid #ff3d5a22">
        <div style="background:#0d0008;padding:10px 16px;border-bottom:1px solid #ff3d5a22;font-size:10px;letter-spacing:2px;color:#ff3d5a">DANGER ZONE</div>
        <div style="padding:14px;display:flex;justify-content:space-between;align-items:center">
          <div style="font-size:11px;color:#6060a0">Permanently delete all ${trades.length} trades from cloud.</div>
          <button class="btn-r" id="clr-all">CLEAR ALL</button>
        </div></div>`:''}
    </div>`;
    setTimeout(()=>{
      if(el('exp-csv'))el('exp-csv').onclick=exportCSV;
      if(el('clr-all'))el('clr-all').onclick=async()=>{
        if(!confirm('Delete ALL '+trades.length+' trades? CANNOT be undone.'))return;
        const snap=await colRef.get();const batch=db.batch();snap.docs.forEach(d=>batch.delete(d.ref));await batch.commit();
      };
    },50);
  }
}

// ── Boot ──────────────────────────────────────────────────────────
if(!initFB()){document.getElementById('app').innerHTML='<div style="color:#ff3d5a;padding:40px;text-align:center">Firebase failed to initialize. Check your internet connection.</div>';}
else{auth.onAuthStateChanged(user=>{if(user){currentUser=user;subscribeTrades(user.uid);}else renderAuth();});}
</script>
</body>
</html>
