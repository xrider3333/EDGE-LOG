<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>EDGE LOG v4 — Trade Tracker</title>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Bebas+Neue&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#05050a;color:#dde0ec;font-family:'JetBrains Mono',monospace;font-size:13px}
.topbar{background:#080810;border-bottom:1px solid #141422;display:flex;align-items:stretch;padding:0 20px;position:sticky;top:0;z-index:100}
.btn-ghost{background:none;border:none;color:#404058;font-size:11px;letter-spacing:2px;padding:16px 24px;border-bottom:2px solid transparent}
.btn-ghost:hover{color:#a0a0c0}
.btn-ghost.active{color:#00e5a0;border-bottom-color:#00e5a0}
.btn-r{background:#ff3d5a14;border:1px solid #ff3d5a30;color:#ff3d5a;padding:8px 16px;font-size:10px}
.content{padding:25px;max-width:1200px;margin:0 auto}
.section{border:1px solid #141422;background:#0b0b12}
.sec-hd{background:#0b0b12;padding:12px 20px;border-bottom:1px solid #141422;font-size:10px;letter-spacing:2px;color:#505068}
.drop-zone{border:2px dashed #252538;padding:80px 20px;text-align:center;background:#09090f;cursor:pointer;transition:all .2s}
.drop-zone:hover,.drop-zone.drag{border-color:#00e5a0;background:#00e5a008}
.trade-row{padding:12px 16px;border-bottom:1px solid #1e1e2e;display:flex;justify-content:space-between;align-items:center}
.green{color:#00e5a0}
.red{color:#ff3d5a}
</style>
</head>
<body>
<div id="app"></div>

<script>
// EDGE LOG v4
const VERSION = "v4";

const PRESETS = {
  ES:{tv:12.50,ts:0.25}, MES:{tv:1.25,ts:0.25}, NQ:{tv:5.00,ts:0.25},
  MNQ:{tv:0.50,ts:0.25}, CL:{tv:10.00,ts:0.01}
};

function getBaseSymbol(sym) {
  return sym.replace(/[^A-Za-z]/g, '').slice(0,3).toUpperCase();
}

function calcPnl(sym, type, entry, exit, size) {
  const base = getBaseSymbol(sym);
  const p = PRESETS[base] || PRESETS.ES;
  const dir = type === 'LONG' ? 1 : -1;
  const ticks = (exit - entry) / p.ts;
  return +(ticks * p.tv * size).toFixed(2);
}

let trades = [];
let activeTab = 'import';

// Parser
function parseCSV(text) {
  const lines = text.split('\n').filter(l => l.trim());
  if (lines.length < 2) return alert("CSV is empty");

  function parseLine(line) {
    const result = [];
    let current = '', inQuotes = false;
    for (let char of line) {
      if (char === '"') inQuotes = !inQuotes;
      else if (char === ',' && !inQuotes) {
        result.push(current.trim());
        current = '';
      } else current += char;
    }
    result.push(current.trim());
    return result.map(f => f.replace(/^"|"$/g, '').trim());
  }

  const headers = parseLine(lines[0]).map(h => h.toLowerCase().trim());
  let newTrades = 0;

  for (let i = 1; i < lines.length; i++) {
    const row = parseLine(lines[i]);
    if (row.length < 6) continue;

    const get = (keys) => {
      for (let k of keys) {
        const idx = headers.findIndex(h => h.includes(k));
        if (idx !== -1 && row[idx]) return row[idx];
      }
      return '';
    };

    let symbol = get(['symbol']) || 'MES';
    const qty = parseInt(get(['qty'])) || 1;
    const buyPrice = parseFloat(get(['buyprice']));
    const sellPrice = parseFloat(get(['sellprice']));

    let type = buyPrice ? 'LONG' : 'SHORT';
    let entry = buyPrice || sellPrice;
    let exitPrice = sellPrice || buyPrice;

    let date = '';
    let dt = get(['boughttimestamp']) || get(['soldtimestamp']);
    if (dt) {
      const m = dt.match(/(\d{2})\/(\d{2})\/(\d{4})/);
      if (m) date = `${m[3]}-${m[1]}-${m[2]}`;
    }

    if (!entry || !exitPrice || isNaN(entry) || isNaN(exitPrice)) continue;

    const pnl = calcPnl(symbol, type, entry, exitPrice, qty);

    const isDuplicate = trades.some(t => 
      t.date === date && t.symbol === getBaseSymbol(symbol) && Math.abs(t.entry - entry) < 0.01
    );

    if (!isDuplicate) {
      trades.push({
        date: date,
        symbol: getBaseSymbol(symbol),
        type: type,
        entry: +entry.toFixed(2),
        exit: +exitPrice.toFixed(2),
        size: qty,
        fees: 0,
        setup: '—',
        notes: 'Imported from NinjaTrader',
        chartUrl: '',
        pnl: pnl
      });
      newTrades++;
    }
  }

  alert(`✅ EDGE LOG v4\n\nImported ${newTrades} new trades!\nTotal: ${trades.length} trades`);
  activeTab = 'journal';
  renderApp();
}

function clearAllTrades() {
  if (!confirm(`Delete ALL ${trades.length} trades? This cannot be undone.`)) return;
  trades = [];
  alert("All trades have been cleared.");
  renderApp();
}

function renderApp() {
  let html = `
  <div class="topbar">
    <div style="padding:16px 24px;font-family:'Bebas Neue';font-size:24px;color:#00e5a0">
      EDGE LOG <span style="font-size:14px;color:#505070">${VERSION}</span>
    </div>
    <button class="btn-ghost ${activeTab==='overview'?'active':''}" onclick="activeTab='overview';renderApp()">OVERVIEW</button>
    <button class="btn-ghost ${activeTab==='journal'?'active':''}" onclick="activeTab='journal';renderApp()">JOURNAL (${trades.length})</button>
    <button class="btn-ghost ${activeTab==='import'?'active':''}" onclick="activeTab='import';renderApp()">IMPORT</button>
  </div>
  <div class="content">`;

  if (activeTab === 'import') {
    html += `
    <div class="section">
      <div class="sec-hd">NINJATRADER IMPORT — v4</div>
      <div id="drop-zone" class="drop-zone" style="margin:40px">
        <div style="font-size:65px;margin-bottom:20px">📂</div>
        <div style="font-size:17px">Drop your NinjaTrader CSV here</div>
        <div style="font-size:12px;color:#606080;margin-top:12px">Performance.csv • Duplicate protection • Correct MES calculation</div>
        <input type="file" id="csv-input" accept=".csv" style="display:none">
      </div>
    </div>`;
  } 
  else if (activeTab === 'journal') {
    html += `<div class="section"><div class="sec-hd">TRADES (${trades.length})</div>`;
    if (trades.length === 0) {
      html += `<div style="padding:100px;text-align:center;color:#505070">No trades yet — Go to Import tab</div>`;
    } else {
      html += `<div style="max-height:680px;overflow:auto">`;
      trades.slice().reverse().forEach(t => {
        html += `
        <div class="trade-row">
          <div>${t.date || '—'} ${t.symbol} <span style="color:${t.type==='LONG'?'#00e5a0':'#ff3d5a'}">${t.type}</span> ${t.size}x</div>
          <div>${t.entry} → ${t.exit}</div>
          <div style="color:${t.pnl >= 0 ? '#00e5a0' : '#ff3d5a'};font-weight:bold">${t.pnl >= 0 ? '+' : ''}$${t.pnl}</div>
        </div>`;
      });
      html += `</div>`;
    }
    html += `</div>`;
  } 
  else {
    const total = trades.reduce((sum, t) => sum + (t.pnl || 0), 0);
    html += `
    <div class="section">
      <div class="sec-hd">OVERVIEW — EDGE LOG v4</div>
      <div style="padding:50px;text-align:center">
        <div style="font-size:52px;color:${total >= 0 ? '#00e5a0' : '#ff3d5a'}">${total >= 0 ? '+' : ''}$${total.toFixed(2)}</div>
        <div style="margin-top:10px;color:#8080a0">TOTAL P&L</div>
        <div style="margin-top:50px">
          <button onclick="clearAllTrades()" class="btn-r">CLEAR ALL TRADES</button>
        </div>
      </div>
    </div>`;
  }

  html += `</div>`;
  document.getElementById('app').innerHTML = html;

  // Drop zone
  setTimeout(() => {
    const dz = document.getElementById('drop-zone');
    const input = document.getElementById('csv-input');
    if (dz && input) {
      dz.onclick = () => input.click();
      input.onchange = e => {
        const file = e.target.files[0];
        if (file) {
          const reader = new FileReader();
          reader.onload = ev => parseCSV(ev.target.result);
          reader.readAsText(file);
        }
      };
      dz.ondragover = e => {e.preventDefault(); dz.classList.add('drag');};
      dz.ondragleave = () => dz.classList.remove('drag');
      dz.ondrop = e => {
        e.preventDefault();
        dz.classList.remove('drag');
        const file = e.dataTransfer.files[0];
        if (file) {
          const reader = new FileReader();
          reader.onload = ev => parseCSV(ev.target.result);
          reader.readAsText(file);
        }
      };
    }
  }, 100);
}

renderApp();
</script>
</body>
</html>
