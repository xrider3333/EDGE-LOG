name: tests

# Runs the streamlit-free engine test suite. The Streamlit app (optimizer.py) is
# NOT imported here — only augur_engine/, api/, and augur_mp_worker.py, which is
# exactly the code these tests cover.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
      - name: Run tests
        run: pytest -ra
