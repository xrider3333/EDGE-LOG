[pytest]
# Repo root is the import root: tests do `import augur_engine`, `import augur_mp_worker`.
# The root conftest.py puts the repo root on sys.path so this works without installing
# the package. Keep tests out of the Streamlit app / strategy plugins.
testpaths = tests
python_files = test_*.py
python_functions = test_*
addopts = -ra
